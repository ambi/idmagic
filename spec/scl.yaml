# idmagic — SCL context map
# Root context map for the IdMagic SCL 3.0 workspace.

system: idmagic
spec_version: "3.0"
context_map:
  System:
    description: 外部標準、共有語彙、横断ユーザー体験、context 横断シナリオを所有する。
    path: contexts/system.yaml
    publishes:
      []
  Tenancy:
    description: テナント (Realm) 集約、ライフサイクル、HTTP リクエストからのテナント解決、テナント管理 API を所有する。テナントは idmagic のあらゆる集約に共通する境界文脈。
    path: contexts/tenancy.yaml
    publishes:
      - TenantRef
      - ResolveTenant
      - QuotaExceededError
  IdManagement:
    description: 人間 User、Group、非人間 Agent という identity principal と、そのプロフィール、ロール、ライフサイクル、管理 API、自己管理 API を所有する。資格情報検証、MFA、ログインセッションは Authentication に分離する。
    path: contexts/identity-management.yaml
    publishes:
      - UserRef
      - GroupRef
      - AgentRef
      - EffectiveRoles
    depends_on:
      Tenancy:
        via: published_language
        uses:
          - TenantRef
          - QuotaExceededError
        reason: identity principal と管理 API はテナント境界内に閉じる。
      Jobs:
        via: published_language
        uses:
          - JobRef
        reason: dynamic group rule の全件再評価を durable job として実行する。
      ApiTokens:
        via: published_language
        uses:
          - ApiTokenScope
        reason: identity 自己管理 API は ApiTokens が所有する account:* scope で発行者本人の操作を認可する。
  Authentication:
    description: エンドユーザ (Subject) の資格情報検証、MFA、ログインセッション、パスワード変更・リセット、step-up、認証イベントを所有する。User / Group / Agent の identity ライフサイクルは IdManagement が所有する。
    path: contexts/authentication.yaml
    publishes:
      - AuthenticationContext
      - LoginSessionRef
    depends_on:
      Tenancy:
        via: published_language
        uses:
          - TenantRef
          - QuotaExceededError
        reason: LoginSession と認証イベントはテナント境界内に閉じる。
      IdManagement:
        via: published_language
        uses:
          - UserRef
          - AgentRef
        reason: 認証は User の状態、required actions、MFA 登録状態、Agent 所有者などの identity 情報を参照する。
      ApiTokens:
        via: published_language
        uses:
          - ApiTokenScope
        reason: authentication 自己管理 API は ApiTokens が所有する account:* scope で発行者本人の操作を認可する。
  OAuth2:
    description: "OAuth 2.0 / OIDC プロトコルファミリーの全責務を所有する。Client metadata\nとその Dynamic Registration、認可判断 (Authorize / Consent /\nAuthorization Code / PAR / Device Authorization / RP-Initiated Logout)、\nトークン発行とライフサイクル (AccessToken / RefreshToken / ID Token /\nIntrospect / Revoke / UserInfo / proof-of-possession)、Discovery /\nAuthorization Server Metadata / 健全性報告\nを本 bounded context に集約する。\n"
    path: contexts/oauth2.yaml
    publishes:
      - Authorize
      - Token
      - UserInfo
      - OAuth2ClientRef
      - AccessTokenClaims
    depends_on:
      Tenancy:
        via: published_language
        uses:
          - TenantRef
          - QuotaExceededError
        reason: クライアント・コード・トークン・鍵はテナント境界内に閉じる。
      Authentication:
        via: published_language
        uses:
          - AuthenticationContext
        reason: Authorize は AuthenticationContext を Authentication から解決する。
      IdManagement:
        via: published_language
        uses:
          - UserRef
          - AgentRef
        reason: UserInfo / ID Token claim と Agent client_credentials は identity principal 情報を参照する。
      SigningKeys:
        via: published_language
        uses:
          - SigningKey
          - JWKS
          - SignatureAlgorithm
        reason: ID Token / access token / JWK Set の署名鍵ライフサイクルと公開は SigningKeys が所有する。
      Jobs:
        via: published_language
        uses:
          - JobRef
        reason: back-channel logout の配送 (LogoutNotification) を再試行可能な durable job (kind=backchannel_logout_delivery) として実行する (wi-28)。
      Application:
        via: published_language
        uses:
          - ApplicationAssignmentRef
        reason: authorize は client が属する Application への割当を fail-closed で確認する。
      ApiTokens:
        via: published_language
        uses:
          - ApiTokenScope
        reason: OAuth2 の管理 API は ApiTokens が所有する resource 別 scope で操作を認可する。
  Audit:
    description: "authentication、identity-management、oauth2、tenancy、signing-keys、application、\nsaml / wsfederation など複数 bounded context から発火されるセキュリティ監査イベントの\n横断的な read model を所有する。監査イベントの検索・エクスポート管理 API、検索属性\nregistry、PII 変換方針、保持期間を集約する。イベントの発火元は各 context のままであり、\nAudit はそれらを横断して読む窓口を所有する。\n"
    path: contexts/audit.yaml
    publishes:
      []
    depends_on:
      Tenancy:
        via: published_language
        uses:
          - TenantRef
        reason: 監査イベントはテナント境界内に閉じる。system_admin だけが default tenant 経路から横断参照できる。
  Application:
    description: "運用者が「接続する業務アプリケーション」として扱う上位概念を所有する。OIDC client /\nSAML SP / WS-Fed RP は Application の protocol binding であり、表示名、アイコン、\nライフサイクル、割当はここに集約する。割当はポータル可視性と\nフェデレーション利用可否を fail-closed で制御する。protocol binding の wire 挙動は\n各 protocol context が所有し、Application は binding を opaque key で参照する。\n"
    path: contexts/application.yaml
    publishes:
      - ApplicationRef
      - ApplicationAssignmentRef
    depends_on:
      Tenancy:
        via: published_language
        uses:
          - TenantRef
          - QuotaExceededError
        reason: Application・binding・割当は realm 境界内に閉じる。
      IdManagement:
        via: published_language
        uses:
          - UserRef
          - GroupRef
        reason: 割当の subject は User / Group の identity principal である。
      ClaimMapping:
        via: published_language
        uses:
          - ClaimMappingPolicy
        reason: protocol binding の claim release 設定は ClaimMapping の公開 policy を参照する。
      ApiTokens:
        via: published_language
        uses:
          - ApiTokenScope
        reason: Application 管理 API は applications:*、自己管理 API は account:* scope で操作を認可する。
  ClaimMapping:
    description: "identity principal の属性を外部 relying party / service provider / client へ出すための\nrelease policy と protocol-neutral な claim projection を所有する。属性解決と出力許可を\n共通化し、OIDC JSON claims、SAML AttributeStatement、WS-Fed claim URI への wire 変換は\n各 protocol context が所有する。\n"
    path: contexts/claim-mapping.yaml
    publishes:
      - ClaimMappingPolicy
      - IssuedClaim
    depends_on:
      Tenancy:
        via: published_language
        uses:
          - TenantRef
        reason: claim release policy は realm 境界内に閉じる。
      IdManagement:
        via: published_language
        uses:
          - UserRef
        reason: claim の source は User 等 identity principal の属性である。
  SigningKeys:
    description: "tenant-scoped signing key material のライフサイクル、ローテーション、公開重複期間、監査を\nprotocol 横断で所有する。OAuth2/OIDC は JWK/JWKS と JWT signer、SAML / WS-* は X.509\n証明書と XML signer adapter を使うが、鍵用途・ローテーション・tenant isolation の規範は\nここに集約する。\n"
    path: contexts/signing-keys.yaml
    publishes:
      - SigningKey
      - JWKS
      - SignatureAlgorithm
    depends_on:
      Tenancy:
        via: published_language
        uses:
          - TenantRef
        reason: 署名鍵と証明書は tenant / realm 境界内に閉じる。
  WsFederation:
    description: WS-Federation passive と WS-Trust active STS の trust、federationmetadata.xml、MEX、RST/RSTR、WS-Fed relying party binding を所有する。SAML assertion / claim release / signing key lifecycle の共有 capability には依存するが、SAML 2.0 SP binding は Saml context が所有する。
    path: contexts/ws-federation.yaml
    publishes:
      - WsFederationSignIn
      - WsTrustIssue
    depends_on:
      Tenancy:
        via: published_language
        uses:
          - TenantRef
        reason: WS-Fed RP trust と endpoint は realm 境界内に閉じる。
      Authentication:
        via: published_language
        uses:
          - AuthenticationContext
        reason: WS-Fed passive は AuthenticationContext を参照し、WS-Trust usernamemixed は資格情報検証を再利用する。
      IdManagement:
        via: published_language
        uses:
          - UserRef
        reason: WS-Fed / WS-Trust token の subject は User 属性から解決する。
      ClaimMapping:
        via: published_language
        uses:
          - ClaimMappingPolicy
          - IssuedClaim
        reason: WS-Fed / WS-Trust の assertion claim は ClaimMapping policy で組み立てる。
      Application:
        via: published_language
        uses:
          - ApplicationAssignmentRef
        reason: WS-Fed sign-in は RP が属する Application への割当を fail-closed で確認する。
      SigningKeys:
        via: published_language
        uses:
          - SigningKey
        reason: SAML assertion 署名証明書と metadata への証明書広告は SigningKeys の鍵境界に従う。
      ApiTokens:
        via: published_language
        uses:
          - ApiTokenScope
        reason: WS-Fed 管理 API は ApiTokens が所有する wsfed:* scope で操作を認可する。
  Saml:
    description: "SAML 2.0 IdP の service provider binding、IdP metadata、AuthnRequest / Response、\nAssertionConsumerService / Single Logout を所有する protocol context。Web Browser SSO Profile に\n基づき SP-initiated / IdP-initiated SSO を提供する。WS-Fed / WS-Trust とは claim release と\nXML signing capability だけを共有する。\n"
    path: contexts/saml.yaml
    publishes:
      - SamlSingleSignOn
      - PublishSamlMetadata
    depends_on:
      Tenancy:
        via: published_language
        uses:
          - TenantRef
        reason: SAML SP trust と metadata は realm 境界内に閉じる。
      Authentication:
        via: published_language
        uses:
          - AuthenticationContext
        reason: SAML SSO は AuthenticationContext を参照する。
      IdManagement:
        via: published_language
        uses:
          - UserRef
        reason: SAML assertion の subject は User 属性から解決する。
      ClaimMapping:
        via: published_language
        uses:
          - ClaimMappingPolicy
          - IssuedClaim
        reason: SAML AttributeStatement / NameID は ClaimMapping policy を利用する。
      Application:
        via: published_language
        uses:
          - ApplicationAssignmentRef
        reason: SAML SSO は SP が属する Application への割当を fail-closed で確認する。
      SigningKeys:
        via: published_language
        uses:
          - SigningKey
        reason: SAML assertion / metadata 署名は SigningKeys の鍵境界に従う。
      ApiTokens:
        via: published_language
        uses:
          - ApiTokenScope
        reason: SAML 管理 API は ApiTokens が所有する saml:* scope で操作を認可する。
  Scim:
    description: "SCIM 2.0 Inbound Provisioning プロトコルファミリーの全責務を所有する。/scim/v2/Users, /scim/v2/Groups などのエンドポイントを提供し、外部の IDP/Identity Provider (Okta, Google IAM, Entra ID) からのユーザー・グループ同期を処理する。"
    path: contexts/scim.yaml
    publishes:
      - ScimUserRef
      - ScimGroupRef
    depends_on:
      Tenancy:
        via: published_language
        uses:
          - TenantRef
        reason: SCIM クライアント、トークン、プロビジョニングデータはテナント境界内に閉じる。
      IdManagement:
        via: published_language
        uses:
          - UserRef
          - GroupRef
        reason: SCIM のプロビジョニング要求は User および Group aggregate の作成・更新・削除へと変換・適用される。
      ApiTokens:
        via: published_language
        uses:
          - ApiTokenScope
        reason: SCIM endpoint は ApiTokens が発行・認証する token の scim:* scope で操作を認可する。
  ApiTokens:
    description: "管理用 API と SCIM API を認証する tenant-scoped な API アクセストークン (idmagic_pat_ 接頭辞) の発行・失効・一覧と、scope 語彙を所有する。トークンに付与された scope 集合は認証時に実行コンテキストの token_scopes として展開され、各 record context の操作認可に使われる。SCIM を含む各 API surface の endpoint 自体は所有せず、トークンと scope 語彙という横断的な認証基盤だけを提供する。"
    path: contexts/api-tokens.yaml
    publishes:
      - ApiTokenScope
    depends_on:
      Tenancy:
        via: published_language
        uses:
          - TenantRef
        reason: API アクセストークンはテナント境界内に閉じ、tenant_id を必須とする。
  Jobs:
    description: "テナント境界を保つ汎用非同期ジョブ基盤の durable queue と worker runtime を所有する。\n各ジョブの業務ロジックは呼び出し元の bounded context の usecase に残り、Jobs は\nenqueue・claim・リース・リトライ・進捗可視化という技術的能力だけを提供する。管理者向け\n一覧/詳細/キャンセル API と運用 metrics は wi-157-job-admin-operations-surface が別途所有する。\n"
    path: contexts/jobs.yaml
    publishes:
      - JobRef
    depends_on:
      Tenancy:
        via: published_language
        uses:
          - TenantRef
          - QuotaExceededError
        reason: Job は tenant_id を必須とし、worker はテナント境界内でのみ副作用を起こす。
  Seeding:
    description: "環境別の seed profile、投入計画、dry-run、適用の安全方針を所有する運用 bounded context。\n各業務データの意味と永続化は各 record context に残し、Seeding は published command\nsurface を通じて依存順の実行を調整する。profile は明示選択であり、production では\nbootstrap 以外を fail-closed で拒否する。\n"
    path: contexts/seeding.yaml
    publishes:
      - SeedData
    depends_on:
      Tenancy:
        via: published_language
        uses:
          - TenantRef
        reason: seed request と実行対象はテナント境界を明示し、既存 tenant を越えて適用しない。
  Provisioning:
    description: "idmagic を SCIM 2.0 client にした outbound provisioning (下流 SaaS への\nuser/group push lifecycle management) を所有する。真実源は idmagic 側の User/Group、\n下流は mirror。connection は Application 1 件に対し最大 1 件、scope は既存\nApplicationAssignment を再利用する。Scim は inbound server 専用のままで、本 context とは\nprotocol を話す点以外ほぼ重ならない別 context。\n"
    path: contexts/provisioning.yaml
    publishes:
      []
    depends_on:
      Tenancy:
        via: published_language
        uses:
          - TenantRef
        reason: ProvisioningConnection・RemoteResourceLink・ProvisioningDelivery はテナント境界内に閉じる。
      Application:
        via: published_language
        uses:
          - ApplicationRef
          - ApplicationAssignmentRef
        reason: connection は Application に帰属し、scope=assigned_only は ApplicationAssignment を参照する。
      IdManagement:
        via: published_language
        uses:
          - UserRef
          - GroupRef
        reason: 配送対象の User/Group を参照し、既定属性マッピングは User/Group の属性を写す。
      Jobs:
        via: published_language
        uses:
          - JobRef
        reason: ProvisioningDelivery の配送は冪等・順序保証・retry 付きの durable job として実行する。
      ApiTokens:
        via: published_language
        uses:
          - ApiTokenScope
        reason: Provisioning 管理 API は ApiTokens が所有する provisioning:* scope で操作を認可する。
  IdGovernance:
    description: "identity ガバナンスの policy と orchestration を所有する。LifecycleWorkflow (JML 自動化) の\ndefinition・trigger 評価・WorkflowRun 実行・executor action を集約し、将来の IGA 機能\n(認証キャンペーン、アクセスリクエスト/承認、エンタイトルメント/SoD、JIT 特権昇格) の受け皿となる。\nidentity principal の record-of-truth は IdManagement が、Application 割当は Application が\n所有し、IdGovernance は User ライフサイクルイベントを購読し、冪等コマンド surface 経由で\nこれら record context の状態を書き換える。\n"
    path: contexts/identity-governance.yaml
    publishes:
      []
    depends_on:
      Tenancy:
        via: published_language
        uses:
          - TenantRef
        reason: LifecycleWorkflow・WorkflowRun はテナント境界内に閉じる。
      IdManagement:
        via: published_language
        uses:
          - UserRef
          - GroupRef
        reason: trigger は User ライフサイクルイベントを購読し、executor は User/Group への冪等コマンド surface を published interface 経由で呼ぶ。
      Application:
        via: published_language
        uses:
          - ApplicationRef
          - ApplicationAssignmentRef
        reason: assign/unassign_application action は Application の published 冪等コマンド surface を経由して割当を書き換える。
      Jobs:
        via: published_language
        uses:
          - JobRef
        reason: WorkflowRun は lifecycle_workflow_run kind の durable job として実行される。
