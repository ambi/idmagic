# idmagic SigningKeys — SCL
# SCL 3.0 context specification.
# KeyProviderFailClosed の実際の強制点は OAuth2.Token の requires であり、SigningKeys
# 自体は署名/発行 interface を持たない。強制点は OAuth2 context 側に置く。

system: idmagic
spec_version: "3.0"
context: SigningKeys
glossary:
  SigningKeys:
    definition: tenant-scoped signing key material のライフサイクルと公開を扱う境界。OAuth2/OIDC は JWK/JWKS、SAML/WS-* は X.509 証明書を使う。
    aliases:
      - KeyMaterial
      - signing keys
  Retire:
    definition: SigningKey を Verifying から Retired に移す。
    aliases:
      - retire
  Archive:
    definition: SigningKey を Retired から Archived に移す。
    aliases:
      - archive
  Verifying:
    definition: 署名はしないが、過去発行トークンの検証のため JWKS に残っている状態。
    aliases:
      - verifying
  Retired:
    definition: JWKS から除去された状態。新規検証には使われない。
    aliases:
      - retired
  Archived:
    definition: 監査用に長期保管されている終端状態。鍵マテリアルは封印。
    aliases:
      - archived
  KeyProvider:
    definition: 鍵マテリアルの保管場所と署名の実行主体。Local / Postgres は private key をプロセス内に持ちアプリが署名する dev/test 用、VaultTransit は private key を Vault 内に保持し署名を Vault API に委ねる本番用。
    aliases:
      - key provider
      - 鍵プロバイダ
  VaultTransit:
    definition: HashiCorp Vault の Transit secrets engine を使う KeyProvider。秘密鍵マテリアルは Vault 外に出ず、署名要求ごとに Vault へ委譲する。
    aliases:
      - Vault Transit
  FailClosed:
    definition: KeyProvider が不達のとき、新規 token 発行を停止する挙動。既発行 token 検証用の JWKS は取得可能な範囲で返す。強制点は OAuth2.Token の requires が持つ。
    aliases:
      - fail-closed
      - フェイルクローズ
models:
  User:
    kind: entity
    description: IdentityManagement が publish する identity principal を、認可判断に必要な属性だけで表す published language stub。
    identity: id
    fields:
      id:
        type: String
      tenant_id:
        type: String
      status:
        type: String
      roles:
        type: "String[]"
  Tenant:
    kind: entity
    description: Tenancy が publish するテナント集約を、認可判断に必要な識別子だけで表す published language stub。
    identity: id
    fields:
      id:
        type: String
  SignatureAlgorithm:
    kind: enum
    description: JWT 署名アルゴリズム。FAPI 2.0 が許容する asymmetric な強度の高いものに限定（HS256 等の対称鍵は除外）。
    values:
      - PS256
      - ES256
  SigningKeyState:
    kind: enum
    description: SigningKeyLifecycle 状態機械の取りうる状態列挙。Active が現行署名鍵、Verifying は JWKS に残るが署名はしない、Retired は JWKS から除去済、Archived は監査保管。
    values:
      - Active
      - Verifying
      - Retired
      - Archived
  KeyProvider:
    kind: enum
    description: 鍵マテリアルの保管場所と署名の実行主体。Local / Postgres は private key をプロセス内に保持する dev/test 用、VaultTransit は private key を Vault 内に保持し署名を Vault へ委譲する本番用。
    values:
      - Local
      - Postgres
      - VaultTransit
  KeyUsage:
    kind: enum
    description: 鍵の用途。現状は OAuth2/OIDC の JWT 署名 (Signing) のみ。JWE 暗号鍵や SAML/WS-* の X.509 は将来の用途として枠だけ残す。
    values:
      - Signing
  SigningKey:
    kind: entity
    description: トークン署名用の非対称鍵。テナントごとに Active 1本＋Verifying 過去鍵 0本以上を JWKS に並べる（SigningKeyMinJwksOverlap、[[ADR-108]]）。列挙・検索・回転・署名鍵選択はすべて tenant_id で絞る。tenant_id は既存 Tenant を指す。
    identity: kid
    fields:
      tenant_id:
        type: String
        default: default
        description: 鍵が属するテナント ID。既存 Tenant を指し、テナント A の JWKS にテナント B の kid は出ない。
      kid:
        type: String
        constraints:
          - non_empty
      alg:
        type: SignatureAlgorithm
      provider:
        type: KeyProvider
        description: 鍵マテリアルの保管場所と署名の実行主体。
      usage:
        type: KeyUsage
        description: 鍵の用途。現状 Signing のみ。
      public_jwk:
        type: JWK
      state:
        type: SigningKeyState
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
      activated_at:
        type: DateTime
        optional: true
        description: 一度 Active となった時刻。
      retired_at:
        type: DateTime
        optional: true
        description: Retired 状態に遷移した時刻。
      archived_at:
        type: DateTime
        optional: true
  JWK:
    kind: value_object
    description: JSON Web Key (RFC 7517)。kid で識別される 1 件の公開鍵情報。
    fields:
      kty:
        type: String
      use:
        type: String
        optional: true
      kid:
        type: String
      alg:
        type: String
        optional: true
      extra:
        type: JSON
        optional: true
  JWKS:
    kind: value_object
    description: JWK Set (RFC 7517 §5)。/jwks エンドポイントが返す公開鍵集合。クライアントがトークン署名を検証する際に取得する。
    fields:
      keys:
        type: "JWK[]"
  AdminKeyResponse:
    kind: value_object
    description: "管理者向けに公開する署名鍵のメタデータ。秘密鍵は当然返さず、JWKS と\n同じ公開鍵 JWK のみを含める。鍵の状態 (active / verifying) と作成時刻で\nローテーション可否を判断できる粒度を提供する。\n"
    fields:
      kid:
        type: String
        description: JWK Key ID。JWKS で配布されるものと同一。
      alg:
        type: SignatureAlgorithm
        description: 署名アルゴリズム (現状 PS256 のみ)。
      provider:
        type: KeyProvider
        description: 鍵マテリアルの保管場所と署名の実行主体。
      active:
        type: Boolean
        description: true のとき新規 ID Token / Access Token の署名鍵。false は verifying 用途で JWKS 残留。
      created_at:
        type: DateTime
        description: 鍵生成時刻 ([[ADR-108]] の SigningKeyMaxAge / SigningKeyMinJwksOverlap 評価の起点)。
      public_jwk:
        type: JSON
        description: 公開鍵 JWK。JWKS と同じ表現。
  AdminKeyListResponse:
    kind: value_object
    description: 全署名鍵の一覧。active が複数同時に存在することは無い (rotateInternal で旧鍵は非 active 化)。
    fields:
      keys:
        type: "AdminKeyResponse[]"
  AdminRotateKeyResponse:
    kind: value_object
    description: 鍵ローテーションの結果。新しい active 鍵と直前の active 鍵 (verifying へ降りた) の kid を返す。
    fields:
      next:
        type: AdminKeyResponse
        description: 新しい active 署名鍵。
      previous:
        type: AdminKeyResponse
        optional: true
        description: 直前まで active だった鍵 (初回ローテーション時は無し)。
  TenantSigningKey:
    kind: value_object
    description: "テナント 1 件分の署名鍵ヘルス。system_admin がテナント横断で鍵の\n健全性 (provider / active kid / 鍵数 / provider 到達性) を一覧するために返す。\n秘密鍵は含めない。\n"
    fields:
      tenant_id:
        type: String
        description: 対象テナント ID。
      provider:
        type: KeyProvider
        description: このテナントが使う KeyProvider。
      usage:
        type: KeyUsage
        description: 鍵の用途。現状 Signing。
      active_kid:
        type: String
        optional: true
        description: 現在 active な署名鍵の kid。鍵がまだ無いテナントでは無し。
      active_state:
        type: SigningKeyState
        optional: true
        description: active 鍵の状態。
      jwks_key_count:
        type: Integer
        description: JWKS に載る鍵数 (active + verifying)。
      provider_healthy:
        type: Boolean
        description: KeyProvider が到達可能か。false のとき FailClosed で新規発行を止める (強制点は OAuth2.Token)。
  SigningKeyRotated:
    kind: event
    description: JWKS の署名鍵が回転した（[[ADR-108]] の既定 90 日ごと、または緊急回転）。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 回転した署名鍵が属するテナント ID。
      newKid:
        type: String
      previousKid:
        type: String
        optional: true
  SigningKeyRetired:
    kind: event
    description: "署名鍵が Verifying から Retired に移り JWKS から除去された\n([[ADR-108]] の SigningKeyMinJwksOverlap 経過、または緊急無効化)。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      kid:
        type: String
  SigningKeyArchived:
    kind: event
    description: 署名鍵が Retired から Archived (終端、監査保管) に移った。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      kid:
        type: String
  InvalidRequestError:
    kind: error
    description: リクエストに必須パラメータの欠落・不正値・重複・存在しない kid 等がある (RFC 6749 §5.2 invalid_request)。OAuth2 context が定義する共通 error の published language stub。
    payload:
      reason:
        type: String
        optional: true
  AccessDeniedError:
    kind: error
    description: 認証済みだが認可条件を満たさない、またはサーバーポリシーが許可しなかった。OAuth2 context が定義する共通 error の published language stub。
states:
  SigningKeyLifecycle:
    description: 署名鍵のライフサイクル ([[ADR-108]] の SigningKeyMinJwksOverlap)。Active から Rotate で Verifying に降り、Retire で JWKS から外し、Archive で監査保管に入る。
    target: SigningKey
    initial: Active
    terminal:
      - Archived
    transitions:
      - from: Active
        event: SigningKeyRotated
        to: Verifying
      - from: Verifying
        event: SigningKeyRetired
        to: Retired
      - from: Retired
        event: SigningKeyArchived
        to: Archived
interfaces:
  GetJwks:
    description: "解決済みテナント (未 prefix リクエストは default) の JWKS (RFC 7517) を返す公開 interface。\n"
    output:
      jwks:
        type: JWKS
    ensures:
      - output.jwks.keys.all(k, tenant_owns_signing_key(context.tenant_id, k))
    read_only: true
    access: public
    bindings:
      - kind: http
        method: GET
        path: /jwks
  ListTenantJwks:
    description: "テナント指定の JWKS (RFC 7517)。当該テナントの active + verifying\n(retired-not-expired) 鍵のみを返す。テナント A の JWKS にテナント B の kid は\n出ない。RP はこの URL で自テナント発行トークンの署名を検証する。認証を要求しない。\n"
    input:
      tenant_id:
        type: String
    output:
      jwks:
        type: JWKS
    ensures:
      - output.jwks.keys.all(k, tenant_owns_signing_key(input.tenant_id, k))
    read_only: true
    access: public
    bindings:
      - kind: http
        method: GET
        path: "/realms/{tenant_id}/jwks"
  ListAdminKeys:
    description: "テナント内 admin が自テナントの JWKS に乗っている署名鍵 (active + verifying) の\nメタデータを取得する。対象は context.tenant_id に固定するため cross-tenant 読み出しは\n構造的に発生しない。\n"
    output:
      response:
        type: AdminKeyListResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: /api/admin/keys
  GetAdminKey:
    description: テナント内 admin が kid を指定して自テナントの署名鍵 1 件を取得する。他テナントの kid または存在しない kid は InvalidRequestError。
    input:
      kid:
        type: String
    output:
      key:
        type: AdminKeyResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/keys/{kid}"
  RotateTenantSigningKey:
    description: "テナント内 admin が自テナントに新しい署名鍵を生成し active を切り替える。旧 active 鍵は\nJWKS に verifying として残存し、[[ADR-108]] の SigningKeyMinJwksOverlap 期間後に Retire される\n(Retire 処理は別の運用ジョブ)。テナント単位のため回転の影響範囲は当該テナントに\n閉じる。\n"
    output:
      response:
        type: AdminRotateKeyResponse
    errors:
      - AccessDeniedError
    emits:
      - SigningKeyRotated
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: POST
        path: /api/admin/keys/rotate
        successful_status_codes:
          - "200"
  DisableTenantKey:
    description: "緊急時にテナント内 admin が自テナントの署名鍵 1 件を kid 指定で無効化 (Retire) する。\n漏洩疑いの鍵を JWKS から即時に外すための操作。active 鍵を無効化した場合は\n直近の verifying 鍵へフォールバックできないため、続けて回転が要る。\nSigningKeyRotated は発行せず、鍵の状態のみ Retired にする。\n"
    input:
      kid:
        type: String
    output:
      key:
        type: AdminKeyResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/keys/{kid}/disable"
        successful_status_codes:
          - "200"
  ListTenantKeyHealth:
    description: "system_admin がテナント横断で署名鍵ヘルス (provider / active kid /\n鍵数 / provider 到達性) を一覧する。秘密鍵は返さない。fail-closed 判定や\n回転漏れの検知に使う。\n"
    output:
      tenants:
        type: "TenantSigningKey[]"
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [SystemAdministrator]
      resource:
        type: SigningKeyDirectory
        id: '"signing_key_directory"'
    bindings:
      - kind: http
        method: GET
        path: /api/admin/keys/health
authorization:
  resources:
    SigningKeyDirectory:
      description: 全テナントの署名鍵ヘルスを横断する一覧対象を表す singleton resource。
  principals:
    SystemAdministrator:
      type: User
      matches:
        - context.authenticated
        - principal.status == "Active"
        - '"system_admin" in principal.roles'
        - principal.tenant_id == "default"
    TenantAdministrator:
      type: User
      matches:
        - context.authenticated
        - principal.status == "Active"
        - '"admin" in principal.roles || "system_admin" in principal.roles'
  policies:
    SystemAdministrator:
      effect: permit
      principal: SystemAdministrator
    TenantAdministrator:
      effect: permit
      principal: TenantAdministrator
      when: principal.tenant_id == resource.id
objectives:
  JwksLatency:
    description: /jwks 応答の99%以上を20ms未満で返す。クライアントの署名検証準備のため極めて低レイテンシを要求し、CDN キャッシュも前提とする。
    interface: GetJwks
    indicator: measurement.latency < duration("20ms")
    target: 0.99
    window: 30d
    budgeting: occurrences
  JwksErrorRate:
    description: /jwks 応答の99.99%以上を非5xxで返す。全クライアントの署名検証経路に影響するため一桁厳しい上限を要求する。
    interface: GetJwks
    indicator: measurement.status_code < 500
    target: 0.9999
    window: 30d
    budgeting: occurrences
scenarios:
  署名鍵を回転しても旧kidはJWKSに残る:
    actor: TenantAdministrator
    given:
      - "admin ロールを持つ \"operator\" が認証済みである"
      - "現在の署名鍵は kid \"kid-old\" を持つ"
    main_success:
      - "\"operator\" が管理画面で現在の署名鍵を回転する"
      - "回転により kid \"kid-new\" が新しい active 鍵になる"
      - JWKS を取得する
      - "応答に kid \"kid-old\" と \"kid-new\" の両方が含まれる"
  テナントごとのJWKSは互いに分離される:
    actor: TenantAdministrator
    given:
      - "テナント \"tenant-a\" とテナント \"tenant-b\" がそれぞれ署名鍵を持つ"
    main_success:
      - "テナント \"tenant-a\" の管理者が署名鍵を回転する"
      - "テナント \"tenant-a\" の JWKS を取得する"
      - "応答にはテナント \"tenant-a\" の kid だけが含まれ、テナント \"tenant-b\" の kid は含まれない"
  KeyProvider障害時は健全性が観測できJWKSは取得可能な範囲で返る:
    actor: SystemAdministrator
    given:
      - "テナント \"tenant-a\" の KeyProvider が到達不能である"
    main_success:
      - system_admin が署名鍵ヘルス一覧を取得する
      - "テナント \"tenant-a\" の provider_healthy は false として返る"
      - "テナント \"tenant-a\" の JWKS は取得可能な範囲でキャッシュされた鍵を返す"
  通常のテナント管理者はシステムコンソールの署名鍵ヘルスにアクセスできない:
    actor: TenantAdministrator
    given:
      - "\"operator\" は admin ロールのみを持ち system_admin ロールを持たない"
    main_success:
      - "\"operator\" が署名鍵ヘルス一覧を呼び出す"
      - AccessDeniedError で拒否される
flows:
  AdminKeyManagement:
    entry: AdminKeys
    views:
      AdminKeys:
        sees: 署名鍵管理画面(鍵一覧、状態、JWKS)
        does:
          - action: rotate
            does: 鍵を回転するボタンをクリックする
            interface: RotateTenantSigningKey
            to: AdminKeys
          - action: disable
            does: kid を指定して、無効化するボタンをクリックする
            interface: DisableTenantKey
            to: AdminKeys
