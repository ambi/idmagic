# idmagic WsFederation — SCL
# WS-Federation bounded-context specification for the IdMagic SCL 3.0 workspace.

system: idmagic
spec_version: "3.0"
context: WsFederation
standards:
  WsFederationPassiveRequestorProfile:
    title: Web Services Federation Language (WS-Federation) Version 1.2
    version: "1.2"
    url: https://docs.oasis-open.org/wsfed/federation/v1.2/ws-federation.html
    roles: [IdentityProvider, SecurityTokenService]
    scope: Passive Requestor Profile の sign-in / sign-out と federation metadata
    requirements:
      - id: WSFed-PassiveSignIn
        section: "§13"
        strength: MUST
        adoption: required
        statement: wsignin1.0 で登録済み wtrealm と許可済み wreply にだけ token を返す
        refs:
          - interfaces.WsFederationSignIn
      - id: WSFed-SilentSignIn
        section: "§13"
        strength: MAY
        adoption: excluded
        statement: silent sign-in / prompt=none 相当の無音認証
        reason: 初期範囲では利用者の明示的な認証状態だけを使い、無音サインインは提供しない
  WsTrust13:
    title: WS-Trust 1.3
    version: "1.3"
    url: https://docs.oasis-open.org/ws-sx/ws-trust/v1.3/ws-trust.html
    roles: [SecurityTokenService]
    scope: Issue binding / RequestSecurityToken / RequestSecurityTokenResponse
    requirements:
      - id: WSTrust13-IssueBearer
        section: "§4, §8"
        strength: MUST
        adoption: required
        statement: Issue 要求に対して Bearer SAML assertion を RSTR で返す
        refs:
          - interfaces.WsTrustIssue
          - models.WsTrustRequestSecurityToken
      - id: WSTrust13-WindowsTransport
        section: "§8"
        strength: MAY
        adoption: excluded
        statement: WindowsTransport / Kerberos based active profile
        reason: 初期範囲では UsernameToken のみを受理する
  WsSecurityUsernameToken:
    title: Web Services Security UsernameToken Profile 1.1.1
    version: "1.1.1"
    url: https://docs.oasis-open.org/wss-m/wss/v1.1.1/os/wss-UsernameTokenProfile-v1.1.1-os.html
    roles: [SecurityTokenService]
    scope: UsernameToken username / password credential
    requirements:
      - id: WSS-UsernameTokenPassword
        section: "§3"
        strength: MUST
        adoption: required
        statement: WS-Trust active STS は UsernameToken username/password を認証する
        refs:
          - interfaces.WsTrustIssue
  WsAddressing:
    title: Web Services Addressing 1.0 - Core
    version: "1.0"
    url: https://www.w3.org/TR/ws-addr-core/
    roles: [SecurityTokenService]
    scope: MessageID / To / Action
    requirements:
      - id: WSAddressing-MessageIDToAction
        section: "§3"
        strength: MUST
        adoption: required
        statement: MessageID は replay 防止、To は active STS endpoint、Action は Issue として検証する
        refs:
          - interfaces.WsTrustIssue
          - models.WsTrustRequestSecurityToken
glossary:
  WsFederation:
    definition: WS-Federation Passive Requestor Profile と WS-Trust active STS を組み合わせた WS-* protocol family。UsernameToken による Issue、WS-Addressing の MessageID / To / Action、Bearer SAML assertion 発行を扱う。WindowsTransport / Kerberos、silent sign-in は初期範囲外。
    aliases:
      - WS-Federation
      - WS-Trust
      - WS-Fed
  EndUser:
    definition: WS-Federation passive sign-in / sign-out をブラウザで開始する利用者。
  SecurityTokenRequester:
    definition: UsernameToken credential を提示して WS-Trust Issue を呼び出す active client。
models:
  User:
    kind: entity
    description: IdManagement が publish する認可 principal の最小 stub。
    identity: id
    fields:
      id:
        type: String
      tenant_id:
        type: String
      status:
        type: String
      roles:
        type: "String[]"
  Tenant:
    kind: entity
    description: Tenancy が publish するテナント resource の最小 stub。
    identity: id
    fields:
      id:
        type: String
  ClaimMappingPolicy:
    kind: value_object
    description: ClaimMapping context が publish する trust ごとの claim 発行規則の最小 stub。
    fields:
      configuration:
        type: JSON
        optional: true
  InvalidRequestError:
    kind: error
    description: WS-Federation、WS-Trust、または管理入力が契約を満たさない。
  AccessDeniedError:
    kind: error
    description: credential または認可 principal が要求された操作を許可されない。
  WsFedTokenType:
    kind: enum
    description: WS-Federation で発行する assertion の SAML バージョン (RSTR の TokenType にもなる)。 SAML 1.1 (urn:oasis:names:tc:SAML:1.0:assertion) は Entra / AD FS の WS-Fed 既定。
    values:
      - urn:oasis:names:tc:SAML:1.0:assertion
      - urn:oasis:names:tc:SAML:2.0:assertion
  WsFedRelyingParty:
    kind: entity
    description: "WS-Federation passive の relying party (RP) 登録。wtrealm で識別し、許可する wreply (返信先) の閉集合、audience、claim 発行 policy を束ねる。未登録 wtrealm・許可外 wreply は拒否する (open redirect 防止, fail-closed)。"
    identity:
      - tenant_id
      - wtrealm
    fields:
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。
      wtrealm:
        type: String
        constraints:
          - non_empty
        description: RP の識別子 (WS-Fed wtrealm / SAML audience)。
      display_name:
        type: String
        optional: true
        description: 管理 UI 表示名。
      reply_urls:
        type: "String[]"
        constraints:
          - non_empty
        description: 許可する wreply の閉集合。wreply はこの集合との完全一致のみ受理する。
      audience:
        type: String
        optional: true
        description: 発行 assertion の audience。空なら wtrealm を用いる。
      token_type:
        type: WsFedTokenType
        optional: true
        description: 発行 assertion の SAML バージョン。空なら SAML 1.1 (Entra WS-Fed 互換の既定)。
      claim_policy:
        type: ClaimMappingPolicy
        description: この RP 向けの claim 発行 policy。
      entra_profile:
        type: EntraFederationProfile
        optional: true
        description: Microsoft Entra domain federation preset。設定時に required claims と sourceAnchor 変換を束ねる。
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
  EntraFederationProfile:
    kind: value_object
    description: Microsoft Entra domain federation 用 profile。IssuerUri、sourceAnchor 属性、 passive / active / MEX endpoint を束ね、UPN / ImmutableID / persistent NameID の claim preset を WS-Fed RP に適用する。
    fields:
      domain:
        type: String
        constraints:
          - non_empty
        description: Entra で検証済みの DNS domain。
      issuer_uri:
        type: String
        constraints:
          - non_empty
        description: Entra に登録する IssuerUri。発行 token の issuer / RP wtrealm と一致させる。
      source_anchor_attribute:
        type: String
        constraints:
          - non_empty
        description: ImmutableID の元になる不変 user 属性。objectGUID の GUID 文字列または既に base64 化済みの値。
      immutable_id_attribute:
        type: String
        constraints:
          - non_empty
        description: 変換後 ImmutableID を格納する合成属性名。既定 entra_immutable_id。
      passive_logon_uri:
        type: String
        description: Entra PassiveLogOnUri。通常 /wsfed。
      active_logon_uri:
        type: String
        description: Entra ActiveLogOnUri。通常 /trust/usernamemixed。
      metadata_exchange_uri:
        type: String
        description: Entra MetadataExchangeUri。通常 /trust/mex。
  SecurityTokenEndpoint:
    kind: value_object
    description: WS-Trust / WS-Federation metadata に広告する STS endpoint。受理する認証方式と binding を表す。
    fields:
      url:
        type: String
        description: 公開 endpoint URL。
      binding:
        type: String
        constraints:
          - non_empty
        description: "例: usernamemixed, mex, passive。"
      auth_methods:
        type: "String[]"
        constraints:
          - non_empty
        description: "受理する認証方式。例: UsernameToken。"
  WsTrustRequestSecurityToken:
    kind: value_object
    description: WS-Trust 1.3 Issue binding の RST から検証対象を抽出した中間表現。
    fields:
      message_id:
        type: String
        constraints:
          - non_empty
        description: WS-Addressing MessageID。replay 防止に使う。
      to:
        type: String
        description: WS-Addressing To。要求先 STS endpoint。
      action:
        type: String
        description: WS-Addressing Action。Issue のみ受理する。
      username:
        type: String
        constraints:
          - non_empty
        description: WS-Security UsernameToken username。
      password:
        type: String
        constraints:
          - non_empty
        description: WS-Security UsernameToken password credential。
      created_at:
        type: DateTime
        description: WS-Security Timestamp Created。
      expires_at:
        type: DateTime
        description: WS-Security Timestamp Expires。
      applies_to:
        type: String
        constraints:
          - non_empty
        description: 対象 RP / audience。登録済み WsFedRelyingParty に解決する。
      token_type:
        type: WsFedTokenType
        optional: true
        description: 要求 token type。空なら RP 既定。
      request_type:
        type: String
        optional: true
        description: WS-Trust RequestType。空または Issue のみ受理する。
      key_type:
        type: String
        optional: true
        description: WS-Trust KeyType。空または Bearer のみ受理する。
  WsTrustResponse:
    kind: value_object
    description: WS-Trust Issue に対する RSTR。署名済み SAML assertion と lifetime / appliesTo を含む。
    fields:
      relates_to:
        type: String
        optional: true
        description: 元 RST の MessageID。
      applies_to:
        type: String
        constraints:
          - non_empty
      token_type:
        type: WsFedTokenType
      issued_at:
        type: DateTime
      expires_at:
        type: DateTime
      assertion_id:
        type: String
        optional: true
  WsFedSignInIssued:
    kind: event
    description: WS-Federation passive sign-in で署名済み assertion を RP へ発行した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 発行したテナント ID。
      wtrealm:
        type: String
        description: 発行先 RP の wtrealm。
      userId:
        type: String
        description: subject (NameID 由来の user)。
  WsFedSignInRejected:
    kind: event
    description: "WS-Federation passive sign-in を拒否した (未登録 wtrealm・許可外 wreply・検証失敗など)。"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 拒否したテナント ID。
      wtrealm:
        type: String
        optional: true
        description: 要求された wtrealm (判明していれば)。
      reason:
        type: String
        description: 拒否理由の要約。
  WsFedSignOut:
    kind: event
    description: WS-Federation sign-out でローカルセッションを破棄した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: sign-out したテナント ID。
      wtrealm:
        type: String
        optional: true
        description: sign-out を要求した RP の wtrealm (判明していれば)。
  WsTrustTokenIssued:
    kind: event
    description: WS-Trust active STS で署名済み assertion を発行した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 発行したテナント ID。
      appliesTo:
        type: String
        description: 発行先 RP / audience。
      userId:
        type: String
        description: subject user。
  WsTrustTokenRejected:
    kind: event
    description: WS-Trust active STS の Issue 要求を拒否した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 拒否したテナント ID。
      appliesTo:
        type: String
        optional: true
        description: 要求された AppliesTo (判明していれば)。
      reason:
        type: String
        description: 拒否理由の要約。
  EntraFederationConfigured:
    kind: event
    description: Microsoft Entra domain federation preset を設定し、対応する WS-Fed RP trust を upsert した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 設定したテナント ID。
      domain:
        type: String
        description: Entra 検証済み domain。
      issuerUri:
        type: String
        description: Entra に登録する IssuerUri。
interfaces:
  WsFederationSignIn:
    description: WS-Federation passive requestor profile の単一 HTTP endpoint。wa で sign-in と sign-out を dispatch する。sign-in は wtrealm で relying party を解決し、wreply を許可集合に限定する (open redirect 防止)。未認証はログインへ誘導し、認証済みなら relying party の claim policy で発行した claim を署名済み SAML assertion (既定 SAML 1.1 / Entra 互換、RP 設定で SAML 2.0) に載せ、RSTR に包んで自動 POST する。wfresh が示す最大経過時間より認証が古ければ再認証へ誘導し、wauth が要求する認証方式を尊重する。sign-out の意味契約は WsFederationSignOut が所有する。
    input:
      wa:
        type: String
        description: wsignin1.0、wsignout1.0、または wsignoutcleanup1.0。
      wtrealm:
        type: String
        description: relying party 識別子。
      wreply:
        type: String
        optional: true
        description: 返信先。許可集合との完全一致のみ。
      wctx:
        type: String
        optional: true
        description: RP が往復させる不透明コンテキスト。
      wfresh:
        type: String
        optional: true
        description: 再認証の最大経過時間 (分)。古ければ再認証へ誘導する。
      wauth:
        type: String
        optional: true
        description: 要求された認証方式 URI。満たせなければ拒否する。
      whr:
        type: String
        optional: true
        description: home realm のヒント。
    requires:
      - input.wa == "wsignin1.0" || input.wa == "wsignout1.0" || input.wa == "wsignoutcleanup1.0"
      - input.wa != "wsignin1.0" || wtrealm_registered(input.wtrealm, context.tenant_id)
      - input.wa != "wsignin1.0" || reply_url_allowed(input.wtrealm, input.wreply, context.tenant_id)
    ensures:
      - authentication_fresh_enough(input.wfresh)
      - requested_authentication_method_satisfied(input.wauth)
      - subject_assigned_to_application(input.wtrealm, context.tenant_id)
      - wctx_round_tripped(input.wctx)
    access: public
    bindings:
      - kind: http
        method: GET
        path: /wsfed
        request_form: query
        successful_status_codes:
          - "200"
          - "303"
  WsFederationSignOut:
    description: WsFederationSignIn が所有する単一 passive HTTP endpoint 内の sign-out 意味契約。ローカルセッションを破棄する。wsignout1.0 は許可済み wreply へのリダイレクトまで行い、wsignoutcleanup1.0 は破棄のみで 200 を返す。
    input:
      wa:
        type: String
        description: wsignout1.0 または wsignoutcleanup1.0。
      wtrealm:
        type: String
        optional: true
      wreply:
        type: String
        optional: true
        description: 返信先。許可集合との完全一致のみ。
    requires:
      - input.wa == "wsignout1.0" || input.wa == "wsignoutcleanup1.0"
      - input.wtrealm == null || wtrealm_registered(input.wtrealm, context.tenant_id)
      - input.wreply == null || reply_url_allowed(input.wtrealm, input.wreply, context.tenant_id)
    ensures:
      - local_session_cleared
      - no_unregistered_redirect
    access: internal
  WsTrustIssue:
    description: WS-Trust 1.3 active STS Issue endpoint。UsernameToken を検証し、 To を現在 realm の active STS endpoint、Action / RequestType を Issue、KeyType を Bearer に限定し、AppliesTo を登録済み WsFedRelyingParty に解決する。RP の claim policy で組み立てた claim を署名済み SAML assertion に載せ、RSTR として返す。未登録 AppliesTo、期限切れ Timestamp、不正な To / Action / RequestType / KeyType / TokenType は fail-closed で拒否する。
    input:
      request:
        type: WsTrustRequestSecurityToken
    output:
      response:
        type: WsTrustResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - WsTrustTokenIssued
      - WsTrustTokenRejected
    requires:
      - input.request.to == active_sts_endpoint(context.tenant_id)
      - input.request.action == "Issue"
      - input.request.request_type == null || input.request.request_type == "Issue"
      - input.request.key_type == null || input.request.key_type == "Bearer"
      - applies_to_registered(input.request.applies_to, context.tenant_id)
      - message_id_not_seen_within_replay_window(input.request.message_id)
      - timestamp_is_valid(input.request.created_at, input.request.expires_at)
    ensures:
      - output.response.relates_to == input.request.message_id
      - output.response.applies_to == input.request.applies_to
    access:
      policies: [UsernameTokenSubject]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: POST
        path: /trust/usernamemixed
        request_body: xml
  WsTrustMetadataExchange:
    description: WS-Trust MEX endpoint。active STS の usernamemixed endpoint、UsernameToken policy、WS-Addressing / SOAP binding を realm issuer から派生して広告する。
    output:
      endpoint:
        type: SecurityTokenEndpoint
    read_only: true
    access: public
    bindings:
      - kind: http
        method: GET
        path: /trust/mex
        successful_status_codes:
          - "200"
  PublishWsFederationMetadata:
    description: WS-Federation / WS-Trust metadata publication。realm entityID、passive endpoint、 active STS endpoint、MEX endpoint、token 署名検証用証明書を AD FS 互換 federationmetadata.xml として公開する。
    output:
      endpoint:
        type: SecurityTokenEndpoint
    read_only: true
    access: public
    bindings:
      - kind: http
        method: GET
        path: /federationmetadata/2007-06/federationmetadata.xml
        successful_status_codes:
          - "200"
  ConfigureEntraFederation:
    description: Microsoft Entra domain federation preset を設定する。検証済み domain、 IssuerUri、sourceAnchor 属性を受け取り、sourceAnchor が既存 user で欠落・重複しないこと、 GUID または base64 ImmutableID として正規化できることを検証する。成功時は UPN / ImmutableID / persistent NameID の claim preset を持つ WsFedRelyingParty を upsert し、Entra に登録する PassiveLogOnUri / ActiveLogOnUri / MetadataExchangeUri を返す。 Hybrid Azure AD Join device registration は windowstransport + コンピュータアカウント Kerberos を要するため未提供として診断に含める。
    input:
      domain:
        type: String
        description: Entra で検証済みの DNS domain。
      issuer_uri:
        type: String
        optional: true
        description: 空なら domain から安定生成する IssuerUri。
      source_anchor_attribute:
        type: String
        description: ImmutableID の元になる不変 user 属性。
      reply_url:
        type: String
        optional: true
        description: Entra が wreply に使う URL。空なら Microsoft Online の既定 URL。
    output:
      profile:
        type: EntraFederationProfile
      relying_party:
        type: WsFedRelyingParty
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - EntraFederationConfigured
    requires:
      - source_anchor_is_unique_and_normalizable(input.source_anchor_attribute, context.tenant_id)
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: POST
        path: /api/admin/wsfed/entra-federation
        request_body: json
  RegisterWsFedRelyingParty:
    description: 管理者が WS-Federation relying party trust を登録または更新する。wtrealm、reply_urls、audience、token_type、claim_policy を契約として保存し、reply_urls は空でない閉集合にする。管理操作は AdminFederationTrustsManage で保護する。
    input:
      relying_party:
        type: WsFedRelyingParty
    output:
      relying_party:
        type: WsFedRelyingParty
    errors:
      - InvalidRequestError
      - AccessDeniedError
    requires:
      - input.relying_party.tenant_id == context.tenant_id
      - input.relying_party.reply_urls.size > 0
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: POST
        path: /api/admin/wsfed/relying-parties
        request_body: json
        successful_status_codes:
          - "201"
          - "200"
  ListWsFedRelyingParties:
    description: 管理者が所属テナントの WS-Federation relying party trust を一覧する。管理操作は AdminFederationTrustsManage で保護する。
    output:
      relying_parties:
        type: "WsFedRelyingParty[]"
    read_only: true
    errors:
      - AccessDeniedError
    ensures:
      - relying_parties_belong_to_tenant(output.relying_parties, context.tenant_id)
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: /api/admin/wsfed/relying-parties
        successful_status_codes:
          - "200"
  DeleteWsFedRelyingParty:
    description: 管理者が所属テナントの WS-Federation relying party trust を wtrealm で削除する。管理操作は AdminFederationTrustsManage で保護する。
    input:
      wtrealm:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: DELETE
        path: /api/admin/wsfed/relying-parties
        request_form: query
        successful_status_codes:
          - "204"
authorization:
  principals:
    TenantAdministrator:
      type: User
      matches:
        - context.authenticated
        - principal.status == "Active"
        - '"admin" in principal.roles || "system_admin" in principal.roles'
    UsernameTokenSubject:
      type: User
      matches:
        - context.authenticated
        - principal.status == "Active"
  policies:
    TenantAdministrator:
      effect: permit
      principal: TenantAdministrator
      when: principal.tenant_id == resource.id
    UsernameTokenSubject:
      effect: permit
      principal: UsernameTokenSubject
      when: principal.tenant_id == resource.id
scenarios:
  WS-Federation passive sign-in succeeds:
    actor: EndUser
    given:
      - wtrealm と wreply は登録済みで subject は対象 Application に割り当てられている
    main_success:
      - 登録済み RP の wsignin1.0 を受信する
      - wtrealm / wreply / wfresh / subject assignment を検証する
      - 署名済み assertion を RSTR form で返し wctx を同値で往復する
    extensions:
      - at: 2
        condition: wfresh より認証が古い
        steps:
          - token を発行せず再認証へ誘導する
      - at: 2
        condition: wtrealm、wreply、wauth、subject assignment のいずれかが不正である
        steps:
          - WsFedSignInRejected を発行して fail-closed で拒否する
  WS-Federation passive sign-in rejects untrusted target:
    actor: EndUser
    given:
      - wtrealm が未登録、wreply が許可外、または subject が未割当である
    main_success:
      - 不正な wsignin1.0 を受信する
      - token を発行せず WsFedSignInRejected を発行する
  WS-Trust Issue succeeds:
    actor: SecurityTokenRequester
    given:
      - UsernameToken、MessageID、Timestamp、To、Action、RequestType、KeyType、AppliesTo が有効である
    main_success:
      - WS-Trust Issue RST を受信する
      - UsernameToken と RST の閉集合条件を検証する
      - RSTR を返す
    extensions:
      - at: 2
        condition: MessageID が assertion lifetime 内に再利用されている
        steps:
          - WsTrustTokenRejected を発行して protocol error を返す
      - at: 2
        condition: UsernameToken credential が不正である
        steps:
          - AccessDeniedError を返し token を発行しない
  WS-Trust Issue rejects invalid envelope:
    actor: SecurityTokenRequester
    given:
      - RST の To、MessageID、AppliesTo、Action、RequestType、KeyType のいずれかが不正である
    main_success:
      - 不正な RST を受信する
      - WsTrustTokenRejected を emit して 400 または 401 を返す
flows:
  WsFederationBrowserNavigation:
    entry: RelyingParty
    views:
      RelyingParty:
        sees: RP からの WS-Federation リクエスト受信画面(wtrealm で指定された relying party)
        does:
          - action: sign_in
            does: RP からのサインインリクエストを受け取り、必要に応じてログインする
            interface: WsFederationSignIn
            to: RelyingParty
          - action: sign_out
            does: RP からのサインアウトリクエストを受け取る
            interface: WsFederationSignOut
            to: RelyingParty
  AdminEntraFederation:
    entry: AdminEntraFederation
    views:
      AdminEntraFederation:
        sees: Entra ドメインフェデレーション設定画面(検証済み domain、IssuerUri、sourceAnchor 属性)
        does:
          - action: configure
            does: domain・IssuerUri・sourceAnchor 属性を入力して設定する
            interface: ConfigureEntraFederation
            to: AdminEntraFederation
