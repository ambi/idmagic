# idmagic Seeding — SCL
# 環境固有のデータ投入を、業務データの所有 context から分離する。

system: idmagic
spec_version: "3.0"
context: Seeding
glossary:
  SeedProfile:
    definition: seed の内容と生成規則を表す明示選択の profile。bootstrap は稼働に必要な最小データだけ、development/test は既知のサンプル、performance は非機密の合成データを表す。環境名から暗黙に選ばない。
    aliases: [seed profile]
  SeedPlan:
    definition: 現在状態と profile manifest を比較して作る、redacted な変更計画。dry-run と apply は同じ計画規則を使う。
    aliases: [seed plan]
  SeedDrift:
    definition: seed 管理対象の logical key に対する現在値が manifest の canonical value と異なる状態。既定では手動変更を上書きせず conflict として停止する。
    aliases: [drift]
  BootstrapSeed:
    definition: first-party client など、サービス稼働に必要な最小データ。デモ資格情報やサンプル tenant data を含まない。
  SeedOperator:
    definition: 明示した profile を plan または apply するローカル運用者または自動化主体。
  SeedManifest:
    definition: seed resource と決定的 generator を宣言する versioned YAML desired state。DB fixture ではなく各 record context の公開 command surface への入力となる。
    aliases: [seed manifest]
  SeedSecretReference:
    definition: manifest が秘密値そのものの代わりに保持する provider、locator、version の組。解決値は plan、log、error に現れない。
    aliases: [secret reference]
models:
  SeedEnvironment:
    kind: enum
    values: [development, test, staging, production]
  SeedProfileKind:
    kind: enum
    values: [bootstrap, development, test, performance]
  SeedMode:
    kind: enum
    values: [dry_run, apply]
  SeedOperationKind:
    kind: enum
    values: [create, update, noop, conflict]
  SeedSecretProvider:
    kind: enum
    values: [env, file]
  SeedSecretReference:
    kind: value_object
    description: 秘密値を materialize するための opaque reference。version は同一 secret の意図した rotation を識別する。
    fields:
      provider:
        type: SeedSecretProvider
      locator:
        type: String
        constraints: [non_empty]
      version:
        type: String
        constraints: [non_empty]
  SeedManifest:
    kind: value_object
    description: profile ごとの型付き desired resource、include、決定的 generator を持つ versioned manifest。秘密値は SeedSecretReference だけで表す。
    fields:
      schema_version:
        type: String
        constraints: [non_empty]
      profile:
        type: SeedProfileKind
      includes:
        type: "String[]"
        optional: true
        description: root manifest directory 内のローカル相対 path。循環、root 外 path、remote URL は拒否する。
      resources:
        type: JSON
        description: 対応する record context の公開 command surface へ渡す型付き desired resource。未知 kind と重複 logical key は拒否する。
      generators:
        type: JSON
        optional: true
        description: profile と明示 seed から決定する bounded generator。performance user は login-disabled で秘密値を持たない。
  SeedRequest:
    kind: value_object
    description: profile を計画または適用する入力。profile と environment は必須で、件数を増やす場合も明示する。
    fields:
      environment:
        type: SeedEnvironment
      profile:
        type: SeedProfileKind
      manifest_path:
        type: String
        optional: true
        description: 明示 root manifest path。未指定時は profile ごとの repository default を選ぶ。
      mode:
        type: SeedMode
      tenant_id:
        type: String
        optional: true
      generator_seed:
        type: String
        optional: true
      first_party_redirect_uris:
        type: "String[]"
        optional: true
        description: production bootstrap で first-party client に設定する明示 URI。production では bootstrap 実行時に 1 件以上を必須とし、localhost URI は許可しない。
      count:
        type: Integer
        optional: true
      allow_large:
        type: Boolean
        optional: true
        description: performance profile の通常上限を超える件数を明示して許可する。絶対上限を越える値は許可しない。
      batch_size:
        type: Integer
        optional: true
        description: performance profile を bounded memory で適用する 1 batch の最大件数。未指定時は安全な既定値を使い、上限を超える値は拒否する。
  SeedPlan:
    kind: value_object
    description: 秘密値と PII 全量を含まない seed の計画結果。
    fields:
      creates:
        type: Integer
      updates:
        type: Integer
      noops:
        type: Integer
      conflicts:
        type: Integer
      operations:
        type: JSON
        description: logical key、operation kind、redacted summary の streamable な表現。
  SeedRejectedError:
    kind: error
    description: 環境 policy、profile、件数上限、または unknown key が安全規則に違反した。
  SeedConflictError:
    kind: error
    description: seed 管理対象に manual drift があり、明示 reconcile なしに上書きできない。
interfaces:
  SeedData:
    description: seed を同一の決定的 planner で計画し適用する内部運用 interface。apply は各 record context の published command surface だけを呼び、直接 SQL fixture で不変条件を迂回しない。
    input:
      request:
        type: SeedRequest
    output:
      plan:
        type: SeedPlan
    errors: [SeedRejectedError, SeedConflictError]
    requires:
      - "manifest_schema_supported(input.request)"
      - "manifest_profile_matches_request(input.request)"
      - "manifest_paths_are_local_and_contained(input.request)"
      - "input.request.environment in ['staging', 'production'] implies manifest_secret_providers(input.request) == ['file']"
    ensures:
      - "input.request.mode == 'dry_run' implies persistent_state_unchanged()"
      - "reapply_same_request_is_noop(input.request)"
      - "input.request.environment == 'production' && input.request.profile == 'bootstrap' implies production_safe_redirect_uris(input.request.first_party_redirect_uris)"
      - "seed_plan_and_diagnostics_exclude_secret_values(output.plan)"
    access: internal
objectives:
  SeedScalability:
    description: manifest/include は bounded size と depth で読み、performance profile は bounded batch と streamable plan を使い、全 operation をメモリに保持しない。通常 profile の件数上限は安全な既定値を越えず、override は明示される。
    interface: SeedData
    indicator: measurement.memory_bounded == true
    target: 1.0
    window: 30d
    budgeting: occurrences
scenarios:
  環境別の明示profileが選択される:
    actor: SeedOperator
    given:
      - SeedOperator が environment と profile を明示している
    main_success:
      - SeedOperator が SeedData を dry_run で呼ぶ
      - planner は environment policy に許可された manifest だけを選ぶ
      - 応答は redacted な SeedPlan を返し永続状態を変更しない
  明示manifestまたはprofile既定manifestが選択される:
    actor: SeedOperator
    given:
      - SeedOperator が environment と profile を明示している
    main_success:
      - SeedOperator が明示 manifest path を指定して SeedData を呼ぶ
      - loader は指定 path の manifest と contained include を strict decode する
      - planner は manifest の typed desired resource を計画する
    extensions:
      - at: 1
        condition: manifest path が未指定である
        steps:
          - loader は profile ごとの repository default manifest を選ぶ
  manifestとrequestのprofile不一致は拒否される:
    actor: SeedOperator
    given:
      - SeedOperator が request と異なる profile の manifest を指定している
    main_success:
      - SeedOperator が SeedData を呼ぶ
      - SeedData は secret 解決と書き込みの前に SeedRejectedError で拒否する
  不正manifestは書き込み前に拒否される:
    actor: SeedOperator
    given:
      - manifest に未知 key、重複 logical key、未対応 schema version、include cycle、または root 外 path がある
    main_success:
      - SeedOperator が SeedData を呼ぶ
      - loader は secret 解決と書き込みの前に SeedRejectedError で拒否する
      - 診断には秘密値を含めない
  productionではenv secret providerを拒否する:
    actor: SeedOperator
    given:
      - environment が production である
      - manifest が env secret provider を参照している
    main_success:
      - SeedOperator が SeedData を dry_run または apply で呼ぶ
      - SeedData は secret 解決と書き込みの前に SeedRejectedError で拒否する
      - 永続状態は変更されない
  同一seedの再適用はno-opになる:
    actor: SeedOperator
    given:
      - 同じ manifest、generator seed、secret version で seed が apply 済みである
    main_success:
      - SeedOperator が同じ SeedRequest を再度 apply する
      - SeedPlan の全 operation は noop である
      - password history と created_at / updated_at は変更されない
  productionでdemoまたはperformance profileは拒否される:
    actor: SeedOperator
    given:
      - environment が production である
    main_success:
      - SeedOperator が development または performance profile を指定する
      - SeedData は書き込み前に SeedRejectedError で拒否する
      - 既知のデモ資格情報は作成されない
  production bootstrapには明示redirect URIが必要である:
    actor: SeedOperator
    given:
      - environment が production である
      - profile が bootstrap である
    main_success:
      - SeedOperator が first_party_redirect_uris を指定して SeedData を apply する
      - first-party client は指定 URI だけを redirect URI として持つ
    extensions:
      - at: 1
        condition: redirect URI が未指定、localhost、または http URI である
        steps:
          - SeedData は書き込み前に SeedRejectedError で拒否する
  manual driftは上書きせずconflictになる:
    actor: SeedOperator
    given:
      - seed 管理対象の logical key が手動変更されている
    main_success:
      - SeedOperator が対応する profile を apply する
      - SeedData は SeedConflictError を返す
      - 手動変更は維持される
  部分失敗後に同じrequestを再実行すると収束する:
    actor: SeedOperator
    given:
      - SeedData の apply が一部の operation を完了した後に失敗している
    main_success:
      - SeedOperator が同じ SeedRequest を再度 apply する
      - 完了済み logical key は no-op と判定される
      - 未完了の logical key だけが適用され、重複なく目的状態へ収束する
