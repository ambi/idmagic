# idmagic Jobs — SCL
# wi-126: テナント境界を保つ汎用非同期ジョブ基盤の core runtime。
# durable queue と worker runtime という技術的能力を所有し、各ジョブの業務ロジックは
# 呼び出し元の bounded context の usecase に残す。管理者向け一覧/詳細/キャンセル API は
# wi-157-job-admin-operations-surface に分離する。
# Migrated to SCL 3.0 by wi-209 (ADR-103).

system: idmagic
spec_version: "3.0"
context: Jobs
glossary:
  JobLease:
    definition: worker が Job を Running にする際に確保する排他権。lease_owner (worker 識別子) と lease_expires_at を持ち、heartbeat で更新される。heartbeat が途絶えて期限切れになると別 worker が再取得できる。
    aliases:
      - lease
      - リース
  DeadLetter:
    definition: attempts が max_attempts を超えて Failed に確定した Job。再試行されず、error を保持したまま調査対象として残る。
    aliases:
      - dead-letter
  Queued:
    definition: Job が enqueue され、まだ worker に claim されていない初期状態。run_at を過ぎれば claim 可能。
    aliases:
      - queued
  Running:
    definition: worker がリースを確保し、ハンドラを実行中の状態。
    aliases:
      - running
  Succeeded:
    definition: ハンドラが正常終了した終端状態。
    aliases:
      - succeeded
  Failed:
    definition: attempts が max_attempts を超えて dead-letter に確定した終端状態。
    aliases:
      - failed
  Canceled:
    definition: 終端状態に達する前に取消された終端状態。
    aliases:
      - canceled
  Claim:
    definition: worker が claim 可能な Job を取得し、自らを lease_owner として Running へ遷移させる。
    aliases:
      - claim
  Complete:
    definition: worker がハンドラの正常終了を報告し、Job を Succeeded に確定する。
    aliases:
      - complete
  Fail:
    definition: worker がハンドラの失敗を報告する。attempts が max_attempts 未満なら Retry、以上なら dead-letter (Failed) に確定する。
    aliases:
      - fail
  Retry:
    definition: 失敗後、backoff を経て再試行のため Queued に戻す遷移。
    aliases:
      - retry
  Cancel:
    definition: 終端状態に達していない Job を取消す。
    aliases:
      - cancel
  Developer:
    definition: 標準開発環境でこのリポジトリを動かす開発者。
  System:
    definition: Jobs の durable queue と worker runtime そのもの。人間の操作者を伴わない技術的な主体を指す。
models:
  InvalidRequestError:
    kind: error
    description: リクエストに必須パラメータの欠落・不正値・重複等がある (RFC 6749 §5.2 invalid_request)。OAuth2 context が定義する共通 error の published language stub。
    payload:
      reason:
        type: String
        optional: true
  JobLeaseLostError:
    kind: error
    description: worker が heartbeat / 完了報告 / 失敗報告を行った時点で、既にリースが失効しているか別 worker に奪われている。呼び出し元 worker はハンドラ実行を中断すべきである。
  Job:
    kind: entity
    identity: id
    description: "enqueue された非同期処理の実行単位。worker がリースを確保して Running にし、\nハンドラが handler_context.tenant_id == job.tenant_id の境界内だけで副作用を起こす。\nレコードの保持期間は ADR-100-job-data-retention-and-pii が定める (delete_after 30日)。\n"
    fields:
      id:
        type: String
        description: Job の内部生成 ID (UUIDv4)。
      tenant_id:
        type: String
        description: Job が帰属するテナント境界。worker はこの境界内でのみ副作用を起こす。
      kind:
        type: JobKind
        description: 実行するハンドラを決めるジョブ種別。
      status:
        type: JobStatus
      params:
        type: JSON
        description: enqueue 時にハンドラへ渡す入力。呼び出し側は生 PII を極力含めない。
      result:
        type: JSON
        optional: true
        description: ハンドラが Succeeded 時に残す出力。
      error:
        type: String
        optional: true
        description: 直近の失敗理由。Failed (dead-letter) 到達時は最終エラーを保持する。
      attempts:
        type: Integer
        description: これまでの実行試行回数。
      max_attempts:
        type: Integer
        description: この回数を超えて失敗すると dead-letter (Failed) に確定する。
      dedup_key:
        type: String
        optional: true
        description: "(tenant_id, dedup_key) で一意。同じ副作用を重複 enqueue しないための冪等キー。at-least-once 配信下でもハンドラの副作用は1回分しか観測されないことを保証する主な仕組み。"
      progress:
        type: JobProgress
        optional: true
        description: ハンドラが Running 中に任意で報告する進捗。
      lease_owner:
        type: String
        optional: true
        description: 現在 Running を保持する worker 識別子。terminal 状態や Queued では未設定。
      lease_expires_at:
        type: DateTime
        optional: true
        description: リースの失効時刻。heartbeat で延長する。期限切れになると別 worker が再 claim できる。
      run_at:
        type: DateTime
        description: この時刻以降に claim 可能。enqueue 直後は now、リトライ時は backoff 分だけ先送りされる。
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
  JobStatus:
    kind: enum
    description: JobLifecycle の状態。
    values:
      - queued
      - running
      - succeeded
      - failed
      - canceled
  JobKind:
    kind: enum
    description: "worker の handler registry に登録されたジョブ種別の allowlist。新しいジョブ種別を\n追加する consumer 機能側の WI は、実装前にこの enum へ自分の種別を足す (SCL-first)。\n本 WI (core runtime) は疎通確認用の noop_echo のみを追加する。\n"
    values:
      - noop_echo
      - user_import_preview
      - user_import_apply
      - dynamic_group_reconcile
  JobProgress:
    kind: value_object
    description: ハンドラが Running 中に任意で報告する進捗スナップショット。
    fields:
      percent:
        type: Integer
        optional: true
        description: 0-100 の概算進捗。
      message:
        type: String
        optional: true
        description: 人間可読な進捗メッセージ。
      updated_at:
        type: DateTime
  JobRef:
    kind: value_object
    description: "他 bounded context が「enqueue した/参照したい Job」を保持するための published\nlanguage。Job aggregate 全体ではなく、外部公開してよい最小の参照だけを持つ。\n"
    fields:
      id:
        type: String
      tenant_id:
        type: String
      kind:
        type: JobKind
      status:
        type: JobStatus
  JobEnqueued:
    kind: event
    description: Job が queue に投入された。
    payload:
      occurredAt:
        type: DateTime
      jobId:
        type: String
      tenantId:
        type: String
      kind:
        type: JobKind
  JobStarted:
    kind: event
    description: worker が Job を claim し Running に遷移した。
    payload:
      occurredAt:
        type: DateTime
      jobId:
        type: String
      tenantId:
        type: String
      workerId:
        type: String
      attempt:
        type: Integer
  JobSucceeded:
    kind: event
    description: ハンドラが正常終了した。
    payload:
      occurredAt:
        type: DateTime
      jobId:
        type: String
      tenantId:
        type: String
  JobFailed:
    kind: event
    description: ハンドラが失敗した。terminal が true なら max_attempts 超過による dead-letter 確定。
    payload:
      occurredAt:
        type: DateTime
      jobId:
        type: String
      tenantId:
        type: String
      attempt:
        type: Integer
      terminal:
        type: Boolean
      error:
        type: String
  JobRetried:
    kind: event
    description: 失敗後、backoff を経て再試行のため Queued に戻った。
    payload:
      occurredAt:
        type: DateTime
      jobId:
        type: String
      tenantId:
        type: String
      attempt:
        type: Integer
      nextRunAt:
        type: DateTime
  JobCanceled:
    kind: event
    description: 終端状態に達する前に取消された。
    payload:
      occurredAt:
        type: DateTime
      jobId:
        type: String
      tenantId:
        type: String
states:
  JobLifecycle:
    description: "Job の状態機械。queued → running は worker の claim、running → queued は\nリトライ (backoff 待ち)、succeeded / failed / canceled は終端で不可逆。running → failed は\nattempts が max_attempts に達した dead-letter 確定、running → queued (retry) は達していない場合。\n"
    target: Job
    initial: queued
    terminal:
      - succeeded
      - failed
      - canceled
    transitions:
      - from: queued
        event: JobStarted
        to: running
      - from: running
        event: JobSucceeded
        to: succeeded
      - from: running
        event: JobFailed
        to: failed
        guard: attempts >= max_attempts
      - from: running
        event: JobRetried
        to: queued
        guard: attempts < max_attempts
      - from: queued
        event: JobCanceled
        to: canceled
      - from: running
        event: JobCanceled
        to: canceled
interfaces:
  EnqueueJob:
    description: "呼び出し元 bounded context が非同期処理を queue に投入する内部インターフェース。\nHTTP には公開せず、同一プロセス内の Go 呼び出しとして各 context の usecase から使う。\ndedup_key を指定すると (tenant_id, dedup_key) が既存の未終端 Job と一致する場合は\n新規作成せず既存 JobRef を返す。\n"
    input:
      tenant_id:
        type: String
      kind:
        type: JobKind
      params:
        type: JSON
      dedup_key:
        type: String
        optional: true
      max_attempts:
        type: Integer
        optional: true
    output:
      job:
        type: JobRef
    errors:
      - InvalidRequestError
    access: internal
  ClaimJobs:
    description: "worker が claim 可能な (status=queued かつ run_at <= now) Job をバッチで取得し、\n同一トランザクション内で Running に遷移させ、自分を lease_owner として\nlease_expires_at を設定する内部インターフェース。\n"
    input:
      worker_id:
        type: String
      batch_size:
        type: Integer
    output:
      jobs:
        type: "Job[]"
    ensures:
      - all_jobs_leased_by(output.jobs, input.worker_id)
      - single_worker_holds_active_lease(output.jobs)
    access: internal
  HeartbeatJob:
    description: worker が実行中の Job のリースを延長する。
    input:
      job_id:
        type: String
      worker_id:
        type: String
    output:
      lease_expires_at:
        type: DateTime
    errors:
      - JobLeaseLostError
    access: internal
  CompleteJob:
    description: worker がハンドラの正常終了を報告し、Job を Succeeded に確定する。
    input:
      job_id:
        type: String
      worker_id:
        type: String
      result:
        type: JSON
        optional: true
    errors:
      - JobLeaseLostError
    access: internal
  FailJob:
    description: "worker がハンドラの失敗を報告する。attempts < max_attempts なら backoff 後の\nrun_at を設定して Queued (Retry) へ、attempts >= max_attempts なら Failed\n(dead-letter) へ確定する。\n"
    input:
      job_id:
        type: String
      worker_id:
        type: String
      error:
        type: String
    output:
      status:
        type: JobStatus
    errors:
      - JobLeaseLostError
    ensures:
      - "output.status == 'failed' || output.status == 'queued'"
    access: internal
  CancelJob:
    description: 終端状態に達していない Job を取消す。既に終端状態の Job には作用しない (不可逆)。
    input:
      job_id:
        type: String
    errors:
      - InvalidRequestError
    access: internal
objectives:
  StandardDevelopmentStackStartup:
    description: embedded PostgreSQL binary が取得済みの環境では、標準開発コマンドが API、worker、UI を利用可能な状態にするまでを 5 秒未満に保つ。初回の binary 取得時間は除く。
    indicator: measurement.startup_latency < duration("5s")
    target: 0.95
    window: 30d
    budgeting: occurrences
scenarios:
  Dockerなしの標準開発環境でworkerがジョブを完了する:
    actor: Developer
    given:
      - embedded PostgreSQL binary が取得済み、または初回取得可能である
      - 開発用ポートが利用可能である
    main_success:
      - 開発者が標準開発コマンドを実行する
      - embedded PostgreSQL と開発用 Valkey 互換 endpoint が起動し schema が適用される
      - API、worker、UI が起動する
      - 初回 binary 取得を除き、標準開発コマンドの開始から API、worker、UI が利用可能になるまで 5 秒未満である
      - API が Job を enqueue する
      - worker が同じ Job を claim して Succeeded にする
      - API と worker は同じ PostgreSQL queue と Valkey 互換 endpoint を共有する
    extensions:
      - at: 2
        condition: binary 取得、ポート確保、または schema 適用に失敗する
        steps:
          - 標準開発環境は API と UI を起動せず fail-fast する
  Go source が未変更の標準開発環境は既存バイナリを再利用する:
    actor: Developer
    given:
      - embedded PostgreSQL binary が取得済みである
      - 前回の標準開発コマンドが API、worker、開発用インフラのバイナリを正常に生成している
      - 前回の生成以降、backend 配下の Go source、go.mod、go.sum が変更されていない
      - 開発用ポートが利用可能である
    main_success:
      - 開発者が標準開発コマンドを実行する
      - 前回生成済みの API、worker、開発用インフラのバイナリを再利用する
      - API、worker、UI が起動する
      - 標準開発コマンドの開始から API、worker、UI が利用可能になるまで 5 秒未満である
    extensions:
      - at: 2
        condition: backend 配下の Go source、go.mod、または go.sum が前回の生成以降に変更されている
        steps:
          - API、worker、開発用インフラのバイナリを再生成してから起動する
  ジョブをenqueueするとworkerが実行して成功する:
    actor: System
    given:
      - "テナント \"tenant-a\" が存在する"
      - worker プロセスが起動している
    main_success:
      - "テナント \"tenant-a\" に kind=\"noop_echo\" の Job を enqueue する"
      - Job の状態が queued である
      - worker が Job を claim し状態が running になる
      - ハンドラが正常終了し状態が succeeded になり result を保持する
  同じJobがリトライされてもハンドラの副作用は1回分しか観測されない:
    actor: System
    given:
      - dedup_key を指定して Job が enqueue 済みである
    main_success:
      - ハンドラが1回目の実行で外部への通知を送信し succeeded になる
      - at-least-once 配信により同じ Job が誤って再実行されても、ハンドラは dedup_key を用いて冪等に判定し重複通知を送らない
  workerがクラッシュしてもリース失効後に別workerが再取得する:
    actor: System
    given:
      - "テナント \"tenant-a\" の Job が worker-1 に claim され running である"
    main_success:
      - worker-1 が heartbeat を送らないまま停止する
      - lease_expires_at を過ぎる
      - worker-2 が同じ Job を claim し running を継続する
  ハンドラが失敗し続けるとmax_attempts超過でdead-letterになる:
    actor: System
    given:
      - "max_attempts=3 の Job が running で FailJob を呼ばれた回数が既に2回である"
    main_success:
      - ハンドラが3回目も失敗し FailJob を呼ぶ
      - attempts が max_attempts に達している
      - Job の状態が failed になり error が保持される
      - Job は二度と running にならない
  他テナントのJobはworkerのテナント境界を跨がない:
    actor: System
    given:
      - "テナント \"tenant-a\" の Job \"job-a\" が running で worker-1 に claim されている"
    main_success:
      - worker-1 が "job-a" のハンドラを実行する
      - ハンドラ実行 context の tenant_id が "tenant-a" と一致する
    extensions:
      - at: 2
        condition: ハンドラが誤って他テナントの集約 ID を渡された
        steps:
          - handler_execution_context.tenant_id と対象集約の tenant_id が不一致のため操作が拒否される
