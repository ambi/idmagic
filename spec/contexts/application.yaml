# idmagic Application — SCL
# Generated from idmagic/spec/scl.yaml during SCL 2.0 context split.

system: idmagic
spec_version: "2.0"
context: Application
glossary:
  Application:
    definition: 運用者が接続・割当・監査する業務アプリケーション。OIDC client、SAML SP、WS-Fed RP は Application に紐づく protocol binding である。
    aliases:
      - アプリケーション
      - Application
  ProtocolBinding:
    definition: "Application を特定 protocol で接続するための設定。例: OAuth2Client、SAML ServiceProvider、WS-Fed RelyingParty。"
    aliases:
      - binding
      - protocol_binding
models:
  ApplicationKind:
    kind: enum
    description: Application の種別。federated は SSO フェデレーションを束ねる業務アプリ、weblink は SSO しない外部リンク、service は M2M / client_credentials の API クライアント (Okta の API Services 相当。ポータルタイル・利用者割当を持たない)。
    values:
      - federated
      - weblink
      - service
  ApplicationStatus:
    kind: enum
    description: Application の有効状態。
    values:
      - active
      - disabled
  ProtocolBindingType:
    kind: enum
    description: "Application に接続する protocol binding の種別。"
    values:
      - oidc
      - saml
      - wsfed
  AssignmentSubjectType:
    kind: enum
    description: Application 割当の対象種別。
    values:
      - user
      - group
  AssignmentVisibility:
    kind: enum
    description: 割当の可視性。hidden はポータル一覧から除外するがプロトコル利用は許可する。
    values:
      - visible
      - hidden
  ApplicationProvisionType:
    kind: enum
    description: 一括作成で選ぶアプリ種別。oidc / wsfed は federated Application と対応する OAuth2 client / WS-Fed RP を同時に作成し、weblink は SSO なしの外部リンク、service は M2M / client_credentials の OAuth2 client (service kind) を作る。
    values:
      - oidc
      - wsfed
      - weblink
      - service
  ProtocolBinding:
    kind: value_object
    description: "Application に紐づく protocol binding。OIDC client / WS-Fed RP / 将来 SAML SP への 参照を opaque key で保持する。binding の wire 挙動は各 protocol context が所有する。"
    fields:
      type:
        type: ProtocolBindingType
        description: binding 種別。
      client_id:
        type: String
        optional: true
        description: oidc binding が指す OAuth2 client_id。
      wtrealm:
        type: String
        optional: true
        description: wsfed binding が指す WS-Fed RP の wtrealm。
  Application:
    kind: entity
    description: "運用者が「接続する業務アプリケーション」として扱う上位 aggregate。OIDC client / SAML SP / WS-Fed RP を protocol binding として束ね、表示名・アイコン・状態・割当を所有する。weblink kind は binding を持たない外部リンク。tenant_id は既存 Tenant を指し、category_ids と protocol binding の opaque key は use case が同一テナント内の既存参照として検証する。"
    identity:
      - tenant_id
      - application_id
    fields:
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。
      application_id:
        type: UUID
        description: Application 識別子。
      name:
        type: String
        constraints:
          - non_empty
        description: 管理 UI / ポータル表示名。
      kind:
        type: ApplicationKind
        description: federated か weblink か。
      status:
        type: ApplicationStatus
        description: 有効状態。
      icon_url:
        type: String
        optional: true
        description: IdP が保存済みアイコンから生成する内部配信 URL。管理者は直接入力しない。
      icon_object_key:
        type: String
        optional: true
        description: テナント境界内に保存されたアイコン画像 object の opaque key。
      launch_url:
        type: String
        optional: true
        description: weblink kind の起動先 URL。
      bindings:
        type: "ProtocolBinding[]"
        description: 接続済み protocol binding。weblink は空。
      category_ids:
        type: "UUID[]"
        description: 付与された ApplicationCategory の id 群 (0..N)。ポータルのセクション分類に使う (ADR-069)。
      created_at:
        type: Timestamp
      updated_at:
        type: Timestamp
  ApplicationCategory:
    kind: entity
    description: "管理者が tenant 単位で定義するポータルの分類セクション (ADR-069)。Application に 0..N 個\n付与され、利用者ポータルはこのカテゴリ単位でタイルをセクション表示する。割当境界は越えず、\nセクションには利用者に割当済みのアプリだけが並ぶ。\n"
    identity:
      - tenant_id
      - category_id
    fields:
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。
      category_id:
        type: UUID
        description: カテゴリ識別子。
      name:
        type: String
        constraints:
          - non_empty
        description: セクション表示名。
      position:
        type: Integer
        description: セクションの表示順。小さいほど先。同値は name 昇順。
      created_at:
        type: Timestamp
      updated_at:
        type: Timestamp
  ApplicationAssignment:
    kind: entity
    description: Application へのユーザー / グループ割当。割当はポータル可視性とフェデレーション利用可否を fail-closed で制御する。hidden は一覧に出さないがプロトコル利用は許可する。subject_id は subject_type に応じて同一テナントの User.id または Group.id を指す。
    identity:
      - tenant_id
      - application_id
      - subject_type
      - subject_id
    fields:
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。
      application_id:
        type: UUID
        description: 対象 Application。
      subject_type:
        type: AssignmentSubjectType
        description: user か group か。
      subject_id:
        type: String
        constraints:
          - non_empty
        description: user の sub または group id。
      visibility:
        type: AssignmentVisibility
        description: visible か hidden か。
      created_at:
        type: Timestamp
  RequiredAuthnStrength:
    kind: enum
    description: サインインポリシーが要求する認証強度。Password は追加要求なし (acr ⊇ urn:idmagic:acr:pwd)、Mfa は第二要素必須 (acr = urn:idmagic:acr:mfa、amr に otp / webauthn / hwk / swk のいずれかを含む)。
    values:
      - Password
      - Mfa
  RequiredAuthnLevel:
    kind: value_object
    description: サインインポリシーが要求する認証強度。制約された選択肢 (Password / Mfa) を内部の acr / amr へ写像する。Mfa を満たさない場合は step-up で昇格を促す。
    fields:
      strength:
        type: RequiredAuthnStrength
        default: Password
  AccessCondition:
    kind: value_object
    description: サインインポリシーの静的アクセス条件。すべて初期実装で実際に評価できる構造化条件のみを持つ。network_allow_cidrs はクライアント IP を許可 CIDR に突き合わせ、reauth_max_age_seconds は認証または step-up の recency として評価する。旧 network / device の自由入力は廃止した。
    fields:
      network_allow_cidrs:
        type: "String[]"
        description: 許可するクライアント IP の CIDR 一覧。空なら制限なし。非空でクライアント IP がいずれの CIDR にも含まれない、または IP を取得できない場合は fail-closed で拒否する。
      reauth_max_age_seconds:
        type: Integer
        optional: true
  SignInRule:
    kind: value_object
    description: サインインポリシーの単一ルール。
    fields:
      rule_id:
        type: String
      name:
        type: String
      enabled:
        type: Boolean
      required_authn:
        type: RequiredAuthnLevel
      condition:
        type: AccessCondition
  AppSignInPolicy:
    kind: entity
    description: Application ごとのサインインポリシー。ApplicationCatalog が所有する。有効ルールを持つときテナントデフォルトを完全に上書き (置換) して評価され、持たなければデフォルトが適用される (上書きモデル, ADR-081)。デフォルトより弱い設定でも保存でき、その場合は UI で警告する。
    identity:
      - tenant_id
      - application_id
    fields:
      tenant_id:
        type: String
        default: default
      application_id:
        type: UUID
      rules:
        type: "SignInRule[]"
      created_at:
        type: Timestamp
      updated_at:
        type: Timestamp
  TenantDefaultSignInPolicy:
    kind: entity
    description: テナントデフォルトのサインインポリシー。ApplicationCatalog が tenant 単位で所有し、独自ポリシーを持たない全 Application の federation 開始で適用される baseline。アプリ個別ポリシーが設定されるとそのアプリではデフォルトを上書きする (ADR-081)。
    identity:
      - tenant_id
    fields:
      tenant_id:
        type: String
        default: default
      rules:
        type: "SignInRule[]"
      created_at:
        type: Timestamp
      updated_at:
        type: Timestamp
  AdminApplicationResponse:
    kind: value_object
    description: 管理 API が返す Application 表現。
    fields:
      application_id:
        type: UUID
      name:
        type: String
      kind:
        type: ApplicationKind
      status:
        type: ApplicationStatus
      icon_url:
        type: String
        optional: true
      icon_object_key:
        type: String
        optional: true
      launch_url:
        type: String
        optional: true
      bindings:
        type: "ProtocolBinding[]"
      category_ids:
        type: "UUID[]"
      category_names:
        type: "String[]"
      binding_summaries:
        type: "String[]"
      assigned_subject_count:
        type: Integer
      sign_in_policy_summary:
        type: String
      created_at:
        type: Timestamp
      updated_at:
        type: Timestamp
  AdminApplicationListResponse:
    kind: value_object
    description: Application 一覧レスポンス。
    fields:
      applications:
        type: "AdminApplicationResponse[]"
  AdminApplicationCategoryRequest:
    kind: value_object
    description: ApplicationCategory の作成 / 更新リクエスト。position 省略時は末尾扱い (ADR-069)。
    fields:
      name:
        type: String
        constraints:
          - non_empty
      position:
        type: Integer
        optional: true
  AdminApplicationCategoryResponse:
    kind: value_object
    description: 管理 API が返す ApplicationCategory 表現。
    fields:
      category_id:
        type: UUID
      name:
        type: String
      position:
        type: Integer
      created_at:
        type: Timestamp
      updated_at:
        type: Timestamp
  AdminApplicationCategoryListResponse:
    kind: value_object
    description: ApplicationCategory 一覧レスポンス。position 昇順 (同値は name 昇順)。
    fields:
      categories:
        type: "AdminApplicationCategoryResponse[]"
  ApplicationCategoriesRequest:
    kind: value_object
    description: Application に付与するカテゴリ集合を置き換えるリクエスト。category_ids は所属テナントの 既存カテゴリのみを含む (ADR-069)。
    fields:
      category_ids:
        type: "UUID[]"
  AdminApplicationCreateRequest:
    kind: value_object
    description: Application 一括作成リクエスト。種別を選び、対応するプロトコル設定もまとめて受け取る。 backend が OAuth2 client / WS-Fed RP を作成し、Application と protocol binding を一括で作る。
    fields:
      name:
        type: String
        constraints:
          - non_empty
      type:
        type: ApplicationProvisionType
        description: oidc / wsfed / weblink。
      launch_url:
        type: String
        optional: true
        description: ポータルのタイルから開く起動 URL。weblink では必須。
      redirect_uris:
        type: "String[]"
        optional: true
        description: type=oidc のとき必須。生成する OAuth2 client のリダイレクト URI。
      scope:
        type: String
        optional: true
        description: 生成する OAuth2 client のスコープ。
      client_type:
        type: ClientType
        optional: true
        description: type=oidc の生成 client 種別。既定は confidential。
      token_endpoint_auth_method:
        type: TokenEndpointAuthMethod
        optional: true
        description: type=oidc の生成 client 認証方式。作成時に確定し以後不変。
      jwks_uri:
        type: Uri
        optional: true
        description: token_endpoint_auth_method=private_key_jwt の公開鍵 JWKS URI。
      tls_client_auth_subject_dn:
        type: String
        optional: true
        description: token_endpoint_auth_method=tls_client_auth の証明書 Subject DN。
      wtrealm:
        type: String
        optional: true
        description: type=wsfed のとき必須。生成する WS-Fed RP の wtrealm。
      reply_urls:
        type: "String[]"
        optional: true
        description: type=wsfed のとき必須。許可する wreply。
      name_id_format:
        type: String
        optional: true
        description: type=wsfed の NameID 形式。
      name_id_source:
        type: String
        optional: true
        description: type=wsfed の NameID ソース属性。
  AdminApplicationCreateResponse:
    kind: value_object
    description: 一括作成の結果。type=oidc のときは生成した OAuth2 client の client_id / client_secret を 一度だけ返す (再表示不可)。
    fields:
      application:
        type: AdminApplicationResponse
      client_id:
        type: String
        optional: true
        description: type=oidc のとき返る生成クライアント ID。
      client_secret:
        type: String
        optional: true
        description: type=oidc のとき一度だけ返るシークレット。
  ApplicationOidcConfig:
    kind: value_object
    description: Application の OIDC binding が指す OAuth2 client の実設定 (アプリ詳細表示用)。advanced 項目を含む。token_endpoint_auth_method / client_type / fapi_profile は更新契約上の不変項目で 表示専用。
    fields:
      client_id:
        type: String
      client_type:
        type: ClientType
      redirect_uris:
        type: "String[]"
      grant_types:
        type: "GrantType[]"
      response_types:
        type: "ResponseType[]"
      token_endpoint_auth_method:
        type: TokenEndpointAuthMethod
      scope:
        type: String
      require_pushed_authorization_requests:
        type: Boolean
      dpop_bound_access_tokens:
        type: Boolean
      fapi_profile:
        type: FapiProfile
  ApplicationWsFedConfig:
    kind: value_object
    description: Application の WS-Fed binding が指す relying party の実設定 (アプリ詳細表示用)。per-RP の advanced 項目 (audience / token_type / claim 規則) を含む。Entra domain federation は テナント単位の設定として別に扱う。
    fields:
      wtrealm:
        type: String
      reply_urls:
        type: "String[]"
      audience:
        type: String
      token_type:
        type: WsFedTokenType
      name_id_format:
        type: String
      name_id_source:
        type: String
      rules:
        type: "ClaimMappingRule[]"
  AdminApplicationDetailResponse:
    kind: value_object
    description: アプリ詳細レスポンス。Application 本体に加え、binding から解決した protocol 実設定を含む。
    fields:
      application:
        type: AdminApplicationResponse
      oidc:
        type: ApplicationOidcConfig
        optional: true
      wsfed:
        type: ApplicationWsFedConfig
        optional: true
  ApplicationOidcConfigUpdateRequest:
    kind: value_object
    description: OIDC binding 設定の更新リクエスト。指定フィールドのみ変更する。advanced 項目を含む。 token_endpoint_auth_method など更新契約上の不変項目は含めない。
    fields:
      redirect_uris:
        type: "String[]"
        optional: true
      grant_types:
        type: "GrantType[]"
        optional: true
      response_types:
        type: "ResponseType[]"
        optional: true
      scope:
        type: String
        optional: true
      require_pushed_authorization_requests:
        type: Boolean
        optional: true
      dpop_bound_access_tokens:
        type: Boolean
        optional: true
  ApplicationWsFedConfigUpdateRequest:
    kind: value_object
    description: WS-Federation binding 設定の更新リクエスト。指定フィールドのみ変更する。per-RP の advanced 項目 (audience / token_type / claim 規則) を含む。Entra domain federation は対象外。
    fields:
      reply_urls:
        type: "String[]"
        optional: true
      audience:
        type: String
        optional: true
      token_type:
        type: WsFedTokenType
        optional: true
      name_id_format:
        type: String
        optional: true
      name_id_source:
        type: String
        optional: true
      rules:
        type: "ClaimMappingRule[]"
        optional: true
  AdminApplicationUpdateRequest:
    kind: value_object
    description: Application 更新リクエスト。指定フィールドのみ変更する。
    fields:
      name:
        type: String
        optional: true
      status:
        type: ApplicationStatus
        optional: true
      launch_url:
        type: String
        optional: true
  ApplicationIconUploadResponse:
    kind: value_object
    description: Application icon アップロードまたは削除後の Application 表現。
    fields:
      application:
        type: AdminApplicationResponse
  ProtocolBindingRequest:
    kind: value_object
    description: protocol binding の接続リクエスト。
    fields:
      type:
        type: ProtocolBindingType
      client_id:
        type: String
        optional: true
      wtrealm:
        type: String
        optional: true
  ApplicationAssignmentRequest:
    kind: value_object
    description: Application 割当リクエスト。visibility 省略時は visible。
    fields:
      subject_type:
        type: AssignmentSubjectType
      subject_id:
        type: String
        constraints:
          - non_empty
      visibility:
        type: AssignmentVisibility
        optional: true
  ApplicationAssignmentResponse:
    kind: value_object
    description: 割当表現。
    fields:
      subject_type:
        type: AssignmentSubjectType
      subject_id:
        type: String
      visibility:
        type: AssignmentVisibility
      created_at:
        type: Timestamp
  ApplicationAssignmentListResponse:
    kind: value_object
    description: 割当一覧レスポンス。
    fields:
      assignments:
        type: "ApplicationAssignmentResponse[]"
  AppSignInPolicyRequest:
    kind: value_object
    description: 管理者が Application の sign-in policy を置き換えるリクエスト。有効ルールを送るとテナントデフォルトを上書きし、空で送るとデフォルト適用に戻る。
    fields:
      rules:
        type: "SignInRule[]"
  AppSignInPolicyResponse:
    kind: value_object
    description: "Application の sign-in policy 表現。アプリ詳細で「このアプリの上書き (policy)」「テナントデフォルト (tenant_default)」\n「実際に適用される effective ルール列」を区別して表示できるようにする (ADR-081)。\n"
    fields:
      policy:
        type: AppSignInPolicy
      tenant_default:
        type: TenantDefaultSignInPolicy
      effective_rules:
        type: "SignInRule[]"
        description: 上書きモデルで実際に評価されるルール列。アプリが有効ルールを持てば policy.rules、持たなければ tenant_default.rules。
      weaker_than_default:
        type: Boolean
        description: アプリ独自ポリシーがデフォルトより弱い (認証強度・再認証時間・許可ネットワークのいずれかを緩める) とき true。UI 警告用で評価は妨げない (ADR-081)。
  TenantDefaultSignInPolicyRequest:
    kind: value_object
    description: 管理者がテナントデフォルト sign-in policy を置き換えるリクエスト。
    fields:
      rules:
        type: "SignInRule[]"
  TenantDefaultSignInPolicyResponse:
    kind: value_object
    description: テナントデフォルト sign-in policy 表現。
    fields:
      policy:
        type: TenantDefaultSignInPolicy
  MyApplication:
    kind: value_object
    description: 利用者ポータルに表示する割当済みアプリ 1 件。
    fields:
      application_id:
        type: UUID
      name:
        type: String
      kind:
        type: ApplicationKind
      icon_url:
        type: String
        optional: true
      launch_url:
        type: String
        optional: true
      category_ids:
        type: "UUID[]"
        description: 付与カテゴリの id 群。ポータルはこれでタイルをセクションに振り分ける (ADR-069)。
  PortalApplicationCategory:
    kind: value_object
    description: 利用者ポータルのセクション見出し 1 件。tenant のカテゴリ定義を position 昇順で表す (ADR-069)。
    fields:
      category_id:
        type: UUID
      name:
        type: String
  MyApplicationListResponse:
    kind: value_object
    description: "利用者ポータルの割当済みアプリ一覧。手動並び順があればそれを優先し、無ければ name 昇順。\ncategories は tenant のカテゴリ定義を position 昇順で含み、ポータルはこれをセクション見出しに使う (ADR-069)。\n"
    fields:
      applications:
        type: "MyApplication[]"
      categories:
        type: "PortalApplicationCategory[]"
  ApplicationOrdering:
    kind: entity
    description: "利用者ポータルでの手動並び順 (ADR-069)。user_id をキーに、Application の\n表示順を application_id の順序列として持つ。user_id は global unique な既存 User を指す。\n順序列に在って現在は未割当の application は一覧から除外し、順序列に無い割当アプリは name 昇順で末尾に付ける。application_ids は配列で保持するため DB 外部キーではなく ReorderMyApplications の use case 検証で、本人に割当済み visible な Application のみに制限する。\n"
    identity:
      - user_id
    fields:
      user_id:
        type: String
      application_ids:
        type: "UUID[]"
      created_at:
        type: Timestamp
      updated_at:
        type: Timestamp
  ReorderMyApplicationsRequest:
    kind: value_object
    description: 利用者が自分のポータル手動並び順を保存する。application_ids は自分に割当済み visible なアプリのみを含む。
    fields:
      application_ids:
        type: "UUID[]"
  MyApplicationOrderResponse:
    kind: value_object
    description: 利用者が保存済みのポータル手動並び順。未保存なら application_ids は空。
    fields:
      application_ids:
        type: "UUID[]"
  ApplicationCreated:
    kind: event
    description: Application を作成した。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
      actorUserId:
        type: String
      applicationId:
        type: String
  ApplicationUpdated:
    kind: event
    description: Application のメタデータを更新した。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
      actorUserId:
        type: String
