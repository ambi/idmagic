interfaces:
  ListAdminApplications:
    description: 管理者が所属テナントの Application を一覧する。
    output:
      response:
        type: AdminApplicationListResponse
    errors:
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/admin/applications
  GetAdminApplication:
    description: 管理者が Application を取得する。binding から解決した protocol 実設定も含む。別テナントは未存在として扱う。
    input:
      application_id:
        type: String
    output:
      response:
        type: AdminApplicationDetailResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/applications/{application_id}"
  CreateAdminApplication:
    description: 管理者が Application を一括作成する。種別に応じて OAuth2 client / WS-Fed RP も同時に作成し、 protocol binding を接続する。
    input:
      request:
        type: AdminApplicationCreateRequest
    output:
      response:
        type: AdminApplicationCreateResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationCreated
    bindings:
      - kind: http
        method: POST
        path: /api/admin/applications
        request_form: body
        successful_status_codes:
          - "201"
  UpdateAdminApplication:
    description: 管理者が Application のメタデータを更新する。
    input:
      application_id:
        type: String
      request:
        type: AdminApplicationUpdateRequest
    output:
      application:
        type: AdminApplicationResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationUpdated
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/applications/{application_id}"
        request_form: body
  UploadApplicationIcon:
    description: 管理者が Application のアイコン画像を multipart でアップロードする。受理形式は PNG / JPEG / WebP / GIF、最大 256KiB とし、magic byte で検証する。
    input:
      application_id:
        type: String
      file:
        type: String
    output:
      response:
        type: ApplicationIconUploadResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationIconUpdated
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/applications/{application_id}/icon"
        request_form: form
  DeleteApplicationIcon:
    description: 管理者が Application の保存済みアイコンを削除する。削除後は icon_url を返さない。
    input:
      application_id:
        type: String
    output:
      response:
        type: ApplicationIconUploadResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationIconUpdated
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/applications/{application_id}/icon"
  GetApplicationIcon:
    description: "保存済み Application アイコンを配信する。Content-Type は検証済み形式に固定し、X-Content-Type-Options: nosniff を付ける。別テナントまたは削除済み object は未存在として扱う。"
    input:
      application_id:
        type: String
      object_key:
        type: String
    output:
      file:
        type: String
    errors:
      - InvalidRequestError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: "/application-icons/{application_id}/{object_key}"
  DeleteAdminApplication:
    description: 管理者が Application を削除する (冪等)。
    input:
      application_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationDeleted
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/applications/{application_id}"
        successful_status_codes:
          - "204"
  AttachProtocolBinding:
    description: 管理者が Application に protocol binding を接続する。
    input:
      application_id:
        type: String
      request:
        type: ProtocolBindingRequest
    output:
      application:
        type: AdminApplicationResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ProtocolBindingAttached
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/applications/{application_id}/bindings"
        request_form: body
        successful_status_codes:
          - "201"
  DetachProtocolBinding:
    description: 管理者が Application から protocol binding を解除する (冪等)。
    input:
      application_id:
        type: String
      binding_type:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ProtocolBindingDetached
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/applications/{application_id}/bindings/{binding_type}"
        successful_status_codes:
          - "204"
  UpdateApplicationOidcConfig:
    description: 管理者が Application の OIDC binding が指す OAuth2 client の設定を更新する。
    input:
      application_id:
        type: String
      request:
        type: ApplicationOidcConfigUpdateRequest
    errors:
      - InvalidRequestError
      - AccessDeniedError
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/applications/{application_id}/oidc"
        request_form: body
        successful_status_codes:
          - "204"
  UpdateApplicationWsFedConfig:
    description: 管理者が Application の WS-Fed binding が指す relying party の設定を更新する。
    input:
      application_id:
        type: String
      request:
        type: ApplicationWsFedConfigUpdateRequest
    errors:
      - InvalidRequestError
      - AccessDeniedError
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/applications/{application_id}/wsfed"
        request_form: body
        successful_status_codes:
          - "204"
  ListApplicationAssignments:
    description: 管理者が Application の割当を一覧する。
    input:
      application_id:
        type: String
    output:
      response:
        type: ApplicationAssignmentListResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/applications/{application_id}/assignments"
  AssignApplication:
    description: 管理者が Application にユーザー / グループを割当てる。
    input:
      application_id:
        type: String
      request:
        type: ApplicationAssignmentRequest
    output:
      assignment:
        type: ApplicationAssignmentResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationAssigned
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/applications/{application_id}/assignments"
        request_form: body
        successful_status_codes:
          - "201"
  UnassignApplication:
    description: 管理者が Application の割当を解除する (冪等)。
    input:
      application_id:
        type: String
      subject_type:
        type: String
      subject_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationUnassigned
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/applications/{application_id}/assignments/{subject_type}/{subject_id}"
        successful_status_codes:
          - "204"
  GetAppSignInPolicy:
    description: 管理者が Application の sign-in policy を取得する。アプリ個別ポリシー・テナントデフォルト・上書き後に実際に適用される effective ルール列と、デフォルトより弱いかの警告フラグを返す。未設定なら空 rules を返す (ADR-081)。
    input:
      application_id:
        type: String
    output:
      response:
        type: AppSignInPolicyResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/applications/{application_id}/sign-in-policy"
  UpdateAppSignInPolicy:
    description: 管理者が Application の sign-in policy を置き換える。無効な CIDR を含む条件は拒否する。
    input:
      application_id:
        type: String
      request:
        type: AppSignInPolicyRequest
    output:
      response:
        type: AppSignInPolicyResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - AppSignInPolicyUpdated
    bindings:
      - kind: http
        method: PUT
        path: "/api/admin/applications/{application_id}/sign-in-policy"
        request_form: body
  GetTenantDefaultSignInPolicy:
    description: 管理者がテナントデフォルト sign-in policy を取得する。未設定なら空 rules の policy を返す (ADR-081)。
    output:
      response:
        type: TenantDefaultSignInPolicyResponse
    errors:
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/admin/default-sign-in-policy
  UpdateTenantDefaultSignInPolicy:
    description: 管理者がテナントデフォルト sign-in policy を置き換える。無効な CIDR を含む条件は拒否する。空 rules で保存すればデフォルトは allow-all に戻る (ADR-081)。
    input:
      request:
        type: TenantDefaultSignInPolicyRequest
    output:
      response:
        type: TenantDefaultSignInPolicyResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - TenantDefaultSignInPolicyUpdated
    bindings:
      - kind: http
        method: PUT
        path: /api/admin/default-sign-in-policy
        request_form: body
  ListApplicationCategories:
    description: 管理者が所属テナントの ApplicationCategory を position 昇順で一覧する。
    output:
      response:
        type: AdminApplicationCategoryListResponse
    errors:
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/admin/application-categories
  CreateApplicationCategory:
    description: 管理者が ApplicationCategory を作成する。
    input:
      request:
        type: AdminApplicationCategoryRequest
    output:
      category:
        type: AdminApplicationCategoryResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationCategoryCreated
    bindings:
      - kind: http
        method: POST
        path: /api/admin/application-categories
        request_form: body
        successful_status_codes:
          - "201"
  UpdateApplicationCategory:
    description: 管理者が ApplicationCategory の名前 / 並び順を更新する。
    input:
      category_id:
        type: String
      request:
        type: AdminApplicationCategoryRequest
    output:
      category:
        type: AdminApplicationCategoryResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationCategoryUpdated
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/application-categories/{category_id}"
        request_form: body
  DeleteApplicationCategory:
    description: 管理者が ApplicationCategory を削除する (冪等)。付与済みの Application からも除く。
    input:
      category_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationCategoryDeleted
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/application-categories/{category_id}"
        successful_status_codes:
          - "204"
  SetApplicationCategories:
    description: 管理者が Application に付与するカテゴリ集合を置き換える。所属テナントの既存カテゴリのみ受け付ける。
    input:
      application_id:
        type: String
      request:
        type: ApplicationCategoriesRequest
    output:
      application:
        type: AdminApplicationResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationUpdated
    bindings:
      - kind: http
        method: PUT
        path: "/api/admin/applications/{application_id}/categories"
        request_form: body
  ListMyApplications:
    description: "利用者が自分に割当済み (visible) の Application を一覧する。hidden 割当は除外する。\n手動並び順 (ApplicationOrdering) があればそれを優先し、無ければ name 昇順。応答の categories は\ntenant のカテゴリ定義を position 昇順で含み、各アプリの category_ids でセクションに振り分ける (ADR-069)。\n"
    output:
      response:
        type: MyApplicationListResponse
    errors:
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/account/applications
  GetMyApplicationOrder:
    description: 利用者が保存済みのポータル手動並び順を取得する。未保存なら空配列を返す (ADR-069)。
    output:
      response:
        type: MyApplicationOrderResponse
    errors:
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/account/applications/order
  ReorderMyApplications:
    description: "利用者が自分のポータル手動並び順を保存する。application_ids は自分に割当済み visible な\nアプリのみを含み、それ以外を含むと拒否する (ADR-069)。\n"
    input:
      request:
        type: ReorderMyApplicationsRequest
    output:
      response:
        type: MyApplicationOrderResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    bindings:
      - kind: http
        method: PUT
        path: /api/account/applications/order
        request_form: body
invariants:
  AssignmentGatesProtocol:
    description: "未割当の subject はどの protocol binding でもフェデレーションを開始 / 完了できない。\nauthorize / WS-Fed sign-in / 将来 SAML SSO は割当を fail-closed で確認する。\n反例: 未割当ユーザーがプロトコル経由でアプリにログインできる (アクセス制御の迂回)。\n"
    target: Application
    never: federation_completed and not subject_assigned
  AssignmentGatesPortalVisibility:
    description: "ListMyApplications は visible 割当のみ返す。hidden 割当は一覧から除外するが\nプロトコル利用は引き続き許可する。\n"
    target: ApplicationAssignment
    always: listed_in_portal implies (assigned and visibility == visible)
  AppPolicyFailClosed:
    description: Application sign-in policy の要求を満たせない subject には token / assertion を発行しない。評価不能な条件 (許可 CIDR 非空でクライアント IP 不明など) も拒否として扱う。
    target: AppSignInPolicy
    never: federation_completed and policy_result != allow
  AppPolicyEvaluatedAcrossProtocols:
    description: OIDC authorize、WS-Fed sign-in、SAML SSO は同じ Application sign-in policy 評価器を通し、protocol ごとの個別条件分岐で迂回できない。評価器には上書きモデルの実効ポリシー (アプリ独自ルールがあればそれ、なければテナントデフォルト) とクライアント IP を全経路で渡す。
    target: AppSignInPolicy
    always: federation_started_via_binding implies app_sign_in_policy_evaluated
  DefaultPolicyAppliesWhenAppUnset:
    description: "独自の sign-in policy を持たない Application は、federation 開始時にテナントデフォルトポリシーで\nfail-closed 評価される。アプリが有効ルールを持つ場合はデフォルトを上書き (置換) し、その実効ポリシーで評価する。\nどちらの経路でも評価器は fail-closed。\n反例: デフォルトで MFA を要求しているのに、独自ポリシーを持たないアプリへ単要素で federation を完了できる。\n"
    target: TenantDefaultSignInPolicy
    never: federation_completed and effective_policy_result != allow
  ApplicationIconSafeServing:
    description: Application icon は保存時に magic byte とサイズ上限を検証し、配信時は保存済み content-type と nosniff を強制する。SVG や実行可能コンテンツとして扱われる形式は受け付けない。
    target: Application
    always: icon_uploaded implies (content_type in ["image/png","image/jpeg","image/webp","image/gif"] and size_bytes <= 262144 and response_nosniff == true)
  ApplicationIconTenantIsolation:
    description: Application icon は tenant_id + application_id + object_key で参照し、別テナントの object は同じ key でも取得できない。
    target: Application
    always: icon_served implies request.tenant_id == icon.tenant_id
  ApplicationReferencesStayTenantLocal:
    description: "Application / ApplicationCategory / ApplicationAssignment は既存 Tenant に属し、割当 subject は同一 tenant_id 内の live User または Group だけを指す。ApplicationOrdering の user は global unique な既存 live User を指す。category_ids と protocol binding は配列 / JSONB 参照なので保存 use case が同一テナントの存在性を検証する。\n反例: tenant A の ApplicationAssignment が tenant B の User / Group を subject_id に持つ。\n"
    target: Application
    always: "application.tenant_id in Tenants && assignment.subject in Subjects(assignment.tenant_id) && ordering.user_id in Users"
permissions:
  AdminApplicationsManage:
    description: 所属テナント内の Application 一覧・取得・作成・更新・削除・binding 接続/解除・アイコンアップロード/削除。
    actor: User
    resource: Application
    allow_when: "admin in actor.roles && actor.disabled_at == null && context.authenticated == true && actor.tenant_id == resource.tenant_id"
  AdminApplicationAssignmentsManage:
    description: Application へのユーザー / グループ割当の参照・追加・削除。
    actor: User
    resource: ApplicationAssignment
    allow_when: "admin in actor.roles && actor.disabled_at == null && context.authenticated == true && actor.tenant_id == resource.tenant_id"
  AdminApplicationPoliciesManage:
    description: 所属テナント内の Application sign-in policy の参照・更新。
    actor: User
    resource: AppSignInPolicy
    allow_when: "admin in actor.roles && actor.disabled_at == null && context.authenticated == true && actor.tenant_id == resource.tenant_id"
  AdminTenantDefaultSignInPolicyManage:
    description: 所属テナントのデフォルト sign-in policy の参照・更新。
    actor: User
    resource: TenantDefaultSignInPolicy
    allow_when: "admin in actor.roles && actor.disabled_at == null && context.authenticated == true && actor.tenant_id == resource.tenant_id"
  AdminApplicationCategoriesManage:
    description: 所属テナント内の ApplicationCategory の参照・作成・更新・削除と Application への付与。
    actor: User
    resource: ApplicationCategory
    allow_when: "admin in actor.roles && actor.disabled_at == null && context.authenticated == true && actor.tenant_id == resource.tenant_id"
  MyApplicationsRead:
    description: 利用者が自分に割当済みの Application 一覧を参照する。
    actor: User
    resource: ApplicationAssignment
    allow_when: "context.authenticated == true && actor.tenant_id == resource.tenant_id"
scenarios:
  管理者は所属テナントの client を作成・更新・削除できる:
    goal: 管理者が所属テナントの client を作成・更新・削除する。
    primary_actor: Administrator
    scope: Application
    level: user_goal
    preconditions:
      - "tenant_id \"acme\" の roles=[\"admin\"] のユーザー \"operator\" が認証済みである"
    main_success:
      - "管理者 \"operator\" が client \"portal\" を作成する"
      - 作成応答だけが生成された client_secret を含む
      - "管理者 \"operator\" が client \"portal\" の redirect_uris を更新する"
      - "管理者 \"operator\" が client \"portal\" を削除する"
      - "\"AdminOAuth2ClientCreated\"、\"AdminOAuth2ClientUpdated\"、\"AdminOAuth2ClientDeleted\" が発行される"
    extensions:
      - at: 1
        condition: 管理画面から操作する
        steps:
          - "roles=[\"admin\"] のユーザー \"operator\" が管理画面のアプリケーション一覧を開く"
          - "管理者 \"operator\" が confidential client を作成する"
          - 画面は生成された client_secret を一度だけ表示する
          - "管理者 \"operator\" が redirect_uris と scope を編集する"
          - "管理者 \"operator\" が client_id を確認して client を削除する"
          - 一覧から対象 client が消える
      - condition: 別テナントの client を取得しようとする
        steps:
          - "tenant_id \"acme\" に client_id \"portal\" が存在する"
          - "tenant_id \"default\" の管理者が client_id \"portal\" を取得する"
          - "エラー \"InvalidRequestError\""
  管理 consent API は別テナントの同意を公開しない:
    goal: 管理 consent API がテナント境界を越えた同意を公開しない。
    primary_actor: Administrator
    scope: Application
    level: user_goal
    preconditions:
      - "tenant_id \"acme\" のユーザー \"alice\" と client \"portal\" の Consent が存在する"
    main_success:
      - "tenant_id \"default\" の管理者が同じ sub と client_id の Consent を取得する"
      - "エラー \"InvalidRequestError\""
  管理者は管理画面でアプリケーションを作成し protocol binding を構成できる:
    goal: 管理者が統合 Application 画面でアプリを作成し、protocol binding と割り当てを構成する。
    primary_actor: Administrator
    scope: Application
    level: user_goal
    description: OAuth2 / WS-Federation / service を統合した Application 画面。
    preconditions:
      - "roles=[\"admin\"] のユーザー \"operator\" が管理画面のアプリケーション一覧を開いている"
    main_success:
      - "管理者 \"operator\" が confidential なアプリケーション \"portal\" を作成する"
      - 画面は生成された client_secret を一度だけ表示する
      - "管理者 \"operator\" がアプリケーション \"portal\" に OIDC protocol binding を追加する"
      - "管理者 \"operator\" がアプリケーション \"portal\" の redirect_uris と scope を編集する"
      - "管理者 \"operator\" がアプリケーション \"portal\" をユーザー \"alice\" に割り当てる"
      - "管理者 \"operator\" がアプリケーション \"portal\" を削除する"
      - 一覧から対象アプリケーションが消える
    extensions:
      - condition: 別テナントまたは存在しない subject へ割り当てる
        steps:
          - "tenant_id \"acme\" の Application に tenant_id \"default\" の User sub を指定する"
          - "エラー \"InvalidRequestError\""
  管理者は Application アイコンをアップロード・削除できる:
    goal: 管理者が Application 編集画面で画像ファイルを選び、ポータルと管理画面に保存済みアイコンを表示する。
    primary_actor: Administrator
    scope: Application
    level: user_goal
    preconditions:
      - 管理者が Application 編集画面を開いている
    main_success:
      - PNG / JPEG / WebP / GIF の 256KiB 以下の画像をアップロードする
      - Application は icon_object_key と内部 icon_url を持つ
      - 管理一覧・詳細・利用者ポータルの icon_url は IdP の配信 URL を指す
      - 管理者がアイコンを削除すると icon_object_key と icon_url は空になる
    extensions:
      - condition: 非画像または上限超過ファイルをアップロードする
        steps:
          - エラー "InvalidRequestError"
          - 既存アイコンは置き換わらない
  管理者はアプリケーション別サインインポリシーを設定できる:
    goal: 管理者が Application ごとに MFA / 再認証 / 許可 CIDR 条件を設定し、フェデレーション開始時に強制する。
    primary_actor: Administrator
    scope: Application
    level: user_goal
    preconditions:
      - 管理者が Application 編集画面を開いている
      - Application は OIDC / SAML / WS-Fed のいずれかの protocol binding を持つ
    main_success:
      - 管理者が MFA 必須と再認証を求めるまでの時間 (秒) を要求する sign-in policy を保存する
      - 単要素セッションの利用者が対象 Application にアクセスする
      - システムは step-up が可能な経路では step-up を要求し、昇格後に federation を完了する
      - システムは token / assertion 発行前に policy を評価する
    extensions:
      - condition: 許可 CIDR に含まれないクライアント IP、またはクライアント IP を取得できない
        steps:
          - 対象 Application への federation は拒否される
          - "AppAccessDeniedByPolicy が発行される"
      - condition: 管理者以外が policy を更新する
        steps:
          - エラー "AccessDeniedError"
  管理者はテナントデフォルトサインインポリシーを設定し全アプリに適用できる:
    goal: 管理者がテナントデフォルトサインインポリシーを設定し、独自ポリシーを持たない全 Application の federation 開始に baseline として適用する。
    primary_actor: Administrator
    scope: Application
    level: user_goal
    preconditions:
      - "roles=[\"admin\"] のユーザー \"operator\" がサインインポリシー画面を開いている"
      - テナントに OIDC binding を持つ複数の Application が存在し、いずれも個別 sign-in policy を持たない
    main_success:
      - 管理者が MFA 必須を要求するテナントデフォルトサインインポリシーを保存する
      - "TenantDefaultSignInPolicyUpdated が発行される"
      - 単要素セッションの利用者が個別ポリシーを持たない Application にアクセスする
      - システムはデフォルトポリシーを適用し step-up を要求する
    extensions:
      - condition: 低リスクアプリだけデフォルトを上書きして緩和する
        steps:
          - "管理者が対象 Application に弱いサインインポリシー (例: パスワードのみ) を設定してデフォルトを上書きする"
          - システムはデフォルトより弱い旨の警告を表示するが保存は許可する
          - 単要素セッションの利用者が当該 Application に step-up なしでアクセスできる
          - 他の Application ではデフォルトの MFA 必須が引き続き適用される
      - condition: アプリ詳細で最終適用ポリシーを確認する
        steps:
          - アプリ編集画面はテナントデフォルト・このアプリの上書き・最終的に適用されるポリシーを区別して表示する
      - condition: デフォルトポリシーを空にして解除する
        steps:
          - 管理者がルールを空にして保存する
          - "TenantDefaultSignInPolicyUpdated が発行される"
          - 以降、独自ポリシーを持たない Application の federation 開始は追加要件を課さない
  ダッシュボードは所属テナントの集計を表示する:
    goal: 管理ダッシュボードが所属テナントの集計を表示する。
    primary_actor: Administrator
    scope: Application
    level: user_goal
    preconditions:
      - "roles=[\"admin\"] のユーザー \"operator\" が管理ダッシュボードを開いている"
    main_success:
      - ユーザー数・登録アプリケーション数・付与済み同意数・直近 24 時間の監査イベント数が表示される
      - 最近の監査イベントが表示される
user_experience:
  screens:
    AdminApplications:
      route: /admin/applications
      purpose: "管理者が OAuth2 / WS-Federation / service の各種クライアントを単一の「アプリケーション」として\n一覧・作成・更新・削除し、protocol binding の追加・削除、OIDC / WS-Fed の設定、\nユーザー/グループへの割り当てを行う統合画面。OIDC の高度な設定 (grant / response 種別・PAR・\nDPoP、作成時に確定する認証方式) もここで編集し、専用の低レベル client 画面は持たない。\n生成された client_secret は作成成功直後に一度だけ表示する。\n"
      interfaces:
        - ListAdminApplications
        - GetAdminApplication
        - CreateAdminApplication
        - UpdateAdminApplication
        - UploadApplicationIcon
        - DeleteApplicationIcon
        - DeleteAdminApplication
        - AttachProtocolBinding
        - DetachProtocolBinding
        - UpdateApplicationOidcConfig
        - UpdateApplicationWsFedConfig
        - GetAppSignInPolicy
        - UpdateAppSignInPolicy
        - ListApplicationAssignments
        - AssignApplication
        - UnassignApplication
        - ListApplicationCategories
        - CreateApplicationCategory
        - UpdateApplicationCategory
        - DeleteApplicationCategory
        - SetApplicationCategories
        - ListAdminUsers
        - ListGroups
      states:
        - ready
        - loading
        - submitting
        - empty
        - secret_issued
        - delete_confirmation
        - access_denied
        - service_error
    AdminSignInPolicy:
      route: /admin/sign-in-policy
      purpose: "テナントのサインインポリシーを総合的に扱う画面。上段で全 Application 共通のデフォルトポリシー\n(要求認証強度・再認証を求めるまでの時間・許可 CIDR を制約された選択肢で) を詳細表示し、編集モードに切り替えて編集する。\n下段で各 Application の個別設定 (上書き) の有無・デフォルトより弱い警告・最終的に適用される実効ポリシーを\n一覧して編集画面へ導線する (ADR-081)。\n"
      interfaces:
        - GetTenantDefaultSignInPolicy
        - UpdateTenantDefaultSignInPolicy
        - ListAdminApplications
        - GetAppSignInPolicy
      states:
        - viewing
        - editing
        - loading
        - submitting
        - access_denied
        - service_error
    AccountApps:
      route: /account/apps
      purpose: "end-user が利用できるアプリケーションをタイルで一覧し、起動する。管理者が定義したカテゴリ\nごとにセクション表示し、利用者は手動で並び替えられる (ADR-069)。\n"
      interfaces:
        - ListMyApplications
        - GetMyApplicationOrder
        - ReorderMyApplications
      states:
        - ready
        - loading
        - reordering
        - saving_order
        - empty
        - access_denied
        - service_error
  transitions:
    - from: AdminApplications
      to: AdminUsers
      trigger: user_management_selected
  requirements:
    - id: UX-ADMIN-CLIENT-SECRET
      category: security
      adoption: required
      statement: AdminApplicationsはOIDCアプリ作成で生成されたclient_secretを作成成功直後に一度だけ表示し、再取得できないことを明示する。client_secret_hashは表示しない。
      screens:
        - AdminApplications
      interfaces:
        - CreateAdminApplication
        - GetAdminApplication
    - id: UX-ADMIN-CLIENT-DELETE-CONFIRMATION
      category: usability
      adoption: required
      statement: AdminApplicationsはアプリケーション削除前に対象を示す確認操作を要求する。
      screens:
        - AdminApplications
      interfaces:
        - DeleteAdminApplication
    - id: UX-APPLICATION-ICON-UPLOAD
      category: usability
      adoption: required
      statement: AdminApplicationsはアイコンを URL 入力ではなくファイル選択またはドラッグ&ドロップで受け取り、アップロード後のプレビューを保存済み配信 URL で表示する。不正形式・過大サイズは同じ画面で拒否理由を表示する。
      screens:
        - AdminApplications
      interfaces:
        - UploadApplicationIcon
        - DeleteApplicationIcon
        - GetApplicationIcon
    - id: UX-APPLICATION-PORTAL-DIRECT-REORDER
      category: usability
      adoption: required
      statement: AccountApps は利用者が通常表示のアプリタイル上のドラッグハンドルで直接並び替え、ドラッグ完了後に順序を保存できるようにする。
      screens:
        - AccountApps
      interfaces:
        - ReorderMyApplications
    - id: UX-APPLICATION-PORTAL-REORDER-FALLBACK
      category: accessibility
      adoption: required
      statement: AccountApps の並び替えはドラッグ操作だけに依存せず、キーボード操作で同じ順序変更と保存ができる。
      screens:
        - AccountApps
      interfaces:
        - ReorderMyApplications
    - id: UX-APPLICATION-SIGN-IN-POLICY
      category: security
      adoption: required
      statement: AdminApplications は Application 編集画面で sign-in policy の有効化、要求認証強度 (パスワードのみ / MFA 必須)、再認証を求めるまでの時間 (秒)、許可 CIDR を制約された選択肢で編集できるようにし、保存後の federation 開始で同じ条件が protocol 横断に適用されることを示す。自由入力の未評価条件は入力できない。
      screens:
        - AdminApplications
      interfaces:
        - GetAppSignInPolicy
        - UpdateAppSignInPolicy
    - id: UX-TENANT-DEFAULT-SIGN-IN-POLICY
      category: security
      adoption: required
      statement: AdminSignInPolicy はテナント全 Application に適用するデフォルトサインインポリシーを、まず詳細表示し編集モードで編集する (他の設定画面と同じ詳細→編集の作法)。編集項目はアプリ個別ポリシーと同じ制約された選択肢 (要求認証強度・再認証を求めるまでの時間・許可 CIDR)。あわせて各 Application の個別設定 (上書き) の有無・デフォルトより弱い警告・実効ポリシーを一覧表示する。認証強度を最低・その他を空にすれば追加要件のない状態に戻せる。
      screens:
        - AdminSignInPolicy
      interfaces:
        - GetTenantDefaultSignInPolicy
        - UpdateTenantDefaultSignInPolicy
        - ListAdminApplications
        - GetAppSignInPolicy
    - id: UX-APPLICATION-EFFECTIVE-SIGN-IN-POLICY
      category: security
      adoption: required
      statement: AdminApplications は Application 編集画面で「テナントデフォルト」「このアプリの上書き」「最終的に適用されるポリシー」を区別して表示する。アプリ個別ポリシーはデフォルトを上書き (置換) し、デフォルトより弱い設定 (認証強度・再認証を求めるまでの時間・許可ネットワークのいずれかを緩める) のときは警告を表示する。
      screens:
        - AdminApplications
      interfaces:
        - GetAppSignInPolicy
        - UpdateAppSignInPolicy
