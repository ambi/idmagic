# idmagic Application — SCL
# SCL 3.0 context specification.
# AssignmentGatesProtocol / AppPolicyFailClosed の実際の強制点は OAuth2.Authorize の requires
# であり、Application 自体は federation を実行する interface を持たない。強制点は OAuth2
# context 側に置く (SAML / WS-Federation はこの context の対象外)。

system: idmagic
spec_version: "3.0"
context: Application
glossary:
  Application:
    definition: 運用者が接続・割当・監査する業務アプリケーション。federated / service Application は最大1個の protocol 設定を持つ。
    aliases:
      - アプリケーション
      - Application
  ApplicationProtocol:
    definition: "Application が利用する単一の protocol 設定への型付き参照。OAuth2Client、SamlServiceProvider、WsFedRelyingParty のいずれか1個を指す。"
    aliases:
      - application_protocol
models:
  ApplicationKind:
    kind: enum
    description: Application の種別。federated は SSO フェデレーションを束ねる業務アプリ、weblink は SSO しない外部リンク、service は M2M / client_credentials の API クライアント (Okta の API Services 相当。ポータルタイル・利用者割当を持たない)。
    values:
      - federated
      - weblink
      - service
  ApplicationStatus:
    kind: enum
    description: Application の有効状態。
    values:
      - active
      - disabled
  ApplicationProtocolType:
    kind: enum
    description: "Application が利用する単一 protocol の種別。作成後は変更できない。"
    values:
      - oidc
      - saml
      - wsfed
  AssignmentSubjectType:
    kind: enum
    description: Application 割当の対象種別。
    values:
      - user
      - group
  AssignmentVisibility:
    kind: enum
    description: 割当の可視性。hidden はポータル一覧から除外するがプロトコル利用は許可する。
    values:
      - visible
      - hidden
  ApplicationProvisionType:
    kind: enum
    description: 一括作成で選ぶアプリ種別。oidc / saml / wsfed は federated Application と対応する protocol 設定を作成して catalog へ原子的に公開し、weblink は SSO なしの外部リンク、service は M2M / client_credentials の OAuth2 client (service kind) を作る。
    values:
      - oidc
      - saml
      - wsfed
      - weblink
      - service
  ApplicationProtocol:
    kind: value_object
    description: "Application に紐づく単一 protocol 設定への参照。type に対応する key だけを持ち、protocol row の application_id から Application へ通常の外部キーで関連付ける。"
    fields:
      type:
        type: ApplicationProtocolType
        description: protocol 種別。
      client_id:
        type: String
        optional: true
        description: oidc が指す OAuth2 client_id。
      entity_id:
        type: String
        optional: true
        description: saml が指す SAML entity_id。
      wtrealm:
        type: String
        optional: true
        description: wsfed が指す WS-Fed RP の wtrealm。
  Application:
    kind: entity
    description: "運用者が「接続する業務アプリケーション」として扱う上位 aggregate。表示名・アイコン・状態・割当と、不変な単一 protocol 種別を所有する。weblink は protocol を持たず、federated は oidc / saml / wsfed のいずれか1個、service は oidc 1個を持つ。protocol row は nullable application_id を持ち、NULL の catalog 外設定も許容する。"
    identity: application_id
    fields:
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。
      application_id:
        type: UUID
        description: PostgreSQL の global UUID primary key。tenant_id は所属境界であり、識別子の一部ではない。
      name:
        type: String
        constraints:
          - non_empty
        description: 管理 UI / ポータル表示名。
      kind:
        type: ApplicationKind
        description: federated か weblink か。
      status:
        type: ApplicationStatus
        description: 有効状態。
      icon_url:
        type: String
        optional: true
        description: IdP が保存済みアイコンから生成する内部配信 URL。管理者は直接入力しない。
      icon_object_key:
        type: String
        optional: true
        description: テナント境界内に保存されたアイコン画像 object の opaque key。
      launch_url:
        type: String
        optional: true
        description: weblink kind の起動先 URL。
      protocol:
        type: ApplicationProtocol
        optional: true
        description: 作成時に確定する単一 protocol。weblink は未設定で、作成後の接続・解除・種別変更はできない。
      category_ids:
        type: "UUID[]"
        description: 付与された ApplicationCategory の id 群 (0..N)。ポータルのセクション分類に使う (ADR-069)。
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
  ApplicationCategory:
    kind: entity
    description: "管理者が tenant 単位で定義するポータルの分類セクション (ADR-069)。Application に 0..N 個\n付与され、利用者ポータルはこのカテゴリ単位でタイルをセクション表示する。割当境界は越えず、\nセクションには利用者に割当済みのアプリだけが並ぶ。\n"
    identity:
      - tenant_id
      - category_id
    fields:
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。
      category_id:
        type: UUID
        description: カテゴリ識別子。
      name:
        type: String
        constraints:
          - non_empty
        description: セクション表示名。
      position:
        type: Integer
        description: セクションの表示順。小さいほど先。同値は name 昇順。
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
  ApplicationAssignment:
    kind: entity
    description: Application へのユーザー / グループ割当。割当はポータル可視性とフェデレーション利用可否を fail-closed で制御する。hidden は一覧に出さないがプロトコル利用は許可する。subject_id は subject_type に応じて同一テナントの User.id または Group.id を指す。
    identity:
      - application_id
      - subject_type
      - subject_id
    fields:
      application_id:
        type: UUID
        description: 親 Application の global UUID foreign key。tenant 境界は親 Application の tenant_id と actor tenant の照合で fail-closed に検証する。
      subject_type:
        type: AssignmentSubjectType
        description: user か group か。
      subject_id:
        type: String
        constraints:
          - non_empty
        description: user の sub または group id。
      visibility:
        type: AssignmentVisibility
        description: visible か hidden か。
      created_at:
        type: DateTime
  RequiredAuthnStrength:
    kind: enum
    description: サインインポリシーが要求する認証強度。Password は追加要求なし (acr ⊇ urn:idmagic:acr:pwd)、Mfa は第二要素必須 (acr = urn:idmagic:acr:mfa、amr に otp / webauthn / hwk / swk のいずれかを含む)。
    values:
      - Password
      - Mfa
  RequiredAuthnLevel:
    kind: value_object
    description: サインインポリシーが要求する認証強度。制約された選択肢 (Password / Mfa) を内部の acr / amr へ写像する。Mfa を満たさない場合は step-up で昇格を促す。
    fields:
      strength:
        type: RequiredAuthnStrength
        default: Password
  MfaEnrollmentPolicy:
    kind: value_object
    description: MFA 必須化の事前登録期間と、強制開始後の管理者承認済みオンボーディングを制御する。enforcement_start_at より前は通常ログインを許可して self-service 登録を促し、開始後は未登録ユーザーをログイン完了させず、allow_admin_bypass=true かつ有効な単発 enrollment bypass がある場合だけ登録専用 flow へ進める。grace_period_seconds は開始後に bypass を利用できる期間であり、自由登録期間ではない。
    fields:
      enforcement_start_at:
        type: DateTime
        optional: true
      grace_period_seconds:
        type: Integer
        optional: true
      allow_admin_bypass:
        type: Boolean
        default: false
  AccessCondition:
    kind: value_object
    description: サインインポリシーの静的アクセス条件。すべて初期実装で実際に評価できる構造化条件のみを持つ。network_allow_cidrs はクライアント IP を許可 CIDR に突き合わせ、reauth_max_age_seconds は認証または step-up の recency として評価する。旧 network / device の自由入力は廃止した。
    fields:
      network_allow_cidrs:
        type: "String[]"
        description: 許可するクライアント IP の CIDR 一覧。空なら制限なし。非空でクライアント IP がいずれの CIDR にも含まれない、または IP を取得できない場合は fail-closed で拒否する。
      reauth_max_age_seconds:
        type: Integer
        optional: true
  SignInRule:
    kind: value_object
    description: サインインポリシーの単一ルール。
    fields:
      rule_id:
        type: String
      name:
        type: String
      enabled:
        type: Boolean
      required_authn:
        type: RequiredAuthnLevel
      condition:
        type: AccessCondition
      mfa_enrollment:
        type: MfaEnrollmentPolicy
        optional: true
  AppSignInPolicy:
    kind: entity
    description: Application ごとのサインインポリシー。ApplicationCatalog が所有する。有効ルールを持つときテナントデフォルトを完全に上書き (置換) して評価され、持たなければデフォルトが適用される (上書きモデル, ADR-081)。デフォルトより弱い設定でも保存でき、その場合は UI で警告する。
    identity: application_id
    fields:
      application_id:
        type: UUID
        description: 親 Application の global UUID foreign key。tenant 境界は親 Application から導出する。
      rules:
        type: "SignInRule[]"
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
  TenantDefaultSignInPolicy:
    kind: entity
    description: テナントデフォルトのサインインポリシー。ApplicationCatalog が tenant 単位で所有し、独自ポリシーを持たない全 Application の federation 開始で適用される baseline。アプリ個別ポリシーが設定されるとそのアプリではデフォルトを上書きする (ADR-081)。
    identity:
      - tenant_id
    fields:
      tenant_id:
        type: String
        default: default
      rules:
        type: "SignInRule[]"
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
  AdminApplicationResponse:
    kind: value_object
    description: 管理 API が返す Application 表現。
    fields:
      application_id:
        type: UUID
      name:
        type: String
      kind:
        type: ApplicationKind
      status:
        type: ApplicationStatus
      icon_url:
        type: String
        optional: true
      icon_object_key:
        type: String
        optional: true
      launch_url:
        type: String
        optional: true
      protocol:
        type: ApplicationProtocol
        optional: true
      category_ids:
        type: "UUID[]"
      category_names:
        type: "String[]"
      protocol_summary:
        type: String
        optional: true
      assigned_subject_count:
        type: Integer
      sign_in_policy_summary:
        type: String
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
  AdminApplicationListResponse:
    kind: value_object
    description: Application 一覧レスポンス。
    fields:
      applications:
        type: "AdminApplicationResponse[]"
  AdminApplicationCategoryRequest:
    kind: value_object
    description: ApplicationCategory の作成 / 更新リクエスト。position 省略時は末尾扱い (ADR-069)。
    fields:
      name:
        type: String
        constraints:
          - non_empty
      position:
        type: Integer
        optional: true
  AdminApplicationCategoryResponse:
    kind: value_object
    description: 管理 API が返す ApplicationCategory 表現。
    fields:
      category_id:
        type: UUID
      name:
        type: String
      position:
        type: Integer
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
  AdminApplicationCategoryListResponse:
    kind: value_object
    description: ApplicationCategory 一覧レスポンス。position 昇順 (同値は name 昇順)。
    fields:
      categories:
        type: "AdminApplicationCategoryResponse[]"
  ApplicationCategoriesRequest:
    kind: value_object
    description: Application に付与するカテゴリ集合を置き換えるリクエスト。category_ids は所属テナントの 既存カテゴリのみを含む (ADR-069)。
    fields:
      category_ids:
        type: "UUID[]"
  AdminApplicationCreateRequest:
    kind: value_object
    description: Application 一括作成リクエスト。種別を選び、対応する protocol 設定もまとめて受け取る。backend は protocol row を catalog 外として準備した後、Application insert と protocol row.application_id の設定を同一 transaction で行う。後半が失敗した protocol row は有効な catalog 外設定であり、意味のない Application は残さない。
    fields:
      name:
        type: String
        constraints:
          - non_empty
      type:
        type: ApplicationProvisionType
        description: oidc / saml / wsfed / weblink / service。
      launch_url:
        type: String
        optional: true
        description: ポータルのタイルから開く起動 URL。weblink では必須。
      redirect_uris:
        type: "String[]"
        optional: true
        description: type=oidc のとき必須。生成する OAuth2 client のリダイレクト URI。
      scope:
        type: String
        optional: true
        description: 生成する OAuth2 client のスコープ。
      client_type:
        type: ClientType
        optional: true
        description: type=oidc の生成 client 種別。既定は confidential。
      token_endpoint_auth_method:
        type: TokenEndpointAuthMethod
        optional: true
        description: type=oidc の生成 client 認証方式。作成時に確定し以後不変。
      jwks_uri:
        type: URI
        optional: true
        description: token_endpoint_auth_method=private_key_jwt の公開鍵 JWKS URI。
      tls_client_auth_subject_dn:
        type: String
        optional: true
        description: token_endpoint_auth_method=tls_client_auth の証明書 Subject DN。
      wtrealm:
        type: String
        optional: true
        description: type=wsfed のとき必須。生成する WS-Fed RP の wtrealm。
      reply_urls:
        type: "String[]"
        optional: true
        description: type=wsfed のとき必須。許可する wreply。
      name_id_format:
        type: String
        optional: true
        description: type=wsfed の NameID 形式。
      name_id_source:
        type: String
        optional: true
        description: type=wsfed の NameID ソース属性。
      entity_id:
        type: String
        optional: true
        description: type=saml のとき必須。生成する SAML SP の entity ID。
      acs_urls:
        type: "String[]"
        optional: true
        description: type=saml のとき必須。Assertion Consumer Service URL。
  AdminApplicationCreateResponse:
    kind: value_object
    description: 一括作成の結果。type=oidc のときは生成した OAuth2 client の client_id / client_secret を 一度だけ返す (再表示不可)。
    fields:
      application:
        type: AdminApplicationResponse
      client_id:
        type: String
        optional: true
        description: type=oidc のとき返る生成クライアント ID。
      client_secret:
        type: String
        optional: true
        description: type=oidc のとき一度だけ返るシークレット。
  ApplicationOidcConfig:
    kind: value_object
    description: Application の OIDC protocol が指す OAuth2 client の実設定 (アプリ詳細表示用)。advanced 項目を含む。token_endpoint_auth_method / client_type / fapi_profile は更新契約上の不変項目で 表示専用。
    fields:
      client_id:
        type: String
      client_type:
        type: ClientType
      redirect_uris:
        type: "String[]"
      grant_types:
        type: "GrantType[]"
      response_types:
        type: "ResponseType[]"
      token_endpoint_auth_method:
        type: TokenEndpointAuthMethod
      scope:
        type: String
      require_pushed_authorization_requests:
        type: Boolean
      dpop_bound_access_tokens:
        type: Boolean
      fapi_profile:
        type: FapiProfile
      client_secret_rotatable:
        type: Boolean
        description: client_secret_basic / client_secret_post の confidential client のみ true。private_key_jwt、mTLS、public client は false。
      secret_credentials:
        type: "ApplicationClientSecretCredentialMetadata[]"
        description: hash・平文を含まない credential metadata。editor は rotation 状態と overlap expiry のみ表示する。
  ApplicationClientSecretCredentialMetadata:
    kind: value_object
    description: Application editor 向けに OAuth2 credential を写像した非機密メタデータ。OAuth2 の hash や平文を露出しない。
    fields:
      credential_id:
        type: UUID
      created_at:
        type: DateTime
      expires_at:
        type: DateTime
        optional: true
      revoked_at:
        type: DateTime
        optional: true
  ApplicationWsFedConfig:
    kind: value_object
    description: Application の WS-Fed protocol が指す relying party の実設定 (アプリ詳細表示用)。per-RP の advanced 項目 (audience / token_type / claim 規則) を含む。Entra domain federation は テナント単位の設定として別に扱う。
    fields:
      wtrealm:
        type: String
      reply_urls:
        type: "String[]"
      audience:
        type: String
      token_type:
        type: WsFedTokenType
      name_id_format:
        type: String
      name_id_source:
        type: String
      rules:
        type: "ClaimMappingRule[]"
  ApplicationSamlConfig:
    kind: value_object
    description: Application の SAML protocol が指す service provider の実設定 (アプリ詳細表示用)。
    fields:
      entity_id: { type: String }
      acs_urls: { type: "String[]" }
      slo_url: { type: String, optional: true }
      audience: { type: String, optional: true }
      name_id_format: { type: String }
      name_id_source: { type: String }
      sign_assertion: { type: Boolean }
      sign_response: { type: Boolean }
      want_authn_requests_signed: { type: Boolean }
      authn_request_signing_certificate_pem:
        type: String
        optional: true
        annotations:
          sensitive: true
      rules: { type: "ClaimMappingRule[]" }
  AdminApplicationDetailResponse:
    kind: value_object
    description: アプリ詳細レスポンス。Application 本体に加え、protocol relation から解決した実設定を含む。oidc / saml / wsfed のうち Application.protocol.type に対応する最大1個だけが設定される。
    fields:
      application:
        type: AdminApplicationResponse
      oidc:
        type: ApplicationOidcConfig
        optional: true
      wsfed:
        type: ApplicationWsFedConfig
        optional: true
      saml:
        type: ApplicationSamlConfig
        optional: true
  ApplicationOidcConfigUpdateRequest:
    kind: value_object
    description: OIDC protocol 設定の更新リクエスト。指定フィールドのみ変更する。advanced 項目を含む。 token_endpoint_auth_method など更新契約上の不変項目は含めない。
    fields:
      redirect_uris:
        type: "String[]"
        optional: true
      grant_types:
        type: "GrantType[]"
        optional: true
      response_types:
        type: "ResponseType[]"
        optional: true
      scope:
        type: String
        optional: true
      require_pushed_authorization_requests:
        type: Boolean
        optional: true
      dpop_bound_access_tokens:
        type: Boolean
        optional: true
  RotateApplicationClientSecretRequest:
    kind: value_object
    description: Application の OIDC protocol に対する secret rotation 要求。grace_days は未指定時7、0（即時 revoke）または1..30日だけ受理する。
    fields:
      grace_days:
        type: Integer
        optional: true
  RotateApplicationClientSecretResponse:
    kind: value_object
    description: 新 secret を一度だけ返す。hash、既存 secret、平文の再取得経路は含まない。
    fields:
      client_secret:
        type: String
        annotations:
          sensitive: true
      grace_until:
        type: DateTime
        optional: true
      credentials:
        type: "ApplicationClientSecretCredentialMetadata[]"
  ApplicationWsFedConfigUpdateRequest:
    kind: value_object
    description: WS-Federation protocol 設定の更新リクエスト。指定フィールドのみ変更する。per-RP の advanced 項目 (audience / token_type / claim 規則) を含む。Entra domain federation は対象外。
    fields:
      reply_urls:
        type: "String[]"
        optional: true
      audience:
        type: String
        optional: true
      token_type:
        type: WsFedTokenType
        optional: true
      name_id_format:
        type: String
        optional: true
      name_id_source:
        type: String
        optional: true
      rules:
        type: "ClaimMappingRule[]"
        optional: true
  ApplicationSamlConfigUpdateRequest:
    kind: value_object
    description: SAML protocol 設定の部分更新リクエスト。ACS/SLO、audience、NameID、署名方針、claim 規則を更新する。
    fields:
      acs_urls: { type: "String[]", optional: true }
      slo_url: { type: String, optional: true }
      audience: { type: String, optional: true }
      name_id_format: { type: String, optional: true }
      name_id_source: { type: String, optional: true }
      sign_assertion: { type: Boolean, optional: true }
      sign_response: { type: Boolean, optional: true }
      want_authn_requests_signed: { type: Boolean, optional: true }
      authn_request_signing_certificate_pem:
        type: String
        optional: true
        annotations:
          sensitive: true
      rules: { type: "ClaimMappingRule[]", optional: true }
  AdminApplicationUpdateRequest:
    kind: value_object
    description: Application 更新リクエスト。指定フィールドのみ変更する。
    fields:
      name:
        type: String
        optional: true
      status:
        type: ApplicationStatus
        optional: true
      launch_url:
        type: String
        optional: true
  ApplicationIconUploadResponse:
    kind: value_object
    description: Application icon アップロードまたは削除後の Application 表現。
    fields:
      application:
        type: AdminApplicationResponse
  ApplicationAssignmentRequest:
    kind: value_object
    description: Application 割当リクエスト。visibility 省略時は visible。
    fields:
      subject_type:
        type: AssignmentSubjectType
      subject_id:
        type: String
        constraints:
          - non_empty
      visibility:
        type: AssignmentVisibility
        optional: true
  ApplicationAssignmentResponse:
    kind: value_object
    description: 割当表現。
    fields:
      subject_type:
        type: AssignmentSubjectType
      subject_id:
        type: String
      visibility:
        type: AssignmentVisibility
      created_at:
        type: DateTime
  ApplicationAssignmentListResponse:
    kind: value_object
    description: 割当一覧レスポンス。
    fields:
      assignments:
        type: "ApplicationAssignmentResponse[]"
  AppSignInPolicyRequest:
    kind: value_object
    description: 管理者が Application の sign-in policy を置き換えるリクエスト。有効ルールを送るとテナントデフォルトを上書きし、空で送るとデフォルト適用に戻る。
    fields:
      rules:
        type: "SignInRule[]"
  AppSignInPolicyResponse:
    kind: value_object
    description: "Application の sign-in policy 表現。アプリ詳細で「このアプリの上書き (policy)」「テナントデフォルト (tenant_default)」\n「実際に適用される effective ルール列」を区別して表示できるようにする (ADR-081)。\n"
    fields:
      policy:
        type: AppSignInPolicy
      tenant_default:
        type: TenantDefaultSignInPolicy
      effective_rules:
        type: "SignInRule[]"
        description: 上書きモデルで実際に評価されるルール列。アプリが有効ルールを持てば policy.rules、持たなければ tenant_default.rules。
      weaker_than_default:
        type: Boolean
        description: アプリ独自ポリシーがデフォルトより弱い (認証強度・再認証時間・許可ネットワークのいずれかを緩める) とき true。UI 警告用で評価は妨げない (ADR-081)。
  TenantDefaultSignInPolicyRequest:
    kind: value_object
    description: 管理者がテナントデフォルト sign-in policy を置き換えるリクエスト。
    fields:
      rules:
        type: "SignInRule[]"
  TenantDefaultSignInPolicyResponse:
    kind: value_object
    description: テナントデフォルト sign-in policy 表現。
    fields:
      policy:
        type: TenantDefaultSignInPolicy
      unenrolled_user_count:
        type: Integer
        description: テナント内の active user のうち TOTP / WebAuthn factor を 1 件も持たない人数。MFA 必須化前の影響確認に使う。
  MyApplication:
    kind: value_object
    description: 利用者ポータルに表示する割当済みアプリ 1 件。
    fields:
      application_id:
        type: UUID
      name:
        type: String
      kind:
        type: ApplicationKind
      icon_url:
        type: String
        optional: true
      launch_url:
        type: String
        optional: true
      category_ids:
        type: "UUID[]"
        description: 付与カテゴリの id 群。ポータルはこれでタイルをセクションに振り分ける (ADR-069)。
  PortalApplicationCategory:
    kind: value_object
    description: 利用者ポータルのセクション見出し 1 件。tenant のカテゴリ定義を position 昇順で表す (ADR-069)。
    fields:
      category_id:
        type: UUID
      name:
        type: String
  MyApplicationListResponse:
    kind: value_object
    description: "利用者ポータルの割当済みアプリ一覧。手動並び順があればそれを優先し、無ければ name 昇順。\ncategories は tenant のカテゴリ定義を position 昇順で含み、ポータルはこれをセクション見出しに使う (ADR-069)。\n"
    fields:
      applications:
        type: "MyApplication[]"
      categories:
        type: "PortalApplicationCategory[]"
  ApplicationOrdering:
    kind: entity
    description: "利用者ポータルでの手動並び順 (ADR-069)。user_id をキーに、Application の\n表示順を application_id の順序列として持つ。user_id は global unique な既存 User を指す。\n順序列に在って現在は未割当の application は一覧から除外し、順序列に無い割当アプリは name 昇順で末尾に付ける。application_ids は配列で保持するため DB 外部キーではなく ReorderMyApplications の use case 検証で、本人に割当済み visible な Application のみに制限する。\n"
    identity:
      - user_id
    fields:
      user_id:
        type: String
      application_ids:
        type: "UUID[]"
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
  ReorderMyApplicationsRequest:
    kind: value_object
    description: 利用者が自分のポータル手動並び順を保存する。application_ids は自分に割当済み visible なアプリのみを含む。
    fields:
      application_ids:
        type: "UUID[]"
  MyApplicationOrderResponse:
    kind: value_object
    description: 利用者が保存済みのポータル手動並び順。未保存なら application_ids は空。
    fields:
      application_ids:
        type: "UUID[]"
  ApplicationCreated:
    kind: event
    description: Application を作成した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      applicationId:
        type: String
  ApplicationUpdated:
    kind: event
    description: Application のメタデータを更新した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      applicationId:
        type: String
      changedFields:
        type: "String[]"
  ApplicationIconUpdated:
    kind: event
    description: Application の保存済みアイコンをアップロードまたは削除した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      applicationId:
        type: String
      action:
        type: String
  ApplicationDeleted:
    kind: event
    description: Application を削除した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      applicationId:
        type: String
  ApplicationAssigned:
    kind: event
    description: Application にユーザー / グループを割当てた。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      applicationId:
        type: String
      subjectType:
        type: String
      subjectId:
        type: String
  ApplicationUnassigned:
    kind: event
    description: Application の割当を解除した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      applicationId:
        type: String
      subjectType:
        type: String
      subjectId:
        type: String
  ApplicationCategoryCreated:
    kind: event
    description: ApplicationCategory を作成した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      categoryId:
        type: String
  ApplicationCategoryUpdated:
    kind: event
    description: ApplicationCategory を更新した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      categoryId:
        type: String
  ApplicationCategoryDeleted:
    kind: event
    description: ApplicationCategory を削除した。付与済みの Application からも除かれる。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      categoryId:
        type: String
  AppSignInPolicyUpdated:
    kind: event
    description: Application の sign-in policy を更新した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      applicationId:
        type: String
  TenantDefaultSignInPolicyUpdated:
    kind: event
    description: テナントデフォルト sign-in policy を更新した (クリアを含む)。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
  AppAccessDeniedByPolicy:
    kind: event
    description: Application sign-in policy により federation を拒否した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      applicationId:
        type: String
      protocol:
        type: String
      subject:
        type: String
      reason:
        type: String
  AppStepUpRequired:
    kind: event
    description: Application sign-in policy の認証強度を満たすため step-up が必要になった。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      applicationId:
        type: String
      protocol:
        type: String
      subject:
        type: String
  User:
    kind: entity
    description: IdManagement が publish する identity principal を、認可判断に必要な属性だけで表す published language stub。
    identity: id
    fields:
      id:
        type: String
      tenant_id:
        type: String
      status:
        type: String
      roles:
        type: "String[]"
  Agent:
    kind: entity
    description: ApiTokens が認証した management API client の認可判断用 stub。
    identity: id
    fields:
      id:
        type: String
      tenant_id:
        type: String
      status:
        type: String
  ClientType:
    kind: enum
    description: OAuth2 context が publish する client 種別の published language stub。
    values:
      - Public
      - Confidential
  GrantType:
    kind: enum
    description: OAuth2 context が publish するトークン発行方式の published language stub。
    values:
      - AuthorizationCode
      - RefreshToken
      - ClientCredentials
      - DeviceCode
      - TokenExchange
  TokenEndpointAuthMethod:
    kind: enum
    description: OAuth2 context が publish する /token クライアント認証方式の published language stub。
    values:
      - ClientSecretBasic
      - ClientSecretPost
      - PrivateKeyJwt
      - TlsClientAuth
      - None
  ResponseType:
    kind: enum
    description: OAuth2 context が publish する /authorize 応答種別の published language stub。
    values:
      - Code
  FapiProfile:
    kind: enum
    description: OAuth2 context が publish する FAPI セキュリティプロファイルの published language stub。
    values:
      - None
      - Fapi2SecurityProfile
  WsFedTokenType:
    kind: enum
    description: WS-Federation context が publish する発行 assertion 種別の published language stub。
    values:
      - "urn:oasis:names:tc:SAML:1.0:assertion"
      - "urn:oasis:names:tc:SAML:2.0:assertion"
  ClaimMappingRule:
    kind: value_object
    description: ClaimMapping context が publish する claim 発行規則の published language stub。
    fields:
      claim_type:
        type: String
        constraints:
          - non_empty
      source:
        type: String
      source_key:
        type: String
        optional: true
      fixed_value:
        type: String
        optional: true
      required:
        type: Boolean
        default: false
  InvalidRequestError:
    kind: error
    description: リクエストに必須パラメータの欠落・不正値・重複等がある (RFC 6749 §5.2 invalid_request)。OAuth2 context が定義する共通 error の published language stub。
    payload:
      reason:
        type: String
        optional: true
  AccessDeniedError:
    kind: error
    description: 認証済みだが認可条件を満たさない、またはサーバーポリシーが許可しなかった。OAuth2 context が定義する共通 error の published language stub。
  QuotaExceededError:
    kind: error
    description: テナントのリソース作成上限 (Quota) に達している。Tenancy context が定義する共通 error の published language stub。
interfaces:
  AssignApplicationDesiredState:
    description: "呼び出し元 bounded context (IdManagement の LifecycleWorkflow 等) が Application への\nuser 割当を desired-state で付与する内部インターフェース。HTTP には公開せず、同一プロセス内の\nGo 呼び出しとして各 context の usecase から使う。既に同じ (application_id, user_id) の割当が\n指定どおりの visibility で存在する場合は変更せず changed=false を返す (冪等)。呼び出し元は\n同一テナントの application_id / user_id だけを渡す。\n"
    input:
      tenant_id:
        type: String
      application_id:
        type: String
      user_id:
        type: String
      visibility:
        type: AssignmentVisibility
        optional: true
        description: 省略時 visible。
    output:
      assignment:
        type: ApplicationAssignmentResponse
      changed:
        type: Boolean
        description: 割当を新規作成または visibility を変更した場合 true、既に目的状態だった場合 false。
    errors:
      - InvalidRequestError
    access: internal
  UnassignApplicationDesiredState:
    description: "呼び出し元 bounded context が Application への user 割当を desired-state で解除する内部\nインターフェース。割当が存在しない場合も no-op (changed=false) で正常終了する (冪等)。\n"
    input:
      tenant_id:
        type: String
      application_id:
        type: String
      user_id:
        type: String
    output:
      changed:
        type: Boolean
    errors:
      - InvalidRequestError
    access: internal
  ListAdminApplications:
    description: 管理者が所属テナントの Application を一覧する。
    output:
      response:
        type: AdminApplicationListResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator, ManagementApiClientReadApplications]
      resource:
        type: ApplicationDirectory
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: /api/admin/applications
  GetAdminApplication:
    description: 管理者が Application を取得する。protocol relation から解決した実設定も含む。別テナントは未存在として扱う。
    input:
      application_id:
        type: String
    output:
      response:
        type: AdminApplicationDetailResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator, ManagementApiClientReadApplications]
      resource:
        type: Application
        id: input.application_id
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/applications/{application_id}"
  CreateAdminApplication:
    description: 管理者が Application を一括作成する。種別に応じた protocol row を準備し、Application と application_id relation を同一 transaction で catalog へ公開する。protocol 種別は作成後に変更できない。
    input:
      request:
        type: AdminApplicationCreateRequest
    output:
      response:
        type: AdminApplicationCreateResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
      - QuotaExceededError
    emits:
      - ApplicationCreated
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteApplications]
      resource:
        type: ApplicationDirectory
        id: context.tenant_id
    bindings:
      - kind: http
        method: POST
        path: /api/admin/applications
        request_form: body
        successful_status_codes:
          - "201"
  UpdateAdminApplication:
    description: 管理者が Application のメタデータを更新する。
    input:
      application_id:
        type: String
      request:
        type: AdminApplicationUpdateRequest
    output:
      application:
        type: AdminApplicationResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationUpdated
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteApplications]
      resource:
        type: Application
        id: input.application_id
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/applications/{application_id}"
        request_form: body
  UploadApplicationIcon:
    description: 管理者が Application のアイコン画像を multipart でアップロードする。受理形式は PNG / JPEG / WebP / GIF、最大 256KiB とし、magic byte で検証する。
    input:
      application_id:
        type: String
      file:
        type: String
    output:
      response:
        type: ApplicationIconUploadResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationIconUpdated
    requires:
      - context.upload.content_type in ["image/png", "image/jpeg", "image/webp", "image/gif"]
      - context.upload.magic_byte_matches_content_type
      - size(input.file) <= 262144
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteApplications]
      resource:
        type: Application
        id: input.application_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/applications/{application_id}/icon"
        request_form: form
  DeleteApplicationIcon:
    description: 管理者が Application の保存済みアイコンを削除する。削除後は icon_url を返さない。
    input:
      application_id:
        type: String
    output:
      response:
        type: ApplicationIconUploadResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationIconUpdated
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteApplications]
      resource:
        type: Application
        id: input.application_id
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/applications/{application_id}/icon"
  GetApplicationIcon:
    description: "保存済み Application アイコンを配信する公開 interface。Content-Type は検証済み形式に固定し、X-Content-Type-Options: nosniff を付ける。別テナントまたは削除済み object は未存在として扱う。"
    input:
      application_id:
        type: String
      object_key:
        type: String
    output:
      file:
        type: String
    errors:
      - InvalidRequestError
    ensures:
      - response.headers["Content-Type"] in ["image/png", "image/jpeg", "image/webp", "image/gif"]
      - response.headers["X-Content-Type-Options"] == "nosniff"
    read_only: true
    access: public
    bindings:
      - kind: http
        method: GET
        path: "/application-icons/{application_id}/{object_key}"
  DeleteAdminApplication:
    description: 管理者が Application を削除する (冪等)。関連する protocol row は同一 transaction で cascade delete される。
    input:
      application_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationDeleted
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteApplications]
      resource:
        type: Application
        id: input.application_id
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/applications/{application_id}"
        successful_status_codes:
          - "204"
  UpdateApplicationOidcConfig:
    description: 管理者が Application の OIDC protocol が指す OAuth2 client の設定を更新する。
    input:
      application_id:
        type: String
      request:
        type: ApplicationOidcConfigUpdateRequest
    errors:
      - InvalidRequestError
      - AccessDeniedError
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteApplications]
      resource:
        type: Application
        id: input.application_id
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/applications/{application_id}/oidc"
        request_form: body
        successful_status_codes:
          - "204"
  RotateApplicationClientSecret:
    description: 管理者が Application の OIDC protocol の client secret を回す。旧 credential は指定した overlap 期間だけ有効にし、0日は即時 revoke とする。secret-based でない client は拒否する。
    input:
      application_id:
        type: String
      request:
        type: RotateApplicationClientSecretRequest
    output:
      response:
        type: RotateApplicationClientSecretResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteApplications]
      resource:
        type: Application
        id: input.application_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/applications/{application_id}/oidc/rotate-secret"
        request_form: body
        successful_status_codes:
          - "200"
  UpdateApplicationWsFedConfig:
    description: 管理者が Application の WS-Fed protocol が指す relying party の設定を更新する。
    input:
      application_id:
        type: String
      request:
        type: ApplicationWsFedConfigUpdateRequest
    errors:
      - InvalidRequestError
      - AccessDeniedError
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteApplications]
      resource:
        type: Application
        id: input.application_id
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/applications/{application_id}/wsfed"
        request_form: body
        successful_status_codes:
          - "204"
  UpdateApplicationSamlConfig:
    description: 管理者が Application の SAML protocol が指す service provider 設定を部分更新する。署名要求を有効にする場合は検証可能な証明書を必須とする。
    input:
      application_id:
        type: String
      request:
        type: ApplicationSamlConfigUpdateRequest
    errors:
      - InvalidRequestError
      - AccessDeniedError
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteApplications]
      resource:
        type: Application
        id: input.application_id
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/applications/{application_id}/saml"
        request_form: body
        successful_status_codes:
          - "204"
  ListApplicationAssignments:
    description: 管理者が Application の割当を一覧する。
    input:
      application_id:
        type: String
    output:
      response:
        type: ApplicationAssignmentListResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator, ManagementApiClientReadApplications]
      resource:
        type: Application
        id: input.application_id
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/applications/{application_id}/assignments"
  AssignApplication:
    description: 管理者が Application にユーザー / グループを割当てる。
    input:
      application_id:
        type: String
      request:
        type: ApplicationAssignmentRequest
    output:
      assignment:
        type: ApplicationAssignmentResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationAssigned
    requires:
      - subject_exists_in_tenant(input.request.subject_type, input.request.subject_id, context.tenant_id)
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteApplications]
      resource:
        type: Application
        id: input.application_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/applications/{application_id}/assignments"
        request_form: body
        successful_status_codes:
          - "201"
  UnassignApplication:
    description: 管理者が Application の割当を解除する (冪等)。
    input:
      application_id:
        type: String
      subject_type:
        type: String
      subject_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationUnassigned
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteApplications]
      resource:
        type: Application
        id: input.application_id
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/applications/{application_id}/assignments/{subject_type}/{subject_id}"
        successful_status_codes:
          - "204"
  GetAppSignInPolicy:
    description: 管理者が Application の sign-in policy を取得する。アプリ個別ポリシー・テナントデフォルト・上書き後に実際に適用される effective ルール列と、デフォルトより弱いかの警告フラグを返す。未設定なら空 rules を返す (ADR-081)。
    input:
      application_id:
        type: String
    output:
      response:
        type: AppSignInPolicyResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator, ManagementApiClientReadApplications]
      resource:
        type: Application
        id: input.application_id
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/applications/{application_id}/sign-in-policy"
  UpdateAppSignInPolicy:
    description: 管理者が Application の sign-in policy を置き換える。無効な CIDR を含む条件は拒否する。
    input:
      application_id:
        type: String
      request:
        type: AppSignInPolicyRequest
    output:
      response:
        type: AppSignInPolicyResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - AppSignInPolicyUpdated
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteApplications]
      resource:
        type: Application
        id: input.application_id
    bindings:
      - kind: http
        method: PUT
        path: "/api/admin/applications/{application_id}/sign-in-policy"
        request_form: body
  GetTenantDefaultSignInPolicy:
    description: 管理者がテナントデフォルト sign-in policy と MFA 未登録 active user 数を取得する。未設定なら空 rules の policy を返す (ADR-081)。
    output:
      response:
        type: TenantDefaultSignInPolicyResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator, ManagementApiClientReadSettings]
      resource:
        type: TenantDefaultSignInPolicy
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: /api/admin/default-sign-in-policy
  UpdateTenantDefaultSignInPolicy:
    description: 管理者がテナントデフォルト sign-in policy を置き換える。MFA 必須化では強制開始日時、enrollment bypass を利用できる猶予、管理者承認の可否を明示する。無効な CIDR、過去の強制開始日時、非正値の猶予は拒否する。空 rules で保存すればデフォルトは allow-all に戻る (ADR-081)。
    input:
      request:
        type: TenantDefaultSignInPolicyRequest
    output:
      response:
        type: TenantDefaultSignInPolicyResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - TenantDefaultSignInPolicyUpdated
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteSettings]
      resource:
        type: TenantDefaultSignInPolicy
        id: context.tenant_id
    bindings:
      - kind: http
        method: PUT
        path: /api/admin/default-sign-in-policy
        request_form: body
  ListApplicationCategories:
    description: 管理者が所属テナントの ApplicationCategory を position 昇順で一覧する。
    output:
      response:
        type: AdminApplicationCategoryListResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator, ManagementApiClientReadApplications]
      resource:
        type: ApplicationCategoryDirectory
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: /api/admin/application-categories
  CreateApplicationCategory:
    description: 管理者が ApplicationCategory を作成する。
    input:
      request:
        type: AdminApplicationCategoryRequest
    output:
      category:
        type: AdminApplicationCategoryResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationCategoryCreated
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteApplications]
      resource:
        type: ApplicationCategoryDirectory
        id: context.tenant_id
    bindings:
      - kind: http
        method: POST
        path: /api/admin/application-categories
        request_form: body
        successful_status_codes:
          - "201"
  UpdateApplicationCategory:
    description: 管理者が ApplicationCategory の名前 / 並び順を更新する。
    input:
      category_id:
        type: String
      request:
        type: AdminApplicationCategoryRequest
    output:
      category:
        type: AdminApplicationCategoryResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationCategoryUpdated
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteApplications]
      resource:
        type: ApplicationCategory
        id: input.category_id
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/application-categories/{category_id}"
        request_form: body
  DeleteApplicationCategory:
    description: 管理者が ApplicationCategory を削除する (冪等)。付与済みの Application からも除く。
    input:
      category_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationCategoryDeleted
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteApplications]
      resource:
        type: ApplicationCategory
        id: input.category_id
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/application-categories/{category_id}"
        successful_status_codes:
          - "204"
  SetApplicationCategories:
    description: 管理者が Application に付与するカテゴリ集合を置き換える。所属テナントの既存カテゴリのみ受け付ける。
    input:
      application_id:
        type: String
      request:
        type: ApplicationCategoriesRequest
    output:
      application:
        type: AdminApplicationResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ApplicationUpdated
    access:
      policies: [TenantAdministrator, ManagementApiClientWriteApplications]
      resource:
        type: Application
        id: input.application_id
    bindings:
      - kind: http
        method: PUT
        path: "/api/admin/applications/{application_id}/categories"
        request_form: body
  ListMyApplications:
    description: "利用者が自分に割当済み (visible) の Application を一覧する。hidden 割当は除外する。\n手動並び順 (ApplicationOrdering) があればそれを優先し、無ければ name 昇順。応答の categories は\ntenant のカテゴリ定義を position 昇順で含み、各アプリの category_ids でセクションに振り分ける (ADR-069)。\n"
    output:
      response:
        type: MyApplicationListResponse
    errors:
      - AccessDeniedError
    ensures:
      - output.response.applications.all(a, is_visible_assignment(subject.id, a))
    read_only: true
    access:
      policies: [AuthenticatedSelf, SelfApiClientReadAccount]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: GET
        path: /api/account/applications
  GetMyApplicationOrder:
    description: 利用者が保存済みのポータル手動並び順を取得する。未保存なら空配列を返す (ADR-069)。
    output:
      response:
        type: MyApplicationOrderResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [AuthenticatedSelf, SelfApiClientReadAccount]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: GET
        path: /api/account/applications/order
  ReorderMyApplications:
    description: "利用者が自分のポータル手動並び順を保存する。application_ids は自分に割当済み visible な\nアプリのみを含み、それ以外を含むと拒否する (ADR-069)。\n"
    input:
      request:
        type: ReorderMyApplicationsRequest
    output:
      response:
        type: MyApplicationOrderResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    requires:
      - input.request.application_ids.all(id, is_visible_assignment(subject.id, id))
    access:
      policies: [AuthenticatedSelf, SelfApiClientWriteAccount]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: PUT
        path: /api/account/applications/order
        request_form: body
authorization:
  resources:
    ApplicationDirectory:
      description: テナント内の Application 一覧・作成対象を表す singleton resource。
    ApplicationCategoryDirectory:
      description: テナント内の ApplicationCategory 一覧・作成対象を表す singleton resource。
  principals:
    TenantAdministrator:
      type: User
      matches:
        - context.authenticated
        - principal.status == "Active"
        - '"admin" in principal.roles'
    ManagementApiClient:
      type: Agent
      matches:
        - context.authenticated
        - principal.status == "Active"
        - principal.tenant_id == context.tenant_id
    AuthenticatedSelf:
      type: User
      matches:
        - context.authenticated
        - principal.status == "Active"
    SelfApiClient:
      type: User
      matches:
        - context.authenticated
        - 'context.authentication_method in ["api_token", "oauth2_access_token"]'
        - principal.status == "Active"
        - principal.tenant_id == context.tenant_id
  policies:
    TenantAdministrator:
      effect: permit
      principal: TenantAdministrator
      when: principal.tenant_id == resource.tenant_id
    ManagementApiClientReadApplications:
      effect: permit
      principal: ManagementApiClient
      when: '"applications:read" in context.token_scopes && principal.tenant_id == context.tenant_id'
    ManagementApiClientWriteApplications:
      effect: permit
      principal: ManagementApiClient
      when: '"applications:write" in context.token_scopes && principal.tenant_id == context.tenant_id'
    ManagementApiClientReadSettings:
      effect: permit
      principal: ManagementApiClient
      when: '"settings:read" in context.token_scopes && principal.tenant_id == context.tenant_id'
    ManagementApiClientWriteSettings:
      effect: permit
      principal: ManagementApiClient
      when: '"settings:write" in context.token_scopes && principal.tenant_id == context.tenant_id'
    AuthenticatedSelf:
      effect: permit
      principal: AuthenticatedSelf
      when: principal.id == resource.id
    SelfApiClientReadAccount:
      effect: permit
      principal: SelfApiClient
      when: '"account:read" in context.token_scopes && principal.id == resource.id'
    SelfApiClientWriteAccount:
      effect: permit
      principal: SelfApiClient
      when: '"account:write" in context.token_scopes && principal.id == resource.id'
scenarios:
  API token発行者はaccount scope内で自身のportal applicationだけを操作できる:
    actor: SelfApiClient
    given:
      - client は対象 tenant の active User に固定された有効な API access token を提示している
    main_success:
      - account:read scope で自身に割り当てられた application と保存済み順序を参照できる
      - account:write scope で自身の application 順序を保存できる
    extensions:
      - at: 1
        condition: account:read だけで順序変更を要求する
        steps:
          - 操作は AccessDeniedError で拒否される
      - at: 1
        condition: token の tenant または user_id が操作対象と一致しない
        steps:
          - 操作は AccessDeniedError で拒否される
  management API clientはApplication scope内の操作だけを実行できる:
    actor: ManagementApiClient
    given:
      - client は対象 tenant の有効な API access token を提示している
    main_success:
      - applications:read scope で Application と category と assignment を参照できる
      - applications:write scope で Application の作成・protocol 設定更新・削除ができる
      - settings:read または settings:write scope で tenant default sign-in policy を対応する操作種別に限って扱える
    extensions:
      - at: 1
        condition: applications:read だけで変更操作を要求する
        steps:
          - 操作は AccessDeniedError で拒否される
      - at: 1
        condition: token の tenant と request tenant が一致しない
        steps:
          - 操作は AccessDeniedError で拒否される
  管理者はApplicationのSAML protocol設定を更新できる:
    actor: TenantAdministrator
    given:
      - 管理者が SAML protocol を持つ Application の編集画面を開いている
    main_success:
      - 管理者が ACS URL、署名方針、claim 規則を更新する
      - SAML service provider 設定だけが同一テナント内で更新される
    extensions:
      - at: 1
        condition: AuthnRequest 署名必須だが検証可能な証明書がない
        steps:
          - 更新は InvalidRequestError で拒否される
  管理者は管理画面でアプリケーションと単一protocolを構成できる:
    actor: TenantAdministrator
    given:
      - "roles=[\"admin\"] のユーザー \"operator\" が管理画面のアプリケーション一覧を開いている"
    main_success:
      - "管理者 \"operator\" が confidential なアプリケーション \"portal\" (type=oidc) を作成する"
      - 作成応答だけが生成された client_secret を一度だけ含む
      - "管理者 \"operator\" がアプリケーション \"portal\" の OIDC 設定 (redirect_uris / scope) を編集する"
      - "管理者 \"operator\" がアプリケーション \"portal\" をユーザー \"alice\" に割り当てる"
      - "管理者 \"operator\" がアプリケーション \"portal\" を削除する"
      - "\"ApplicationCreated\"、\"ApplicationAssigned\"、\"ApplicationDeleted\" が発行される"
    extensions:
      - at: 5
        condition: 別テナントまたは存在しない subject へ割り当てる
        steps:
          - "tenant_id \"acme\" の Application に tenant_id \"default\" の User sub を指定する"
          - "エラー \"InvalidRequestError\""
      - at: 1
        condition: 別テナントの管理者がアプリケーションを取得しようとする
        steps:
          - "tenant_id \"acme\" に Application \"portal\" が存在する"
          - "tenant_id \"default\" の管理者が同じ application_id を取得する"
          - "エラー \"InvalidRequestError\""
  管理者はApplicationアイコンをアップロード削除できる:
    actor: TenantAdministrator
    given:
      - 管理者が Application 編集画面を開いている
    main_success:
      - PNG / JPEG / WebP / GIF の 256KiB 以下の画像をアップロードする
      - Application は icon_object_key と内部 icon_url を持つ
      - 管理一覧・詳細・利用者ポータルの icon_url は IdP の配信 URL を指す
      - 管理者がアイコンを削除すると icon_object_key と icon_url は空になる
    extensions:
      - at: 1
        condition: 非画像または上限超過ファイルをアップロードする
        steps:
          - エラー "InvalidRequestError"
          - 既存アイコンは置き換わらない
      - at: 1
        condition: 別テナントの application_id + object_key で同じアイコンの取得を試みる
        steps:
          - アセットは存在しないものとして扱われ InvalidRequestError で拒否される
  管理者はアプリケーション別サインインポリシーを設定できる:
    actor: TenantAdministrator
    given:
      - 管理者が Application 編集画面を開いている
      - Application は OIDC / SAML / WS-Fed のいずれか単一の protocol を持つ
    main_success:
      - 管理者が MFA 必須と再認証を求めるまでの時間 (秒) を要求する sign-in policy を保存する
      - "AppSignInPolicyUpdated が発行される"
      - 単要素セッションの利用者が対象 Application にアクセスする
      - システムは step-up が可能な経路では step-up を要求し、昇格後に federation を完了する
      - システムは token / assertion 発行前に policy を評価する (強制点は OAuth2.Authorize、[[ADR-103]])
    extensions:
      - at: 5
        condition: 許可 CIDR に含まれないクライアント IP、またはクライアント IP を取得できない
        steps:
          - 対象 Application への federation は拒否される
          - "AppAccessDeniedByPolicy が発行される"
      - at: 1
        condition: 管理者以外が policy を更新する
        steps:
          - エラー "AccessDeniedError"
  管理者はテナントデフォルトサインインポリシーを設定し全アプリに適用できる:
    actor: TenantAdministrator
    given:
      - "roles=[\"admin\"] のユーザー \"operator\" がサインインポリシー画面を開いている"
      - テナントに OIDC protocol を持つ複数の Application が存在し、いずれも個別 sign-in policy を持たない
    main_success:
      - 管理者が MFA 必須、将来の強制開始日時、enrollment bypass 猶予、管理者承認を要求するテナントデフォルトサインインポリシーを保存する
      - "TenantDefaultSignInPolicyUpdated が発行される"
      - 画面は active user の MFA 未登録人数と強制時のロックアウト影響を表示する
      - 単要素セッションの利用者が個別ポリシーを持たない Application にアクセスする
      - システムはデフォルトポリシーを適用し step-up を要求する
    extensions:
      - at: 1
        condition: 低リスクアプリだけデフォルトを上書きして緩和する
        steps:
          - "管理者が対象 Application に弱いサインインポリシー (例: パスワードのみ) を設定してデフォルトを上書きする"
          - システムはデフォルトより弱い旨の警告を表示するが保存は許可する
          - 単要素セッションの利用者が当該 Application に step-up なしでアクセスできる
          - 他の Application ではデフォルトの MFA 必須が引き続き適用される
      - at: 1
        condition: アプリ詳細で最終適用ポリシーを確認する
        steps:
          - アプリ編集画面はテナントデフォルト・このアプリの上書き・最終的に適用されるポリシーを区別して表示する
      - at: 1
        condition: デフォルトポリシーを空にして解除する
        steps:
          - 管理者がルールを空にして保存する
          - "TenantDefaultSignInPolicyUpdated が発行される"
          - 以降、独自ポリシーを持たない Application の federation 開始は追加要件を課さない
  未割当のsubjectはprotocol経由でアプリケーションへフェデレーションできない:
    actor: TenantAdministrator
    given:
      - "アプリケーション \"portal\" にユーザー \"alice\" は割り当てられていない"
    main_success:
      - "\"alice\" が \"portal\" への federation を試みる (強制点は OAuth2.Authorize、[[ADR-103]])"
      - 未割当のため federation は拒否される
    extensions:
      - at: 1
        condition: 管理者が事後に visible で割り当てる
        steps:
          - "管理者が \"portal\" に \"alice\" を visibility=visible で割り当てる"
          - "\"alice\" は \"portal\" への federation を完了できる"
  hidden割当はポータル一覧から除外されるがprotocol利用は許可される:
    actor: TenantAdministrator
    given:
      - "管理者が \"portal\" にユーザー \"alice\" を visibility=hidden で割り当てている"
    main_success:
      - "\"alice\" が自分のポータルアプリ一覧 (ListMyApplications) を取得する"
      - 一覧に "portal" は含まれない
      - "\"alice\" は \"portal\" への federation は引き続き完了できる (強制点は OAuth2.Authorize)"
  adminロールを持たない利用者はApplicationを操作できない:
    actor: AuthenticatedSelf
    given:
      - "\"alice\" は admin ロールを持たない認証済みユーザーである"
    main_success:
      - "\"alice\" が ListAdminApplications を呼び出す"
      - AccessDeniedError で拒否される
  desired-state割当はgroup経由の割当を変更しない:
    actor: TenantAdministrator
    given:
      - "IdManagement の LifecycleWorkflow が \"alice\" に対して AssignApplicationDesiredState を呼び出す"
      - "\"alice\" は dynamic group 経由で \"portal\" への group assignment (subject_type=group) を既に持つ"
    main_success:
      - "AssignApplicationDesiredState が \"alice\" 個人への direct user assignment (subject_type=user) を新規作成する"
      - group assignment (subject_type=group) の行は変更されない
      - "後から UnassignApplicationDesiredState を呼んでも group assignment は残り、federation は引き続き許可される"
    extensions:
      - at: 1
        condition: "個人の direct assignment が既に指定どおりの visibility で存在する"
        steps:
          - AssignApplicationDesiredState は変更を行わず changed=false を返す
flows:
  AdminApplicationManagement:
    entry: AdminApplications
    views:
      AdminApplications:
        sees: アプリケーション管理画面(アプリケーション一覧、アイコン、プロトコル種別、カテゴリ、割当ユーザー/グループ、sign-in policy)
        does:
          - action: create
            does: 種別を選んでアプリケーションを作成する(OAuth2 client / WS-Fed RP を同時に作成)
            interface: CreateAdminApplication
            to: AdminApplications
          - action: update
            does: アプリケーションのメタデータを編集して保存する
            interface: UpdateAdminApplication
            to: AdminApplications
          - action: delete
            does: 削除ボタンをクリックする
            interface: DeleteAdminApplication
            to: AdminApplications
          - action: upload_icon
            does: アイコン画像(PNG/JPEG/WebP/GIF、最大256KiB)をアップロードする
            interface: UploadApplicationIcon
            to: AdminApplications
          - action: delete_icon
            does: 保存済みアイコンを削除する
            interface: DeleteApplicationIcon
            to: AdminApplications
          - action: update_oidc_config
            does: OIDC protocol が指す OAuth2 client の設定を編集して保存する
            interface: UpdateApplicationOidcConfig
            to: AdminApplications
          - action: update_wsfed_config
            does: WS-Fed protocol が指す relying party の設定を編集して保存する
            interface: UpdateApplicationWsFedConfig
            to: AdminApplications
          - action: assign
            does: ユーザーまたはグループを割当てる
            interface: AssignApplication
            to: AdminApplications
          - action: unassign
            does: 割当を解除する
            interface: UnassignApplication
            to: AdminApplications
          - action: update_sign_in_policy
            does: sign-in policy を編集して保存する
            interface: UpdateAppSignInPolicy
            to: AdminApplications
          - action: create_category
            does: カテゴリ名を入力して作成する
            interface: CreateApplicationCategory
            to: AdminApplications
          - action: update_category
            does: カテゴリの名前または並び順を編集して保存する
            interface: UpdateApplicationCategory
            to: AdminApplications
          - action: delete_category
            does: カテゴリを削除する
            interface: DeleteApplicationCategory
            to: AdminApplications
          - action: set_categories
            does: アプリケーションに付与するカテゴリ集合を選び直して保存する
            interface: SetApplicationCategories
            to: AdminApplications
          - action: manage_users
            does: ユーザー管理へのリンクをクリックする
            external: true
  AdminSignInPolicyManagement:
    entry: AdminSignInPolicy
    views:
      AdminSignInPolicy:
        sees: テナントデフォルト sign-in policy 設定画面(MFA 必須化条件、強制開始日時、enrollment bypass 猶予、管理者承認可否)
        does:
          - action: update_default
            does: sign-in policy の条件をすべて編集して保存する
            interface: UpdateTenantDefaultSignInPolicy
            to: AdminSignInPolicy
  AccountAppsManagement:
    entry: AccountApps
    views:
      AccountApps:
        sees: マイアプリ一覧画面(割当済みで表示可能なアプリケーションのアイコンと並び順)
        does:
          - action: reorder
            does: アプリケーションをドラッグして並び順を変更する
            interface: ReorderMyApplications
            to: AccountApps
