# idmagic Authentication — SCL
# Migrated to SCL 3.0 by wi-209 (ADR-103).

system: idmagic
spec_version: "3.0"
context: Authentication
standards:
  RFC6238:
    title: TOTP Time-Based One-Time Password Algorithm
    version: RFC 6238
    url: https://www.rfc-editor.org/rfc/rfc6238.html
    roles:
      - Verifier
    scope: 時刻ベースワンタイムパスワードによる第二要素認証。
    requirements:
      - id: RFC6238-TOTP
        section: §4
        strength: MUST
        adoption: optional
        statement: TOTP factor利用時は共有秘密と時間ステップからOTPを生成・検証する。
        refs:
          - models.MfaFactor
          - models.MfaFactorType
  NISTSP80063B4:
    title: Digital Identity Guidelines — Authentication and Authenticator Management
    version: NIST SP 800-63B-4
    url: https://pages.nist.gov/800-63-4/sp800-63b.html
    roles:
      - Verifier
    scope: PasswordとAuthenticatorのライフサイクル・検証要件。
    requirements:
      - id: NIST63B4-PASSWORD-MINIMUM
        section: §3.1.1.2
        strength: MUST
        adoption: excluded
        statement: 単一要素認証に使用するPasswordへ15文字以上の最小長を要求する。
        reason: 現行システム要件は12文字であり、NIST SP 800-63B-4への完全準拠は表明しない。
      - id: NIST63B4-NO-COMPOSITION
        section: §3.1.1.2
        strength: MUST NOT
        adoption: required
        statement: 文字種混在などPassword composition ruleを課さない。
      - id: NIST63B4-PASSWORD-STORAGE
        section: §3.1.1.2
        strength: MUST
        adoption: required
        statement: Passwordをsaltとcost factorを持つoffline attack耐性のあるhashとして保存する。
        refs:
          - models.User
  WebAuthnLevel3:
    title: Web Authentication — An API for accessing Public Key Credentials Level 3
    version: Candidate Recommendation Snapshot
    url: https://www.w3.org/TR/webauthn-3/
    roles:
      - RelyingParty
      - UserInterface
    scope: 公開鍵Credentialを用いたphishing-resistantな認証。
    requirements:
      - id: WEBAUTHN3-AUTHENTICATION
        section: §5
        strength: MAY
        adoption: required
        statement: WebAuthn factor利用時はoriginとRelying Partyにscopeされた公開鍵Credentialを検証する。
        refs:
          - models.WebAuthnCredential
          - models.MfaFactorType
      - id: WEBAUTHN3-REGISTRATION
        section: §7.1
        strength: MUST
        adoption: required
        statement: WebAuthn credential登録時はattestationのchallenge / RP ID / originを検証し、COSE公開鍵とsign countを保存する。
        refs:
          - models.WebAuthnCredential
  RFC8176:
    title: Authentication Method Reference Values
    version: RFC 8176
    url: https://www.rfc-editor.org/rfc/rfc8176.html
    roles:
      - Verifier
    scope: amr (Authentication Methods References) の登録値語彙。otp / webauthn / hwk / swk はこの標準の登録値、rc は本アプリ固有の非 IANA 拡張値。
    requirements:
      - id: RFC8176-AMR-VOCABULARY
        section: §2
        strength: MUST
        adoption: required
        statement: LoginSession.amr は RFC 8176 登録値 (pwd, otp, webauthn, hwk, swk) のサブセットに、本アプリ固有の非 IANA 拡張値 rc (recovery code) を加えた語彙のみを許可する。
        refs:
          - models.LoginSession
glossary:
  Totp:
    definition: RFC 6238 に基づく time-based one-time password。
    aliases:
      - totp
      - otp
  Webauthn:
    definition: WebAuthn credential による認証。
    aliases:
      - webauthn
  EndUser:
    definition: 認証済みまたは認証を試みる一般利用者。ログイン・MFA継続・パスワードリセットなど、認証が未完了の操作の主体を指す。
  ResourceOwner:
    definition: OAuth2/OIDC 認可フローでリソースの所有者として認可判断を行う利用者。EndUser と同一人物を OAuth2 文脈で指す呼称。
models:
  User:
    kind: entity
    description: IdManagement が publish する identity principal を、認可判断に必要な属性だけで表す published language stub。
    identity: id
    fields:
      id:
        type: String
      tenant_id:
        type: String
      status:
        type: String
      roles:
        type: "String[]"
  InvalidRequestError:
    kind: error
    description: リクエストに必須パラメータの欠落・不正値・重複等がある (RFC 6749 §5.2 invalid_request)。OAuth2 context が定義する共通 error の published language stub。
    payload:
      reason:
        type: String
        optional: true
  AccessDeniedError:
    kind: error
    description: 認証済みだが認可条件を満たさない、またはサーバーポリシーが許可しなかった (RFC 6749 §4.1.2.1 access_denied)。OAuth2 context が定義する共通 error の published language stub。
  BrowserFlowResponse:
    kind: value_object
    description: SPA の認証操作後に表示する次画面またはクライアント redirect URI。OAuth2 context が定義する共通 response の published language stub。
    fields:
      next:
        type: String
        optional: true
      redirect_to:
        type: String
        optional: true
  AccountContextResponse:
    kind: value_object
    description: 認証済み browser session の管理 shell bootstrap 情報。CSRF token と subject、現在 realm、effective role を返す。
    fields:
      csrf_token:
        type: String
        annotations:
          sensitive: true
      id:
        type: String
      preferred_username:
        type: String
        optional: true
      tenant_id:
        type: String
        optional: true
      realm:
        type: String
        optional: true
      roles:
        type: "String[]"
        optional: true
  BrowserCsrfContext:
    kind: value_object
    description: 未認証 browser form が SameSite cookie と対で使う CSRF token bootstrap 情報。
    fields:
      csrf_token:
        type: String
        annotations:
          sensitive: true
  MfaFactorType:
    kind: enum
    description: 第二要素 (MFA) の種別 (RFC 8176 amr 値の本アプリ向けサブセット)。Totp は RFC 6238、Webauthn は WebAuthn Level 3、Hwk / Swk は将来拡張のための予約。
    values:
      - Totp
      - Webauthn
      - Hwk
      - Swk
  MfaFactor:
    kind: entity
    description: "ユーザーが登録した第二要素 (MFA) 1 件。Totp の場合 secret は base32 で保存し、認証時に RFC 6238 (T0=0, STEP=30s, digits 桁, window ±1 step) で評価する。algorithm は SHA1、secret は 20 バイトで生成する。User.mfa_enrolled の真値はこの集合の非空性と同義。"
    identity:
      - user_id
      - type
    fields:
      user_id:
        type: String
        description: 所有者ユーザの sub。
      type:
        type: MfaFactorType
      secret:
        type: String
        optional: true
        description: Totp の場合は base32 シークレット。他要素は credential JSON 等を別フィールド化する余地として残す。
        annotations:
          sensitive: true
      label:
        type: String
        optional: true
        description: "ユーザが付ける表示名 (例 \"iPhone Authenticator\")。"
      created_at:
        type: DateTime
      last_used_at:
        type: DateTime
        optional: true
    constraints:
      - "type != Totp || (secret == null || size(secret) > 0)"
  LoginPendingPurpose:
    kind: enum
    description: LoginSession が未完了である理由。None は通常の認証済みセッション、Challenge は登録済み factor の検証待ち、Enrollment は管理者承認済みの新規 factor 登録待ち。
    values:
      - None
      - Challenge
      - Enrollment
  MfaEnrollmentBypass:
    kind: entity
    description: 管理者が MFA 未登録 user に発行する短期・単発の登録承認。password 成功後に消費して enrollment pending へ進めるための trust anchor であり、MFA 必須ログインそのものを免除しない。期限切れ・取消・消費済みは fail closed で利用できない。
    identity: id
    fields:
      id:
        type: UUID
      tenant_id:
        type: String
      user_id:
        type: String
      issued_by:
        type: String
      issued_at:
        type: DateTime
      expires_at:
        type: DateTime
      consumed_at:
        type: DateTime
        optional: true
      revoked_at:
        type: DateTime
        optional: true
      expired_at:
        type: DateTime
        optional: true
    constraints:
      - expires_at > issued_at
      - "count([consumed_at, revoked_at, expired_at], value != null) <= 1"
  LoginSession:
    kind: entity
    description: ブラウザログインセッション。Cookie には不透明な session id のみを置き、sub と auth_time はサーバー側ストアに保持する。amr / acr もここに残し、後続の /authorize で step-up 判定に使う。authentication_pending=true はサインインポリシーまたは step-up が追加 factor を要求した場合だけ同一 LoginSession を遷移させる中間状態で、MFA factor 登録済みという事実だけでは pending にしない。追加 factor 待ちへ進むときに別の完了済み pwd セッションを残してはならない。/authorize 完了経路は pending セッションを未認証扱いとし対応する factor challenge に誘導する。Cookie は http_only かつ same_site=Lax で発行する。
    identity: id
    fields:
      id:
        type: UUID
      user_id:
        type: String
      auth_time:
        type: Integer
      amr:
        type: "String[]"
        description: 認証成立時の RFC 8176 メソッド列 (RFC8176-AMR-VOCABULARY)。
        constraints:
          - "amr.all(m, m in ['pwd', 'otp', 'webauthn', 'hwk', 'swk', 'rc'])"
      acr:
        type: String
        description: "認証コンテキストクラス参照 URN。urn:idmagic:acr:pwd (amr ⊇ [pwd] のみ) または urn:idmagic:acr:mfa (amr が otp / webauthn / hwk / swk / rc のいずれかを含む) のいずれか (OIDC Core §2 / RFC 8176)。"
        constraints:
          - "acr in ['urn:idmagic:acr:pwd', 'urn:idmagic:acr:mfa']"
      authentication_pending:
        type: Boolean
        default: false
        description: 追加 factor 検証を待っている中間状態か。完了で false。
      pending_purpose:
        type: LoginPendingPurpose
        default: None
        description: authentication_pending の目的。Enrollment の間は account/admin/application resource へアクセスできず、登録専用 API だけを許可する。
      enrollment_deadline:
        type: DateTime
        optional: true
        description: pending_purpose=Enrollment の完了期限。期限後の登録確定は拒否し、セッションを認証完了へ昇格させない。
      enrollment_bypass_id:
        type: UUID
        optional: true
        description: Enrollment へ進むために消費した管理者発行 bypass。監査相関用。
      expires_at:
        type: DateTime
  AuthenticationContext:
    kind: value_object
    description: Authentication bounded context が OAuth2/OIDC bounded context に渡す認証結果。OAuth2/OIDC は password、UserRepository、session cookie の詳細を参照しない。
    fields:
      user_id:
        type: String
      auth_time:
        type: Integer
      amr:
        type: "String[]"
      acr:
        type: String
        optional: true
      session_id:
        type: String
        optional: true
  AccountMfaFactor:
    kind: value_object
    description: "self-service セキュリティ画面で提示する MFA factor 1 件の射影。secret は\n返さず、種別・ラベル・作成/最終利用時刻のみ。現状 TOTP のみ。\n"
    fields:
      type:
        type: MfaFactorType
      label:
        type: String
        optional: true
      created_at:
        type: DateTime
      last_used_at:
        type: DateTime
        optional: true
  AccountSecurityResponse:
    kind: value_object
    description: "`/api/account/security` の返り値 (end-user account portal のセキュリティ概要)。\nパスワード変更日時と MFA (TOTP / WebAuthn) の登録状態、backup recovery code の残数を\nまとめる。\n"
    fields:
      password_changed_at:
        type: DateTime
        optional: true
      totp_enrolled:
        type: Boolean
      factors:
        type: "AccountMfaFactor[]"
      webauthn_credentials:
        type: "WebAuthnCredentialSummary[]"
      recovery_codes:
        type: RecoveryCodeStatus
  TOTPEnrollmentStart:
    kind: value_object
    description: "TOTP 登録開始の返り値 (self-service)。secret はクライアントが確認まで保持し、\notpauth_uri は QR / 手動登録のために提示する。secret は確認 (ConfirmTotpEnrollment) で\n送り返されるまで永続化しない。\n"
    fields:
      secret:
        type: String
        annotations:
          sensitive: true
      otpauth_uri:
        type: String
        annotations:
          sensitive: true
      account_name:
        type: String
        annotations:
          pii: true
      issuer:
        type: String
  BrowserMfaEnrollmentConfirmRequest:
    kind: value_object
    description: 管理者承認済みの login enrollment flow で TOTP 登録を確定する。secret と code は audit / log に残さない。
    fields:
      secret:
        type: String
        annotations:
          sensitive: true
      code:
        type: String
        annotations:
          sensitive: true
      return_to:
        type: String
        optional: true
  MfaEnrollmentBypassIssueRequest:
    kind: value_object
    description: 管理者が対象 user に単発 enrollment bypass を発行する入力。
    fields:
      expires_in_seconds:
        type: Integer
        default: 900
        constraints:
          - min: 60
          - max: 3600
  MfaEnrollmentBypassResponse:
    kind: value_object
    description: enrollment bypass の管理表示。secret は存在せず、対象 user の password 成功時にサーバーが自動消費する。
    fields:
      bypass:
        type: MfaEnrollmentBypass
  TOTPEnrollmentConfirmRequest:
    kind: value_object
    description: "TOTP 登録確認リクエスト (self-service)。secret は開始時の値、code はその secret\nから生成した現在のコード (所持証明)。\n"
    fields:
      secret:
        type: String
        constraints:
          - non_empty
        annotations:
          sensitive: true
      code:
        type: String
        constraints:
          - non_empty
  MfaFactorRemoveRequest:
    kind: value_object
    description: "MFA factor 解除リクエスト (self-service)。code は所持証明としての現在の TOTP\nコード。解除は本人 + 所持証明を要求する。\n"
    fields:
      code:
        type: String
        constraints:
          - non_empty
  WebAuthnTransport:
    kind: enum
    description: "WebAuthn authenticator の接続方式のヒント (WebAuthn Level 3 §5.8.4 AuthenticatorTransport)。\n"
    values:
      - Usb
      - Nfc
      - Ble
      - Internal
      - Hybrid
  WebAuthnCredential:
    kind: entity
    description: "ユーザーが登録した WebAuthn / Passkey credential 1 件。1 ユーザーが複数持てるため\nMfaFactor とは別集合とし、credential_id で一意識別する。public_key は COSE 公開鍵、\nsign_count は clone 検出のための署名カウンタ。origin / RP に束縛された所持要素として\nphishing-resistant MFA / step-up に使う。ceremony は RP ID / origin を deployment config\nから解決し、user_verification=preferred・attestation=none (enterprise attestation の厳格\nenforcement は行わない)・resident_key=discouraged (passwordless は対象外)・challenge は 32\nバイト・timeout は 120 秒とする (WebAuthn Level 3 §5 / §7 / §13)。\n"
    identity:
      - credential_id
    fields:
      credential_id:
        type: String
        description: authenticator が返す credential ID (base64url)。RP 内で一意。
      user_id:
        type: String
        description: 所有者ユーザの sub。
      public_key:
        type: String
        description: COSE 形式の公開鍵 (base64url)。
        annotations:
          sensitive: true
      sign_count:
        type: Integer
        description: 直近 assertion の署名カウンタ。逆行は clone の疑いとして拒否する (sign_count_regression=reject)。
      transports:
        type: "String[]"
        description: authenticator が申告した transport のヒント (usb / nfc / ble / internal / hybrid)。
      aaguid:
        type: String
        optional: true
        description: authenticator の AAGUID (base64url)。機種識別のヒント。
      label:
        type: String
        optional: true
        description: "ユーザが付ける表示名 (例 \"MacBook Touch ID\")。"
      backup_eligible:
        type: Boolean
        description: credential が複数デバイス間で同期可能か (WebAuthn BE flag)。
      backup_state:
        type: Boolean
        description: credential が現在 backup 済みか (WebAuthn BS flag)。
      created_at:
        type: DateTime
      last_used_at:
        type: DateTime
        optional: true
  WebAuthnCredentialSummary:
    kind: value_object
    description: "self-service セキュリティ画面で提示する WebAuthn credential 1 件の射影。\n公開鍵や sign_count は返さず、識別と表示に必要な属性のみ。\n"
    fields:
      credential_id:
        type: String
      label:
        type: String
        optional: true
      transports:
        type: "String[]"
      created_at:
        type: DateTime
      last_used_at:
        type: DateTime
        optional: true
  RecoveryCode:
    kind: entity
    description: "TOTP / WebAuthn 喪失時の backup recovery code 1 件。平文は生成時に一度だけ表示し、\nDB には code_hash (SHA-256 hex) のみ保存する。consumed_at が非 null なら使用済みで\n再利用不可。1 ユーザーの有効な code 集合を 1 set として扱い、再生成で全置換する\n(regenerate_replaces_all)。生成時は count=10 件、各 code_length=10 文字、\nalphabet 23456789abcdefghijkmnpqrstuvwxyz (混同しやすい文字を除いた base32 風) から\n採番し、単独では第二要素にならない backup 専用とする (NIST SP 800-63B §5.1.2 Look-up Secrets)。\n"
    identity:
      - user_id
      - code_hash
    fields:
      user_id:
        type: String
      code_hash:
        type: String
        description: recovery code 平文の SHA-256 hex。平文は保存しない。
        annotations:
          sensitive: true
      generated_at:
        type: DateTime
      consumed_at:
        type: DateTime
        optional: true
  RecoveryCodeStatus:
    kind: value_object
    description: "self-service セキュリティ画面で提示する recovery code の状態。個々のコードは返さず、\n生成時刻と総数・残数のみ。\n"
    fields:
      generated_at:
        type: DateTime
        optional: true
      total:
        type: Integer
      remaining:
        type: Integer
  WebAuthnRegistrationOptions:
    kind: value_object
    description: "StartWebAuthnRegistration の返り値。navigator.credentials.create に渡す\nPublicKeyCredentialCreationOptions を JSON でそのまま返す。challenge は短命で\nサーバー側セッションに束縛する。\n"
    fields:
      public_key:
        type: JSON
        description: PublicKeyCredentialCreationOptions (WebAuthn Level 3)。
        annotations:
          sensitive: true
  WebAuthnRegistrationRequest:
    kind: value_object
    description: "FinishWebAuthnRegistration の入力。navigator.credentials.create が返した\nattestation を JSON で送り返し、任意で表示ラベルを付ける。\n"
    fields:
      attestation:
        type: JSON
        description: PublicKeyCredential (attestation response, WebAuthn Level 3)。
        annotations:
          sensitive: true
      label:
        type: String
        optional: true
  WebAuthnAssertionOptions:
    kind: value_object
    description: "StartBrowserWebAuthn の返り値。navigator.credentials.get に渡す\nPublicKeyCredentialRequestOptions を JSON でそのまま返す。challenge は pending login\nsession に束縛する。\n"
    fields:
      public_key:
        type: JSON
        description: PublicKeyCredentialRequestOptions (WebAuthn Level 3)。
        annotations:
          sensitive: true
  BrowserWebAuthnRequest:
    kind: value_object
    description: "SubmitBrowserWebAuthn の入力。navigator.credentials.get が返した assertion を\nJSON で送り返す。pending login session cookie が sub を、X-CSRF-Token が CSRF を解決する。\n"
    fields:
      assertion:
        type: JSON
        description: PublicKeyCredential (assertion response, WebAuthn Level 3)。
        annotations:
          sensitive: true
      return_to:
        type: String
        optional: true
  BrowserRecoveryCodeRequest:
    kind: value_object
    description: "SubmitBrowserRecoveryCode の入力。第二要素として recovery code を 1 つ消費する。\ncode は audit / log に残さない。\n"
    fields:
      code:
        type: String
        annotations:
          sensitive: true
      return_to:
        type: String
        optional: true
  WebAuthnCredentialRemoveRequest:
    kind: value_object
    description: "RemoveWebAuthnCredential の入力。解除対象の credential を credential_id で指定する。\n"
    fields:
      credential_id:
        type: String
        constraints:
          - non_empty
  RecoveryCodesResponse:
    kind: value_object
    description: "GenerateRecoveryCodes の返り値。平文の recovery code 一覧を一度だけ返す。\n以降は残数 (RecoveryCodeStatus) のみ取得でき、codes は保存・再表示しない。\n"
    fields:
      codes:
        type: "String[]"
        annotations:
          sensitive: true
      generated_at:
        type: DateTime
  UserSignInActivity:
    kind: value_object
    description: "ユーザー本人のサインイン履歴 1 件の射影。本スライスは既存の監査\nイベントストア (UserAuthenticated) から導出するため、保持する属性は発生時刻と\n認証手段 (amr) のみ。IP / UA / sessionId / clientId の付加は後続で\nイベント側を拡張してから足す。\n"
    fields:
      occurred_at:
        type: DateTime
      amr:
        type: "String[]"
        description: RFC 8176 の技術値 (RFC8176-AMR-VOCABULARY)。UI は pwd=パスワード、otp=認証アプリ、webauthn=パスキー、rc=リカバリコードなど、利用者向けの認証方式名に変換して表示する。
  UserSignInActivityResponse:
    kind: value_object
    description: "ListMySignInActivity / ListUserSignInActivity の返り値。発生時刻の降順 (新しい順) で\n直近 N 件を返す。\n"
    fields:
      activities:
        type: "UserSignInActivity[]"
  SessionEndReason:
    kind: enum
    description: "LoginSession 終了の理由。self_revoke / admin_revoke は本人 / admin の明示的な\n失効、logout / idle / absolute は自動失効、password_change / mfa_change は資格情報変更に\n伴う失効。\n"
    values:
      - logout
      - idle
      - absolute
      - self_revoke
      - admin_revoke
      - password_change
      - mfa_change
      - other
  AccountSession:
    kind: value_object
    description: "self-service セッション一覧の 1 件の射影。secret は持たず、識別子と\n認証情報のみ。current は呼び出し元の現在のセッションかどうか。started_at は LoginSession の\nauth_time、expires_at は失効予定時刻。\n"
    fields:
      id:
        type: String
      current:
        type: Boolean
      amr:
        type: "String[]"
      acr:
        type: String
      started_at:
        type: DateTime
      expires_at:
        type: DateTime
  AccountSessionListResponse:
    kind: value_object
    description: "ListMySessions の返り値。開始時刻の降順 (新しい順) で本人の有効なセッションを返す。\n"
    fields:
      sessions:
        type: "AccountSession[]"
  AuthenticationEventBucket:
    kind: value_object
    description: "認証イベント集約 (bucket) 1 件の admin 表示用射影。攻撃時に個別の\nログイン失敗を 5 分窓へ集約した結果で、window_start は窓の開始時刻、count はその窓の\n累計件数、first_seen / last_seen は窓内の初出・最終時刻。key_hash は SHA-256 hex で\n平文を含まない。tenant 境界内に閉じる。\n"
    fields:
      kind:
        type: String
        description: failed_login | throttled | mfa_failed
      key_hash:
        type: String
      window_start:
        type: DateTime
      count:
        type: Integer
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
      first_seen:
        type: DateTime
      last_seen:
        type: DateTime
  AuthenticationEventBucketListResponse:
    kind: value_object
    description: "ListAuthenticationEventBuckets の返り値。window_start の降順 (新しい窓が先) で返す。\n"
    fields:
      buckets:
        type: "AuthenticationEventBucket[]"
  StepUpMethod:
    kind: enum
    description: "step-up 再認証に使える factor。password は常時、totp / webauthn は enrolled 時のみ、\nrecovery_code は有効な残数がある時のみ利用できる。\n"
    values:
      - password
      - totp
      - webauthn
      - recovery_code
  StepUpStartResponse:
    kind: value_object
    description: "StartStepUpAuthentication の返り値。利用可能な再認証 method の一覧 (UI が再認証\nmodal に出す選択肢)。\n"
    fields:
      methods:
        type: "StepUpMethod[]"
  StepUpCompleteRequest:
    kind: value_object
    description: "CompleteStepUpAuthentication の入力。method に応じて password または code を使う。\n検証材料は audit / log に残さない。\n"
    fields:
      method:
        type: StepUpMethod
      password:
        type: String
        optional: true
        annotations:
          pii: true
      code:
        type: String
        optional: true
  BrowserTotpRequest:
    kind: value_object
    description: Browser client が POST /api/auth/totp に送る TOTP コード。authorization request id は HttpOnly transaction cookie、CSRF は X-CSRF-Token header から解決する。他 factor (WebAuthn 等) はHTTP形が大きく異なるため、別endpointと別value objectとして独立に定義する。
    fields:
      code:
        type: String
        description: Authenticator アプリが生成した数字コード (6 桁、RFC 6238 §4 / RFC 4226 §4)。
        annotations:
          sensitive: true
      return_to:
        type: String
        optional: true
        description: 管理画面への直接ログインを継続する場合の同一 realm 内遷移先。
  BrowserChangePasswordRequest:
    kind: value_object
    description: SPA が POST /api/auth/change_password に送る JSON。認証済みセッション cookie が sub を解決し、CSRF は X-CSRF-Token header で検証する。
    fields:
      current_password:
        type: String
        annotations:
          sensitive: true
      new_password:
        type: String
        annotations:
          sensitive: true
        constraints:
          - non_empty
          - min_length: 12
          - max_length: 128
  BrowserForgotPasswordRequest:
    kind: value_object
    description: SPA が POST /api/auth/forgot_password に送る JSON。未認証経路。anti-enumeration のため email 存在有無に関わらず常に 204 を返す。
    fields:
      email:
        type: String
        annotations:
          pii: true
  BrowserResetPasswordRequest:
    kind: value_object
    description: SPA が POST /api/auth/reset_password に送る JSON。email リンクに含まれた単発消費 token と新パスワードを受ける。
    fields:
      token:
        type: String
        annotations:
          sensitive: true
      new_password:
        type: String
        annotations:
          sensitive: true
        constraints:
          - non_empty
          - min_length: 12
          - max_length: 128
  PasswordResetTokenRecord:
    kind: entity
    identity: token_hash
    description: "パスワードリセット用の単発消費トークン。\ntoken は base64url の 32 バイト乱数で、保存時は SHA-256 hash のみ。\n有効期間は発行から 1800 秒 (30 分) とし、単発消費 (consumed_at 設定後は再利用不可)。\n期限切れ / consume 済みの行は GC するが、INSERT 時に同 sub の未消費を\n失効させる軽い掃除も行う。\n"
    fields:
      user_id:
        type: String
      token_hash:
        type: String
        annotations:
          sensitive: true
      created_at:
        type: DateTime
      expires_at:
        type: DateTime
        description: created_at + 1800 秒 (30 分)。
      consumed_at:
        type: DateTime
        optional: true
        description: 非 null なら使用済みで再利用不可。
  UserAuthenticated:
    kind: event
    description: "ResourceOwner の認証が成功した。amr は実際に経由した認証手段の一覧 (OIDC Core §2)。"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 認証が起きたテナント ID。監査ビューのテナント絞り込みに使う。
      userId:
        type: String
      amr:
        type: "String[]"
        optional: true
      sessionId:
        type: String
        optional: true
        description: 認証で開始した LoginSession の ID。
      clientId:
        type: String
        optional: true
        description: 認証を起動した OAuth クライアント。
      acr:
        type: String
        optional: true
      ip:
        type: String
        optional: true
        description: 接続元 IP。監査イベントの保持期間中は平文のまま保存する。
      userAgent:
        type: String
        optional: true
        description: 接続元 User-Agent。監査イベントの保持期間中は平文のまま保存する。
      countryCode:
        type: String
        optional: true
        description: GeoIP 由来の国コード (未連携時は空)。
      deviceFingerprint:
        type: String
        optional: true
        description: device fingerprint。監査イベントの保持期間中は平文のまま保存する。
      riskScore:
        type: Integer
        optional: true
        description: リスクスコア (本 WI ではフィールド確保のみ、値は null)。
  AuthenticationFailed:
    kind: event
    description: "ResourceOwner の認証が失敗した。レートリミット・不正検知の入力イベント。\n実在しないユーザー名での試行も記録対象のため sub を持たず、username を平文のまま監査検索の\nactor.username 相関キーとして保持する。username を含む接続元属性は hash 化せず、他の failure\nイベントと同じ保持期間 (既定 30 日) で扱う。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 認証を試みたテナント ID (リクエストパス由来)。
      username:
        type: String
        optional: true
      reason:
        type: String
        optional: true
      sessionId:
        type: String
        optional: true
      clientId:
        type: String
        optional: true
      ip:
        type: String
        optional: true
        description: 接続元 IP。監査イベントの保持期間中は平文のまま保存する。
      userAgent:
        type: String
        optional: true
        description: 接続元 User-Agent。監査イベントの保持期間中は平文のまま保存する。
      countryCode:
        type: String
        optional: true
      deviceFingerprint:
        type: String
        optional: true
        description: device fingerprint。監査イベントの保持期間中は平文のまま保存する。
      riskScore:
        type: Integer
        optional: true
  PasswordChanged:
    kind: event
    description: ResourceOwner が /api/auth/change_password で自身のパスワードを変更した。change-password 監査と通知の起点。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 対象 user の所属テナント ID。
      userId:
        type: String
  LoginThrottled:
    kind: event
    description: "ログイン試行が per-account (10 回 / 900 秒窓 / 900 秒ロックアウト) または per-IP\n(30 回 / 900 秒窓 / 900 秒ロックアウト) のスロットリング閾値に到達してロックされた。\nSIEM の credential stuffing / brute-force 検知の入力イベント。keyHash は username\n(lowercase) または IP の SHA-256 で、平文を audit log に流さない。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: スロットリングが起きたテナント ID (リクエストパス由来)。
      kind:
        type: String
        description: account または ip
      keyHash:
        type: String
        description: username (lowercased) または IP の SHA-256 hex
      retryAfterSeconds:
        type: Integer
  AuthenticationEventAggregated:
    kind: event
    description: "クレデンシャル試行洪水時に、個別の AuthenticationFailed を 1 行ずつ書かず\n(tenantId, kind, keyHash, 5 分窓) の bucket に集約したことを表す。1 つの窓につき最初の 1 件だけ\nemit し、以後の増分は bucket store の count に積む。したがって本 payload の\ncount は emit 時点の値で、実体の件数は ListAuthenticationEventBuckets で観測する。\nkeyHash は SHA-256 hex で平文を audit log に流さない (LoginThrottled と同方針)。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 集約が起きたテナント ID。
      kind:
        type: String
        description: failed_login | throttled | mfa_failed
      bucketKey:
        type: String
        description: kind:keyHash:windowStartUnix の合成キー
      keyHash:
        type: String
        description: username (lowercased) または IP の SHA-256 hex
      count:
        type: Integer
        description: emit 時点の窓内件数 (実体は bucket store で伸び続ける)
      firstSeen:
        type: DateTime
      lastSeen:
        type: DateTime
      topKeys:
        type: "String[]"
        description: 窓内で頻出した keyHash (最大 5 件)
  AuthenticationStepCompleted:
    kind: event
    description: 多段認証フローの 1 ステップ (password / totp / webauthn 等) が成功した。acr 確定の入力。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      userId:
        type: String
      step:
        type: String
        description: password | totp | webauthn | recovery_code 等
      sessionId:
        type: String
        optional: true
  AuthenticationStepFailed:
    kind: event
    description: 多段認証フローの 1 ステップが失敗した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      step:
        type: String
      reason:
        type: String
        optional: true
  MfaChallengeIssued:
    kind: event
    description: MFA チャレンジ (TOTP / WebAuthn 等) を提示した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      userId:
        type: String
      factorType:
        type: MfaFactorType
      sessionId:
        type: String
        optional: true
  MfaChallengeSucceeded:
    kind: event
    description: MFA チャレンジに成功した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      userId:
        type: String
      factorType:
        type: MfaFactorType
      sessionId:
        type: String
        optional: true
  MfaChallengeFailed:
    kind: event
    description: MFA チャレンジに失敗した。bucket 集約 (kind=mfa_failed) の入力にもなる。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      userId:
        type: String
        optional: true
      factorType:
        type: MfaFactorType
      sessionId:
        type: String
        optional: true
  MfaEnrollmentRequired:
    kind: event
    description: MFA 必須ポリシー下の未登録 user が、有効な管理者承認を消費して登録専用 pending flow へ入った。password 認証だけでは通常セッションを成立させない。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      userId:
        type: String
      sessionId:
        type: String
      bypassId:
        type: String
      deadline:
        type: DateTime
  MfaEnrollmentCompleted:
    kind: event
    description: login enrollment flow で factor 登録と所持証明が完了し、同一 LoginSession が MFA 済みに昇格した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      userId:
        type: String
      sessionId:
        type: String
      factorType:
        type: MfaFactorType
  MfaEnrollmentBypassIssued:
    kind: event
    description: 管理者が MFA 未登録 user に短期・単発の enrollment bypass を発行した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      userId:
        type: String
      bypassId:
        type: String
      expiresAt:
        type: DateTime
  MfaEnrollmentBypassConsumed:
    kind: event
    description: password 認証済みの対象 user が enrollment bypass を単発消費し、登録専用 pending flow へ入った。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      userId:
        type: String
      bypassId:
        type: String
      sessionId:
        type: String
  MfaEnrollmentBypassRevoked:
    kind: event
    description: 管理者が未消費の enrollment bypass を取り消した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      userId:
        type: String
      bypassId:
        type: String
  MfaEnrollmentBypassExpired:
    kind: event
    description: 未消費の enrollment bypass が期限を過ぎて利用不能と判定された。期限切れを初めて観測した時に発行する。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      userId:
        type: String
      bypassId:
        type: String
  BackupCodeConsumed:
    kind: event
    description: バックアップ/リカバリコードを 1 つ消費した (TOTP / WebAuthn 喪失時の復旧)。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      userId:
        type: String
      remainingCount:
        type: Integer
        optional: true
  SessionStarted:
    kind: event
    description: LoginSession を開始した。session 一覧・調査の起点。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      userId:
        type: String
      sessionId:
        type: String
      amr:
        type: "String[]"
        optional: true
      acr:
        type: String
        optional: true
      ip:
        type: String
        optional: true
        description: セッション開始時の接続元 IP。監査イベントの保持期間中は平文のまま保存する。
      userAgent:
        type: String
        optional: true
        description: セッション開始時の User-Agent。監査イベントの保持期間中は平文のまま保存する。
  SessionRefreshed:
    kind: event
    description: LoginSession の有効期限を延伸した (アクティブ継続)。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      userId:
        type: String
      sessionId:
        type: String
  FederatedAuthenticated:
    kind: event
    description: 外部 IdP 経由の federated login が成功した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      userId:
        type: String
      provider:
        type: String
        description: "外部 IdP 識別子 (例: google / github / saml:acme)"
      sessionId:
        type: String
        optional: true
  SessionImpersonationStarted:
    kind: event
    description: "admin が user として操作するセッションを開始した (impersonation)。本人通知を前提とする\n監査事象で、retention 短縮の対象外。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
        description: impersonate した admin の sub
      targetUserId:
        type: String
        description: 対象 user の sub
      sessionId:
        type: String
  SessionImpersonationEnded:
    kind: event
    description: impersonation セッションを終了した。retention 短縮の対象外。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      targetUserId:
        type: String
      sessionId:
        type: String
  PasswordResetRequested:
    kind: event
    description: "パスワードリセットリンクを発行した。anti-enumeration のため\n「リクエストが届いた」ことのみ記録し、発行有無 (verified email を持つ\nuser が存在したか) は別途 EmailSent イベントで観測する。\nemailHash は SHA-256 で、平文を audit log に流さない。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: リセットを要求したテナント ID (リクエストパス由来)。
      emailHash:
        type: String
        description: 送信元 email の SHA-256 hex
  EmailSent:
    kind: event
    description: "EmailSender port 経由でメールを送信した。fail-open の port なので\n送信失敗時も use case 層には伝播しないが、本イベントの有無で\nSIEM 側からは観測できる。to は SHA-256 hash で記録する。\n"
    payload:
      occurredAt:
        type: DateTime
      toHash:
        type: String
        description: 宛先 email の SHA-256 hex
      purpose:
        type: String
        description: password_reset / email_change / email_verification など。
      delivered:
        type: Boolean
  MfaFactorEnrolled:
    kind: event
    description: "本人が self-service で MFA factor (現状 TOTP) を登録した。secret は audit に\n流さず種別だけを残す。User.mfa_enrolled を true にする。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 対象 user の所属テナント ID。
      userId:
        type: String
      factorType:
        type: MfaFactorType
  MfaFactorRemoved:
    kind: event
    description: "本人が self-service で MFA factor を解除した。解除は有効な TOTP コードによる\n所持証明を伴う。User.mfa_enrolled を false に戻す。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 対象 user の所属テナント ID。
      userId:
        type: String
      factorType:
        type: MfaFactorType
  WebAuthnCredentialRegistered:
    kind: event
    description: "本人が self-service で WebAuthn / Passkey credential を登録した。公開鍵や\ncredential_id は audit に流さず、種別のみ残す。最初の 1 件で User.mfa_enrolled を true にする。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 対象 user の所属テナント ID。
      userId:
        type: String
  WebAuthnCredentialRemoved:
    kind: event
    description: "本人が self-service で WebAuthn / Passkey credential を解除した (step-up 済み)。\n残る第二要素が無くなった場合は User.mfa_enrolled を false に戻す。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 対象 user の所属テナント ID。
      userId:
        type: String
  RecoveryCodesGenerated:
    kind: event
    description: "本人が backup recovery code を生成 / 再生成した (step-up 済み)。平文や hash は\naudit に流さず、発行件数のみ残す。再生成は既存 set を全置換する。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 対象 user の所属テナント ID。
      userId:
        type: String
      count:
        type: Integer
        description: 発行した recovery code の件数。
  RecoveryCodesRevoked:
    kind: event
    description: "本人が backup recovery code を明示的に失効した (step-up 済み)。以降 recovery code は\n第二要素として使えない。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 対象 user の所属テナント ID。
      userId:
        type: String
  SessionEnded:
    kind: event
    description: "LoginSession が終了した。本人 / admin の明示的な失効では actorUserId が操作者、\nreason が self_revoke / admin_revoke になる。OAuth クライアントへ発行済みの refresh\ntoken はセッションに 1:1 で紐づかないため本スライスでは失効しない。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 対象 user の所属テナント ID。
      userId:
        type: String
      sessionId:
        type: String
      actorUserId:
        type: String
        description: 失効を実行した主体の sub (self は本人)。
      reason:
        type: SessionEndReason
  StepUpRequested:
    kind: event
    description: "本人が高 sensitivity 操作のための step-up 再認証を開始した。\n利用可能な factor の提示要求であり、まだ再認証は成立していない。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 本人の所属テナント ID。
      userId:
        type: String
      sessionId:
        type: String
  StepUpCompleted:
    kind: event
    description: "step-up 再認証が成立した。method は再認証に使った factor\n(password | totp)。検証材料 (パスワード / コード) は payload に含めない。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 本人の所属テナント ID。
      userId:
        type: String
      sessionId:
        type: String
      method:
        type: String
        description: password | totp
interfaces:
  GetAccountContext:
    description: 認証済み browser session の管理 shell bootstrap 情報と CSRF token を取得する。認証途中の session は拒否する。
    output:
      context:
        type: AccountContextResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: GET
        path: /api/auth/account
  GetPasswordResetContext:
    description: 未認証のパスワードリセット画面が POST を保護する CSRF token を取得する。
    output:
      context:
        type: BrowserCsrfContext
    read_only: true
    access: public
    bindings:
      - kind: http
        method: GET
        path: /api/auth/password_reset_context
  StartStepUpWebAuthnChallenge:
    description: 認証済み session に束縛した step-up 用 WebAuthn assertion challenge を発行する。CSRF を検証し、WebAuthn 無効時は fail closed とする。
    output:
      options:
        type: WebAuthnAssertionOptions
    errors:
      - InvalidRequestError
      - AccessDeniedError
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: POST
        path: /api/account/step_up/webauthn/challenge
  SubmitBrowserLogin:
    description: SPA JSON API から browser password step を処理する。MFA 必須かつ factor 未登録の場合、強制開始前は password session でログインを許可して事前登録を促し、開始後は有効な単発 enrollment bypass と猶予期限の両方を満たすときだけ同一 LoginSession を Enrollment pending にする。それ以外は fail closed でログインを完了しない。per-account (10 回 / 900 秒窓、900 秒ロックアウト) と per-IP (30 回 / 900 秒窓、900 秒ロックアウト) のスロットリングを cluster_wide カウンタで適用し、共有カウンタストア到達不能時も fail_closed とする。
    input:
      body:
        fields:
          username:
            type: String
          password:
            type: String
            annotations:
              sensitive: true
          return_to:
            type: String
            optional: true
            description: 同一 realm の /admin 配下に限定したログイン後遷移先。
    output:
      response:
        type: BrowserFlowResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - UserAuthenticated
      - AuthenticationFailed
      - MfaEnrollmentRequired
      - MfaEnrollmentBypassConsumed
      - MfaEnrollmentBypassExpired
    requires:
      - "!context.login_throttled"
    access: public
    bindings:
      - kind: http
        method: POST
        path: /api/auth/login
        request_body: json
  StartBrowserMfaEnrollment:
    description: pending_purpose=Enrollment かつ期限内の LoginSession だけが TOTP 登録を開始する。通常の未認証 session、Challenge pending、期限切れ、既登録 user は拒否する。secret は確定まで永続化しない。
    output:
      enrollment:
        type: TOTPEnrollmentStart
    errors:
      - InvalidRequestError
      - AccessDeniedError
    access: public
    bindings:
      - kind: http
        method: POST
        path: /api/auth/mfa/enrollment/totp/start
  ConfirmBrowserMfaEnrollment:
    description: pending_purpose=Enrollment かつ期限内の LoginSession で TOTP 所持証明を検証して factor を保存し、同一 LoginSession に otp を加えて MFA 済みに昇格させ、元の authorization transaction を継続する。通常 self-service 登録 endpoint と権限を共有しない。
    input:
      request:
        type: BrowserMfaEnrollmentConfirmRequest
    output:
      response:
        type: BrowserFlowResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - MfaFactorEnrolled
      - MfaEnrollmentCompleted
      - UserAuthenticated
    access: public
    bindings:
      - kind: http
        method: POST
        path: /api/auth/mfa/enrollment/totp/confirm
        request_body: json
  SubmitBrowserTotp:
    description: SPA JSON API から TOTP コードを検証する。成功すれば LoginSession を認証完了状態に昇格させ、後続フロー (consent / authorization code 発行) に進む。他 factor は別 endpoint として定義する。未認証の pending login session cookie が対象ユーザーを解決するため認証は要求しない。
    input:
      request:
        type: BrowserTotpRequest
    output:
      response:
        type: BrowserFlowResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - UserAuthenticated
      - AuthenticationFailed
    access: public
    bindings:
      - kind: http
        method: POST
        path: /api/auth/totp
        request_body: json
  ChangePassword:
    description: 認証済みユーザーが自身のパスワードを変更する。current_password を verify し、new_password は 12〜128 文字の長さ制約と直近 history_depth (5) 件のハッシュとの不一致 (PasswordHistoryNoReuse) を満たさなければならない。
    input:
      request:
        type: BrowserChangePasswordRequest
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - PasswordChanged
    requires:
      - size(input.request.new_password) >= 12
      - size(input.request.new_password) <= 128
      - "!passwordHistoryContains(subject.id, input.request.new_password)"
    annotations:
      step_up: required
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: POST
        path: /api/auth/change_password
        request_body: json
  GetAccountSecurity:
    description: "認証済みユーザーが自身のセキュリティ概要を取得する (self-service)。対象は subject.id に\n固定。パスワード変更日時と MFA (TOTP) 登録状態を返す。\n"
    output:
      security:
        type: AccountSecurityResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: GET
        path: /api/account/security
  StartTotpEnrollment:
    description: "認証済みユーザーが TOTP 登録を開始する (self-service)。新しい secret (20 バイト) と\notpauth URI を返すだけで永続化はしない。既に TOTP factor がある場合は拒否する。\n"
    output:
      enrollment:
        type: TOTPEnrollmentStart
    errors:
      - InvalidRequestError
      - AccessDeniedError
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: POST
        path: /api/account/mfa/totp/enroll/start
  ConfirmTotpEnrollment:
    description: "secret に対するコードの所持証明を検証し、TOTP factor を永続化する (self-service)。\nsubject.id に固定し、確定時に User.mfa_enrolled を true にする。\n"
    input:
      request:
        type: TOTPEnrollmentConfirmRequest
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - MfaFactorEnrolled
    annotations:
      step_up: required
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: POST
        path: /api/account/mfa/totp/enroll/confirm
        request_form: body
  RemoveTotpFactor:
    description: "有効な TOTP コード (所持証明) を検証してから TOTP factor を解除する (self-service)。\nsubject.id に固定し、解除時に User.mfa_enrolled を false に戻す。\n"
    input:
      request:
        type: MfaFactorRemoveRequest
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - MfaFactorRemoved
    annotations:
      step_up: required
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: POST
        path: /api/account/mfa/totp/remove
        request_form: body
  StartWebAuthnRegistration:
    description: "認証済みユーザーが WebAuthn / Passkey 登録を開始する (self-service)。\nPublicKeyCredentialCreationOptions を返し、challenge をサーバー側セッションに束縛する。\n永続化はまだ行わない。\n"
    output:
      options:
        type: WebAuthnRegistrationOptions
    errors:
      - InvalidRequestError
      - AccessDeniedError
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: POST
        path: /api/account/mfa/webauthn/register/start
  FinishWebAuthnRegistration:
    description: "attestation を検証して WebAuthn credential を永続化する (self-service)。subject.id に\n固定し、最初の 1 件で User.mfa_enrolled を true にする。RP ID / origin / challenge を検証する。\n"
    input:
      request:
        type: WebAuthnRegistrationRequest
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - WebAuthnCredentialRegistered
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: POST
        path: /api/account/mfa/webauthn/register/finish
  RemoveWebAuthnCredential:
    description: "指定した WebAuthn credential を解除する (self-service, step-up 必須)。subject.id に固定し、\n残る第二要素が無くなれば User.mfa_enrolled を false に戻す。\n"
    input:
      request:
        type: WebAuthnCredentialRemoveRequest
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - WebAuthnCredentialRemoved
    annotations:
      step_up: required
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: POST
        path: /api/account/mfa/webauthn/remove
        request_form: body
  StartBrowserWebAuthn:
    description: "SPA JSON API から WebAuthn assertion challenge を発行する。pending login session が\nsub を解決し、PublicKeyCredentialRequestOptions を返す。challenge はそのセッションに束縛する。\n"
    output:
      options:
        type: WebAuthnAssertionOptions
    errors:
      - InvalidRequestError
      - AccessDeniedError
    access: public
    bindings:
      - kind: http
        method: POST
        path: /api/auth/webauthn/challenge
  SubmitBrowserWebAuthn:
    description: "SPA JSON API から WebAuthn assertion を検証する。成功すれば LoginSession を認証完了\n状態に昇格させ、後続フロー (consent / authorization code 発行) に進む。sign_count 逆行は\nclone として拒否する (sign_count_regression=reject)。\n"
    input:
      request:
        type: BrowserWebAuthnRequest
    output:
      response:
        type: BrowserFlowResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - UserAuthenticated
      - AuthenticationFailed
    access: public
    bindings:
      - kind: http
        method: POST
        path: /api/auth/webauthn
        request_body: json
  SubmitBrowserRecoveryCode:
    description: "SPA JSON API から backup recovery code を第二要素として検証する。成功すれば\nLoginSession を認証完了状態に昇格させ、消費した code は再利用不可にする。\n"
    input:
      request:
        type: BrowserRecoveryCodeRequest
    output:
      response:
        type: BrowserFlowResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - UserAuthenticated
      - AuthenticationFailed
      - BackupCodeConsumed
    access: public
    bindings:
      - kind: http
        method: POST
        path: /api/auth/recovery-code
        request_body: json
  GenerateRecoveryCodes:
    description: "認証済みユーザーが backup recovery code を生成 / 再生成する (self-service, step-up 必須)。\n平文を一度だけ返し、DB には hash のみ保存する。既存 set は全置換する (count=10 件)。\n"
    output:
      codes:
        type: RecoveryCodesResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - RecoveryCodesGenerated
    annotations:
      step_up: required
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: POST
        path: /api/account/mfa/recovery-codes/generate
  RevokeRecoveryCodes:
    description: "認証済みユーザーが backup recovery code を明示的に失効する (self-service, step-up 必須)。\nsubject.id に固定し、有効な code をすべて削除する。\n"
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - RecoveryCodesRevoked
    annotations:
      step_up: required
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: POST
        path: /api/account/mfa/recovery-codes/revoke
  ListMySignInActivity:
    description: "認証済みユーザーが自身の直近サインイン履歴を取得する (self-service)。対象は\nsubject.id に固定。既存の監査イベントストア (UserAuthenticated) から発生時刻の降順で\n最大 limit 件を返す。limit 既定 10 / 上限 50。\n"
    output:
      activity:
        type: UserSignInActivityResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: GET
        path: /api/account/signin_activity
  ListUserSignInActivity:
    description: "admin が対象ユーザーのサインイン履歴を取得する。tenant 境界内に限定し、\nパス sub のユーザーの UserAuthenticated を発生時刻の降順で最大 limit 件返す。\n"
    input:
      user_id:
        type: String
    output:
      activity:
        type: UserSignInActivityResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: User
        id: input.user_id
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/users/{user_id}/signin_activity"
  ListAuthenticationEventBuckets:
    description: "admin が認証イベント集約 (bucket) を一覧する。攻撃時に個別行へ\n落とさず 5 分窓へ集約したログイン失敗などを、所属テナント境界内で window_start の\n降順に返す。limit 既定 50 / 上限 200。\n"
    output:
      buckets:
        type: AuthenticationEventBucketListResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: AuthenticationEventLog
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: /api/admin/authentication_event_buckets
  ListMySessions:
    description: "認証済みユーザーが自身の有効なセッションを取得する (self-service)。対象は\nsubject.id に固定。現在のセッションを current=true でマークし、開始時刻の降順で返す。\n"
    output:
      sessions:
        type: AccountSessionListResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: GET
        path: /api/account/sessions
  RevokeMySession:
    description: "認証済みユーザーが自身のセッション 1 件を失効する (self-service)。対象が本人の\nものでなければ拒否する。失効は LoginSession を物理削除して SSO セッションを終了する。\n"
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - SessionEnded
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: POST
        path: "/api/account/sessions/{id}/revoke"
        successful_status_codes:
          - "204"
  RevokeMyOtherSessions:
    description: "認証済みユーザーが現在のセッションを除く自身の全セッションを失効する (self-service)。\"他のセッションを全て終了\" 操作。\n"
    errors:
      - AccessDeniedError
    emits:
      - SessionEnded
    annotations:
      step_up: required
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: POST
        path: /api/account/sessions/revoke_others
        successful_status_codes:
          - "204"
  StartStepUpAuthentication:
    description: "高 sensitivity 操作の前段として step-up 再認証を開始する (self-service)。subject 本人のセッションに固定し、利用可能な factor (password 常時 / totp は\nenrolled 時) を返す。本 interface 自体には step-up を要求しない (再認証の入口のため)。\n"
    output:
      methods:
        type: StepUpStartResponse
    errors:
      - AccessDeniedError
    emits:
      - StepUpRequested
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: POST
        path: /api/account/step_up/start
        request_form: body
  CompleteStepUpAuthentication:
    description: "提示された factor (password または totp コード) を検証し、成立すればセッションに\nstep_up_at を刻む。以降 recency 窓 (5 分) 内は step_up: required の\n操作を許可する。検証失敗は AccessDeniedError。\n"
    input:
      request:
        type: StepUpCompleteRequest
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - StepUpCompleted
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: POST
        path: /api/account/step_up/complete
        request_form: body
  IssueMfaEnrollmentBypass:
    description: テナント管理者が同一テナントの MFA 未登録 active user に短期・単発の enrollment bypass を発行する。同一 user の既存未消費 bypass は取り消して置換する。ログイン免除ではなく登録専用 pending flow への承認である。
    input:
      user_id:
        type: String
      request:
        type: MfaEnrollmentBypassIssueRequest
    output:
      response:
        type: MfaEnrollmentBypassResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - MfaEnrollmentBypassIssued
      - MfaEnrollmentBypassRevoked
    access:
      policies: [TenantAdministrator]
      resource:
        type: User
        id: input.user_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/users/{user_id}/mfa-enrollment-bypass"
        request_body: json
  RevokeMfaEnrollmentBypass:
    description: テナント管理者が対象 user の未消費 enrollment bypass を取り消す。既に消費・期限切れの場合もログインを許可せず冪等に終了する。
    input:
      user_id:
        type: String
    errors:
      - AccessDeniedError
    emits:
      - MfaEnrollmentBypassRevoked
    access:
      policies: [TenantAdministrator]
      resource:
        type: User
        id: input.user_id
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/users/{user_id}/mfa-enrollment-bypass"
        successful_status_codes:
          - "204"
  RequestPasswordReset:
    description: "未認証ユーザーがパスワードリセットリンクの送信を要求する。\nanti-enumeration のため、email の存在有無に関わらず常に 204 を返し、\nverified email を持つ user が見つかった場合のみ token を発行して\nEmailSender 経由で送信する。\n"
    input:
      request:
        type: BrowserForgotPasswordRequest
    emits:
      - PasswordResetRequested
      - EmailSent
    access: public
    bindings:
      - kind: http
        method: POST
        path: /api/auth/forgot_password
        request_body: json
  ResetPasswordWithToken:
    description: "reset リンクから戻ってきたユーザーが新パスワードを設定する。\ntoken を単発消費し (期限 1800 秒、consumed_at 設定済みは再利用不可)、12〜128 文字の\n長さ制約と直近 history_depth (5) 件のハッシュとの不一致 (PasswordHistoryNoReuse) を\n通過した new_password で User.password_hash を更新する。成功時 PasswordChanged を emit。\n"
    input:
      request:
        type: BrowserResetPasswordRequest
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - PasswordChanged
    requires:
      - size(input.request.new_password) >= 12
      - size(input.request.new_password) <= 128
      - "!passwordResetTokenConsumed(input.request.token)"
      - "!passwordHistoryContainsForToken(input.request.token, input.request.new_password)"
    access: public
    bindings:
      - kind: http
        method: POST
        path: /api/auth/reset_password
        request_body: json
authorization:
  resources:
    AuthenticationEventLog:
      description: テナント境界内の認証イベント集約 (bucket) 一覧を表す singleton resource。
  principals:
    AuthenticatedSelf:
      type: User
      matches:
        - context.authenticated
        - principal.status == "Active"
    TenantAdministrator:
      type: User
      matches:
        - context.authenticated
        - principal.status == "Active"
        - '"admin" in principal.roles'
  policies:
    AuthenticatedSelf:
      effect: permit
      principal: AuthenticatedSelf
      when: principal.id == resource.id
    TenantAdministrator:
      effect: permit
      principal: TenantAdministrator
      when: principal.tenant_id == resource.tenant_id
objectives:
  LoginLatency:
    description: /api/auth/login 応答の99%以上を300ms未満で返す。
    interface: SubmitBrowserLogin
    indicator: measurement.latency < duration("300ms")
    target: 0.99
    window: 30d
    budgeting: occurrences
  LoginErrorRate:
    description: /api/auth/login 応答を規定の非5xx成功率以上で返す。認証情報不一致やthrottleは4xxで表現し5xxに含めない。
    interface: SubmitBrowserLogin
    indicator: measurement.status_code < 500
    target: 0.999
    window: 30d
    budgeting: occurrences
scenarios:
  browser bootstrap contextは認証状態とCSRF境界を保持する:
    actor: AuthenticatedSelf
    given:
      - ユーザー "alice" が認証済み session を持つ
    main_success:
      - ユーザー "alice" が account context を取得する
      - 応答は subject、realm、effective role、CSRF token を含む
      - 未認証のパスワードリセット画面は password reset context から CSRF token を取得できる
    extensions:
      - at: 1
        condition: session が未認証または認証途中である
        steps:
          - account context の取得は AccessDeniedError で拒否される
  ユーザーはWebAuthnでstep-up challengeを開始できる:
    actor: AuthenticatedSelf
    given:
      - ユーザー "alice" が WebAuthn credential を登録済みで認証済み session を持つ
    main_success:
      - ユーザー "alice" が正しい CSRF token で step-up WebAuthn challenge を要求する
      - 応答の PublicKeyCredentialRequestOptions は現在 session に束縛される
    extensions:
      - at: 1
        condition: CSRF token が一致しない、または WebAuthn が利用不能である
        steps:
          - challenge は発行されず要求は拒否される
  ResourceOwnerはブラウザでパスワード認証し認可を継続する:
    actor: ResourceOwner
    given:
      - "未認証セッションで \"web-app\" として認可リクエストを送信済みである"
    main_success:
      - "browser login API に username \"alice\" と正しい password を送信する"
      - セッション Cookie が発行される
      - 認可コードが redirect_uri に返る
      - "\"UserAuthenticated\" が発行される"
    extensions:
      - at: 1
        condition: SameSite cookie と request token が一致しない
        steps:
          - csrf 値を改ざんして browser login API を送信する
          - "エラー \"InvalidRequestError\""
      - at: 1
        condition: 直近 900 秒窓で per-account の失敗回数が 10 回に達している
        steps:
          - "正しい password で browser login API を送信する"
          - "エラー \"AccessDeniedError\""
          - "\"LoginThrottled\" が発行される"
  無効化されたユーザーは新規ログインも既存セッションも拒否される:
    actor: TenantAdministrator
    given:
      - "ユーザー \"alice\" が認証済みセッションを持つ"
    main_success:
      - "管理者がユーザー \"alice\" を無効化する"
      - "ユーザー \"alice\" が既存セッションで認証必須 API を呼ぶ"
      - "エラー \"AccessDeniedError\""
    extensions:
      - at: 2
        condition: 無効化済みユーザーが新規ログインを試みる
        steps:
          - "ユーザー \"alice\" が正しい password で browser login API を送信する"
          - "エラー \"AccessDeniedError\""
  ユーザーは現在のパスワードを確認して新しいパスワードへ変更できる:
    actor: AuthenticatedSelf
    given:
      - "ユーザー \"alice\" が認証済みでパスワード変更画面を開いている"
    main_success:
      - "ユーザー \"alice\" が正しい現在のパスワードと新しいパスワードを送信する"
      - パスワードが変更され password_changed_at が更新される
      - "\"PasswordChanged\" が発行される"
    extensions:
      - at: 1
        condition: 新しいパスワードが 12 文字未満である
        steps:
          - "ユーザー \"alice\" が 12 文字未満のパスワードを送信する"
          - "エラー \"InvalidRequestError\""
      - at: 1
        condition: 新しいパスワードが直近 5 件の履歴に一致する
        steps:
          - "ユーザー \"alice\" が直近使用した過去のパスワードを新パスワードとして送信する"
          - "エラー \"InvalidRequestError\""
  ユーザーはTOTP factorを登録して有効化できる:
    actor: AuthenticatedSelf
    given:
      - "ユーザー \"alice\" が認証済みでセキュリティ画面を開いている"
    main_success:
      - "ユーザー \"alice\" が TOTP 登録を開始する"
      - 応答に secret と account_name が含まれる
      - "ユーザー \"alice\" がその secret に対する正しいコードで登録を確認する"
      - セキュリティ概要の MFA 状態が登録済みになる
      - "\"MfaFactorEnrolled\" が発行される"
  ユーザーはstep-up再認証のうえでTOTP factorを解除する:
    actor: AuthenticatedSelf
    given:
      - "ユーザー \"alice\" が登録済み TOTP factor を持ち認証済みである"
    main_success:
      - "ユーザー \"alice\" が step-up を成立させ現在の TOTP コードで解除する"
      - TOTP factor が解除される
      - "\"MfaFactorRemoved\" が発行される"
    extensions:
      - at: 1
        condition: step-up なしで解除を試みる
        steps:
          - "ユーザー \"alice\" が step-up なしで TOTP factor の解除を試みる"
          - step-up 再認証が要求される
  ユーザーは自分の有効なセッションを一覧して失効できる:
    actor: AuthenticatedSelf
    given:
      - "ユーザー \"alice\" が複数の有効なセッションを持ち認証済みである"
    main_success:
      - "ユーザー \"alice\" がアクティビティ画面でセッション一覧を取得する"
      - "ユーザー \"alice\" が現在以外のセッションを 1 件失効させる"
      - 失効したセッションは一覧から消える
      - "ユーザー \"alice\" が現在以外のすべてのセッションを一括失効させる"
      - 現在のセッションだけが残る
  ユーザーは自分のサインイン履歴を確認できる:
    actor: AuthenticatedSelf
    given:
      - "ユーザー \"alice\" が認証済みでアクティビティ画面を開いている"
    main_success:
      - "ユーザー \"alice\" が自分のサインイン履歴を取得する"
      - 応答に自分のサインインイベントだけが含まれる
      - 第二要素を使ったサインインは、pwd と第二要素の amr を含む完了後の UserAuthenticated として表示される
    extensions:
      - at: 1
        condition: 認証手段に WebAuthn が含まれる
        steps:
          - UI は webauthn という技術名ではなく「パスキー」と表示する
  MFA登録済みユーザーでもポリシーが要求しない限り第二要素を求められない:
    actor: EndUser
    given:
      - "ユーザー \"alice\" は TOTP または WebAuthn credential を登録済みである"
      - 対象 Application の実効サインインポリシーは Password である
    main_success:
      - "ユーザー \"alice\" がユーザー名とパスワードを送信する"
      - LoginSession は authentication_pending=false で作られる
      - 認可フローは第二要素画面に進まず、同意または認可コード発行へ進む
    extensions:
      - at: 1
        condition: 対象 Application の実効サインインポリシーが Mfa である
        steps:
          - LoginSession は authentication_pending=true へ切り替わる
          - 利用可能な第二要素 (TOTP / パスキー / リカバリコード) の選択画面へ進む
  ユーザーはメールのリセットリンクでパスワードを再設定する:
    actor: EndUser
    given:
      - "ユーザー \"alice\" 宛に有効なパスワードリセットトークンが発行されている"
    main_success:
      - "ユーザー \"alice\" がそのトークンと新しいパスワードを送信する"
      - パスワードが更新される
      - "ユーザー \"alice\" が新しいパスワードで browser login API に成功する"
    extensions:
      - at: 1
        condition: トークンが期限切れまたは不正である
        steps:
          - 無効なパスワードリセットトークンで新しいパスワードを送信する
          - "エラー \"InvalidRequestError\""
      - at: 1
        condition: リセット要求はアカウントの存在を漏らさない
        steps:
          - パスワード再設定画面で未登録のメールアドレスを送信する
          - 応答は登録済みアドレスと区別できない
          - パスワード再設定画面で登録済みのメールアドレスを送信する
          - 登録済みアドレスへリセットリンクが送られる
  TOTP必須ユーザーは正しいコードで認証を継続できる:
    actor: EndUser
    given:
      - TOTP factor が登録された authentication_pending の LoginSession が存在する
    main_success:
      - browser TOTP API に正しいコードを送信する
      - 認証が成立し認可フローが継続する
      - "\"UserAuthenticated\" が発行される"
    extensions:
      - at: 1
        condition: 誤った TOTP コードを送信する
        steps:
          - browser TOTP API に誤ったコードを送信する
          - "エラー \"InvalidRequestError\""
          - LoginSession は authentication_pending のままである
  MFA未登録ユーザーは管理者承認済みオンボーディングを完了して同じ認可処理を継続できる:
    actor: EndUser
    given:
      - 対象 Application の実効ポリシーは MFA 必須で強制開始済み、enrollment bypass を許可し猶予期限内である
      - user は TOTP / WebAuthn factor を持たない
      - 管理者が対象 user に有効な単発 enrollment bypass を発行済みである
    main_success:
      - user が正しい password を送信する
      - bypass は消費され、同一 LoginSession は pending_purpose=Enrollment の未完了状態になる
      - MfaEnrollmentRequired と MfaEnrollmentBypassConsumed が発行され、登録専用画面へ進む
      - user が TOTP secret に対する正しい code で登録を確定する
      - factor が保存され、同一 LoginSession に otp が追加されて pending が解除される
      - MfaEnrollmentCompleted と UserAuthenticated が発行され、元の authorization transaction が継続する
    extensions:
      - at: 1
        condition: enrollment bypass が無い、取消済み、消費済み、または期限切れである
        steps:
          - password が正しくてもログインを完了せず access denied にする
          - factor 登録 API は利用できない
      - at: 4
        condition: enrollment deadline を過ぎている
        steps:
          - factor を保存せず access denied にする
          - LoginSession を認証完了へ昇格させない
      - at: 4
        condition: TOTP code が不正である
        steps:
          - factor を保存せず InvalidRequestError を返す
          - LoginSession は Enrollment pending のままである
  MFA強制開始前の未登録ユーザーはログインできるが登録を促される:
    actor: EndUser
    given:
      - テナントデフォルトポリシーは将来時刻から MFA 必須になる
      - user は MFA factor を持たない
    main_success:
      - user が正しい password でログインする
      - 強制開始前なので password session は成立する
      - UI は強制開始日時と事前登録を促す警告を表示する
      - user は通常の step-up を経た account security から factor を事前登録できる
  Enrollment pendingセッションは通常リソースへアクセスできない:
    actor: EndUser
    given:
      - pending_purpose=Enrollment の LoginSession が存在する
    main_success:
      - user が account、admin、Application の resource を要求する
      - システムは未認証として拒否する
      - 登録専用 start / confirm API と元の auth transaction だけを許可する
flows:
  Login:
    entry: Login
    views:
      Login:
        sees: ログイン画面(ユーザー名入力フォーム、パスワード入力フォーム)
        does:
          - action: submit
            does: ユーザー名とパスワードを入力して、ログインボタンをクリックする
            interface: SubmitBrowserLogin
            to: Totp
          - action: submit_enrollment_required
            does: ユーザー名とパスワードを入力して、ログインボタンをクリックする(MFA 未登録のため登録へ進む)
            interface: SubmitBrowserLogin
            to: MfaEnrollment
          - action: submit_and_consent_required
            does: ユーザー名とパスワードを入力して、ログインボタンをクリックする(MFA 不要のためそのまま認可へ進む)
            interface: SubmitBrowserLogin
            external: true
          - action: forgot_password_selected
            does: パスワードを忘れた場合のリンクをクリックする
            to: ForgotPassword
  Totp:
    entry: Totp
    views:
      Totp:
        sees: TOTP コード入力画面
        does:
          - action: submit
            does: 認証アプリに表示された6桁のコードを入力して、確認ボタンをクリックする
            interface: SubmitBrowserTotp
            external: true
  MfaEnrollment:
    entry: MfaEnrollment
    views:
      MfaEnrollment:
        sees: MFA 登録画面(TOTP QR コード表示、確認コード入力フォーム)
        does:
          - action: start_totp
            does: 画面を開いて TOTP 登録用の QR コードを表示する
            interface: StartBrowserMfaEnrollment
            to: MfaEnrollment
          - action: confirm_totp
            does: 表示された QR コードを認証アプリで読み取り、確認コードを入力して登録を確定する
            interface: ConfirmBrowserMfaEnrollment
            external: true
  PasswordReset:
    entry: ForgotPassword
    views:
      ForgotPassword:
        sees: パスワード再設定申請画面(メールアドレス入力フォーム)
        does:
          - action: submit
            does: メールアドレスを入力して、送信ボタンをクリックする
            interface: RequestPasswordReset
            to: ResetPassword
      ResetPassword:
        sees: パスワード再設定画面(新しいパスワード入力フォーム)
        does:
          - action: submit
            does: メールで届いたリンクから開き、新しいパスワードを入力して、再設定ボタンをクリックする
            interface: ResetPasswordWithToken
            to: Login
  AccountSecurity:
    entry: AccountSecurity
    views:
      AccountSecurity:
        sees: アカウントセキュリティ画面(パスワード変更日時、MFA(TOTP)登録状態)
        does:
          - action: view
            does: 画面を開く
            interface: GetAccountSecurity
            to: AccountSecurity
          - action: change_password_selected
            does: パスワードを変更するリンクをクリックする
            to: ChangePassword
          - action: enroll_totp
            does: TOTP を登録するボタンをクリックする
            interface: StartTotpEnrollment
            to: AccountSecurity
          - action: confirm_totp
            does: 表示された QR コードを認証アプリで読み取り、確認コードを入力して登録を確定する
            interface: ConfirmTotpEnrollment
            to: AccountSecurity
          - action: remove_totp
            does: 有効な TOTP コードを入力して、TOTP を解除するボタンをクリックする
            interface: RemoveTotpFactor
            to: AccountSecurity
          - action: start_step_up
            does: 再認証を開始するボタンをクリックする
            interface: StartStepUpAuthentication
            to: AccountSecurity
          - action: complete_step_up
            does: パスワードまたは TOTP コードを入力して、再認証を完了する
            interface: CompleteStepUpAuthentication
            to: AccountSecurity
  ChangePassword:
    entry: ChangePassword
    views:
      ChangePassword:
        sees: パスワード変更画面(現在のパスワード入力フォーム、新しいパスワード入力フォーム)
        does:
          - action: submit
            does: 現在のパスワードと新しいパスワードを入力して、変更ボタンをクリックする
            interface: ChangePassword
            to: AccountSecurity
  AccountActivity:
    entry: AccountActivity
    views:
      AccountActivity:
        sees: アカウントアクティビティ画面(有効なセッション一覧、直近サインイン履歴)
        does:
          - action: list_sessions
            does: 画面を開く
            interface: ListMySessions
            to: AccountActivity
          - action: revoke_session
            does: セッションを1件選んで、終了するボタンをクリックする
            interface: RevokeMySession
            to: AccountActivity
          - action: revoke_other_sessions
            does: 他のセッションをすべて終了するボタンをクリックする
            interface: RevokeMyOtherSessions
            to: AccountActivity
          - action: list_signin_activity
            does: サインイン履歴タブを開く
            interface: ListMySignInActivity
            to: AccountActivity
