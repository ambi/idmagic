# idmagic IdentityManagement — SCL
# Migrated to SCL 3.0 by wi-209 (ADR-103).

system: idmagic
spec_version: "3.0"
context: IdentityManagement
glossary:
  Administrator:
    definition: User.roles に admin を持ち、所属テナント内の管理 API を許可された認証済みユーザー。テナント境界を越える操作は SystemAdministrator に限定される。
    aliases:
      - admin
      - 管理者
      - TenantAdmin
    not_to_confuse_with:
      - term: Client
        reason: Administrator は人間の User に付与されるロールであり、OAuth Client の権限ではない。
      - term: SystemAdministrator
        reason: Administrator はテナント内に閉じ、SystemAdministrator はテナント境界を越えて tenant lifecycle 操作と cross-tenant 管理を行える。
  SystemAdministrator:
    definition: "User.roles に system_admin を持つ認証済みユーザー。テナント管理 (CRUD・disable・enable) と cross-tenant 操作を許可され、system_admin 専用のシステムコンソール (/system) から `/api/admin/tenants/*` や `/api/admin/keys/health` を呼び出せる。テナント境界を越えるため path ではなく role でゲートする。"
    aliases:
      - system_admin
      - システム管理者
  EndUser:
    definition: 認証済みまたは認証を試みる一般利用者。管理ロールを持たない自己サービス操作 (account portal) の主体。
    aliases:
      - end user
      - 利用者
      - エンドユーザー
    not_to_confuse_with:
      - term: Administrator
        reason: EndUser は自身のアカウントだけを扱う。Administrator はテナント内の他ユーザーを管理する。
  UserDisablement:
    definition: User.status を Disabled に遷移させて認証とセッション利用を停止する復活可能な管理操作。削除や PII purge とは異なる。
    aliases:
      - disable user
  UserImport:
    definition: 管理者が UTF-8 CSV を使ってユーザーを検証または作成する非同期操作。CSV は preferred_username,email,name,roles ヘッダーを持ち、パスワードや password_hash を含めない。
    aliases:
      - CSV user import
      - bulk user import
      - ユーザー一括インポート
      - アカウント無効化
  UserDeletion:
    definition: "User の tombstone 化と関連 aggregate の cascade 削除。`status` を Deleted に遷移させ PII フィールドを匿名化、`id` のみを audit のため保持する。`Deleted` は終端で復元できない。"
    aliases:
      - delete user
      - anonymize user
      - アカウント削除
    not_to_confuse_with:
      - term: UserDisablement
        reason: Disable は復活可能で PII を残す。Delete は終端で PII を即時 anonymize する。
  Deleted:
    definition: "User の終端状態。`status == Deleted` で PII が anonymize 済み。login / token / userinfo は active=false 相当。"
    aliases:
      - deleted
  Delete:
    definition: User を Deleted に遷移させる管理操作。tombstone 化と cascade を 1 オペレーションで実施する。
    aliases:
      - delete
  PendingDeletion:
    definition: "User の削除予約状態。`status == PendingDeletion` で PII は温存されるが認証は Disabled と同じく拒否される。猶予期間 (states.UserLifecycle の PendingDeletion → Deleted 遷移 guard) 内なら Restore で Active に戻せ、経過すると Purge で Deleted (anonymize) に落ちる。"
    aliases:
      - pending_deletion
      - 削除予約中
  SoftDelete:
    definition: User を Active / Disabled から PendingDeletion に遷移させる管理操作。PII / Consent / RefreshToken / Session を残したまま削除を予約し、誤操作を 猶予期間内で救済できる。
    aliases:
      - soft_delete
      - soft-delete
  Restore:
    definition: PendingDeletion の User を Active に戻す管理操作。猶予期間内でのみ可能で、PII や credential は温存されているためログインは通常どおり再開する。
    aliases:
      - restore
  Purge:
    definition: User を Active / Disabled / PendingDeletion から Deleted に遷移させる確定削除操作。ADR-036 の anonymize cascade を実行し、猶予期間経過後の自動 purge と admin の明示的完全削除の双方から呼ばれる。
    aliases:
      - purge
  Group:
    definition: "tenant-scoped 集約。再利用可能なロール束 (roles[]) を持ち、所属する User にそのロールを一斉付与する。階層・deny ルール・属性自動所属は持たない (union のみ)。"
    aliases:
      - group
      - グループ
      - role group
      - ロールグループ
    not_to_confuse_with:
      - term: Tenant
        reason: Tenant は認可境界、Group はその境界内のロール束。Group は単独で認証境界を成さない。
  GroupMembership:
    definition: User と Group の所属関係 (GroupMember)。manual は管理者操作、dynamic は有効な CEL rule の評価結果だけから変更される。effective_roles(user) = user.roles ∪ ⋃ membership.group.roles。
    aliases:
      - group membership
      - グループ所属
      - membership
  DynamicGroupRule:
    definition: User の core 属性と TenantUserAttributeSchema で定義された属性だけを参照し、所属可否を Boolean で返す制限 CEL 式。rule version が一致する dynamic membership だけが有効になる。
    aliases:
      - dynamic membership rule
      - 動的グループルール
  EffectiveRoles:
    definition: 認可判断で用いる User の有効ロール集合。user.roles と所属 Group の roles の和集合。admin RBAC ゲートと /account 自己コンテキストで参照する。
    aliases:
      - effective roles
      - 有効ロール
  Agent:
    definition: tenant-scoped な非人間 (non-human) identity principal。自身の資格情報は持たず、AgentCredentialBinding で既存 OAuth2Client に束縛してトークンを得る。owner (所有者 User の id) は必須。
    aliases:
      - agent
      - エージェント
      - AI agent
      - non-human identity
    not_to_confuse_with:
      - term: User
        reason: User は人間 identity。Agent は非人間 identity で owner User を必須に持つ。
      - term: OAuth2Client
        reason: OAuth2Client はアプリ登録 (資格情報の器)、Agent は identity principal。Agent は Client を束縛して稼働するが Client そのものではない。
  Killed:
    definition: Agent の緊急停止 (kill-switch) による一方向終端状態。Killed からは復帰できず、新規トークンを一切発行しない (fail-closed)。
    aliases:
      - killed
  DisableAgent:
    definition: "Agent を Active から Disabled に遷移させる可逆な運用停止。`/api/admin/agents/{agent_id}/disable` から発火。"
    aliases:
      - disable agent
  EnableAgent:
    definition: "Disabled の Agent を Active に戻す。`/api/admin/agents/{agent_id}/enable` から発火。"
    aliases:
      - enable agent
  KillAgent:
    definition: "Agent を Killed (一方向終端) に遷移させる緊急停止。`/api/admin/agents/{agent_id}/kill` から発火し、以後復帰不能。"
    aliases:
      - kill agent
  Autonomous:
    definition: Agent が人間の都度承認なしに自律実行する区分。
    aliases:
      - autonomous
  Supervised:
    definition: Agent が人間の監督下で実行する区分。
    aliases:
      - supervised
  LifecycleWorkflow:
    definition: "テナント管理者が事前定義する、User の作成・属性変更・status 遷移を trigger として\n構造化 action を実行する定義。draft / enabled / disabled / archived のライフサイクルを持ち、\nenable された revision だけが新規 WorkflowRun を生成する。DAG や条件分岐は持たず、action は\n定義順の線形 list。\n"
    aliases:
      - lifecycle workflow
      - ライフサイクルワークフロー
    not_to_confuse_with:
      - term: DynamicGroupRule
        reason: DynamicGroupRule は Group 所属だけを CEL 式で決める単一目的の rule。LifecycleWorkflow は複数種の trigger と action からなる汎用の構造化 workflow で、Group 割当はその action の一種にすぎない。
  WorkflowTrigger:
    definition: "LifecycleWorkflow の revision が固定する発火条件。user_created / user_attributes_changed /\nuser_status_changed のいずれかの kind と、0〜20 件の型付き filter (field/operator/value の\nAND) からなる。評価は User mutation の post-state に対して行い、属性変更の before/after 判定\nだけは mutation 差分を使う。\n"
    aliases:
      - workflow trigger
      - トリガー
  WorkflowAction:
    definition: "WorkflowRun が展開する desired-state 操作 1 件。add_group_member / remove_group_member /\nassign_application / unassign_application / set_required_action / clear_required_action /\nenable_user / disable_user / send_email のいずれかで、既に目的状態なら no_op として扱う\n冪等な操作。\n"
    aliases:
      - workflow action
      - アクション
  WorkflowRun:
    definition: "WorkflowTrigger の発火 1 回から生成される実行単位。作成時の workflow_id、revision、\ntrigger occurrence、対象 user、展開済み action list を固定し、後から definition が変わっても\n意味が変わらない。Jobs の lifecycle_workflow_run Job に紐付いて実行される。\n"
    aliases:
      - workflow run
      - ワークフロー実行
  WorkflowStep:
    definition: "WorkflowRun 内の action 1 件分の実行記録。outcome (changed / no_op / failed / canceled) と\nsanitised error code、実行時刻を checkpoint する。retry は failed step だけを再実行し、\nchanged / no_op 済み step は飛ばす。\n"
    aliases:
      - workflow step
      - ステップ
models:
  GroupMembershipType:
    kind: enum
    description: Group の所属管理方式。作成後は変更できない。
    values: [manual, dynamic]
  GroupMembershipSource:
    kind: enum
    description: GroupMember を作成した唯一の経路。
    values: [manual, dynamic_rule]
  DynamicMembershipEvaluationStatus:
    kind: enum
    description: rule version 単位の全件再評価状態。
    values: [queued, running, succeeded, failed]
  UserStatus:
    kind: enum
    description: User の運用状態の唯一の真実。状態機械 UserLifecycle (Active / Disabled / PendingDeletion / Deleted) と一致し、Okta lifecycle_state / Keycloak 相当の Locked / Staged / Suspended を追加する。Active 以外は認証不可、PendingDeletion は 猶予期間内に復元可能な削除予約、Deleted は終端 (tombstone)。「いつ遷移したか」は監査イベントと status_changed_at が持つ。
    values:
      - Active
      - Disabled
      - PendingDeletion
      - Deleted
      - Locked
      - Staged
      - Suspended
  RequiredAction:
    kind: enum
    description: 次回ログイン時にユーザへ強制するアクション (Keycloak Required Actions / Okta transitioning 相当)。
    values:
      - UpdatePassword
      - VerifyEmail
      - ConfigureTotp
      - UpdateProfile
      - TermsAndConditions
  AssignmentVisibility:
    kind: enum
    description: 割当の可視性。hidden はポータル一覧から除外するがプロトコル利用は許可する。Application context が所有する定義の published language stub。
    values:
      - visible
      - hidden
  AgentStatus:
    kind: enum
    description: Agent の運用状態。Active は通常稼働、Disabled は可逆な運用停止、Killed は緊急停止 (一方向終端)。Active 以外は新規トークンを発行しない (fail-closed)。
    values:
      - Active
      - Disabled
      - Killed
  AgentKind:
    kind: enum
    description: Agent の自律性区分。Autonomous は自律実行、Supervised は人間の監督下で実行する。
    values:
      - Autonomous
      - Supervised
  InvalidRequestError:
    kind: error
    description: リクエストに必須パラメータの欠落・不正値・重複等がある (RFC 6749 §5.2 invalid_request)。OAuth2 context が定義する共通 error の published language stub。
    payload:
      reason:
        type: String
        optional: true
  AccessDeniedError:
    kind: error
    description: 認証済みだが認可条件を満たさない、またはサーバーポリシーが許可しなかった (RFC 6749 §4.1.2.1 access_denied)。OAuth2 context が定義する共通 error の published language stub。
  AttributeType:
    kind: enum
    description: 属性値の sum type discriminator。Tenancy context が所有する定義の published language stub。
    values:
      - String
      - Number
      - Boolean
      - Date
      - StringArray
  UserAttributeDef:
    kind: value_object
    description: 属性 1 件の定義。Tenancy context が所有する BuiltinUserAttributeDefs / TenantUserAttributeSchema の published language stub。
    fields:
      key:
        type: String
        constraints:
          - non_empty
          - pattern: "^[a-z][a-z0-9_]{0,62}$"
      label:
        type: String
        optional: true
        constraints:
          - max_length: 100
      type:
        type: AttributeType
      multi_valued:
        type: Boolean
        default: false
      required:
        type: Boolean
        default: false
      editable_by_user:
        type: Boolean
        default: false
      claim_name:
        type: String
        optional: true
      oidc_scope:
        type: String
        optional: true
      visibility:
        type: String
        default: Private
      pii:
        type: Boolean
        default: true
  AccountConsentResponse:
    kind: value_object
    description: "end-user の「接続済みアプリ」1 件の projection。OAuth2 context が所有する定義の\npublished language stub (ExportAccountData の入れ子表現専用)。\n"
    fields:
      client_id:
        type: String
      client_name:
        type: String
      scopes:
        type: "String[]"
      state:
        type: String
      granted_at:
        type: DateTime
      expires_at:
        type: DateTime
  User:
    kind: entity
    description: "IdP の最小コア。識別・認証・表示名・RBAC・ライフサイクルだけを\n型付きで持つ。それ以外のプロフィール属性 (OIDC §5.1 optional claim / 組織属性 /\ntenant 定義 custom) は attributes に sparse に格納し、テナントが実際に使う属性\nだけが領域を消費する。effective_roles (direct roles ∪ 所属 Group の roles) は\nGroup 集約にまたがる導出値のため本 entity のフィールドとしては持たず、\nUserGroupsResponse.effective_roles に投影する (models.User.constraints では\n表現できない、Group を参照する combination)。\n"
    identity: id
    fields:
      id:
        type: String
        constraints:
          - non_empty
        description: "User の canonical な domain 識別子。global 一意で tenant 跨ぎでも衝突しない。\nprotocol 境界ではこの id を写像して表現する: OIDC `sub` claim / SAML NameID /\nWS-Fed subject / SCIM リソース参照。protocol vocabulary (`sub` 等) を storage identity\nとして露出させない。pairwise subject など写像を差し替える場合も id 自体は不変。\n"
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。preferred_username の一意性スコープを決める。
      preferred_username:
        type: String
        constraints:
          - non_empty
          - max_length: 100
        annotations:
          pii: true
      password_hash:
        type: String
        annotations:
          sensitive: true
      name:
        type: String
        optional: true
        annotations:
          pii: true
      given_name:
        type: String
        optional: true
        annotations:
          pii: true
      family_name:
        type: String
        optional: true
        annotations:
          pii: true
      email:
        type: String
        optional: true
        constraints:
          - format: email
        annotations:
          pii: true
      email_verified:
        type: Boolean
        default: false
      mfa_enrolled:
        type: Boolean
        default: false
      roles:
        type: "String[]"
        default:
          []
        description: RBAC ロール名の集合 (重複なし)。値 admin を持つ user だけが /admin/* を呼べる。空配列は通常ユーザ。
      lifecycle:
        type: UserLifecycle
        description: 運用ライフサイクル (status / 各時刻 / required_actions)。status が無効化・削除の唯一の真実。
      attributes:
        type: "Map<String,AttributeValue>"
        optional: true
        description: OIDC optional claim / 組織属性 / custom を統合した sparse 属性。BuiltinUserAttributeDefs + TenantUserAttributeSchema に対して検証する。
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
        description: 作成時は created_at と同じ値を持ち、以後 User aggregate の管理・自己変更操作ごとに更新する。
  UserLifecycle:
    kind: value_object
    description: "User の運用ライフサイクル属性。status は状態機械 UserLifecycle\n(states セクション) と一致する唯一の真実で、旧 disabled_at / deleted_at は\nstatus + status_changed_at に統合した。tombstone は status == Deleted。\n"
    fields:
      status:
        type: UserStatus
        default: Active
      status_changed_at:
        type: DateTime
        optional: true
        description: 現在の status になった時刻。詳細な遷移履歴は監査イベントが持つ。
      last_login_at:
        type: DateTime
        optional: true
      password_changed_at:
        type: DateTime
        optional: true
      required_actions:
        type: "RequiredAction[]"
        optional: true
  AttributeValue:
    kind: value_object
    description: 属性 1 件の値 (sum type)。type が示すフィールドだけが設定される。OIDC 組み込み属性と tenant 定義 custom で共通。
    fields:
      type:
        type: AttributeType
      string:
        type: String
        optional: true
        annotations:
          pii: true
      number:
        type: Float
        optional: true
      boolean:
        type: Boolean
        optional: true
      date:
        type: String
        optional: true
      string_array:
        type: "String[]"
        optional: true
        annotations:
          pii: true
  AdminUserCreateRequest:
    kind: value_object
    description: 管理者がユーザーを作成する JSON リクエスト。初期パスワードには Authentication context の PasswordPolicy を適用する。
    fields:
      preferred_username:
        type: String
        constraints:
          - non_empty
          - max_length: 100
        annotations:
          pii: true
      password:
        type: String
        annotations:
          sensitive: true
      name:
        type: String
        optional: true
        annotations:
          pii: true
      email:
        type: String
        optional: true
        constraints:
          - format: email
        annotations:
          pii: true
      email_verified:
        type: Boolean
        default: false
      roles:
        type: "String[]"
        default:
          []
  AdminUserUpdateRequest:
    kind: value_object
    description: 管理者がユーザーの可変プロフィールとロールを更新する JSON リクエスト。id と password_hash は変更しない。
    fields:
      preferred_username:
        type: String
        optional: true
        constraints:
          - non_empty
          - max_length: 100
        annotations:
          pii: true
      name:
        type: String
        optional: true
        annotations:
          pii: true
      email:
        type: String
        optional: true
        constraints:
          - format: email
        annotations:
          pii: true
      email_verified:
        type: Boolean
        optional: true
      roles:
        type: "String[]"
        optional: true
  AdminUserListResponse:
    kind: value_object
    description: 管理 API のユーザー一覧。
    fields:
      users:
        type: "AdminUserResponse[]"
  AdminUserResponse:
    kind: value_object
    description: 管理 API が返すユーザー表現。password_hash は契約上含めない。
    fields:
      id:
        type: String
      tenant_id:
        type: String
        description: 所属テナント ID。
      preferred_username:
        type: String
        annotations:
          pii: true
      name:
        type: String
        optional: true
        annotations:
          pii: true
      email:
        type: String
        optional: true
        constraints:
          - format: email
        annotations:
          pii: true
      email_verified:
        type: Boolean
      mfa_enrolled:
        type: Boolean
      roles:
        type: "String[]"
      required_actions:
        type: "RequiredAction[]"
        optional: true
        description: 次回ログイン時の強制アクション。
      last_login_at:
        type: DateTime
        optional: true
        description: 直近の認証完了時刻。
      password_changed_at:
        type: DateTime
        optional: true
        description: 直近のパスワード変更時刻。
      disabled_at:
        type: DateTime
        optional: true
        description: "旧世代の無効化時刻フィールド。User.lifecycle.status + status_changed_at が唯一の真実であり、本フィールドは現状レスポンス後方互換のためだけに残る (別途整理が必要な既存ギャップ、本移行のスコープ外)。"
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
        description: 作成時は created_at と同じ値を持ち、以後管理操作ごとに更新する。
  AdminRequiredActionRequest:
    kind: value_object
    description: SetUserRequiredAction の JSON リクエスト。action は RequiredAction enum の wire 値。
    fields:
      action:
        type: RequiredAction
  AccountProfileResponse:
    kind: value_object
    description: "`/api/account/profile` の返り値 (self-service)。呼び出しユーザ自身の表示用\nprojection。attributes は self が読める分 (self_readable / claim_exposed) のみ、\neditable_attributes は editable_by_user=true の定義一覧で、UI のフォーム描画に使う。\n"
    fields:
      id:
        type: String
      preferred_username:
        type: String
        annotations:
          pii: true
      name:
        type: String
        optional: true
        annotations:
          pii: true
      given_name:
        type: String
        optional: true
        annotations:
          pii: true
      family_name:
        type: String
        optional: true
        annotations:
          pii: true
      email:
        type: String
        optional: true
        constraints:
          - format: email
        annotations:
          pii: true
      email_verified:
        type: Boolean
      mfa_enrolled:
        type: Boolean
      status:
        type: UserStatus
      attributes:
        type: "Map<String,AttributeValue>"
      editable_attributes:
        type: "UserAttributeDef[]"
  AccountProfileUpdateRequest:
    kind: value_object
    description: "self-service プロフィール更新リクエスト。表示名と editable_by_user=true の属性\nのみを受け付ける。attributes は key 単位の merge (指定 key のみ upsert、未指定は\n現状維持) で、admin 管理属性 (status / roles / organization) は対象外。\n"
    fields:
      name:
        type: String
        optional: true
        annotations:
          pii: true
      given_name:
        type: String
        optional: true
        annotations:
          pii: true
      family_name:
        type: String
        optional: true
        annotations:
          pii: true
      attributes:
        type: "Map<String,AttributeValue>"
        optional: true
  UserImportJob:
    kind: value_object
    description: CSV ユーザーインポートジョブの公開ビュー。結果は行番号と stable error code を持ち、入力の password/hash は保存しない。
    fields:
      id:
        type: String
      status:
        type: String
      mode:
        type: String
      total_rows:
        type: Integer
      accepted_rows:
        type: Integer
      rejected_rows:
        type: Integer
      errors:
        type: "UserImportRowError[]"
        optional: true
  UserImportRowError:
    kind: value_object
    description: CSV の 1 行に対する安全な検証または適用エラー。値そのものは返さず、列名と stable code のみを返す。
    fields:
      row:
        type: Integer
      column:
        type: String
      code:
        type: String
  AccountSummary:
    kind: value_object
    description: "`/api/account/summary` の返り値 (end-user account portal のホーム)。呼び出し\nユーザ自身のアカウント概要で、admin shell 用の AccountContext (/api/auth/account)\nとは別契約。roles は含めず、最終ログイン・パスワード変更日時・MFA 状態・未対応の\nrequired actions を portal home の summary card 用に返す。\n"
    fields:
      id:
        type: String
      preferred_username:
        type: String
        annotations:
          pii: true
      name:
        type: String
        optional: true
        annotations:
          pii: true
      email:
        type: String
        optional: true
        constraints:
          - format: email
        annotations:
          pii: true
      email_verified:
        type: Boolean
      mfa_enrolled:
        type: Boolean
      status:
        type: UserStatus
      last_login_at:
        type: DateTime
        optional: true
      password_changed_at:
        type: DateTime
        optional: true
      required_actions:
        type: "RequiredAction[]"
  AccountEmailChangeRequest:
    kind: value_object
    description: "primary email 変更の起票リクエスト (self-service)。新アドレスへ確認リンクを\n送るだけで、User.email の反映は確認完了 (ConfirmEmailChange) まで起きない。\n"
    fields:
      new_email:
        type: String
        constraints:
          - format: email
        annotations:
          pii: true
  AccountEmailChangeConfirm:
    kind: value_object
    description: "新アドレスへ送ったワンタイムリンクの確認リクエスト (self-service)。token が\n新アドレス所有の証左なので認証済みセッションは要求しない (reset password と同方針)。\n"
    fields:
      token:
        type: String
        constraints:
          - non_empty
  AccountDataExport:
    kind: value_object
    description: "end-user 自身の個人データエクスポート (GDPR 第15条 right of access)。本ステージは\n同期生成で、現状 API から得られる profile と接続済みアプリ (consents) をまとめる。\n"
    fields:
      exported_at:
        type: DateTime
      profile:
        type: AccountProfileResponse
      consents:
        type: "AccountConsentResponse[]"
  Group:
    kind: entity
    description: tenant-scoped ロール束集約。所属 User に roles を一斉付与する。id は不変の生成識別子、name はテナント内で一意な編集可能ラベル。
    identity: id
    fields:
      id:
        type: String
        constraints:
          - non_empty
          - max_length: 64
        description: 生成識別子。UUID v4。不変。
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。cross-tenant 参照は禁止。
      name:
        type: String
        constraints:
          - non_empty
          - max_length: 100
        description: テナント内で一意な表示名。
        annotations:
          pii: true
      description:
        type: String
        optional: true
        constraints:
          - max_length: 500
      roles:
        type: "String[]"
        description: このグループが付与するロール束。
      membership_type:
        type: GroupMembershipType
        default: manual
        description: 作成時に固定し、manual と dynamic を混在させない。
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
        optional: true
  GroupMember:
    kind: entity
    description: User と Group の所属関係。group_id × user_id で一意。
    identity:
      - group_id
      - user_id
    fields:
      group_id:
        type: String
      user_id:
        type: String
      source:
        type: GroupMembershipSource
        default: manual
      rule_version:
        type: Integer
        optional: true
        description: dynamic_rule の場合に評価した DynamicGroupRule.version。
      created_at:
        type: DateTime
  DynamicGroupRule:
    kind: entity
    description: dynamic Group と一対一の制限 CEL rule。expression は Boolean を返し、未知属性・許可外関数・過大な式を保存できない。
    identity: group_id
    fields:
      group_id: { type: String }
      tenant_id: { type: String }
      expression:
        type: String
        constraints: [non_empty, { max_length: 4096 }]
      enabled: { type: Boolean, default: false }
      version: { type: Integer }
      referenced_attributes: { type: "String[]" }
      created_at: { type: DateTime }
      updated_at: { type: DateTime }
  DynamicMembershipEvaluation:
    kind: entity
    description: rule version の全件再評価と所属差分の監査可能な結果。
    identity: id
    fields:
      id: { type: String }
      tenant_id: { type: String }
      group_id: { type: String }
      rule_version: { type: Integer }
      job_id: { type: String, optional: true }
      status: { type: DynamicMembershipEvaluationStatus }
      added_count: { type: Integer, default: 0 }
      removed_count: { type: Integer, default: 0 }
      unchanged_count: { type: Integer, default: 0 }
      error_count: { type: Integer, default: 0 }
      created_at: { type: DateTime }
      completed_at: { type: DateTime, optional: true }
  DynamicGroupRuleRequest:
    kind: value_object
    description: CEL rule の作成・更新入力。
    fields:
      expression:
        type: String
        constraints: [non_empty, { max_length: 4096 }]
  DynamicGroupPreviewRequest:
    kind: value_object
    description: 保存前 CEL と最大100 userの read-only preview入力。
    fields:
      expression: { type: String }
      user_ids: { type: "String[]" }
  DynamicGroupPreviewResult:
    kind: value_object
    description: Userごとの一致と現在所属との差分。属性値は含めない。
    fields:
      user_id: { type: String }
      matched: { type: Boolean }
      change: { type: String }
      error_code: { type: String, optional: true }
  GroupCreateRequest:
    kind: value_object
    description: 管理者がグループを作成する JSON リクエスト。
    fields:
      name:
        type: String
        constraints:
          - non_empty
          - max_length: 100
        annotations:
          pii: true
      description:
        type: String
        optional: true
        constraints:
          - max_length: 500
      roles:
        type: "String[]"
        optional: true
      membership_type:
        type: GroupMembershipType
        optional: true
      dynamic_rule:
        type: DynamicGroupRuleRequest
        optional: true
  GroupUpdateRequest:
    kind: value_object
    description: 管理者がグループの name / description / roles を更新する JSON リクエスト。省略フィールドは現状維持。
    fields:
      name:
        type: String
        optional: true
        constraints:
          - non_empty
          - max_length: 100
        annotations:
          pii: true
      description:
        type: String
        optional: true
        constraints:
          - max_length: 500
      roles:
        type: "String[]"
        optional: true
  GroupSummaryResponse:
    kind: value_object
    description: グループ表現。管理 UI の一覧と詳細で同じ表現を返す。
    fields:
      id:
        type: String
      tenant_id:
        type: String
      name:
        type: String
        annotations:
          pii: true
      description:
        type: String
        optional: true
      roles:
        type: "String[]"
      member_count:
        type: Integer
      membership_type:
        type: GroupMembershipType
      dynamic_rule:
        type: DynamicGroupRule
        optional: true
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
        optional: true
  GroupListResponse:
    kind: value_object
    description: 管理 API のグループ一覧。
    fields:
      groups:
        type: "GroupSummaryResponse[]"
  GroupMemberResponse:
    kind: value_object
    description: グループ所属メンバー表現。
    fields:
      user_id:
        type: String
      preferred_username:
        type: String
        annotations:
          pii: true
      created_at:
        type: DateTime
  GroupAddMemberRequest:
    kind: value_object
    description: User 詳細画面など group_id を body で指定して所属させる際の任意リクエスト。
    fields:
      group_id:
        type: String
  UserGroupsResponse:
    kind: value_object
    description: "指定 User の所属グループと有効ロール内訳。明示ロール (user.roles) と\nグループ由来ロール、その union を分けて返し、管理 UI が effective roles を\n理解しやすくする。effective_roles = direct_roles ∪ group_roles で、User と Group\n両方にまたがる導出値であるため models.User の constraint ではなく本 response の\nフィールドとして計算・公開する。\n"
    fields:
      groups:
        type: "GroupSummaryResponse[]"
      direct_roles:
        type: "String[]"
        description: user.roles。
      group_roles:
        type: "String[]"
        description: 所属グループ由来ロールの union。
      effective_roles:
        type: "String[]"
        description: direct_roles ∪ group_roles。
  Agent:
    kind: entity
    description: tenant-scoped な非人間 (non-human) identity principal。自身の資格情報は持たず、AgentCredentialBinding で同一テナントの既存 OAuth2Client に束縛してトークンを得る。owner は同一テナントの既存 User で必須。owner_user_id と AgentCredentialBinding.client_id は同一 tenant_id 内の live aggregate だけを指す (tenant isolation)。
    identity: id
    constraints:
      - "owner_user_id != ''"
    fields:
      id:
        type: String
        constraints:
          - non_empty
          - max_length: 64
        description: 生成識別子。UUID v4。不変。
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。cross-tenant 参照は禁止。
      name:
        type: String
        constraints:
          - non_empty
          - max_length: 100
        description: テナント内で一意な表示名。
        annotations:
          pii: true
      description:
        type: String
        optional: true
        constraints:
          - max_length: 500
        description: 用途 purpose。
      kind:
        type: AgentKind
        default: Supervised
      owner_user_id:
        type: String
        constraints:
          - non_empty
        description: 所有者 User の id。必須。同一 tenant_id の User でなければならない (AgentReferencesStayTenantLocal、RegisterAgent/UpdateAgent の requires で検証)。
      status:
        type: AgentStatus
        default: Active
      roles:
        type: "String[]"
        description: Agent に付与するロール束。
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
        optional: true
      disabled_at:
        type: DateTime
        optional: true
      killed_at:
        type: DateTime
        optional: true
        description: 一方向終端 (kill) 時刻。
  AgentCredentialBinding:
    kind: entity
    description: Agent と同一テナントの OAuth2Client の束縛関係。agent_id × client_id で一意。Agent は束縛した Client の資格情報を用いてトークンを得る。束縛先 client_id は Agent と同一 tenant_id の OAuth2Client でなければならない (AgentReferencesStayTenantLocal)。
    identity:
      - agent_id
      - client_id
    fields:
      agent_id:
        type: String
      client_id:
        type: String
      created_at:
        type: DateTime
  AgentRegisterRequest:
    kind: value_object
    description: 管理者が Agent を登録する JSON リクエスト。owner_user_id 省略時は actor を所有者とする。
    fields:
      name:
        type: String
        constraints:
          - non_empty
          - max_length: 100
        annotations:
          pii: true
      description:
        type: String
        optional: true
        constraints:
          - max_length: 500
      kind:
        type: AgentKind
        optional: true
      owner_user_id:
        type: String
        optional: true
        description: 省略時は actor の id を所有者とする。
      roles:
        type: "String[]"
        optional: true
  AgentUpdateRequest:
    kind: value_object
    description: 管理者が Agent の name / description / kind / owner_user_id / roles を更新する JSON リクエスト。省略フィールドは現状維持。owner_user_id の変更は所有権移転。
    fields:
      name:
        type: String
        optional: true
        constraints:
          - non_empty
          - max_length: 100
        annotations:
          pii: true
      description:
        type: String
        optional: true
        constraints:
          - max_length: 500
      kind:
        type: AgentKind
        optional: true
      owner_user_id:
        type: String
        optional: true
        description: 変更は所有権移転 (AgentOwnerChanged)。
      roles:
        type: "String[]"
        optional: true
  AgentCredentialBindRequest:
    kind: value_object
    description: Agent に OAuth2Client を束縛する JSON リクエスト。
    fields:
      client_id:
        type: String
        constraints:
          - non_empty
  AgentSummaryResponse:
    kind: value_object
    description: Agent 表現。管理 UI の一覧と詳細で同じ表現を返す。
    fields:
      id:
        type: String
      tenant_id:
        type: String
      name:
        type: String
        annotations:
          pii: true
      description:
        type: String
        optional: true
      kind:
        type: AgentKind
      owner_user_id:
        type: String
      status:
        type: AgentStatus
      roles:
        type: "String[]"
      client_ids:
        type: "String[]"
        description: 束縛済み OAuth2Client id。
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
        optional: true
      disabled_at:
        type: DateTime
        optional: true
      killed_at:
        type: DateTime
        optional: true
  AgentListResponse:
    kind: value_object
    description: 管理 API の Agent 一覧。
    fields:
      agents:
        type: "AgentSummaryResponse[]"
  FederationLinked:
    kind: event
    description: ローカル user に外部 IdP の identity を紐付けた (account linking)。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      userId:
        type: String
      provider:
        type: String
  FederationUnlinked:
    kind: event
    description: ローカル user から外部 IdP の identity を解除した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      userId:
        type: String
      provider:
        type: String
  EmailChangeRequested:
    kind: event
    description: "end-user が primary email の変更を起票し、新アドレスへ確認リンクを送った\n(self-service)。実際の email 反映は ConfirmEmailChange まで起きない。\nnewEmailHash は SHA-256 で、平文を audit log に流さない。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 対象 user の所属テナント ID。
      userId:
        type: String
      newEmailHash:
        type: String
        description: 新 email の SHA-256 hex
  EmailChanged:
    kind: event
    description: "新アドレスへ送ったワンタイムリンクの確認が完了し、primary email を確定した\n(self-service)。email_verified=true に更新し、verify_email の\nrequired action があれば自動解除する。\n"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 対象 user の所属テナント ID。
      userId:
        type: String
  UserCreated:
    kind: event
    description: 管理者がユーザーを作成した。初期パスワードと password_hash は監査イベントに含めない。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 操作対象テナント ID。actor / target と一致する。
      actorUserId:
        type: String
      targetUserId:
        type: String
  UserUpdated:
    kind: event
    description: 管理者がユーザーのプロフィールまたは roles を更新した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 操作対象テナント ID。actor / target と一致する。
      actorUserId:
        type: String
      targetUserId:
        type: String
      changedFields:
        type: "String[]"
  UserDisabled:
    kind: event
    description: 管理者がユーザーを無効化した。対象ユーザーの新規ログインと既存セッション利用を拒否する。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 操作対象テナント ID。actor / target と一致する。
      actorUserId:
        type: String
      targetUserId:
        type: String
  UserEnabled:
    kind: event
    description: 管理者が無効化済みユーザーを再有効化した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 操作対象テナント ID。actor / target と一致する。
      actorUserId:
        type: String
      targetUserId:
        type: String
  UserSoftDeleted:
    kind: event
    description: 管理者がユーザーを SoftDelete した。status は PendingDeletion に遷移し、PII / Consent / RefreshToken / Session は温存される。reason は admin が任意に残せる自由記述。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 操作対象テナント ID。actor / target と一致する。
      actorUserId:
        type: String
      targetUserId:
        type: String
      reason:
        type: String
        optional: true
  UserRestored:
    kind: event
    description: 管理者が PendingDeletion のユーザーを Restore した。status は Active に戻り、PII / credential は温存されたままでログインが再開する。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 操作対象テナント ID。actor / target と一致する。
      actorUserId:
        type: String
      targetUserId:
        type: String
  UserDeleted:
    kind: event
