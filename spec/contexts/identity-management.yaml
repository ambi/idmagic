      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 操作対象テナント ID。actor / target と一致する。
      actorUserId:
        type: String
        description: 解除を行った主体。自動解除時は対象本人。
      targetUserId:
        type: String
  GroupCreated:
    kind: event
    description: 管理者がグループを作成した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: グループが属するテナント ID。
      actorUserId:
        type: String
      groupId:
        type: String
  GroupUpdated:
    kind: event
    description: 管理者がグループの name / description / roles を更新した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: グループが属するテナント ID。
      actorUserId:
        type: String
      groupId:
        type: String
      changedFields:
        type: "String[]"
  GroupDeleted:
    kind: event
    description: 管理者がグループを削除した。所属 membership は cascade で解除され、各々 GroupMemberRemoved を伴う。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: グループが属するテナント ID。
      actorUserId:
        type: String
      groupId:
        type: String
  GroupMemberAdded:
    kind: event
    description: 管理者が User をグループに所属させた。既に所属済みの場合は emit されない (冪等)。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: グループが属するテナント ID。
      actorUserId:
        type: String
      groupId:
        type: String
      userId:
        type: String
  GroupMemberRemoved:
    kind: event
    description: 管理者が User をグループから外した、またはグループ削除に伴い解除された。所属していない場合は emit されない (冪等)。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: グループが属するテナント ID。
      actorUserId:
        type: String
      groupId:
        type: String
      userId:
        type: String
  DynamicGroupRuleUpdated:
    kind: event
    description: 管理者が dynamic group の CEL rule を新しい version へ更新した。
    payload:
      occurredAt: { type: DateTime }
      tenantId: { type: String }
      actorUserId: { type: String }
      groupId: { type: String }
      ruleVersion: { type: Integer }
  DynamicGroupRuleEnabled:
    kind: event
    description: 管理者が検証済み rule を有効化し全件再評価を予約した。
    payload:
      occurredAt: { type: DateTime }
      tenantId: { type: String }
      actorUserId: { type: String }
      groupId: { type: String }
      ruleVersion: { type: Integer }
  DynamicGroupRuleDisabled:
    kind: event
    description: 管理者が rule を無効化し旧 dynamic membership を即時無効にした。
    payload:
      occurredAt: { type: DateTime }
      tenantId: { type: String }
      actorUserId: { type: String }
      groupId: { type: String }
      ruleVersion: { type: Integer }
  DynamicMembershipEvaluated:
    kind: event
    description: rule version の全件再評価が完了した。属性値は持たず差分件数だけを記録する。
    payload:
      occurredAt: { type: DateTime }
      tenantId: { type: String }
      groupId: { type: String }
      ruleVersion: { type: Integer }
      addedCount: { type: Integer }
      removedCount: { type: Integer }
      unchangedCount: { type: Integer }
      errorCount: { type: Integer }
  DynamicMembershipEvaluationStarted:
    kind: event
    description: worker が dynamic membership 全件再評価を開始した。
    payload:
      occurredAt: { type: DateTime }
      tenantId: { type: String }
      groupId: { type: String }
      ruleVersion: { type: Integer }
  DynamicMembershipEvaluationFailed:
    kind: event
    description: dynamic membership 全件再評価が失敗し、対象 rule version は fail-closed のままになった。
    payload:
      occurredAt: { type: DateTime }
      tenantId: { type: String }
      groupId: { type: String }
      ruleVersion: { type: Integer }
  AgentRegistered:
    kind: event
    description: 管理者が Agent を登録した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: Agent が属するテナント ID。
      actorUserId:
        type: String
      agentId:
        type: String
  AgentUpdated:
    kind: event
    description: 管理者が Agent の name / description / kind / roles を更新した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: Agent が属するテナント ID。
      actorUserId:
        type: String
      agentId:
        type: String
      changedFields:
        type: "String[]"
  AgentDisabled:
    kind: event
    description: 管理者が Agent を可逆に運用停止した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: Agent が属するテナント ID。
      actorUserId:
        type: String
      agentId:
        type: String
  AgentEnabled:
    kind: event
    description: 管理者が運用停止中の Agent を再稼働した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: Agent が属するテナント ID。
      actorUserId:
        type: String
      agentId:
        type: String
  AgentKilled:
    kind: event
    description: 管理者が Agent を緊急停止した (一方向終端)。以後復帰不能。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: Agent が属するテナント ID。
      actorUserId:
        type: String
      agentId:
        type: String
  AgentDeleted:
    kind: event
    description: 管理者が Agent を削除した。束縛は cascade で解除される。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: Agent が属するテナント ID。
      actorUserId:
        type: String
      agentId:
        type: String
  AgentOwnerChanged:
    kind: event
    description: 管理者が Agent の所有者 (owner_user_id) を移転した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: Agent が属するテナント ID。
      actorUserId:
        type: String
      agentId:
        type: String
      previousOwnerUserId:
        type: String
      newOwnerUserId:
        type: String
  AgentCredentialBound:
    kind: event
    description: 管理者が Agent に OAuth2Client を束縛した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: Agent が属するテナント ID。
      actorUserId:
        type: String
      agentId:
        type: String
      clientId:
        type: String
  AgentCredentialUnbound:
    kind: event
    description: 管理者が Agent から OAuth2Client の束縛を解除した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: Agent が属するテナント ID。
      actorUserId:
        type: String
      agentId:
        type: String
      clientId:
        type: String
  LifecycleWorkflowStatus:
    kind: enum
    description: LifecycleWorkflow のライフサイクル。archived は終端で履歴保全のため hard delete しない。
    values:
      - draft
      - enabled
      - disabled
      - archived
  WorkflowTriggerKind:
    kind: enum
    description: WorkflowTrigger の発火条件種別。初期版は User mutation 起点の3種のみ (日付・cron・待機 step は対象外)。
    values:
      - user_created
      - user_attributes_changed
      - user_status_changed
  WorkflowFilterOperator:
    kind: enum
    description: WorkflowFilter で使える比較演算子。eq/not_eq は完全一致・不一致、in は値集合のいずれか一致、exists は値の有無判定。
    values:
      - eq
      - not_eq
      - in
      - exists
  WorkflowActionKind:
    kind: enum
    description: WorkflowAction の種別。いずれも desired-state で、既に目的状態なら no_op になる冪等操作。
    values:
      - add_group_member
      - remove_group_member
      - assign_application
      - unassign_application
      - set_required_action
      - clear_required_action
      - enable_user
      - disable_user
      - send_email
  WorkflowRunStatus:
    kind: enum
    description: WorkflowRunLifecycle の状態。no-op は成功として扱う。
    values:
      - queued
      - running
      - succeeded
      - partially_failed
      - failed
      - canceled
  WorkflowStepOutcome:
    kind: enum
    description: WorkflowStep 1 件の実行結果。pending はまだ試行されていない初期値。
    values:
      - pending
      - changed
      - no_op
      - failed
      - canceled
  WorkflowRevisionConflictError:
    kind: error
    description: "UpdateLifecycleWorkflow が input.request.expected_revision と現在の\nLifecycleWorkflow.current_revision の不一致を検出した (lost update の拒否)。呼び出し側は\n最新 revision を再取得してから再試行する。\n"
  WorkflowFilter:
    kind: value_object
    description: "WorkflowTrigger.filters の1項。TenantUserAttributeSchema に存在し型が一致する field\nだけを保存でき、PII の自由文字 regex や未知 field は保存時に拒否する。複数 filter は AND。\n"
    fields:
      field:
        type: String
        constraints:
          - non_empty
        description: TenantUserAttributeSchema.key または User の built-in attribute key。
      operator:
        type: WorkflowFilterOperator
      value:
        type: JSON
        optional: true
        description: operator=exists では未指定。field の AttributeType と一致する型付き値 (in は配列)。
  WorkflowTriggerDef:
    kind: value_object
    description: "LifecycleWorkflowRevision が固定する trigger 定義。kind に応じて watched_attributes\nまたは from_status/to_status を用いる。filters は 0〜20 件で AND。\n"
    fields:
      kind:
        type: WorkflowTriggerKind
      watched_attributes:
        type: "String[]"
        optional: true
        description: "kind=user_attributes_changed のとき必須。列挙した field のいずれかが実際に変化した\n場合だけ発火する (request に含まれただけで値が同じ場合は発火しない)。\n"
      from_status:
        type: UserStatus
        optional: true
        description: kind=user_status_changed のとき必須。許可された UserLifecycle 遷移の from。
      to_status:
        type: UserStatus
        optional: true
        description: kind=user_status_changed のとき必須。許可された UserLifecycle 遷移の to。
      filters:
        type: "WorkflowFilter[]"
        constraints:
          - max_items: 20
  WorkflowActionDef:
    kind: value_object
    description: "LifecycleWorkflowRevision が固定する action 定義 1 件。kind ごとに使うフィールドが異なり、\ncreate/update と enable の双方で参照先の存在を検証する。\n"
    fields:
      kind:
        type: WorkflowActionKind
      group_id:
        type: String
        optional: true
        description: "kind=add_group_member/remove_group_member のとき必須。dynamic group を指定した場合は\n保存時に validation error。\n"
      application_id:
        type: String
        optional: true
        description: kind=assign_application/unassign_application のとき必須。
      visibility:
        type: AssignmentVisibility
        optional: true
        description: kind=assign_application のとき任意 (省略時 visible)。Application context が所有する定義の published language stub。
      required_action:
        type: RequiredAction
        optional: true
        description: kind=set_required_action/clear_required_action のとき必須。
      reason:
        type: String
        optional: true
        description: kind=enable_user/disable_user のとき任意の記録用理由。
      template_key:
        type: String
        optional: true
        description: kind=send_email のとき必須。固定 template key (custom template editor は対象外)。
  LifecycleWorkflowRevision:
    kind: entity
    description: "LifecycleWorkflow の不変な definition 断面。意味の変わる update ごとに revision を 1 増やし、\n過去 revision は immutable に残す。enable された revision だけが新規 WorkflowRun を生成する。\n"
    identity:
      - workflow_id
      - revision
    fields:
      workflow_id:
        type: String
      tenant_id:
        type: String
      revision:
        type: Integer
      trigger:
        type: WorkflowTriggerDef
      actions:
        type: "WorkflowActionDef[]"
        constraints:
          - min_items: 1
          - max_items: 20
      created_at:
        type: DateTime
  LifecycleWorkflow:
    kind: entity
    description: "テナント内で name が一意な workflow 定義集約。create は revision 1 の draft を作る。\nenable した revision だけが trigger 評価対象になり、意味の変わる update は current_revision を\n増やすだけで status/enabled_revision は変えない (再度 enable するまで旧 revision の評価が続く)。\ndisable は新規 trigger を止め、archive は disabled にのみ許可される終端 (hard delete しない)。\n"
    identity: id
    fields:
      id:
        type: String
        constraints:
          - non_empty
          - max_length: 64
        description: 生成識別子。UUID v4。不変。
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。cross-tenant 参照は禁止。
      name:
        type: String
        constraints:
          - non_empty
          - max_length: 100
        description: テナント内で一意な表示名。
        annotations:
          pii: true
      description:
        type: String
        optional: true
        constraints:
          - max_length: 500
      status:
        type: LifecycleWorkflowStatus
        default: draft
      current_revision:
        type: Integer
        description: 直近に作成した revision 番号。
      enabled_revision:
        type: Integer
        optional: true
        description: 現在 trigger 評価対象になっている revision。draft/disabled/archived では未設定のことがある。
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
        optional: true
  WorkflowRunTriggerSnapshot:
    kind: value_object
    description: "WorkflowRun 作成時に固定する trigger 発火の要約。履歴には changed field 名と predicate の\n成否だけを残し、属性値そのものは保持しない (PII 保護)。\n"
    fields:
      kind:
        type: WorkflowTriggerKind
      source_occurrence_id:
        type: String
        description: 発火元の User mutation domain event ID。同一 occurrence の再配送は同じ run に収束する (dedup)。
      changed_fields:
        type: "String[]"
        description: kind=user_attributes_changed のとき、実際に変化した field 名一覧 (値は含まない)。
      from_status:
        type: UserStatus
        optional: true
      to_status:
        type: UserStatus
        optional: true
  WorkflowRun:
    kind: entity
    description: "WorkflowTrigger の発火 1 回から生成される実行単位。作成時の workflow_id、revision、\ntrigger snapshot、target_user_id、展開済み action list を固定し、後から definition を変更しても\n既存 run の意味は変わらない。job_id は dispatcher が enqueue 後に関連付ける。action 実行直前に\ntenant 内の対象 user と resource を再検証し、同一 target_user_id の run は triggered_at 順に\n直列化する。\n(tenant_id, workflow_id, revision, source_occurrence_id, target_user_id) が一意制約。\n"
    identity: id
    fields:
      id:
        type: String
        description: 生成識別子。UUID v4。
      tenant_id:
        type: String
      workflow_id:
        type: String
      revision:
        type: Integer
      trigger:
        type: WorkflowRunTriggerSnapshot
      target_user_id:
        type: String
      actions:
        type: "WorkflowActionDef[]"
        description: revision から展開・固定した action list。definition が後から変わっても本 run の意味は変わらない。
      status:
        type: WorkflowRunStatus
      job_id:
        type: String
        optional: true
        description: dispatcher が enqueue 後に関連付ける Jobs.JobRef.id。未 enqueue の間は未設定。
      triggered_at:
        type: DateTime
      started_at:
        type: DateTime
        optional: true
      completed_at:
        type: DateTime
        optional: true
  WorkflowStep:
    kind: entity
    description: "WorkflowRun 内の action 1 件分の実行記録。定義順の index を持ち、outcome と sanitised\nerror code を checkpoint する。attribute value / email 本文 / secret は保持しない。\n"
    identity:
      - run_id
      - step_index
    fields:
      run_id:
        type: String
      tenant_id:
        type: String
      step_index:
        type: Integer
        description: WorkflowRun.actions 内の 0 始まり順序。
      action_kind:
        type: WorkflowActionKind
      outcome:
        type: WorkflowStepOutcome
        default: pending
      error_code:
        type: String
        optional: true
        description: sanitised error code。attribute 値や email 本文は含めない。
      attempted_at:
        type: DateTime
        optional: true
  LifecycleNotificationDelivery:
    kind: entity
    description: send_email action の delivery 冪等キー。(run_id, step_index) 単位で一回分だけ送信したことを記録する。
    identity:
      - run_id
      - step_index
    fields:
      run_id:
        type: String
      step_index:
        type: Integer
      tenant_id:
        type: String
      template_key:
        type: String
      delivered_at:
        type: DateTime
  LifecycleWorkflowDryRunRequest:
    kind: value_object
    description: dry-run 対象 user_id の入力。対象 revision は enabled_revision (未指定なら current_revision)。
    fields:
      target_user_id:
        type: String
  LifecycleWorkflowDryRunStepResult:
    kind: value_object
    description: dry-run の action 1 件分の判定結果。属性値や email address は含まない。
    fields:
      action_kind:
        type: WorkflowActionKind
      would_change:
        type: String
        description: would_change / no_op / blocked のいずれか。
      reason:
        type: String
        optional: true
  LifecycleWorkflowDryRunResponse:
    kind: value_object
    description: "dry-run 結果。WorkflowRun / Job / membership / assignment / required action / status / email\nのいずれも作成・変更しない。evaluated_at と revision を含め、本実行の保証とは表示しない。\n"
    fields:
      workflow_id:
        type: String
      revision:
        type: Integer
      target_user_id:
        type: String
      evaluated_at:
        type: DateTime
      steps:
        type: "LifecycleWorkflowDryRunStepResult[]"
  LifecycleWorkflowCreateRequest:
    kind: value_object
    description: workflow 作成リクエスト。作成すると revision 1 の draft になる。
    fields:
      name:
        type: String
        constraints:
          - non_empty
          - max_length: 100
      description:
        type: String
        optional: true
        constraints:
          - max_length: 500
      trigger:
        type: WorkflowTriggerDef
      actions:
        type: "WorkflowActionDef[]"
        constraints:
          - min_items: 1
          - max_items: 20
  LifecycleWorkflowUpdateRequest:
    kind: value_object
    description: "workflow 更新リクエスト。expected_revision と現在の current_revision が一致しない場合は\nWorkflowRevisionConflictError で拒否する (lost update 防止)。\n"
    fields:
      expected_revision:
        type: Integer
      name:
        type: String
        optional: true
        constraints:
          - max_length: 100
      description:
        type: String
        optional: true
        constraints:
          - max_length: 500
      trigger:
        type: WorkflowTriggerDef
        optional: true
      actions:
        type: "WorkflowActionDef[]"
        optional: true
        constraints:
          - min_items: 1
          - max_items: 20
  LifecycleWorkflowResponse:
    kind: value_object
    description: workflow 定義の表現 (current_revision の内容を含む)。
    fields:
      id:
        type: String
      name:
        type: String
      description:
        type: String
        optional: true
      status:
        type: LifecycleWorkflowStatus
      current_revision:
        type: Integer
      enabled_revision:
        type: Integer
        optional: true
      trigger:
        type: WorkflowTriggerDef
      actions:
        type: "WorkflowActionDef[]"
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
        optional: true
  LifecycleWorkflowListResponse:
    kind: value_object
    description: workflow 一覧レスポンス。
    fields:
      workflows:
        type: "LifecycleWorkflowResponse[]"
  WorkflowStepResponse:
    kind: value_object
    description: run detail 内の step 表現。secret / email 本文 / attribute value は含めない。
    fields:
      step_index:
        type: Integer
      action_kind:
        type: WorkflowActionKind
      outcome:
        type: WorkflowStepOutcome
      error_code:
        type: String
        optional: true
      attempted_at:
        type: DateTime
        optional: true
  WorkflowRunResponse:
    kind: value_object
    description: "run detail レスポンス。trigger、固定 revision、target user、Job attempt、各 step の\noutcome/error_code/timestamp を表示し、secret / email 本文 / attribute value は含めない。\n"
    fields:
      id:
        type: String
      workflow_id:
        type: String
      revision:
        type: Integer
      trigger:
        type: WorkflowRunTriggerSnapshot
      target_user_id:
        type: String
      status:
        type: WorkflowRunStatus
      job_id:
        type: String
        optional: true
      steps:
        type: "WorkflowStepResponse[]"
      triggered_at:
        type: DateTime
      started_at:
        type: DateTime
        optional: true
      completed_at:
        type: DateTime
        optional: true
  WorkflowRunListResponse:
    kind: value_object
    description: workflow の run 一覧レスポンス。
    fields:
      runs:
        type: "WorkflowRunResponse[]"
      next_after:
        type: DateTime
        optional: true
        description: ページング継続用カーソル。
  LifecycleWorkflowCreated:
    kind: event
    description: 管理者が LifecycleWorkflow を作成した (revision 1 の draft)。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      workflowId:
        type: String
  LifecycleWorkflowUpdated:
    kind: event
    description: 管理者が LifecycleWorkflow を更新した。trigger/actions が変わり revision が増えた場合は newRevision を含む。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      workflowId:
        type: String
      newRevision:
        type: Integer
        optional: true
  LifecycleWorkflowEnabled:
    kind: event
    description: 管理者が current_revision を validation に成功させ enabled_revision として enable した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      workflowId:
        type: String
      revision:
        type: Integer
  LifecycleWorkflowDisabled:
    kind: event
    description: 管理者が LifecycleWorkflow を disable した。新規 trigger を止め、未開始の queued run を canceled にする。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      workflowId:
        type: String
  LifecycleWorkflowArchived:
    kind: event
    description: 管理者が disabled の LifecycleWorkflow を archive した (終端)。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      actorUserId:
        type: String
      workflowId:
        type: String
  LifecycleWorkflowRunStarted:
    kind: event
    description: dispatcher が WorkflowRun を worker に渡し、最初の step 実行を開始した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      workflowId:
        type: String
      runId:
        type: String
      targetUserId:
        type: String
  LifecycleWorkflowRunSucceeded:
    kind: event
    description: WorkflowRun の全 step が changed または no_op で終端した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      workflowId:
        type: String
      runId:
        type: String
      targetUserId:
        type: String
  LifecycleWorkflowRunPartiallyFailed:
    kind: event
    description: WorkflowRun が attempt 上限に達し、成功と失敗が混在したまま終端した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      workflowId:
        type: String
      runId:
        type: String
      targetUserId:
        type: String
  LifecycleWorkflowRunFailed:
    kind: event
    description: WorkflowRun が attempt 上限に達し、成功した step が一つもないまま終端した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      workflowId:
        type: String
      runId:
        type: String
      targetUserId:
        type: String
  LifecycleWorkflowRunCanceled:
    kind: event
    description: disable により未開始の queued run が、または実行中の run が現在 step の checkpoint 後に停止した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      workflowId:
        type: String
      runId:
        type: String
      targetUserId:
        type: String
  LifecycleWorkflowStepFailed:
    kind: event
    description: WorkflowStep 1 件が failed outcome で確定した。監査検索用に workflow_id/run_id/step_id/error_code を残す。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      workflowId:
        type: String
      runId:
        type: String
      stepIndex:
        type: Integer
      actionKind:
        type: WorkflowActionKind
      errorCode:
        type: String
states:
  UserLifecycle:
    description: "User aggregate のライフサイクル。Active が通常稼働、\nDisable で復活可能な無効化。SoftDelete で削除予約 (PendingDeletion) に入り、\n猶予期間内は Restore で Active に戻せる。Purge で tombstone 化\n(anonymize cascade) となる。Deleted は終端で復元できない。PendingDeletion から\nDeleted への遷移 guard は、猶予期間 (30日、業界標準の 7〜30 日に合わせた既定値) を\n経過したか、admin の明示的 purge=true 指定のいずれかを要求する。経過前に\npurge=false で PendingDeletion の user へ呼び出した場合は DeleteAdminUser.requires\nが InvalidRequestError で拒否し、本遷移は発生しない。\n"
    target: User
    initial: Active
    terminal:
      - Deleted
    transitions:
      - from: Active
        event: UserDisabled
        to: Disabled
      - from: Disabled
        event: UserEnabled
        to: Active
      - from: Active
        event: UserSoftDeleted
        to: PendingDeletion
      - from: Disabled
        event: UserSoftDeleted
        to: PendingDeletion
      - from: PendingDeletion
        event: UserRestored
        to: Active
      - from: PendingDeletion
        event: UserDeleted
        to: Deleted
        guard: "input.purge == true || duration_since(status_changed_at) >= duration('2592000s')"
        effect:
          - UserDeleted
      - from: Active
        event: UserDeleted
        to: Deleted
      - from: Disabled
        event: UserDeleted
        to: Deleted
  DynamicMembershipEvaluationLifecycle:
    description: 全件再評価は queued から running を経て succeeded または failed へ終端する。
    target: DynamicMembershipEvaluation
    initial: queued
    terminal: [succeeded, failed]
    transitions:
      - { from: queued, event: DynamicMembershipEvaluationStarted, to: running }
      - { from: running, event: DynamicMembershipEvaluated, to: succeeded }
      - { from: running, event: DynamicMembershipEvaluationFailed, to: failed }
  AgentLifecycle:
    description: "Agent aggregate のライフサイクル。Active が通常稼働、Disable で\n復活可能な運用停止、Kill で一方向終端 (緊急停止) となる。Killed は終端で\n復元できず、Active 以外は新規トークンを発行しない (fail-closed)。\n"
    target: Agent
    initial: Active
    terminal:
      - Killed
    transitions:
      - from: Active
        event: AgentDisabled
        to: Disabled
      - from: Disabled
        event: AgentEnabled
        to: Active
      - from: Active
        event: AgentKilled
        to: Killed
      - from: Disabled
        event: AgentKilled
        to: Killed
  WorkflowDefinitionLifecycle:
    description: "LifecycleWorkflow.status の状態機械。draft で作成し、完全 validation に成功した revision を\nenable すると新規 trigger 評価対象になる。disable は新規 trigger を止め、再度 enable すれば\n(同じか新しい) revision を再評価対象にできる。archive は disabled にのみ許可される終端で、\ndefinition と run history は retention 期間中残る (hard delete しない)。definition の update 自体は\ncurrent_revision を増やすだけで status は変えない (enabled_revision は明示的な再 enable まで固定)。\n"
    target: LifecycleWorkflow
    initial: draft
    terminal:
      - archived
    transitions:
      - from: draft
        event: LifecycleWorkflowEnabled
        to: enabled
      - from: enabled
        event: LifecycleWorkflowDisabled
        to: disabled
      - from: disabled
        event: LifecycleWorkflowEnabled
        to: enabled
      - from: disabled
        event: LifecycleWorkflowArchived
        to: archived
  WorkflowRunLifecycle:
    description: "WorkflowRun.status の状態機械。queued で作成され、dispatcher が job_id を関連付けて\nrunning に遷移する (最初の step 実行開始)。1 attempt では未完了 step を定義順にすべて試し、\nJob の attempt 上限到達時に全 step 成功なら succeeded、成功と失敗が混在すれば\npartially_failed、成功が一つもなければ failed に終端する (no-op は成功として扱う)。\nJobs レベルの retry 中は run.status を running のまま保持する。disable は未開始の queued run を\ncanceled にし、running run は現在 step の checkpoint 後、次 step の前で canceled にする。\n"
    target: WorkflowRun
    initial: queued
    terminal:
      - succeeded
      - partially_failed
      - failed
      - canceled
    transitions:
      - from: queued
        event: LifecycleWorkflowRunStarted
        to: running
      - from: running
        event: LifecycleWorkflowRunSucceeded
        to: succeeded
      - from: running
        event: LifecycleWorkflowRunPartiallyFailed
        to: partially_failed
      - from: running
        event: LifecycleWorkflowRunFailed
        to: failed
      - from: queued
        event: LifecycleWorkflowRunCanceled
        to: canceled
      - from: running
        event: LifecycleWorkflowRunCanceled
        to: canceled
interfaces:
  GetAccountSummary:
    description: "認証済みユーザーが自身のアカウント概要を取得する (self-service portal home)。\n対象は subject.id に固定。roles を含まず、最終ログイン・パスワード変更日時・\nMFA 状態・未対応 required actions を返す。admin shell の AccountContext とは\n別契約。\n"
    output:
      summary:
        type: AccountSummary
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: GET
        path: /api/account/summary
  GetUserProfile:
    description: "認証済みユーザーが自身のプロフィールを取得する (self-service)。対象は\nsubject.id に固定するため cross-user 参照は構造的に発生しない。attributes は\nself が読める分のみ、editable_attributes に編集可能定義を併せて返す。\n"
    output:
      profile:
        type: AccountProfileResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: GET
        path: /api/account/profile
  UpdateUserProfile:
    description: "認証済みユーザーが自身の表示名と editable_by_user=true の属性を更新する\n(self-service)。subject.id == resource.id に固定。属性は key 単位の merge とし、\neditable_by_user=false の key は拒否する。status / roles / organization の変更は\nadmin 専用で本経路では扱わない。\n"
    input:
      request:
        type: AccountProfileUpdateRequest
    output:
      profile:
        type: AccountProfileResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - UserUpdated
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: PATCH
        path: /api/account/profile
        request_form: body
  RequestEmailChange:
    description: "認証済みユーザーが自身の primary email 変更を起票する (self-service)。新アドレスへ\nワンタイムリンクを送るだけで User.email は変えない。subject.id に固定し、tenant 内で\n既に使われているアドレスは拒否する。\n"
    input:
      request:
        type: AccountEmailChangeRequest
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - EmailChangeRequested
    annotations:
      step_up: required
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: POST
        path: /api/account/email/change_request
        request_form: body
  ConfirmEmailChange:
    description: "新アドレスへ送ったワンタイムリンクを消費して primary email を確定する。\ntoken が新アドレス所有の証左なので認証済みセッションは要求しない。token の\n所持そのものが認可の根拠であり (self-service セッションではなく\ntoken-possession-authenticated)、AuthenticatedSelf/session ベースの access 分類は\n適用しない。確定時に email_verified=true とし、verify_email の required action が\nあれば自動解除する。\n"
    input:
      request:
        type: AccountEmailChangeConfirm
    errors:
      - InvalidRequestError
    emits:
      - EmailChanged
    access: public
    bindings:
      - kind: http
        method: POST
        path: /api/account/email/verify
        request_form: body
  ExportAccountData:
    description: "認証済みユーザーが自身の個人データを JSON で取得する (self-service, GDPR access)。\n対象は subject.id に固定。本ステージは同期生成で profile と consents を含む。\n"
    output:
      export:
        type: AccountDataExport
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: GET
        path: /api/account/data_export
  ListAdminUsers:
    description: 管理者が削除されていないユーザーを一覧する。
    output:
      response:
        type: AdminUserListResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: UserDirectory
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: /api/admin/users
  GetAdminUser:
    description: 管理者が id を指定してユーザーを取得する。
    input:
      user_id:
        type: String
    output:
      user:
        type: AdminUserResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: User
        id: input.user_id
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/users/{user_id}"
  CreateAdminUser:
    description: 管理者が Authentication context の PasswordPolicy を満たす初期パスワードでユーザーを作成する。
    input:
      request:
        type: AdminUserCreateRequest
    output:
      user:
        type: AdminUserResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - UserCreated
    access:
      policies: [TenantAdministrator]
      resource:
        type: UserDirectory
        id: context.tenant_id
    bindings:
      - kind: http
        method: POST
        path: /api/admin/users
        request_form: body
        successful_status_codes:
          - "201"
  ImportAdminUsers:
    description: 管理者が CSV を dry_run または apply ジョブへ投入する。入力は UTF-8 (BOM 可)、最大 1 MiB・1,000 行・64 KiB/field とし、password/hash 列は拒否する。
    input:
      csv:
        type: String
      mode:
        type: String
    output:
      job:
        type: UserImportJob
    errors:
      - InvalidRequestError
      - AccessDeniedError
    requires:
      - size(input.csv) <= 1048576
    ensures:
      - "input.mode != 'dry_run' || usersUnchanged(context.tenant_id)"
    access:
      policies: [TenantAdministrator]
      resource:
        type: UserDirectory
        id: context.tenant_id
    bindings:
      - kind: http
        method: POST
        path: /api/admin/users/imports
        request_form: body
        successful_status_codes:
          - "202"
  GetAdminUserImport:
    description: 管理者が同一 tenant の CSV インポートジョブと行ごとの検証・適用結果を取得する。
    input:
      job_id:
        type: String
    output:
      job:
        type: UserImportJob
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: UserImportJob
        id: input.job_id
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/users/imports/{job_id}"
  UpdateAdminUser:
    description: 管理者がユーザーのプロフィール、email_verified、roles を更新する。
    input:
      user_id:
        type: String
      request:
        type: AdminUserUpdateRequest
    output:
      user:
        type: AdminUserResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - UserUpdated
    access:
      policies: [TenantAdministrator]
      resource:
        type: User
        id: input.user_id
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/users/{user_id}"
        request_form: body
  DisableAdminUser:
    description: 管理者がユーザーを無効化し、新規ログインと既存セッション利用を拒否する。
    input:
      user_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - UserDisabled
    access:
      policies: [TenantAdministrator]
      resource:
        type: User
        id: input.user_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/users/{user_id}/disable"
        successful_status_codes:
          - "204"
  EnableAdminUser:
    description: 管理者が無効化済みユーザーを再有効化する。
    input:
      user_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - UserEnabled
    access:
      policies: [TenantAdministrator]
      resource:
        type: User
        id: input.user_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/users/{user_id}/enable"
        successful_status_codes:
          - "204"
  DeleteAdminUser:
    description: "管理者がユーザーを削除する。既定は SoftDelete で、status を\nPendingDeletion に遷移させ PII / Consent / RefreshToken / Session を温存する\n(猶予期間内は Restore 可能)。`purge=true` の場合は ADR-036 の anonymize\ncascade を即時実施し tombstone 化する。いずれも冪等で、既に同じ終着状態の\nuser への再呼び出しは no-op として 204 を返す。自分自身は削除できない\n(admin / system_admin の自爆防止)。\n"
    input:
      user_id:
        type: String
      purge:
        type: Boolean
        optional: true
        description: true で即時 anonymize cascade (完全削除)。省略時は soft-delete。
      reason:
        type: String
        optional: true
        description: 監査用の任意自由記述。
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - UserSoftDeleted
      - UserDeleted
    requires:
      - subject.id != resource.id
    access:
      policies: [TenantAdministrator]
      resource:
        type: User
        id: input.user_id
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/users/{user_id}"
        request_form: body
        successful_status_codes:
          - "204"
  RestoreAdminUser:
    description: "管理者が PendingDeletion のユーザーを Restore する。status を Active\nに戻し PII / credential を温存したまま復元する。猶予期間を過ぎている、または\nPendingDeletion でない user に対しては InvalidRequestError を返す。復元後の\nuser を返す。自分自身への操作は use case 側で reject する (自爆防止と対称の\n扱い)。\n"
    input:
      user_id:
        type: String
    output:
      user:
        type: AdminUserResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - UserRestored
    requires:
      - subject.id != resource.id
    access:
      policies: [TenantAdministrator]
      resource:
        type: User
        id: input.user_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/users/{user_id}/restore"
        successful_status_codes:
          - "200"
  SetUserRequiredAction:
    description: "管理者が対象ユーザーに次回ログイン時の強制アクション (RequiredAction) を\n付与する。update_password を付与されたユーザーは次回ログイン時に\nchange-password 画面へ強制誘導される (本人の変更で自動解除)。冪等で、既に\n付与済みなら現状を返す。admin 専用。\n"
    input:
      user_id:
        type: String
      request:
        type: AdminRequiredActionRequest
    output:
      user:
        type: AdminUserResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - UserRequiredActionSet
    access:
      policies: [TenantAdministrator]
      resource:
        type: User
        id: input.user_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/users/{user_id}/required_actions"
        request_form: body
  ClearUserRequiredAction:
    description: "管理者が対象ユーザーの強制アクションを解除する。冪等で、未付与なら\n現状を返す。admin 専用。本人のパスワード変更に伴う update_password の自動\n解除は ChangePassword / ResetPasswordWithToken 側で発火する。\n"
    input:
      user_id:
        type: String
    output:
      user:
        type: AdminUserResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - UserRequiredActionCleared
    access:
      policies: [TenantAdministrator]
      resource:
        type: User
        id: input.user_id
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/users/{user_id}/required_actions/{action}"
  ListGroups:
    description: 管理者が所属テナントのグループを一覧する。各グループは member_count を含む。
    output:
      response:
        type: GroupListResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: GroupDirectory
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: /api/admin/groups
  GetGroup:
    description: 管理者が単一グループとそのメンバー一覧を取得する。別テナントのグループは未存在として扱う。
    input:
      group_id:
        type: String
    output:
      group:
        type: GroupSummaryResponse
      members:
        type: "GroupMemberResponse[]"
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: Group
        id: input.group_id
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/groups/{group_id}"
  CreateGroup:
    description: 管理者が所属テナントにグループを作成する。name はテナント内で一意。
    input:
      request:
        type: GroupCreateRequest
    output:
      group:
        type: GroupSummaryResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - GroupCreated
    ensures:
      - emitted.exists(e, e is GroupCreated)
    access:
      policies: [TenantAdministrator]
      resource:
        type: GroupDirectory
        id: context.tenant_id
    bindings:
      - kind: http
        method: POST
        path: /api/admin/groups
        request_form: body
        successful_status_codes:
          - "201"
  UpdateGroup:
    description: 管理者がグループの name / description / roles を更新する。
    input:
      group_id:
        type: String
      request:
        type: GroupUpdateRequest
    output:
      group:
        type: GroupSummaryResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - GroupUpdated
    ensures:
      - "changedFields(input.request).size() > 0 ? emitted.exists(e, e is GroupUpdated) : !emitted.exists(e, e is GroupUpdated)"
    access:
      policies: [TenantAdministrator]
      resource:
        type: Group
        id: input.group_id
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/groups/{group_id}"
        request_form: body
  DeleteGroup:
    description: 管理者がグループを削除する。所属 membership は cascade で解除する。
    input:
      group_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - GroupDeleted
      - GroupMemberRemoved
    ensures:
      - emitted.exists(e, e is GroupDeleted)
      - emitted.filter(e, e is GroupMemberRemoved).size() == membersOf(input.group_id).size()
    access:
      policies: [TenantAdministrator]
      resource:
        type: Group
        id: input.group_id
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/groups/{group_id}"
        successful_status_codes:
          - "204"
  AddGroupMember:
    description: 管理者が User をグループに所属させる。同一テナントの User のみ許可し、既所属なら no-op (冪等)。
    input:
      group_id:
        type: String
      user_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - GroupMemberAdded
    idempotent: true
    ensures:
      - "alreadyMember(input.group_id, input.user_id) ? !emitted.exists(e, e is GroupMemberAdded) : emitted.exists(e, e is GroupMemberAdded)"
    access:
      policies: [TenantAdministrator]
      resource:
        type: Group
        id: input.group_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/groups/{group_id}/members/{user_id}"
        successful_status_codes:
          - "204"
  RemoveGroupMember:
    description: 管理者が User をグループから外す。非所属なら no-op (冪等)。
    input:
      group_id:
        type: String
      user_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - GroupMemberRemoved
    idempotent: true
    ensures:
      - "alreadyMember(input.group_id, input.user_id) ? emitted.exists(e, e is GroupMemberRemoved) : !emitted.exists(e, e is GroupMemberRemoved)"
    access:
      policies: [TenantAdministrator]
      resource:
        type: Group
        id: input.group_id
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/groups/{group_id}/members/{user_id}"
        successful_status_codes:
          - "204"
  UpdateDynamicGroupRule:
    description: 管理者が dynamic group の制限 CEL rule を検証して保存する。未知属性、型不一致、非 Boolean、許可外構文、上限超過は拒否する。
    input:
      group_id: { type: String }
      request: { type: DynamicGroupRuleRequest }
    output:
      rule: { type: DynamicGroupRule }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [DynamicGroupRuleUpdated]
    requires:
      - group(input.group_id).membership_type == dynamic
    access:
      policies: [TenantAdministrator]
      resource: { type: Group, id: input.group_id }
    bindings:
      - kind: http
        method: PUT
        path: "/api/admin/groups/{group_id}/dynamic-rule"
        request_form: body
  PreviewDynamicGroupRule:
    description: 最大100 Userに未保存 CEL を副作用なしで評価し、現在所属との差分だけを返す。
    input:
      group_id: { type: String }
      request: { type: DynamicGroupPreviewRequest }
    output:
      results: { type: "DynamicGroupPreviewResult[]" }
    errors: [InvalidRequestError, AccessDeniedError]
    read_only: true
    requires:
      - input.request.user_ids.size() <= 100
    access:
      policies: [TenantAdministrator]
      resource: { type: Group, id: input.group_id }
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/groups/{group_id}/dynamic-rule/preview"
        request_form: body
  EnableDynamicGroupRule:
    description: 検証済み rule を有効化し、旧 version membership を即時無効化して全件再評価 Job を予約する。
    input:
      group_id: { type: String }
    output:
      rule: { type: DynamicGroupRule }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [DynamicGroupRuleEnabled]
    access:
      policies: [TenantAdministrator]
      resource: { type: Group, id: input.group_id }
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/groups/{group_id}/dynamic-rule/enable"
  DisableDynamicGroupRule:
    description: rule を無効化して、全 dynamic membership を認可・割当判定から即時除外する。
    input:
      group_id: { type: String }
    output:
      rule: { type: DynamicGroupRule }
    errors: [InvalidRequestError, AccessDeniedError]
    emits: [DynamicGroupRuleDisabled]
    access:
      policies: [TenantAdministrator]
      resource: { type: Group, id: input.group_id }
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/groups/{group_id}/dynamic-rule/disable"
  ListUserGroups:
    description: 管理者が指定 User の所属グループと有効ロール内訳 (明示 / グループ由来 / union) を取得する。
    input:
      user_id:
        type: String
    output:
      response:
        type: UserGroupsResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: User
        id: input.user_id
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/users/{user_id}/groups"
  ListAgents:
    description: 管理者が所属テナントの Agent を一覧する。
    output:
      response:
        type: AgentListResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: AgentDirectory
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: /api/admin/agents
  GetAgent:
    description: 管理者が単一 Agent を取得する。別テナントの Agent は未存在として扱う。
    input:
      agent_id:
        type: String
    output:
      response:
        type: AgentSummaryResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: Agent
        id: input.agent_id
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/agents/{agent_id}"
  RegisterAgent:
    description: 管理者が所属テナントに Agent を登録する。name はテナント内で一意、owner_user_id 省略時は actor を所有者とする。
    input:
      request:
        type: AgentRegisterRequest
    output:
      response:
        type: AgentSummaryResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - AgentRegistered
    requires:
      - "input.request.owner_user_id == null || input.request.owner_user_id in tenantUserIds(context.tenant_id)"
    access:
      policies: [TenantAdministrator]
      resource:
        type: AgentDirectory
        id: context.tenant_id
    bindings:
      - kind: http
        method: POST
        path: /api/admin/agents
        request_form: body
        successful_status_codes:
          - "201"
  UpdateAgent:
    description: 管理者が Agent の name / description / kind / owner_user_id / roles を更新する。owner_user_id の変更は所有権移転。
    input:
      agent_id:
        type: String
      request:
        type: AgentUpdateRequest
    output:
      response:
        type: AgentSummaryResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - AgentUpdated
      - AgentOwnerChanged
    requires:
      - "input.request.owner_user_id == null || input.request.owner_user_id in tenantUserIds(context.tenant_id)"
    access:
      policies: [TenantAdministrator]
      resource:
        type: Agent
        id: input.agent_id
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/agents/{agent_id}"
        request_form: body
  DisableAgent:
    description: 管理者が Agent を可逆に運用停止する。
    input:
      agent_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - AgentDisabled
    access:
      policies: [TenantAdministrator]
      resource:
        type: Agent
        id: input.agent_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/agents/{agent_id}/disable"
        successful_status_codes:
          - "204"
  EnableAgent:
    description: 管理者が運用停止中の Agent を再稼働する。
    input:
      agent_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - AgentEnabled
    access:
      policies: [TenantAdministrator]
      resource:
        type: Agent
        id: input.agent_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/agents/{agent_id}/enable"
        successful_status_codes:
          - "204"
  KillAgent:
    description: 管理者が Agent を緊急停止する (一方向終端、復帰不能)。
    input:
      agent_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - AgentKilled
    access:
      policies: [TenantAdministrator]
      resource:
        type: Agent
        id: input.agent_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/agents/{agent_id}/kill"
        successful_status_codes:
          - "204"
  DeleteAgent:
    description: 管理者が Agent を削除する。束縛は cascade で解除する。
    input:
      agent_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - AgentDeleted
    access:
      policies: [TenantAdministrator]
      resource:
        type: Agent
        id: input.agent_id
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/agents/{agent_id}"
        successful_status_codes:
          - "204"
  BindAgentCredential:
    description: 管理者が Agent に OAuth2Client を束縛する。
    input:
      agent_id:
        type: String
      request:
        type: AgentCredentialBindRequest
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - AgentCredentialBound
    access:
      policies: [TenantAdministrator]
      resource:
        type: Agent
        id: input.agent_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/agents/{agent_id}/credentials"
        request_form: body
        successful_status_codes:
          - "204"
  UnbindAgentCredential:
    description: 管理者が Agent から OAuth2Client の束縛を解除する。
    input:
      agent_id:
        type: String
      client_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - AgentCredentialUnbound
    access:
      policies: [TenantAdministrator]
      resource:
        type: Agent
        id: input.agent_id
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/agents/{agent_id}/credentials/{client_id}"
        successful_status_codes:
          - "204"
  ListLifecycleWorkflows:
    description: 管理者が所属テナントの LifecycleWorkflow を一覧する。
    output:
      response:
        type: LifecycleWorkflowListResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: LifecycleWorkflowDirectory
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: /api/admin/lifecycle_workflows
  CreateLifecycleWorkflow:
    description: 管理者が LifecycleWorkflow を作成する。revision 1 の draft になり、name はテナント内で一意。
    input:
      request:
        type: LifecycleWorkflowCreateRequest
    output:
      workflow:
        type: LifecycleWorkflowResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - LifecycleWorkflowCreated
    ensures:
      - emitted.exists(e, e is LifecycleWorkflowCreated)
    access:
      policies: [TenantAdministrator]
      resource:
        type: LifecycleWorkflowDirectory
        id: context.tenant_id
    bindings:
      - kind: http
        method: POST
        path: /api/admin/lifecycle_workflows
        request_form: body
        successful_status_codes:
          - "201"
  GetLifecycleWorkflow:
    description: 管理者が LifecycleWorkflow 1 件を取得する。別テナントの workflow は未存在として扱う。
    input:
      workflow_id:
        type: String
    output:
      workflow:
        type: LifecycleWorkflowResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: LifecycleWorkflow
        id: input.workflow_id
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/lifecycle_workflows/{workflow_id}"
  UpdateLifecycleWorkflow:
    description: "管理者が LifecycleWorkflow の trigger/actions/表示情報を更新する。expected_revision が\ncurrent_revision と一致しない場合は WorkflowRevisionConflictError で拒否する (lost update 防止)。\ntrigger または actions が変わる場合は current_revision を 1 増やすが status/enabled_revision は\n変えない (再度 EnableLifecycleWorkflow を呼ぶまで旧 revision の trigger 評価が続く)。archived\nworkflow は拒否する。\n"
    input:
      workflow_id:
        type: String
      request:
        type: LifecycleWorkflowUpdateRequest
    output:
      workflow:
        type: LifecycleWorkflowResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
      - WorkflowRevisionConflictError
    emits:
      - LifecycleWorkflowUpdated
    access:
      policies: [TenantAdministrator]
      resource:
        type: LifecycleWorkflow
        id: input.workflow_id
    bindings:
      - kind: http
        method: PUT
        path: "/api/admin/lifecycle_workflows/{workflow_id}"
        request_form: body
  EnableLifecycleWorkflow:
    description: "管理者が current_revision を validation し、成功すれば enabled_revision に設定して\nstatus=enabled にする。以後この revision が trigger 評価対象になる。validation 失敗または\narchived workflow は拒否する。\n"
    input:
      workflow_id:
        type: String
    output:
      workflow:
        type: LifecycleWorkflowResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - LifecycleWorkflowEnabled
    access:
      policies: [TenantAdministrator]
      resource:
        type: LifecycleWorkflow
        id: input.workflow_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/lifecycle_workflows/{workflow_id}/enable"
  DisableLifecycleWorkflow:
    description: "管理者が LifecycleWorkflow を disable する。新規 trigger を止め、未開始の queued run を\ncanceled にする。running run は現在 step の checkpoint 後、次 step の前で停止する。\n"
    input:
      workflow_id:
        type: String
    output:
      workflow:
        type: LifecycleWorkflowResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - LifecycleWorkflowDisabled
    access:
      policies: [TenantAdministrator]
      resource:
        type: LifecycleWorkflow
        id: input.workflow_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/lifecycle_workflows/{workflow_id}/disable"
  ArchiveLifecycleWorkflow:
    description: 管理者が disabled の LifecycleWorkflow を archive する (終端、hard delete しない)。draft/enabled は拒否する。
    input:
      workflow_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - LifecycleWorkflowArchived
    access:
      policies: [TenantAdministrator]
      resource:
        type: LifecycleWorkflow
        id: input.workflow_id
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/lifecycle_workflows/{workflow_id}"
        successful_status_codes:
          - "204"
  DryRunLifecycleWorkflow:
    description: "管理者が enabled_revision (未指定なら current_revision) を対象 user へ試算する。同じ\nvalidator / trigger evaluator / action planner を使い、WorkflowRun / Job / membership /\nassignment / required action / status / email のいずれも作成・変更しない。\n"
    input:
      workflow_id:
        type: String
      request:
        type: LifecycleWorkflowDryRunRequest
    output:
      response:
        type: LifecycleWorkflowDryRunResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: LifecycleWorkflow
        id: input.workflow_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/lifecycle_workflows/{workflow_id}/dry_run"
        request_form: body
  ListLifecycleWorkflowRuns:
    description: 管理者が特定 LifecycleWorkflow の run 履歴を新しい順に一覧する。
    input:
      workflow_id:
        type: String
    output:
      response:
        type: WorkflowRunListResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: LifecycleWorkflow
        id: input.workflow_id
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/lifecycle_workflows/{workflow_id}/runs"
  GetLifecycleWorkflowRun:
    description: 管理者が WorkflowRun 1 件の詳細 (trigger、revision、target user、Job attempt、各 step) を取得する。別テナントの run は未存在として扱う。
    input:
      run_id:
        type: String
    output:
      response:
        type: WorkflowRunResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: WorkflowRun
        id: input.run_id
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/lifecycle_workflow_runs/{run_id}"
  RetryLifecycleWorkflowRun:
    description: "管理者が partially_failed または failed の WorkflowRun を再試行する。未完了 (failed) step\nだけを対象に新しい Job を関連付ける。changed / no_op 済み step は変更しない。disable と競合する\n場合は新しい step を開始しない。\n"
    input:
      run_id:
        type: String
    output:
      response:
        type: WorkflowRunResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    access:
      policies: [TenantAdministrator]
      resource:
        type: WorkflowRun
        id: input.run_id
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/lifecycle_workflow_runs/{run_id}/retry"
authorization:
  resources:
    UserDirectory:
      description: テナント内の User 一覧・作成対象を表す singleton resource。
    GroupDirectory:
      description: テナント内の Group 一覧・作成対象を表す singleton resource。
    AgentDirectory:
      description: テナント内の Agent 一覧・登録対象を表す singleton resource。
    LifecycleWorkflowDirectory:
      description: テナント内の LifecycleWorkflow 一覧・作成対象を表す singleton resource。
  principals:
    TenantAdministrator:
      type: User
      matches:
        - context.authenticated
        - principal.status == "Active"
        - '"admin" in principal.roles'
    AuthenticatedSelf:
      type: User
      matches:
        - context.authenticated
        - principal.status == "Active"
  policies:
    TenantAdministrator:
      effect: permit
      principal: TenantAdministrator
      when: principal.tenant_id == resource.tenant_id
    AuthenticatedSelf:
      effect: permit
      principal: AuthenticatedSelf
      when: principal.id == resource.id
objectives:
  LifecycleWorkflowTriggerHandoffLatency:
    description: "User mutation の commit から WorkflowRun 作成までの遅延の99%以上を5秒未満に収める。\nAPI process の即時 dispatch が失敗しても、periodic dispatcher が同じ目標内に未 enqueue run を\n回収することを含む。\n"
    indicator: measurement.latency < duration("5s")
    target: 0.99
    window: 30d
    budgeting: occurrences
scenarios:
  管理者は CSV を検証して有効な行だけをインポートできる:
    actor: TenantAdministrator
    given:
      - "roles=[\"admin\"] のユーザー \"operator\" が管理画面のユーザー一覧を開いている"
    main_success:
      - "管理者が CSV を dry_run で投入する"
      - "job result に行番号と error code が表示され、User は作成されない"
      - "管理者が修正済み CSV を apply で投入する"
      - "有効行だけが UserCreated として作成され、無効行は結果に残る"
    extensions:
      - at: 1
        condition: CSV が 1 MiB、1,000 行、64 KiB/field のいずれかを超える
        steps:
          - "インポート投入は拒否される"
          - "エラー \"csv_too_large\" または \"too_many_rows\" または \"field_too_large\""
      - at: 1
        condition: CSV のヘッダー列が preferred_username,email,name,roles と一致しない (password 列を含む場合を含む)
        steps:
          - "インポート投入は拒否される"
          - "エラー \"invalid_header\""
  管理者はエージェントを登録し client 資格情報をバインドできる:
    actor: TenantAdministrator
    given:
      - "roles=[\"admin\"] のユーザー \"operator\" が管理画面のエージェント一覧を開いている"
    main_success:
      - "管理者 \"operator\" がエージェント \"batch-agent\" を登録する"
      - "管理者 \"operator\" がエージェント \"batch-agent\" に client 資格情報をバインドする"
      - "管理者 \"operator\" がエージェント \"batch-agent\" を無効化する"
      - "管理者 \"operator\" がエージェント \"batch-agent\" を再有効化する"
      - "エージェント一覧に \"batch-agent\" が表示される"
    extensions:
      - at: 2
        condition: 別テナントの client 資格情報をバインドする
        steps:
          - "tenant_id \"acme\" の Agent に tenant_id \"default\" の client_id を指定する"
          - "エラー \"InvalidRequestError\""
  管理者は無効化したユーザーを再有効化できる:
    actor: TenantAdministrator
    given:
      - "管理者がユーザー \"alice\" を無効化している"
    main_success:
      - "管理者がユーザー \"alice\" を再有効化する"
      - "ユーザー \"alice\" の status は Active である"
      - "\"UserEnabled\" が発行される"
  管理者はユーザーを soft-delete し 猶予期間内に復元できる:
    actor: TenantAdministrator
    given:
      - "roles=[\"admin\"] のユーザー \"operator\" が管理画面のユーザー一覧を開いている"
      - "ユーザー \"alice\" は Active である"
    main_success:
      - "管理者 \"operator\" がユーザー \"alice\" を削除する"
      - "ユーザー \"alice\" の status は PendingDeletion である"
      - "\"UserSoftDeleted\" が発行される"
      - "管理者 \"operator\" がユーザー \"alice\" を復元する"
      - "ユーザー \"alice\" の status は Active である"
      - "\"UserRestored\" が発行される"
  soft-delete されたユーザーはログインを拒否される:
    actor: EndUser
    given:
      - "ユーザー \"alice\" は PendingDeletion である"
    main_success:
      - "ユーザー \"alice\" が正しいパスワードでログインを試みる"
      - "ログインは拒否される"
  管理者はユーザーを完全削除できる:
    actor: TenantAdministrator
    given:
      - "ユーザー \"alice\" は PendingDeletion である"
    main_success:
      - "管理者がユーザー \"alice\" を完全削除する"
      - "ユーザー \"alice\" の status は Deleted である"
      - "\"UserDeleted\" が発行される"
    extensions:
      - at: 1
        condition: "対象が admin 自身である"
        steps:
          - "soft-delete / 復元 / 完全削除のいずれも拒否される"
          - "エラー \"self_delete_forbidden\""
  ロールに応じて管理APIのアクセスが制御される:
    actor: TenantAdministrator
    given:
      - "roles に \"admin\" を持つユーザー \"operator\" が認証済みである"
    main_success:
      - "管理者 \"operator\" が preferred_username \"bob\" のユーザーを作成する"
      - "管理者 \"operator\" がユーザー一覧を取得する"
      - "応答にユーザー \"bob\" が含まれる"
      - "\"UserCreated\" が発行される"
    extensions:
      - at: 2
        condition: admin ロールを持たないユーザーが管理 API を呼ぶ
        steps:
          - "roles が空のユーザー \"alice\" が認証済みである"
          - "ユーザー \"alice\" がユーザー一覧を取得する"
          - "エラー \"AccessDeniedError\""
  管理者はグループを作成しユーザーを所属させると有効ロールにグループ由来ロールが乗る:
    actor: TenantAdministrator
    given:
      - "roles=[\"admin\"] のユーザー \"operator\" が認証済みである"
      - "roles が空のユーザー \"alice\" が同一テナントに存在する"
    main_success:
      - "管理者 \"operator\" が roles=[\"catalog:read\"] のグループ \"engineering\" を作成する"
      - "\"GroupCreated\" が発行される"
      - "管理者 \"operator\" がユーザー \"alice\" をグループ \"engineering\" に所属させる"
      - "\"GroupMemberAdded\" が発行される"
      - "ユーザー \"alice\" の所属グループを取得すると effective_roles に \"catalog:read\" が含まれる"
      - "group_roles は \"catalog:read\" を含み direct_roles は空である"
    extensions:
      - at: 4
        condition: 同じユーザーを同じグループへ再度所属させる
        steps:
          - "管理者 \"operator\" がユーザー \"alice\" をグループ \"engineering\" に再度所属させる"
          - "\"GroupMemberAdded\" は再発行されない"
  ユーザーは自分のプロフィール表示名を更新できる:
    actor: AuthenticatedSelf
    given:
      - "ユーザー \"alice\" が認証済みでマイアカウントのプロフィールを開いている"
    main_success:
      - "ユーザー \"alice\" が表示名を更新する"
      - 更新後のプロフィールに新しい表示名が反映される
      - editable_by_user=false の属性は更新できない
  ユーザーはメールアドレス変更を起票し確認リンクで確定できる:
    actor: AuthenticatedSelf
    given:
      - "ユーザー \"alice\" が認証済みでメールアドレス画面を開いている"
    main_success:
      - "ユーザー \"alice\" が新しいメールアドレスへの変更を起票する"
      - 新アドレスへ確認リンクが送られる
      - "ユーザー \"alice\" が確認リンクのトークンで変更を確定する"
      - primary email が新しいアドレスへ更新される
  ユーザーは自分のアカウントデータをエクスポートできる:
    actor: AuthenticatedSelf
    given:
      - "ユーザー \"alice\" が認証済みでデータとプライバシー画面を開いている"
    main_success:
      - "ユーザー \"alice\" がアカウントデータをエクスポートする"
      - 応答に自分の profile と consents が含まれる
  マイアカウントAPIは他人のリソースを返さない:
    actor: AuthenticatedSelf
    given:
      - "ユーザー \"alice\" が認証済みである"
    main_success:
      - "ユーザー \"alice\" のマイアカウント概要を取得する"
      - "応答は \"alice\" 自身のデータだけで roles を含まない"
  管理者はCELルールで動的グループ所属を管理できる:
    actor: TenantAdministrator
    given:
      - department 属性が定義され Engineering の User と Sales の User が存在する
      - membership_type=dynamic のグループが存在する
    main_success:
      - 管理者が `user.department == "Engineering"` を保存して有効化する
      - 全件再評価後に Engineering の Active User だけが dynamic_rule source で所属する
      - effective_roles と application assignment はその所属を参照する
  CELルールは保存前に選択ユーザーでプレビューできる:
    actor: TenantAdministrator
    given:
      - 管理者が最大100 Userを選択している
    main_success:
      - 未保存 CEL を評価する
      - 応答は matched と add/remove/unchanged を返し属性値を返さない
  不正なCELルールと動的グループの手動操作は拒否される:
    actor: TenantAdministrator
    main_success:
      - 未定義属性または許可外関数を参照する CEL の保存は拒否される
      - dynamic group への手動 AddGroupMember と RemoveGroupMember は拒否される
  評価不能なルールは権限を付与しない:
    actor: TenantAdministrator
    given:
      - 有効な dynamic rule の version が更新された
    main_success:
      - 旧 version の membership は直ちに effective roles から除外される
      - 再評価が失敗した User は新 version の membership を取得しない
  管理者が定義したworkflowが部署変更でグループとアプリ割当を更新する:
    actor: TenantAdministrator
    given:
      - "roles=[\"admin\"] の管理者 \"operator\" が LifecycleWorkflow \"engineering-onboarding\" (trigger=user_attributes_changed department、action=add_group_member+assign_application) を enable 済みである"
      - "ユーザー \"alice\" は department=\"Sales\" である"
    main_success:
      - "管理者 \"operator\" がユーザー \"alice\" の department を \"Engineering\" に更新する"
      - "WorkflowRun が作成され trigger snapshot に changed_fields=[\"department\"] を保持する"
      - "worker が run を実行し add_group_member と assign_application の step が changed になる"
      - "run の status は succeeded である"
      - "\"LifecycleWorkflowRunSucceeded\" が発行される"
  User変更とWorkflowRunのcaptureは同じ整合性境界で確定しenqueue障害から回復する:
    actor: TenantAdministrator
    given:
      - "user_created / user_attributes_changed / user_status_changed のいずれかに一致する enabled workflow がある"
    main_success:
      - User mutation と重複排除キー (tenant_id, workflow_id, revision, source_occurrence_id, target_user_id) を持つ queued WorkflowRun および pending WorkflowStep が同一 transaction で確定する
      - 同じ source occurrence の再配送は既存 WorkflowRun に収束し、step を重複作成しない
    extensions:
      - at: 2
        condition: Job enqueue が一時的に失敗する
        steps:
          - WorkflowRun は job_id 未設定の queued 状態で残る
          - worker の周期的 dispatcher が未 enqueue run を再走査し、重複しない lifecycle_workflow_run Job を関連付ける
  既に目的状態のactionはno_opとして扱われる:
    actor: TenantAdministrator
    given:
      - "ユーザー \"alice\" は既に対象 Group のメンバーである"
      - "enable 済みの workflow が \"alice\" の department 変更で add_group_member を実行する"
    main_success:
      - "add_group_member の step outcome は no_op である"
      - "membership の重複行は作成されない"
      - "run の status は succeeded である"
  値が変わらない属性更新とdynamic groupへのaction指定は境界として扱われる:
    actor: TenantAdministrator
    given:
      - "\"alice\" の department は既に \"Engineering\" である"
    main_success:
      - "管理者が \"alice\" の department に同じ値 \"Engineering\" を指定して更新する"
      - "user_attributes_changed trigger は発火せず WorkflowRun は作成されない"
    extensions:
      - at: 1
        condition: workflow の add_group_member action に dynamic group を指定して保存する
        steps:
          - 保存は拒否される
          - "エラー \"InvalidRequestError\""
  未知fieldや別テナントresourceを参照するworkflowはenableできない:
    actor: TenantAdministrator
    given:
      - "tenant_id \"acme\" の管理者が workflow を編集している"
    main_success:
      - "TenantUserAttributeSchema に存在しない field を filter に指定して保存する"
      - "エラー \"InvalidRequestError\""
    extensions:
      - at: 1
        condition: "tenant_id \"default\" の group_id を action に指定して enable する"
        steps:
          - enable は拒否される
          - "エラー \"InvalidRequestError\""
  通知失敗があってもアクセス剥奪actionは前進する:
    actor: TenantAdministrator
    given:
      - "enable 済みの leaver workflow が disable_user、remove_group_member、send_email を定義順に持つ"
      - 対象 User に verified primary email がない
    main_success:
      - 退職相当の status 変更で run が作成される
      - "disable_user と remove_group_member の step は changed になる"
      - "send_email の step は blocked failure になる"
      - "run の status は partially_failed である"
      - "\"LifecycleWorkflowRunPartiallyFailed\" と \"LifecycleWorkflowStepFailed\" が発行される"
  一時的な失敗はretryで成功済みstepを飛ばして収束する:
    actor: TenantAdministrator
    given:
      - "enable 済みの workflow による run が 1 attempt 目で repository timeout により一部 step 未完了である"
    main_success:
      - handler が Jobs に retryable error を返す
      - Jobs が backoff 後に同じ run の Job を再試行する
      - retry では changed / no_op 済み step は再実行されず failed step だけが再実行される
      - "管理者が run detail を確認すると status は succeeded である"
  同一ユーザーのrunは発火順に直列化され副作用前に再検証される:
    actor: TenantAdministrator
    given:
      - "同じ target user に対する queued WorkflowRun が triggered_at 順に2件ある"
    main_success:
      - worker は先行 run が terminal になるまで後続 run の action を開始しない
      - 各 action の直前に対象 user と group/application resource を同一 tenant 内で再取得する
      - 削除済みまたは別 tenant の resource を参照する step は sanitised error code で failed checkpoint される
  disableは未開始のqueued runをcancelし実行中のrunはstep境界で止まる:
    actor: TenantAdministrator
    given:
      - "workflow が enabled で running の WorkflowRun \"run-1\" と queued の WorkflowRun \"run-2\" が存在する"
    main_success:
      - 管理者が workflow を disable する
      - "\"run-2\" は直ちに canceled になる"
      - "\"run-1\" は現在の step の checkpoint 後、次の step の前で canceled になる"
      - disable 後に新しい trigger は run を作らない
    extensions:
      - at: 1
        condition: disable と retry が競合する
        steps:
          - disable 済み workflow の run に対する retry は新しい step を開始しない
          - "エラー \"InvalidRequestError\""
  別テナントのworkflowとresourceはテナント境界を越えない:
    actor: TenantAdministrator
    given:
      - "tenant_id \"acme\" の管理者が tenant_id \"default\" の workflow_id を指定して取得する"
    main_success:
      - workflow は未存在として扱われる
    extensions:
      - at: 1
        condition: "tenant_id \"acme\" の workflow の action が tenant_id \"default\" の group_id を参照する"
        steps:
          - 保存または run 実行時に拒否され、別テナントの同名 resource へ fallback しない
          - "エラー \"InvalidRequestError\""
  dry-runはaction結果を試算するがWorkflowRunやJobを作成しない:
    actor: TenantAdministrator
    given:
      - workflow が enabled で対象 User が action の一部について既に目的状態である
    main_success:
      - 管理者が dry_run を呼び出す
      - "応答は action ごとに would_change / no_op / blocked と理由を返す"
      - "WorkflowRun、Job、membership、assignment、required action、status、email は一切作成・変更されない"
flows:
  AdminUsers:
    entry: AdminUsers
    views:
      AdminUsers:
        sees: ユーザー管理画面(ユーザー一覧、詳細、所属グループ、CSV インポート)
        does:
          - action: list
            does: 画面を開く
            interface: ListAdminUsers
            to: AdminUsers
          - action: view
            does: 一覧からユーザーを1件クリックして詳細を表示する
            interface: GetAdminUser
            to: AdminUsers
          - action: create
            does: ユーザー名・初期パスワード等を入力して作成する
            interface: CreateAdminUser
            to: AdminUsers
          - action: update
            does: プロフィール・email_verified・roles を編集して保存する
            interface: UpdateAdminUser
            to: AdminUsers
          - action: disable
            does: 無効化ボタンをクリックする
            interface: DisableAdminUser
            to: AdminUsers
          - action: enable
            does: 有効化ボタンをクリックする
            interface: EnableAdminUser
            to: AdminUsers
          - action: delete
            does: 削除ボタンをクリックする
            interface: DeleteAdminUser
            to: AdminUsers
          - action: restore
            does: 復元ボタンをクリックする
            interface: RestoreAdminUser
            to: AdminUsers
          - action: set_required_action
            does: 次回ログイン時の強制アクションを選んで付与する
            interface: SetUserRequiredAction
            to: AdminUsers
          - action: clear_required_action
            does: 付与済みの強制アクションを解除する
            interface: ClearUserRequiredAction
            to: AdminUsers
          - action: import
            does: CSV ファイルを選択して、dry_run または apply を実行する
            interface: ImportAdminUsers
            to: AdminUsers
          - action: view_import
            does: インポートジョブを選んで、行ごとの検証・適用結果を表示する
            interface: GetAdminUserImport
            to: AdminUsers
          - action: view_groups
            does: ユーザーの所属グループとロール内訳を表示する
            interface: ListUserGroups
            to: AdminUsers
          - action: add_to_group
            does: 所属させるグループを選んで追加する
            interface: AddGroupMember
            to: AdminUsers
          - action: group_management_selected
            does: グループ管理タブをクリックする
            to: AdminGroups
          - action: application_management_selected
            does: アプリケーション管理へのリンクをクリックする
            external: true
  AdminGroups:
    entry: AdminGroups
    views:
      AdminGroups:
        sees: グループ管理画面(グループ一覧、メンバー、動的グループルール)
        does:
          - action: list
            does: 画面を開く
            interface: ListGroups
            to: AdminGroups
          - action: view
            does: 一覧からグループを1件クリックして詳細を表示する
            interface: GetGroup
            to: AdminGroups
          - action: create
            does: グループ名を入力して作成する
            interface: CreateGroup
            to: AdminGroups
          - action: update
            does: 名前・説明・roles を編集して保存する
            interface: UpdateGroup
            to: AdminGroups
          - action: delete
            does: 削除ボタンをクリックする
            interface: DeleteGroup
            to: AdminGroups
          - action: add_member
            does: 追加するユーザーを選ぶ
            interface: AddGroupMember
            to: AdminGroups
          - action: remove_member
            does: メンバーを選んで、外すボタンをクリックする
            interface: RemoveGroupMember
            to: AdminGroups
          - action: update_dynamic_rule
            does: 動的グループの制限 CEL ルールを編集して保存する
            interface: UpdateDynamicGroupRule
            to: AdminGroups
          - action: preview_dynamic_rule
            does: 未保存の CEL ルールをプレビューして、現在所属との差分を確認する
            interface: PreviewDynamicGroupRule
            to: AdminGroups
          - action: enable_dynamic_rule
            does: 動的グループルールを有効化する
            interface: EnableDynamicGroupRule
            to: AdminGroups
          - action: disable_dynamic_rule
            does: 動的グループルールを無効化する
            interface: DisableDynamicGroupRule
            to: AdminGroups
          - action: view_users
            does: グループのメンバー一覧からユーザー管理へ移動する
            interface: ListAdminUsers
            to: AdminUsers
  AdminAgents:
    entry: AdminAgents
    views:
      AdminAgents:
        sees: エージェント管理画面(エージェント一覧、詳細、資格情報の束縛)
        does:
          - action: list
            does: 画面を開く
            interface: ListAgents
            to: AdminAgents
          - action: view
            does: 一覧からエージェントを1件クリックして詳細を表示する
            interface: GetAgent
            to: AdminAgents
          - action: register
            does: 名前等を入力して登録する
            interface: RegisterAgent
            to: AdminAgents
          - action: update
            does: 名前・説明・種別・所有者・roles を編集して保存する
            interface: UpdateAgent
            to: AdminAgents
          - action: disable
            does: 停止ボタンをクリックする
            interface: DisableAgent
            to: AdminAgents
          - action: enable
            does: 再開ボタンをクリックする
            interface: EnableAgent
            to: AdminAgents
          - action: kill
            does: 緊急停止ボタンをクリックする
            interface: KillAgent
            to: AdminAgents
          - action: delete
            does: 削除ボタンをクリックする
            interface: DeleteAgent
            to: AdminAgents
          - action: bind_credential
            does: 束縛する OAuth2 client を選ぶ
            interface: BindAgentCredential
            to: AdminAgents
          - action: unbind_credential
            does: 束縛を解除するボタンをクリックする
            interface: UnbindAgentCredential
            to: AdminAgents
  AdminRoles:
    entry: AdminRoles
    views:
      AdminRoles:
        sees: ロール一覧画面
        does:
          - action: list
            does: 画面を開く
            interface: ListAdminUsers
            to: AdminRoles
  AccountHome:
    entry: AccountHome
    views:
      AccountHome:
        sees: アカウントホーム画面(最終ログイン・パスワード変更日時・MFA 状態・未対応の必須アクション)
        does:
          - action: view_summary
            does: 画面を開く
            interface: GetAccountSummary
            to: AccountHome
          - action: security_selected
            does: セキュリティタブをクリックする
            to: AccountSecurity
          - action: profile_selected
            does: プロフィールタブをクリックする
            to: AccountProfile
          - action: activity_selected
            does: アクティビティタブをクリックする
            to: AccountActivity
          - action: connected_apps_selected
            does: 連携アプリタブをクリックする
            to: AccountApplications
  AccountProfile:
    entry: AccountProfile
    views:
      AccountProfile:
        sees: プロフィール画面(表示名、編集可能な属性一覧)
        does:
          - action: view
            does: 画面を開く
            interface: GetUserProfile
            to: AccountProfile
          - action: update
            does: 表示名または編集可能な属性を変更して保存する
            interface: UpdateUserProfile
            to: AccountProfile
  AccountEmails:
    entry: AccountEmails
    views:
      AccountEmails:
        sees: メールアドレス変更画面(新しいメールアドレス入力フォーム)
        does:
          - action: request_change
            does: 新しいメールアドレスを入力して、変更をリクエストする
            interface: RequestEmailChange
            to: AccountEmailVerify
      AccountEmailVerify:
        sees: メールアドレス確認待ち画面
        does:
          - action: verify_link_opened
            does: メールで届いた確認リンクを開く
            interface: ConfirmEmailChange
            external: true
  AccountData:
    entry: AccountData
    views:
      AccountData:
        sees: アカウントデータ画面(プロフィールと同意済み事項のエクスポート)
        does:
          - action: export
            does: エクスポートボタンをクリックする
            interface: ExportAccountData
            to: AccountData
  AdminLifecycleWorkflows:
    entry: AdminLifecycleWorkflows
    views:
      AdminLifecycleWorkflows:
        sees: LifecycleWorkflow一覧画面(name、status、trigger種別)
        does:
          - action: list
            does: 画面を開く
            interface: ListLifecycleWorkflows
            to: AdminLifecycleWorkflows
          - action: create
            does: trigger と action を型付き form で入力して作成する
            interface: CreateLifecycleWorkflow
            to: AdminLifecycleWorkflowEditor
          - action: view
            does: 一覧から workflow を1件クリックして編集画面を開く
            interface: GetLifecycleWorkflow
            to: AdminLifecycleWorkflowEditor
      AdminLifecycleWorkflowEditor:
        sees: 構造化editor画面(trigger/filter/action の型付き form、validation summary、保存前の action 順序表示)
        does:
          - action: update
            does: trigger/actions/表示情報を編集して保存する (expected_revision による楽観ロック)
            interface: UpdateLifecycleWorkflow
            to: AdminLifecycleWorkflowEditor
          - action: dry_run
            does: 対象 user を指定して dry-run を実行し would-change/no-op/blocked を確認する
            interface: DryRunLifecycleWorkflow
            to: AdminLifecycleWorkflowEditor
          - action: enable
            does: validation に成功した revision を enable する
            interface: EnableLifecycleWorkflow
            to: AdminLifecycleWorkflowEditor
          - action: disable
            does: 影響 (未開始 run の cancel、実行中 run の停止範囲) を確認して disable する
            interface: DisableLifecycleWorkflow
            to: AdminLifecycleWorkflowEditor
          - action: archive
            does: disabled の workflow を archive する
            interface: ArchiveLifecycleWorkflow
            to: AdminLifecycleWorkflows
          - action: view_runs
            does: 実行履歴画面へ移動する
            interface: ListLifecycleWorkflowRuns
            to: AdminLifecycleWorkflowRuns
      AdminLifecycleWorkflowRuns:
        sees: 実行履歴画面(triggered_at、target user、status の一覧)
        does:
          - action: list
            does: workflow の run 一覧を表示する
            interface: ListLifecycleWorkflowRuns
            to: AdminLifecycleWorkflowRuns
          - action: view
            does: run を1件クリックして詳細を表示する
            interface: GetLifecycleWorkflowRun
            to: AdminLifecycleWorkflowRunDetail
      AdminLifecycleWorkflowRunDetail:
        sees: run detail画面(trigger、固定 revision、target user、Job attempt、各 step の outcome/error_code/timestamp)
        does:
          - action: view
            does: 画面を開く
            interface: GetLifecycleWorkflowRun
            to: AdminLifecycleWorkflowRunDetail
          - action: retry
            does: partially_failed / failed の run を再試行する
            interface: RetryLifecycleWorkflowRun
            to: AdminLifecycleWorkflowRunDetail
