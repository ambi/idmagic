    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 操作対象テナント ID。actor / target と一致する。
      actorUserId:
        type: String
      targetUserId:
        type: String
      reason:
        type: String
        optional: true
  UserRequiredActionSet:
    kind: event
    description: 管理者が次回ログイン時の強制アクション (RequiredAction) を付与した。action は enum 値で、監査に平文で残しても安全。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 操作対象テナント ID。actor / target と一致する。
      actorUserId:
        type: String
      targetUserId:
        type: String
  UserRequiredActionCleared:
    kind: event
