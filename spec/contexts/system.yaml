    - id: UX-LOCALE
      category: localization
      adoption: required
      statement: "UI文言はjaとenの辞書で提供する。表示言語(DisplayLanguage)は 明示選択 > OIDCのui_localesヒント > 保存済み設定 > ブラウザ言語 > 既定locale(FallbackLocale=ja) の優先順で解決する。未対応localeおよび辞書keyが欠落しているlocaleは既定locale(ja)にフォールバックする。ui_localesヒントは明示選択済みの表示言語を上書きしない。"
      screens:
