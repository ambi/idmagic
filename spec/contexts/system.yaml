        - UpdateAdminSettings
        - CreateAdminOAuth2Client
        - UpdateAdminOAuth2Client
        - DeleteAdminOAuth2Client
      standards:
        - RFC9700
        - FAPI2SecurityProfile
    - id: UX-NO-STORE
      category: privacy
      adoption: required
      statement: 認証トランザクション、CSRF token、user_code、管理対象データ、自己アカウントデータを含むブラウザAPI応答は保存キャッシュを禁止する。
