# idmagic System — SCL
# Generated from idmagic/spec/scl.yaml during SCL 2.0 context split.

system: idmagic
spec_version: "2.0"
context: System
standards:
  WCAG22:
    title: Web Content Accessibility Guidelines 2.2
    version: W3C Recommendation
    url: https://www.w3.org/TR/WCAG22/
    roles:
      - UserInterface
    scope: ブラウザ認証UIのLevel AAアクセシビリティ。
    requirements:
      - id: WCAG22-KEYBOARD
        section: 2.1.1
        strength: MUST
        adoption: required
        statement: すべての認証操作をキーボードだけで完了可能にする。
      - id: WCAG22-FOCUS
        section: "2.4.7, 2.4.11"
        strength: MUST
        adoption: required
        statement: フォーカスを視認可能にし重要な要素が完全に隠れないようにする。
      - id: WCAG22-LABELS-ERRORS
        section: "3.3.1, 3.3.2"
        strength: MUST
        adoption: required
        statement: 入力にラベルを付け、エラーをテキストで識別して修正方法を示す。
      - id: WCAG22-STATUS
        section: 4.1.3
        strength: MUST
        adoption: required
        statement: 認証結果や送信エラーをフォーカス移動なしに支援技術へ通知する。
  GDPR:
    title: General Data Protection Regulation
    version: Regulation (EU) 2016/679
    url: https://eur-lex.europa.eu/eli/reg/2016/679/oj
    roles:
      - DataController
    scope: 同意、監査、保存期間、削除後の個人データ処理。
    requirements:
      - id: GDPR-CONSENT-WITHDRAWAL
        section: Article 7(3)
        strength: MUST
        adoption: required
        statement: ResourceOwnerが同意を撤回でき、撤回後の新規発行へ利用しない。
        relates_to:
          models:
            - Consent
          states:
            - ConsentLifecycle
      - id: GDPR-ERASURE
        section: Article 17
        strength: MUST
        adoption: required
        statement: 削除要求後は法的保存義務を除くPIIを定義済み期間内に消去する。
        relates_to:
          objectives:
            - PiiPurgeAfterDeletion
      - id: GDPR-PROCESSING-RECORDS
        section: Article 30
        strength: MUST
        adoption: required
        statement: セキュリティ・認可イベントの監査記録を定義済み期間保持する。
        relates_to:
          objectives:
            - AuditLogRetention
glossary:
  EventLog:
    definition: "業務コマンドが確定した事実を記録する不変 (append-only) の event 原本。行は追記後に更新されず、\n監査原本と Kafka 配送の両方の情報源になる。public_integration / audit_only に分類された\nDomainEvent は、対応する業務状態の更新と同一 PostgreSQL transaction で commit される。\n"
    aliases:
      - event_logs
      - イベントログ
    not_to_confuse_with:
      - term: EventDelivery
        reason: EventLog は不変の事実の記録、EventDelivery は同じ event の Kafka への配送試行・状態を追跡する可変レコード。
      - term: outbox
        reason: outbox はイベント本文と Kafka 配送状態を同じ可変行に持つ旧方式。EventLog / EventDelivery はこの責務を分離する後継。
  EventDelivery:
    definition: EventLog の 1 行を Kafka へ配送するための可変な進行状態 (試行回数、直近エラー、配送完了時刻)。event 本文は保持せず event_id で EventLog を参照する。
    aliases:
      - event_deliveries
      - 配送状態
  DomainEventClassification:
    definition: "DomainEvent を public_integration (他 context / 外部への公開契約)、audit_only (監査原本のみ)、\ntelemetry (event log 対象外の運用計測) の三分類に区分する棚卸し軸。分類が EventLog への記録要否と\nKafka publish 要否を決定する。\n"
    aliases:
      - event classification
      - イベント分類
models:
  EventLogRecord:
    kind: entity
    identity: id
    description: "PostgreSQL の event_logs 1 行。業務コマンドの commit と同一 transaction で追記され、\n追記後は更新されない (PersistedModelTimestamps の immutable_record)。tenant、actor、subject、\noccurred_at、correlation_id を持ち、payload は分類ごとに固定された必須属性を満たす。外部語彙 event_id は Kafka header と EventDeliveryRecord の参照名として維持し、その値は id に写像する。\n"
    fields:
      id:
        type: UUID
        description: event_logs の内部 primary key。Kafka message header と EventDeliveryRecord の event_id はこの値に写像される。
      tenant_id:
        type: String
        description: イベントが帰属するテナント ID。
      type:
        type: String
        description: DomainEvent のワイヤ名 (例 AccessTokenIssued)。
      classification:
        type: DomainEventClassification
      actor:
        type: String
        optional: true
        description: 操作を実行した主体の識別子。起動時イベントなど主体を持たない場合は省略する。
      subject:
        type: String
        optional: true
        description: 操作対象の識別子 (例 対象 User の sub)。
      correlation_id:
        type: String
        description: 同一 HTTP request / command に属するイベントを束ねる相関 ID。
      occurred_at:
        type: Timestamp
        description: 業務上イベントが確定した時刻。
      created_at:
        type: Timestamp
        description: event_logs への追記時刻 (PersistedModelTimestamps)。occurred_at とは独立。
      payload:
        type: JSON
        description: 分類ごとに固定された必須属性を満たす構造化本文。PII は発行元 context の方針に従い redact / hash する。
  EventDeliveryRecord:
    kind: entity
    identity: event_id
    description: EventLogRecord 1 行を Kafka へ配送するための可変な進行状態。本文は持たず event_id で参照する。
    fields:
      event_id:
        type: UUID
        description: 対象 EventLogRecord.id。Kafka header の外部語彙 event_id と同じ UUID 値を保持する。
      status:
        type: EventDeliveryStatus
      attempts:
        type: Integer
        description: publish 試行回数。
      last_error:
        type: String
        optional: true
      delivered_at:
        type: Timestamp
        optional: true
        description: Kafka broker への publish 成功時刻。ack 後の relay 停止による重複配送は許容する。
      updated_at:
        type: Timestamp
  DomainEventClassification:
    kind: enum
    description: DomainEvent の三分類。分類が EventLog への記録要否と Kafka publish 要否を決定する。
    values:
      - public_integration
      - audit_only
      - telemetry
  EventDeliveryStatus:
    kind: enum
    description: EventDeliveryRecord の配送状態。
    values:
      - pending
      - delivered
      - failed
invariants:
  PersistedModelTimestamps:
    description: "永続化される状態モデルは作成時刻を持つ。作成後に現在状態が更新されるモデルは更新時刻も持つ。作成後は不可変で、消費または削除のみされる記録モデルは更新時刻を持たない。issued_at / granted_at / occurred_at / expires_at / revoked_at / first_seen / last_seen などのドメイン時刻は作成時刻を置き換えない。イベントログは履歴・監査の真実だが、created_at / updated_at は現在状態の検索・表示・同期・運用確認のためのモデル属性である。"
    target: PersistedStateModel
    always: "persisted_model has created_at and (mutable_persisted_model implies has updated_at) and (immutable_record implies not has updated_at)"
  EventLogFailureIsObservable:
    description: "業務状態の commit 後に行う audit_only DomainEvent の記録は best-effort とする。記録に失敗しても業務操作を rollback しないが、失敗は event type と tenant を含む構造化ログと運用シグナルへ記録し、reconciliation の入力として残す。"
    target: EventLogRecord
    assuming: "command.emits_classification == audit_only and event_log_write_failed(command)"
    eventually: "event_log_failure_observed(command)"
  EventDeliveryRetainsFailedEventLog:
    description: "Kafka publish が失敗しても対象 EventLogRecord は削除・変更されない。EventDeliveryRecord.status のみ failed に遷移し、再試行対象として残る。"
    target: EventLogRecord
    assuming: "event_delivery.status == failed"
    always: "event_log_record.exists and event_log_record.payload == prev.event_log_record.payload"
  EventDeliveryEventuallyDelivered:
    description: "commit 済みで classification が public_integration の EventLogRecord は、対応する EventDeliveryRecord がいずれ delivered に到達するまで relay が再試行する。publish が Kafka broker に ack された後の relay プロセス停止による同一 event_id の重複配送は許容し、消費側が event_id を冪等キーとして重複排除する。"
    target: EventDeliveryRecord
    assuming: "event_log_record.classification == public_integration"
    eventually: { in: [status, [delivered]] }
objectives:
  DatabaseResilience:
    kind: security
    description: "PostgreSQL への接続に対して、プール調整(MaxConns, MinConns, MaxConnIdleTime, MaxConnLifetime)を構成可能とし、接続瞬断時のリトライポリシー、タイムアウト、およびサーキットブレイカーによる障害隔離を提供する。サーキットがオープンした際、リクエストは即座に503エラーで遮断されるが、JWKS などの静的・キャッシュ可能なエンドポイントはメモリキャッシュを利用して縮退運転(グレイスフル劣化)を継続する。"
    policy: database_resilience
    target: DatabaseClient
    value:
      max_conns: 50
      min_conns: 2
      max_conn_idle_time_seconds: 1800
      max_conn_lifetime_seconds: 3600
      timeout_seconds: 5
      circuit_breaker:
        failure_threshold: 0.5
        cooldown_seconds: 30
      retry:
        max_attempts: 3
        backoff_factor: 2.0
  ValkeyResilience:
    kind: security
    description: "Valkey への接続および操作に対してタイムアウトを設定し、障害発生時にサーキットブレイカーによる隔離を行う。Valkey 障害によるハングを防止し、即座の 503 エラーによるフェイルファストまたはメモリへの縮退フォールバックを行う。"
    policy: valkey_resilience
    target: ValkeyClient
    value:
      timeout_seconds: 2
      circuit_breaker:
        failure_threshold: 0.5
        cooldown_seconds: 15
  CancellationConsistency:
    kind: security
    description: "HTTP request context の client abort は、read-only endpoint では処理中断に使ってよい。一方で mutation endpoint は operation context policy を持ち、認可コード、refresh token family、consent、session、audit/outbox が観測不能な中間状態に残らないよう rollback / complete / detached completion のいずれかを明示する。"
    policy: http_operation_context
    target: HTTPMutationOperation
    value:
      read_only_context: request
      mutation_context: without_cancel_with_timeout
      completion_modes:
        - rollback
        - complete
        - detached_completion
      inconsistent_completion_rate: "0"
  ClientAbortLogClassification:
    kind: security
    description: "client abort 由来の context.Canceled は server error として記録・集計せず、server timeout / upstream timeout と別 label で観測する。"
    policy: http_cancel_classification
    target: HTTPErrorHandling
    value:
      metric: http_request_aborts_total
      labels:
        - client_aborted
        - server_timeout
        - upstream_timeout
      client_aborted_counts_as_server_error: false
  RequestFaultIsolation:
    kind: security
    description: "いずれかの HTTP ハンドラで panic が発生しても、その障害は単一リクエストに局所化する。middleware が panic を捕捉して 500 に変換し stack とともに構造化ログへ記録し、プロセスは継続稼働する。併せて全リクエストに request_id を付与し、レスポンスヘッダとログコンテキストへ伝播する。request_id は secure-by-default で常にアプリが自前生成し、受信 X-Request-ID は運用者が REQUEST_ID_TRUST_INBOUND で明示的にオプトインしたときだけ (信頼できる境界プロキシが所有・消毒している前提で) 再利用する。信頼するか否かに関わらず受信値はサニタイズ (許可文字と長さ制限) してヘッダ/ログインジェクションを防ぐ。panic 由来のみを server error として扱い、client abort (context.Canceled) は ClientAbortLogClassification に従い server error に数えない。"
    policy: request_fault_isolation
    target: HTTPRequestMiddleware
    value:
      panic_recovery: true
      panic_response_status: 500
      panic_counts_as_server_error: true
      process_continues_after_panic: true
      request_id_header: X-Request-ID
      request_id_self_generated_by_default: true
      request_id_inbound_trust: opt_in
      request_id_inbound_trust_flag: REQUEST_ID_TRUST_INBOUND
      request_id_inbound_sanitized: true
      request_id_in_response: true
      request_id_in_log_context: true
  HTTPServerHardening:
    kind: security
    description: "インターネットに露出する境界 HTTP サーバとして、基盤 http.Server に read_header / read / write / idle タイムアウトを設定し、リクエストボディに上限を課す。これにより slowloris 等の低速接続によるコネクション枯渇や、巨大ボディによるメモリ枯渇といった単純なリソース枯渇 DoS (gosec G112 / CWE-400) に対する下限の耐性を確保する。値は env で上書きできるが既定は本番安全側に倒す。ボディ上限超過は 413 で拒否する。volumetric / TLS ハンドシェイク DoS の主防御は前段プロキシが担い、本目標はプロキシ非依存の多層防御としてアプリ自身のホップを守る (secure-by-default)。"
    policy: http_server_hardening
    target: HTTPBoundaryServer
    value:
      read_header_timeout_seconds: 10
      read_timeout_seconds: 30
      write_timeout_seconds: 60
      idle_timeout_seconds: 120
      max_body_bytes: 1048576
      env_overridable: true
      oversize_body_status: 413
  BuildInfo:
    kind: security
    description: "稼働中のバイナリの一意性を確定するため、ビルド時のメタデータ（version、git_commit、build_date、go_version）を埋め込み、露出する。"
    policy: version_reporting
    target: SystemBuildVersion
    value:
      fields:
        - version
        - git_commit
        - build_date
        - go_version
      exposure:
        - logs
        - otel_resource
  StructuredApplicationLog:
    kind: security
    description: "アプリケーションログ (debug/info/warn/error) は監査ログと分離し、stdout に構造化 JSON Lines として出力する。各行は必須フィールドを持ち、OTel span context 有効時は trace_id / span_id で trace と相関する。x-pii フィールド (email 等) はアプリケーションログに平文出力しない。"
    policy: application_logging
    target: ApplicationLogRecord
    value:
      sink: stdout
      format: json_lines
      levels:
        - debug
        - info
        - warn
        - error
      required_fields:
        - timestamp
        - level
        - service
        - message
      correlation_fields:
        - trace_id
        - span_id
      pii_in_application_log: false
  SecurityResponseHeaders:
    kind: security
    description: "境界 HTTP サーバが返す全レスポンスに、セキュリティレスポンスヘッダを middleware で一元的に付与する (secure-by-default)。X-Content-Type-Options: nosniff で MIME スニッフィングを止め、Referrer-Policy: no-referrer でリファラ漏洩を防ぎ、Content-Security-Policy で default-src を 'none' に閉じる (base CSP は script-src を持たず全 script を拒否)。'unsafe-inline' には依存しない。SAML ACS / WS-Fed への自動 POST フォームが必要とする固定のインライン submit script は、その内容を CSP hash (sha256) で当該レスポンスにのみ明示的に許可する (nonce は用いない)。CSP は enforce と report-only を CSP_REPORT_ONLY で切替でき、CSP_REPORT_URI で違反レポート収集先を指定して段階導入できる。Strict-Transport-Security は TLS 終端層が所有すべきヘッダで、TLS を終端している前提が要る。既定 (開発 http) では抑制し、HSTS_ENABLED で明示的にオプトインしたときだけ付与する (エッジプロキシへの委譲を許容)。CSP と frame-ancestors は per-route の機微判断を要しプロキシへ委譲できないためアプリが所有する (詳細は ADR)。"
    policy: http_security_headers
    target: HTTPBoundaryResponse
    value:
      applies_to: all_backend_responses
      x_content_type_options: nosniff
      referrer_policy: no-referrer
      csp_default_src: none
      csp_base_uri: none
      csp_form_action: self
      csp_inline_script_allowance: hash
      csp_unsafe_inline: false
      csp_report_only_toggle: CSP_REPORT_ONLY
      csp_report_uri_env: CSP_REPORT_URI
      hsts_owned_by_tls_terminator: true
      hsts_toggle: HSTS_ENABLED
      hsts_suppressed_on_dev_http: true
      hsts_max_age_seconds: 31536000
      hsts_include_subdomains: true
  FrameAncestorsPolicy:
    kind: security
    description: "login / consent / account portal をはじめ IdP が返す全レスポンスは frame-ancestors 'none' (併せて X-Frame-Options: DENY) とし、iframe 埋め込みを禁止して consent / login のクリックジャッキング (同意の乗っ取り) を防ぐ。frame-ancestors の per-route 判断はアプリの知識でありプロキシへ委譲できない (secure-by-default でアプリ単体で成立させる)。SAML ACS / WS-Fed への自動 POST フォームは cross-origin へ form 送信するため、CSP form-action にのみ送信先を明示的に許可し、frame-ancestors は 'none' を維持する。"
    policy: frame_ancestors
    target: HTTPBoundaryResponse
    value:
      frame_ancestors: none
      x_frame_options: DENY
      applies_to: all_backend_responses
      auto_post_form_action_allowlist: destination_only
  SharedEphemeralStateHA:
    kind: security
    description: "複数レプリカで水平スケールする本番構成 (PERSISTENCE=postgres_valkey) では、ephemeral / short-lived な状態を全てレプリカ間で共有するストア (Valkey) に載せ、per-replica のプロセスメモリに残さない。共有対象は authorization request / authorization code / PAR / device code / login session / DPoP・client-assertion replay / access-token denylist / login throttle。login throttle をプロセスメモリに残すと閾値がレプリカ数倍に緩むため (LoginThrottlePolicy 参照)、これも共有ストアに載せる。refresh token / audit event / auth-event bucket は Postgres が durable な共有ストアとして所有する。memory adapter は共有ストアを持たず単一レプリカ / テスト専用であり、複数レプリカ運用では Valkey (postgres_valkey ランタイム) が必須である。共有ストア到達不能時の縮退方針は状態ごとに定め、login throttle は fail_closed とする。"
    policy: shared_ephemeral_state_ha
    target: RuntimeTopology
    value:
      multi_replica_requires_shared_store: true
      shared_store: valkey
      shared_in_valkey:
        - authorization_request
        - authorization_code
        - par
        - device_code
        - login_session
        - dpop_replay
        - client_assertion_replay
        - access_token_denylist
        - login_throttle
      durable_in_postgres:
        - refresh_token
        - audit_event
        - auth_event_bucket
      memory_adapter_scope: single_replica_or_test
  HealthProbe:
    kind: security
    description: "liveness (生存), readiness (トラフィック受入可否), startup (起動完了) のプローブを個別のエンドポイント /livez, /readyz, /startupz に分離する。既存 /health は起動構成ラベル返却用に維持する。liveness は自己回復不能な致命的デッドロック等のみで fail させ、一時的な依存障害では fail させない。startup は初期化完了時に healthy となる。"
    policy: health_probe_separation
    target: HTTPBoundaryServer
    value:
      liveness_path: /livez
      readiness_path: /readyz
      startup_path: /startupz
      legacy_path: /health
  ReadinessCheck:
    kind: security
    description: "readiness プローブは PostgreSQL や Valkey などの必須依存に対する疎通（Ping）を短いタイムアウト（既定 1s）で並列実行する。?verbose クエリで各依存の健康状態（healthy, degraded, unavailable）を詳細に列挙する。"
    policy: dependency_health_check
    target: HTTPBoundaryServer
    value:
      check_timeout_seconds: 1
      dependencies:
        - postgres
        - valkey
      status_vocabulary:
        - healthy
        - degraded
        - unavailable
  GracefulDrain:
    kind: security
    description: "SIGTERM または SIGINT 受信時、readiness プローブを即座に unavailable に落とし、ロードバランサが経路から外すためのドレイン猶予期間（既定 5秒、環境変数 DRAIN_GRACE_PERIOD_SECONDS で可変）だけ待機してから HTTP サーバをシャットダウンする。"
    policy: connection_graceful_drain
    target: HTTPBoundaryServer
    value:
      default_drain_grace_period_seconds: 5
      env_drain_grace_period: DRAIN_GRACE_PERIOD_SECONDS
  RelayAtLeastOnceDelivery:
    kind: security
    description: "relay は commit 済み EventLogRecord のうち classification が public_integration のものだけを取得し、event_id を Kafka message header に付与して at-least-once で publish する。publish が ack された後に EventDeliveryRecord.status を delivered へ更新し、ack 前の障害では pending のまま残して次の tick で再試行する。Kafka の exactly-once 配送、Kafka transaction、分散 transaction / 2PC は対象外とする。"
    policy: relay_at_least_once
    target: EventDeliveryRecord
    value:
      delivery_guarantee: at_least_once
      idempotency_key: event_id
      retry_on_publish_failure: true
      duplicate_after_ack_before_state_update: possible
      exactly_once: not_supported
  EventLogRetention:
    kind: retention
    description: EventLogRecord は監査原本として保持する。保持期間は audit context の AuditLogRetention と揃える。
    target: EventLogRecord
    policy: append_only
    retention: 7y
    reference: GDPR Art. 30
  EventLogBestEffortRecovery:
    kind: security
    description: "audit_only の event log 記録失敗は業務操作を失敗させない。失敗を構造化ログと運用シグナルで観測し、定期 reconciliation が業務状態の revision / updated_at と event log を照合して不足候補を検出する。復元記録には reconciliation 起源を残す。"
    policy: best_effort_with_reconciliation
    target: EventLogRecord
    value:
      business_operation_availability: prioritized
      failure_observable: true
      reconciliation: required
      reconstructed_record_origin: reconciliation
scenarios:
  業務更新後に event log を best-effort で記録する:
    goal: 単件 mutation は event log 基盤の一時障害で失敗させず、記録失敗を運用上検知できる。
    primary_actor: Administrator
    scope: System
    level: user_goal
    preconditions:
      - "roles=[\"admin\"] のユーザー \"operator\" が対象ユーザー \"alice\" を更新しようとしている"
    main_success:
      - "管理者 \"operator\" がユーザー \"alice\" の属性を更新する"
      - 更新後の User に変更が反映されている
      - audit_only EventLogRecord の記録が試行される
  event log への追記が失敗しても業務更新は継続する:
    goal: EventLogRecord の記録失敗は業務操作の可用性を下げず、失敗を reconciliation 可能な形で観測する。
    primary_actor: Administrator
    scope: System
    level: user_goal
    preconditions:
      - "roles=[\"admin\"] のユーザー \"operator\" が対象ユーザー \"alice\" を更新しようとしている"
    main_success:
      - "管理者 \"operator\" がユーザー \"alice\" の属性を更新する"
      - 更新後の User に変更が反映されている
      - audit_only EventLogRecord の記録が試行される
    extensions:
      - condition: EventLogRecord への追記が失敗する
        steps:
          - "ユーザー \"alice\" の更新は成功する"
          - event type と tenant を含む記録失敗が構造化ログと運用シグナルに残る
          - reconciliation が不足候補として検出できる
  relay は Kafka 障害時に delivery を再試行する:
    goal: Kafka broker 障害中に publish できなかった EventDeliveryRecord が pending のまま残り、復旧後に再試行される。
    primary_actor: System
    scope: System
    level: user_goal
    description: relay プロセスの at-least-once 配送。
    preconditions:
      - classification=public_integration の EventLogRecord が commit されている
    main_success:
      - relay が EventLogRecord を取得し Kafka へ publish する
      - "EventDeliveryRecord.status が \"delivered\" になる"
    extensions:
      - condition: Kafka broker が publish 時に到達不能
        steps:
          - "EventDeliveryRecord.status は \"pending\" のまま attempts が増える"
          - EventLogRecord は削除・変更されない
          - Kafka broker 復旧後、relay の次回 tick で再試行し delivered に到達する
  publish 成功後の relay 停止は重複配送を許容する:
    goal: Kafka publish の ack 後、delivery state の更新前に relay プロセスが停止しても、システムは安全に再送できる。
    primary_actor: System
    scope: System
    level: user_goal
    description: at-least-once の受容トレードオフ。exactly-once は対象外 (Out of Scope)。
    preconditions:
      - classification=public_integration の EventLogRecord が commit されている
    main_success:
      - relay が EventLogRecord を取得し同一 event_id を header に付与して Kafka へ publish する
      - Kafka broker が publish を ack する
      - "EventDeliveryRecord.status が \"delivered\" になる"
    extensions:
      - condition: publish の ack 後、EventDeliveryRecord.status を更新する前に relay プロセスが停止する
        steps:
          - 再起動後の relay は当該 EventLogRecord を未配送とみなし同じ event_id で再送する
          - Kafka 上に同じ event_id を持つ重複メッセージが存在し得る
          - 消費側は event_id を冪等キーとして重複を排除する
user_experience:
  accessibility:
    standard: WCAG22
    level: AA
  locales:
    - ja
    - en
  screens:
    AdminDashboard:
      route: /admin
      purpose: 管理者にテナントのユーザー数・登録アプリケーション数・付与済み同意数・直近24時間の監査イベント数と最近のイベントを集約表示する。
      interfaces:
        - ListAdminUsers
        - ListAdminOAuth2Clients
        - ListAdminConsents
        - ListAdminAuditEvents
      states:
        - ready
        - loading
        - empty
        - access_denied
        - reauthenticating
        - service_error
  transitions:
    - from: AdminDashboard
      to: AdminUsers
      trigger: user_management_selected
    - from: AdminDashboard
      to: AdminApplications
      trigger: application_management_selected
  requirements:
    - id: UX-CSRF
      category: security
      adoption: required
      statement: 状態変更を伴うブラウザAPIはSameSite cookieとリクエストトークンを照合してCSRFを拒否する。
      screens:
        - Login
        - Totp
        - Consent
        - Device
        - ForgotPassword
        - ResetPassword
        - ChangePassword
        - AccountProfile
        - AccountEmails
        - AccountEmailVerify
        - AccountSecurity
        - AccountActivity
        - AccountApplications
        - AdminUsers
        - AdminGroups
        - AdminAgents
        - AdminApplications
        - AdminAuthorizationDetailTypes
        - AdminConsents
        - AdminKeys
        - AdminTenants
        - AdminTenantAttributes
        - AdminSettings
        - AdminEntraFederation
      interfaces:
        - SubmitBrowserLogin
        - SubmitBrowserTotp
        - SubmitBrowserConsent
        - SubmitBrowserDevice
        - RequestPasswordReset
        - ResetPasswordWithToken
        - ChangePassword
        - UpdateUserProfile
        - RequestEmailChange
        - ConfirmEmailChange
        - ConfirmTotpEnrollment
        - RemoveTotpFactor
        - RevokeMySession
        - RevokeMyOtherSessions
        - RevokeMyConsent
        - CreateAdminUser
        - UpdateAdminUser
        - DisableAdminUser
        - EnableAdminUser
        - DeleteAdminUser
        - CreateGroup
        - UpdateGroup
        - DeleteGroup
        - AddGroupMember
        - RemoveGroupMember
        - RegisterAgent
        - UpdateAgent
        - DisableAgent
        - EnableAgent
        - KillAgent
        - DeleteAgent
        - CreateAdminApplication
        - UpdateAdminApplication
        - DeleteAdminApplication
        - RevokeAdminConsent
        - RotateTenantSigningKey
        - DisableTenantKey
        - CreateTenant
        - UpdateTenant
        - DisableTenant
        - EnableTenant
        - UpdateTenantUserAttributeSchema
        - UpdateAdminSettings
        - CreateAdminOAuth2Client
        - UpdateAdminOAuth2Client
        - DeleteAdminOAuth2Client
      standards:
        - RFC9700
        - FAPI2SecurityProfile
    - id: UX-NO-STORE
      category: privacy
      adoption: required
      statement: 認証トランザクション、CSRF token、user_code、管理対象データ、自己アカウントデータを含むブラウザAPI応答は保存キャッシュを禁止する。
      screens:
        - Login
        - Totp
        - Consent
        - Device
        - AccountHome
        - AccountProfile
        - AccountSecurity
        - AccountActivity
        - AccountApplications
        - AccountData
        - AdminUsers
        - AdminGroups
        - AdminAgents
        - AdminApplications
        - AdminConsents
        - AdminAuditEvents
        - AdminKeys
        - AdminTenants
        - AdminSettings
