# idmagic System — SCL
# Migrated to SCL 3.0 by wi-209 (ADR-103). Runtime hardening / i18n tooling
# configuration formerly under `objectives` now lives in ADR-105.

system: idmagic
spec_version: "3.0"
context: System
glossary:
  Locale:
    definition: UI表示言語を一意に決めるBCP47言語タグ。idmagicは "ja" と "en" のみをサポート対象とし、それ以外は未対応 locale として扱う。
    aliases:
      - locale tag
      - 表示言語コード
  DisplayLanguage:
    definition: EndUser または Administrator が言語切り替え UI で明示的に選択した Locale。選択はブラウザに保存され、以後のアクセスで保存済み設定として優先される。
    aliases:
      - 表示言語
      - 言語設定
    not_to_confuse_with:
      - term: Locale
        reason: Locale は言語タグそのもの、DisplayLanguage は利用者が選び保存した Locale の値。
  FallbackLocale:
    definition: 要求された Locale が未対応、または対応 Locale の辞書に該当 translation key が欠落している場合に表示へ用いる既定 Locale。idmagicでは "en" を既定とする。
    aliases:
      - 既定 locale
      - default locale
    not_to_confuse_with:
      - term: DisplayLanguage
        reason: DisplayLanguage は利用者が選択した値。FallbackLocale はその選択や辞書が使えない場合の受け皿。
  ConfiguredDefaultLocale:
    definition: アプリケーション起動時の設定 VITE_DEFAULT_LOCALE により指定する既定 Locale。"ja" または "en" のみを受け付け、未設定または未対応値のときは FallbackLocale を使う。
    aliases:
      - startup default locale
      - configured locale fallback
  BackendErrorText:
    definition: バックエンドが HTTP、OAuth/OIDC redirect、SAML、SCIM などの外部 API 応答で返す利用者向けエラー本文。message、error_description、detail およびプレーンテキストのエラー本文を含む。常に英語であり、表示言語によって変化しない。
    aliases:
      - API error message
      - error description
  PersistedStateModel:
    definition: created_at を持ち、作成後に現在状態が更新される場合は updated_at も持つ永続化状態モデルの規約。作成後は不可変で消費・削除のみされる記録モデルは updated_at を持たない。issued_at / granted_at / occurred_at / expires_at / revoked_at などのドメイン時刻は created_at を置き換えない。各 context のモデル定義はこの規約に従う。
  EndUser:
    definition: 認証済みまたは認証を試みる一般利用者。
  Operator:
    definition: IdP をデプロイ・起動時設定を行う運用者。
  ResourceOwner:
    definition: OAuth2/OIDC 認可フローでリソースの所有者として認可判断を行う利用者。EndUser と同一人物を OAuth2 文脈で指す呼称。
  Administrator:
    definition: テナント内または横断のリソースを管理する権限を持つ利用者。
  APIConsumer:
    definition: HTTP API を直接呼び出す外部クライアント。
standards:
  WCAG22:
    title: Web Content Accessibility Guidelines 2.2
    version: W3C Recommendation
    url: https://www.w3.org/TR/WCAG22/
    roles:
      - UserInterface
    scope: ブラウザ認証UIのLevel AAアクセシビリティ。
    requirements:
      - id: WCAG22-KEYBOARD
        section: 2.1.1
        strength: MUST
        adoption: required
        statement: すべての認証操作をキーボードだけで完了可能にする。
      - id: WCAG22-FOCUS
        section: "2.4.7, 2.4.11"
        strength: MUST
        adoption: required
        statement: フォーカスを視認可能にし重要な要素が完全に隠れないようにする。
      - id: WCAG22-LABELS-ERRORS
        section: "3.3.1, 3.3.2"
        strength: MUST
        adoption: required
        statement: 入力にラベルを付け、エラーをテキストで識別して修正方法を示す。
      - id: WCAG22-STATUS
        section: 4.1.3
        strength: MUST
        adoption: required
        statement: 認証結果や送信エラーをフォーカス移動なしに支援技術へ通知する。
  GDPR:
    title: General Data Protection Regulation
    version: Regulation (EU) 2016/679
    url: https://eur-lex.europa.eu/eli/reg/2016/679/oj
    roles:
      - DataController
    scope: 同意、監査、保存期間、削除後の個人データ処理。
    requirements:
      - id: GDPR-CONSENT-WITHDRAWAL
        section: Article 7(3)
        strength: MUST
        adoption: required
        statement: ResourceOwner が同意を撤回でき、撤回後の新規発行へ利用しない。Consent / ConsentLifecycle は OAuth2 context が所有する。
      - id: GDPR-ERASURE
        section: Article 17
        strength: MUST
        adoption: required
        statement: 削除要求後は法的保存義務を除く PII を定義済み期間内に消去する。消去は IdentityManagement の UserLifecycle Purge 遷移と Authentication の資格情報破棄が個別に担う。
      - id: GDPR-PROCESSING-RECORDS
        section: Article 30
        strength: MUST
        adoption: required
        statement: セキュリティ・認可イベントの監査記録を定義済み期間保持する。保持期間は Audit context が所有する。
interfaces:
  LivenessProbe:
    description: プロセスが要求を処理できることを示す liveness probe。依存サービスの一時障害では失敗させない。
    output:
      status: { type: String }
    read_only: true
    access: public
    bindings:
      - kind: http
        method: GET
        path: /livez
  ReadinessProbe:
    description: 起動完了、drain 状態、構成された永続化依存の到達性を確認する readiness probe。verbose 指定時だけ依存詳細を返す。
    input:
      verbose: { type: String, optional: true }
    output:
      status: { type: String }
      dependencies: { type: JSON, optional: true }
    read_only: true
    access: public
    bindings:
      - kind: http
        method: GET
        path: /readyz
        request_form: query
  StartupProbe:
    description: 初期化完了までは 503 starting、完了後は 200 healthy を返す startup probe。
    output:
      status: { type: String }
    read_only: true
    access: public
    bindings:
      - kind: http
        method: GET
        path: /startupz
  BackendErrorResponse:
    description: |
      バックエンドの HTTP API とプロトコル endpoint がエラー時に返す共通の外部契約。
      message、error_description、detail、またはプレーンテキスト本文のいずれも
      BackendErrorText であり、表示言語 (DisplayLanguage) に関わらず常に英語で固定する。
      個別 endpoint の error code と HTTP status はこの契約によって変更しない。
    output:
      error: { type: String, optional: true }
      message: { type: String, optional: true }
      error_description: { type: String, optional: true }
      detail: { type: String, optional: true }
    ensures:
      - text_is_english(output.message)
      - text_is_english(output.error_description)
      - text_is_english(output.detail)
    access: internal
scenarios:
  orchestration probeはprocess lifecycleと依存状態を区別する:
    actor: Operator
    main_success:
      - Operator が初期化完了後の liveness、readiness、startup probe を呼ぶ
      - すべて 200 と healthy を返す
    extensions:
      - at: 1
        condition: 初期化中または graceful drain 中である
        steps:
          - liveness は 200 healthy を維持する
          - readiness または startup は 503 を返す
      - at: 1
        condition: 構成された永続化依存へ到達できない
        steps:
          - readiness は 503 unavailable を返す
          - liveness は 200 healthy を維持する
  明示的に選択した表示言語でホスト認証画面が描画される:
    actor: EndUser
    given:
      - 未認証セッションで Login 画面を表示している
    main_success:
      - "EndUser が表示言語 \"en\" を選択する"
      - Login 画面の文言が en 辞書で表示される
      - 選択した Locale がブラウザに保存され、以後のアクセスで保存済み設定として優先される
  未対応localeは既定localeにフォールバックする:
    actor: EndUser
    given:
      - "ブラウザの言語設定が \"fr\" である"
      - 表示言語の明示選択も保存済み設定も存在しない
    main_success:
      - EndUser が Login 画面を表示する
      - 画面の文言は既定 locale "en" の辞書で表示される
  起動時設定の既定localeがフォールバックに使われる:
    actor: Operator
    given:
      - 表示言語の明示選択、ui_locales ヒント、保存済み設定、対応ブラウザ言語が存在しない
    main_success:
      - "Operator が VITE_DEFAULT_LOCALE を \"ja\" に設定してアプリケーションを起動する"
      - EndUser が画面を表示する
      - 画面の文言は ja 辞書で表示される
    extensions:
      - at: 1
        condition: VITE_DEFAULT_LOCALE が未設定または未対応値である
        steps:
          - "画面の文言は FallbackLocale \"en\" の辞書で表示される"
  OIDC ui_localesヒントにより表示言語が決まる:
    actor: ResourceOwner
    given:
      - 未認証セッションで表示言語の明示選択も保存済み設定も存在しない
    main_success:
      - "\"web-app\" として ui_locales \"en\" で認可リクエストを送信する"
      - Login 画面の文言は en 辞書で表示される
    extensions:
      - at: 1
        condition: 表示言語が既に明示選択済みの場合は ui_locales ヒントで上書きされない
        steps:
          - "EndUser が表示言語 \"ja\" を明示的に選択済みである"
          - "\"web-app\" として ui_locales \"en\" で認可リクエストを送信する"
          - Login 画面の文言は ja 辞書で表示される
  管理者が選択した表示言語で管理画面が表示される:
    actor: Administrator
    given:
      - "roles に \"admin\" を持つ Administrator が認証済みで AdminDashboard を表示している"
    main_success:
      - "Administrator が表示言語 \"en\" を選択する"
      - AdminDashboard の文言が en 辞書で表示される
  選択した表示言語で全UI画面が描画される:
    actor: EndUser
    given:
      - 対応する画面へ遷移できる認証状態である
    main_success:
      - "EndUser または Administrator が表示言語 \"en\" を選択する"
      - 任意のUI画面を表示する
      - 画面、shared shell、dialog、empty state、aria label、状態ラベルがen辞書で表示される
      - 日時および数値がenの書式で表示される
    extensions:
      - at: 1
        condition: jaを選択する
        steps:
          - 同じ要素がja辞書およびjaの書式で表示される
      - at: 3
        condition: 翻訳keyが欠落している
        steps:
          - FallbackLocale (en) の対応keyを表示する
  既知のバックエンドエラーコードはUIで翻訳される:
    actor: EndUser
    given:
      - UI操作に対しバックエンドがエラー応答を返す
    main_success:
      - バックエンドが既知のstable error codeを返す
      - UIが選択済みDisplayLanguageの辞書にあるerror codeの文言を表示する
    extensions:
      - at: 1
        condition: error codeが未知、またはbackendが任意のmessageだけを返す
        steps:
          - UIはバックエンドmessageを英語のまま表示する
  バックエンドAPIエラーは英語で返る:
    actor: APIConsumer
    main_success:
      - APIConsumer が不正な JSON を HTTP API に送信する
      - System は既存の error code と HTTP status を返す
      - System は英語の message を返す
    extensions:
      - at: 1
        condition: OAuth/OIDC redirect endpoint が要求を拒否する
        steps:
          - System は既存の OAuth error code を返す
          - System は英語の error_description を返す
      - at: 1
        condition: 未知の内部エラーが発生する
        steps:
          - System は既存の error code と HTTP status を維持する
          - System は英語のエラー本文を返す
  管理コンソールとアカウントポータルは失効セッションから同一画面に復帰する:
    actor: Administrator
    given:
      - Administrator が first-party の管理コンソールで access token を保持している
      - 保持している access token が失効している
    main_success:
      - Administrator が AdminDashboard で管理 API を呼び出す
      - API が 401 を返す
      - 保持していた access token / refresh token と OIDC callback state を破棄する
      - 直前の画面への同一オリジン相対 return_to を保ったまま再認可を1回だけ開始する
      - 再ログイン完了後に元の AdminDashboard へ復帰する
    extensions:
      - at: 4
        condition: 再認可から復旧できない
        steps:
          - 再ログイン導線を提示する
flows:
  AdminDashboard:
    entry: AdminDashboard
    views:
      AdminDashboard:
        sees: 管理コンソールダッシュボード画面(ユーザー管理・アプリケーション管理へのナビゲーション)
        does:
          - action: user_management_selected
            does: ユーザー管理タブをクリックする
            to: AdminUsers
          - action: application_management_selected
            does: アプリケーション管理タブをクリックする
            to: AdminApplications
