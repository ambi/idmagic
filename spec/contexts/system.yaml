    - id: UX-API-ERROR-ENGLISH-ONLY
      category: localization
      adoption: required
      statement: "バックエンドが返すAPIエラー・validationエラーのmessage/error_descriptionは常に英語で固定し、表示言語(DisplayLanguage)に応じて翻訳しない。UIは stable な error code (例: password_policy, invalid_credentials) を持つ既知のケースについてのみ、その code をkeyとしてUI自身のja/en辞書から文言を選び表示する。UI側で未知のcodeについては、backendのmessage/error_descriptionをそのまま(英語のまま)表示してよい。ネットワーク到達不可時など、backendの応答が無い場合にUIが表示する文言はUI自身の文言なのでja/en化対象である。"
