      scope:
        type: String
        optional: true
      jwks_uri:
        type: URI
        optional: true
      jwks:
        type: JSON
        optional: true
      tls_client_auth_subject_dn:
        type: String
        optional: true
      id_token_signed_response_alg:
        type: SignatureAlgorithm
        optional: true
