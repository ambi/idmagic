        optional: true
        description: RFC 8693 §4.1 actor claim。委任トークンの場合に現在アクターとアクター連鎖を返す。
  RevokeRequest:
    kind: value_object
    description: /revoke リクエスト (RFC 7009 §2.1)。指定したトークンを失効させる。
    fields:
      token:
        type: String
      token_type_hint:
        type: TokenType
        optional: true
  ParRequest:
    kind: value_object
    description: 任意の authorize パラメータを form で受け取る。
    fields:
      parameters:
        type: "Map<String, String>"
  ParResponse:
    kind: value_object
    description: /par レスポンス (RFC 9126 §2.2)。短命の request_uri を発行し、後続の /authorize から参照される。
    fields:
      request_uri:
        type: String
      expires_in:
        type: Integer
  DeviceAuthorizationRequest:
    kind: value_object
    description: /device_authorization リクエスト (RFC 8628 §3.1)。入力制約のあるデバイスからのフロー開始要求。
    fields:
      scope:
        type: String
        optional: true
      client_id:
        type: String
        optional: true
      client_secret:
        type: String
        optional: true
      client_assertion:
        type: String
        optional: true
      client_assertion_type:
        type: String
        optional: true
  DeviceAuthorizationResponse:
    kind: value_object
    description: /device_authorization レスポンス (RFC 8628 §3.2)。device_code・user_code・verification_uri を返し、デバイスはポーリングへ移行する。
    fields:
      device_code:
        type: String
      user_code:
        type: String
      verification_uri:
        type: URI
      verification_uri_complete:
        type: URI
        optional: true
      expires_in:
        type: Integer
      interval:
        type: Integer
        optional: true
  AuthorizeParameters:
    kind: value_object
    description: GET /authorize クエリパラメータ。
    fields:
      response_type:
        type: ResponseType
      client_id:
        type: String
      redirect_uri:
        type: String
      scope:
        type: String
        optional: true
      state:
        type: String
        optional: true
      nonce:
        type: String
        optional: true
      code_challenge:
        type: String
      code_challenge_method:
        type: CodeChallengeMethod
      prompt:
        type: String
        optional: true
      max_age:
        type: Integer
        optional: true
      id_token_hint:
        type: String
        optional: true
      request_uri:
        type: String
        optional: true
  BrowserConsentRequest:
    kind: value_object
    description: SPA が POST /api/auth/consent に送る同意判断。
    fields:
      action:
        type: String
        description: allow または deny。
  BrowserDeviceRequest:
    kind: value_object
    description: SPA が POST /api/auth/device に送る device user_code の承認判断。
    fields:
      user_code:
        type: String
  BrowserTransactionResponse:
    kind: value_object
    description: SPA が現在の browser authorization transaction を描画するための no-store JSON。
    fields:
      kind:
        type: String
        description: 描画すべき画面の識別子。login / totp / consent / device 等、factor 追加に応じて拡張する。
      csrf_token:
        type: String
        annotations:
          sensitive: true
      client_name:
        type: String
        optional: true
        description: "同意画面に表示する client の可読名。OAuth2Client.client_name →\nApplication カタログ名 → client_id の順で解決する (client_id は UUID のため生表示を避ける)。\n"
      scopes:
        type: "String[]"
        optional: true
  BrowserDeviceContextResponse:
    kind: value_object
    description: SPA が device user_code 画面を描画するための no-store JSON。
    fields:
      kind:
        type: String
      user_code:
        type: String
        optional: true
      csrf_token:
        type: String
        annotations:
          sensitive: true
  BrowserFlowResponse:
    kind: value_object
    description: SPA の認証操作後に表示する次画面またはクライアント redirect URI。
    fields:
      next:
        type: String
        optional: true
      redirect_to:
        type: URI
        optional: true
  EndSessionParameters:
    kind: value_object
    description: RP-Initiated Logout v1 のクエリ / form パラメータ。client_id で post_logout_redirect_uri を検証する。
    fields:
      client_id:
        type: String
        optional: true
      id_token_hint:
        type: String
        optional: true
      post_logout_redirect_uri:
        type: URI
        optional: true
      state:
        type: String
        optional: true
  UserInfoResponse:
    kind: value_object
    description: OIDC Core §5.3。可変な OIDC クレームを含む。
    fields:
      sub:
        type: String
      claims:
        type: JSON
        optional: true
  OAuthError:
    kind: error
    description: OAuth 2.0 / OIDC のエラー応答の共通形 (RFC 6749 §5.2)。具体的なエラー種別は error フィールドの OAuthErrorCode で識別される。
    payload:
      error:
        type: OAuthErrorCode
      error_description:
        type: String
        optional: true
      error_uri:
        type: String
        optional: true
  InvalidRequestError:
    kind: error
    description: リクエストに必須パラメータの欠落・不正値・重複等がある (RFC 6749 §5.2 invalid_request)。
    payload:
      reason:
        type: String
        optional: true
  InvalidClientError:
    kind: error
    description: クライアント認証が失敗した、または未登録のクライアント (RFC 6749 §5.2 invalid_client)。client_id の存在有無を開示しないため詳細は返さない。
  InvalidGrantError:
    kind: error
    description: 認可コード・リフレッシュトークン・device_code 等の付与が無効、期限切れ、再利用、あるいは redirect_uri/PKCE 不一致 (RFC 6749 §5.2 invalid_grant)。
    payload:
      reason:
        type: String
        optional: true
  UnauthorizedClientError:
    kind: error
    description: クライアントがこの grant_type を使用する権限を持たない (RFC 6749 §5.2 unauthorized_client)。
  UnsupportedGrantTypeError:
    kind: error
    description: AuthorizationServer がこの grant_type をサポートしていない (RFC 6749 §5.2 unsupported_grant_type)。
  InvalidScopeError:
    kind: error
    description: 要求された scope が不正、未知、またはクライアントに許可されていない (RFC 6749 §5.2 invalid_scope)。
  InvalidTokenError:
    kind: error
    description: アクセストークンが期限切れ、改ざん、不正、または失効済み (RFC 6750 §3.1 invalid_token)。
  InvalidDpopProofError:
    kind: error
    description: DPoP Proof JWT の検証に失敗した（署名・jti・htu/htm・nonce・clock skew 等、RFC 9449 §7.1 invalid_dpop_proof）。
  InsufficientScopeError:
    kind: error
    description: 提示されたトークンの scope では要求された操作に不足している (RFC 6750 §3.1 insufficient_scope)。
  AccessDeniedError:
    kind: error
    description: ResourceOwner が認可を拒否した、またはサーバーポリシーが許可しなかった (RFC 6749 §4.1.2.1 access_denied)。
  ExpiredTokenError:
    kind: error
    description: Device Authorization Grant において device_code が有効期限を過ぎた (RFC 8628 §3.5 expired_token)。
  SlowDownError:
    kind: error
    description: Device Authorization Grant のポーリングが速すぎる。クライアントは interval を 5 秒延長する必要がある (RFC 8628 §3.5 slow_down)。
  AuthorizationPendingError:
    kind: error
    description: Device Authorization Grant においてユーザーがまだ承認していない (RFC 8628 §3.5 authorization_pending)。クライアントは interval 秒待ってから再試行する。
  ServerError:
    kind: error
    description: AuthorizationServer 側の予期せぬ内部エラー (RFC 6749 §4.1.2.1 server_error)。
  ClientRegistered:
    kind: event
    description: /register で新しいクライアントが動的登録された (RFC 7591)。クライアント登録監査の起点。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: クライアントが属するテナント ID。
      clientId:
        type: String
      clientType:
        type: ClientType
        optional: true
  AdminOAuth2ClientCreated:
    kind: event
    description: 管理者が所属テナントに OAuth client を作成した。秘密情報は含めない。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: クライアントが属するテナント ID。actor と一致する。
      actorUserId:
        type: String
      clientId:
        type: String
  AdminOAuth2ClientUpdated:
    kind: event
    description: 管理者が OAuth client metadata を更新した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: クライアントが属するテナント ID。actor と一致する。
      actorUserId:
        type: String
      clientId:
        type: String
      changedFields:
        type: "String[]"
  AdminOAuth2ClientDeleted:
    kind: event
    description: 管理者が所属テナントから OAuth client を削除した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: クライアントが属するテナント ID。actor と一致する。
      actorUserId:
        type: String
      clientId:
        type: String
  ConsentGranted:
    kind: event
    description: ResourceOwner がクライアントに対する scope の同意を与えた (GDPR Art.6 法的根拠の取得記録)。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 同意が起きたテナント ID。
      userId:
        type: String
      clientId:
        type: String
      scopes:
        type: "String[]"
  ConsentRevoked:
    kind: event
    description: ResourceOwner または所属テナントの Administrator が既存の同意を撤回した (GDPR Art.7(3) 同意撤回権)。以後の発行はブロックされる。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 同意が属するテナント ID。
      actorUserId:
        type: String
        optional: true
        description: 管理 API からの撤回時の Administrator sub。ResourceOwner 自身の撤回では省略可。
      userId:
        type: String
      clientId:
        type: String
  AuthorizationDetailsRequested:
    kind: event
    description: RFC 9396 — クライアントが /authorize・/par・/token で authorization_details を要求し、登録 type 適合検証を通過した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      clientId:
        type: String
      userId:
        type: String
        optional: true
        description: 要求時点で確定していれば principal の sub。
      detailTypes:
        type: "String[]"
        description: 要求された詳細の type 一覧。
  AuthorizationDetailsConsented:
    kind: event
    description: RFC 9396 — ResourceOwner が提示された authorization_details に同意した。発行・交換の部分集合判定の基準となる。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      userId:
        type: String
      clientId:
        type: String
      detailTypes:
        type: "String[]"
  AuthorizationDetailsRejected:
    kind: event
    description: "RFC 9396 — authorization_details の構文不正・未登録 type・スキーマ不適合・同意逸脱・ダウンスコープ超過により要求を拒否した (fail-closed)。"
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
      clientId:
        type: String
      reason:
        type: String
        description: 拒否理由 (invalid_authorization_details 等)。
  AuthorizationCodeIssued:
    kind: event
    description: /authorize 完了時に AuthorizationCode を発行した。/token への交換まで 60 秒以内に行う必要がある。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 認可コードを発行したテナント ID。
      clientId:
        type: String
      userId:
        type: String
      scopes:
        type: "String[]"
      codeChallengeMethod:
        type: String
        optional: true
  AuthorizationCodeRedeemed:
    kind: event
    description: AuthorizationCode が /token で正しく交換された。同一コードの再使用はファミリー失効を引き起こす。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 交換が起きたテナント ID。
      clientId:
        type: String
      userId:
        type: String
  AccessTokenIssued:
    kind: event
    description: AccessToken (JWT) を発行した。senderConstraint がある場合は所有証明（DPoP/mTLS）バインド済み。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: トークンを発行したテナント ID。
      jti:
        type: String
      clientId:
        type: String
      userId:
        type: String
      scopes:
        type: "String[]"
      senderConstraint:
        type: AccessTokenSenderConstraint
        default: None
  RefreshTokenIssued:
    kind: event
    description: RefreshToken を発行した。familyId は元の認可コード由来のファミリーを識別し、ローテーションで継承される。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: トークンを発行したテナント ID。
      tokenId:
        type: String
      familyId:
        type: String
      parentId:
        type: String
        optional: true
      clientId:
        type: String
      userId:
        type: String
  RefreshTokenRotated:
    kind: event
    description: RefreshToken を /token で交換し、新しい子トークンを発行して親を Rotated 状態にした。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: ローテーションが起きたテナント ID。
      oldTokenId:
        type: String
      newTokenId:
        type: String
      familyId:
        type: String
  TokenRevoked:
    kind: event
    description: /revoke もしくは管理操作によってトークンが失効された (RFC 7009)。監査・即時性要件あり。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 失効が起きたテナント ID。
      tokenType:
        type: TokenType
      tokenId:
        type: String
      reason:
        type: String
        optional: true
  TokenIntrospected:
    kind: event
    description: /introspect が呼ばれてトークン状態を返した (RFC 7662)。ResourceServer の利用パターン分析に使用。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: introspection が起きたテナント ID。
      rsClientId:
        type: String
      tokenId:
        type: String
      active:
        type: Boolean
  TokenExchanged:
    kind: event
    description: RFC 8693 — トークン交換による委任トークンを発行した。delegationDepth は発行トークンの act 入れ子の深さ。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: トークン交換が起きたテナント ID。
      actorUserId:
        type: String
        description: 発行トークンの現在アクター (act.sub)。
      subjectUserId:
        type: String
        description: 発行トークンの subject (sub)。subject_token の sub を維持する。
      audience:
        type: String
        description: resource パラメータ由来の発行トークン aud。
      delegationDepth:
        type: Integer
        description: 発行トークンの act 入れ子の深さ。
  TokenExchangeRejected:
    kind: event
    description: RFC 8693 — トークン交換要求をポリシー違反・検証失敗により拒否した (fail-closed)。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: トークン交換が拒否されたテナント ID。
      actorUserId:
        type: String
        optional: true
        description: 拒否時に判明している現在アクター。不明な場合は空。
      reason:
        type: String
        description: 拒否理由 (OAuth error code 等)。
  RefreshTokenReuseDetected:
    kind: event
    description: Rotated 状態の RefreshToken が再提示された。ファミリー全失効をトリガーする (RFC 9700 §4.14)。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 再利用が検出されたテナント ID。
      familyId:
        type: String
      tokenId:
        type: String
      clientId:
        type: String
        optional: true
  PARStored:
    kind: event
    description: /par に届いた authorize パラメータをサーバー側に格納し短命の request_uri を発行した (RFC 9126)。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: PAR を受け付けたテナント ID。
      requestUri:
        type: String
      clientId:
        type: String
  DeviceAuthorizationRequested:
    kind: event
    description: RFC 8628 §3.1 — device_code/user_code を発行した。user_code は監査ログに残さない。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: デバイス認可を受け付けたテナント ID。
      clientId:
        type: String
      scopes:
        type: "String[]"
  DeviceAuthorizationApproved:
    kind: event
    description: RFC 8628 §3.3 — ユーザーが承認した。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 承認が起きたテナント ID。
      clientId:
        type: String
      userId:
        type: String
  DeviceAuthorizationDenied:
    kind: event
    description: RFC 8628 §3.3 — ユーザーが拒否、または user_code 誤り続けた。
    payload:
      occurredAt:
        type: DateTime
      tenantId:
        type: String
        description: 拒否が起きたテナント ID。
      clientId:
        type: String
      userId:
        type: String
        optional: true
  User:
    kind: entity
    description: IdentityManagement が publish する principal の認可判断用 stub。
    identity: id
    fields:
      id:
        type: String
      tenant_id:
        type: String
      status:
        type: String
      roles:
        type: "String[]"
  Tenant:
    kind: entity
    description: Tenancy が publish する tenant の認可判断用 stub。
    identity: id
    fields:
      id:
        type: String
  Application:
    kind: entity
    description: Application context が publish する protocol assignment / sign-in policy 判定用 stub。
    identity: application_id
    fields:
      application_id:
        type: UUID
      tenant_id:
        type: String
      status:
        type: String
  SignatureAlgorithm:
    kind: enum
    description: SigningKeys が publish する JWT 署名アルゴリズム。
    values: [PS256, ES256]
  Validate:
    kind: event
    description: 認可要求を検証する lifecycle event。
    payload: { occurredAt: { type: DateTime } }
  Reject:
    kind: event
    description: lifecycle を拒否終端へ進める event。
    payload: { occurredAt: { type: DateTime } }
  AuthenticateUser:
    kind: event
    description: resource owner 認証が成立した event。
    payload: { occurredAt: { type: DateTime } }
  RequestConsent:
    kind: event
    description: resource owner の同意を要求する event。
    payload: { occurredAt: { type: DateTime } }
  GrantConsent:
    kind: event
    description: resource owner が同意した event。
    payload: { occurredAt: { type: DateTime } }
  IssueCode:
    kind: event
    description: authorization code を発行する lifecycle event。
    payload: { occurredAt: { type: DateTime } }
  RedeemCode:
    kind: event
    description: authorization code を単発償還する lifecycle event。
    payload: { occurredAt: { type: DateTime } }
  Expire:
    kind: event
    description: 有効期限到達を表す lifecycle event。
    payload: { occurredAt: { type: DateTime } }
  EnterUserCode:
    kind: event
    description: device user code が入力された event。
    payload: { occurredAt: { type: DateTime } }
  Approve:
    kind: event
    description: device authorization が承認された event。
    payload: { occurredAt: { type: DateTime } }
  Deny:
    kind: event
    description: device authorization が拒否された event。
    payload: { occurredAt: { type: DateTime } }
  Exchange:
    kind: event
    description: device code が token に交換された event。
    payload: { occurredAt: { type: DateTime } }
  Rotate:
    kind: event
    description: refresh token を child token へ rotate する event。
    payload: { occurredAt: { type: DateTime } }
  RevokeToken:
    kind: event
    description: token を失効させる lifecycle event。
    payload: { occurredAt: { type: DateTime } }
  RevokeConsent:
    kind: event
    description: consent を論理撤回する lifecycle event。
    payload: { occurredAt: { type: DateTime } }
  Use:
    kind: event
    description: PAR request_uri を単発消費する lifecycle event。
    payload: { occurredAt: { type: DateTime } }
states:
  AuthorizationCodeFlow:
    description: /authorize から /token に至る authorization request のライフサイクル。
    target: AuthorizationRequest
    initial: Received
    terminal:
      - Exchanged
      - Rejected
      - Expired
    transitions:
      - from: Received
        event: Validate
        to: AuthenticationPending
      - from: Received
        event: Reject
        to: Rejected
      - from: AuthenticationPending
        event: AuthenticateUser
        to: Authenticated
      - from: AuthenticationPending
        event: Reject
        to: Rejected
      - from: AuthenticationPending
        event: Expire
        to: Expired
      - from: Authenticated
        event: RequestConsent
        to: ConsentPending
      - from: Authenticated
        event: IssueCode
        to: CodeIssued
      - from: Authenticated
        event: Reject
        to: Rejected
      - from: ConsentPending
        event: GrantConsent
        to: Consented
      - from: ConsentPending
        event: Reject
        to: Rejected
      - from: ConsentPending
        event: Expire
        to: Expired
      - from: Consented
        event: IssueCode
        to: CodeIssued
      - from: Consented
        event: Reject
        to: Rejected
      - from: CodeIssued
        event: RedeemCode
        to: Exchanged
      - from: CodeIssued
        event: Expire
        to: Expired
  DeviceCodeFlow:
    description: RFC 8628 デバイス認可グラントのライフサイクル。device_code と user_code がペアで進む。
    target: DeviceAuthorization
    initial: Issued
    terminal:
      - Exchanged
      - Denied
      - Expired
    transitions:
      - from: Issued
        event: EnterUserCode
        to: UserCodeEntered
      - from: Issued
        event: Expire
        to: Expired
      - from: UserCodeEntered
        event: Approve
        to: Approved
      - from: UserCodeEntered
        event: Deny
        to: Denied
      - from: UserCodeEntered
        event: Expire
        to: Expired
      - from: Approved
        event: Exchange
        to: Exchanged
      - from: Approved
        event: Expire
        to: Expired
  RefreshTokenLifecycle:
    description: RefreshToken のライフサイクル。Rotate で子トークンに引き継がれ、Revoke で失効、Expire で期限切れ。Rotated 後も家族失効により Revoked へ遷移しうる（RFC 9700 §4.14）。
    target: RefreshTokenRecord
    initial: Active
    terminal:
      - Revoked
      - Expired
    transitions:
      - from: Active
        event: Rotate
        to: Rotated
        guard: now() < absolute_expires_at
      - from: Active
        event: RevokeToken
        to: Revoked
      - from: Active
        event: Expire
        to: Expired
      - from: Rotated
        event: RevokeToken
        to: Revoked
      - from: Rotated
        event: Expire
        to: Expired
  AuthorizationCodeRecordLifecycle:
    description: 発行された AuthorizationCode 本体のライフサイクル。AuthorizationCodeFlow（AuthorizationRequest 側）の Exchanged に対応するのが Redeemed。
    target: AuthorizationCodeRecord
    initial: Issued
    terminal:
      - Redeemed
      - Expired
    transitions:
      - from: Issued
        event: RedeemCode
        to: Redeemed
        guard: now() < expires_at
      - from: Issued
        event: Expire
        to: Expired
  ConsentLifecycle:
    description: 同意レコードのライフサイクル。GDPR Art.7(3) により Granted → Revoked が可能。
    target: Consent
    initial: Granted
    terminal:
      - Revoked
      - Expired
    transitions:
      - from: Granted
        event: RevokeConsent
        to: Revoked
      - from: Granted
        event: Expire
        to: Expired
  PARRecordLifecycle:
    description: PAR で発行された request_uri のライフサイクル。/authorize から一度だけ参照可能（RFC 9126）。
    target: PARRecord
    initial: Stored
    terminal:
      - Used
      - Expired
    transitions:
      - from: Stored
        event: Use
        to: Used
        guard: now() < expires_at
      - from: Stored
        event: Expire
        to: Expired
interfaces:
  RegisterClient:
    description: Dynamic Client Registration (RFC 7591)
    steps:
      - "{client_type} クライアント {client_name} を redirect_uri {redirect_uris} で登録する"
    input:
      request:
        type: ClientRegistrationRequest
    output:
      client:
        type: OAuth2Client
    errors:
      - InvalidRequestError
    emits:
      - ClientRegistered
    access: public
    bindings:
      - kind: http
        method: POST
        path: /register
  Authorize:
    description: Authorization endpoint (RFC 6749 §4.1.1)
    steps:
      - "{client_id} として scope {scope} で認可リクエストを送る"
      - "{client_id} として redirect_uri {redirect_uri} で認可リクエストを送る"
      - "{client_id} として prompt {prompt} で認可リクエストを送る"
      - "request_uri {request_uri} で認可リクエストを送る"
    input:
      params:
        type: AuthorizeParameters
    errors:
      - InvalidRequestError
      - InvalidClientError
      - AccessDeniedError
    requires:
      - registered_client(input.params.client_id)
      - redirect_uri_exact_match(input.params.client_id, input.params.redirect_uri)
      - requested_scopes_allowed(input.params.client_id, input.params.scope)
      - pkce_s256_present(input.params)
      - par_requirement_satisfied(input.params.client_id, input.params.request_uri)
      - application_assignment_permits(context.tenant_id, subject.id, input.params.client_id)
      - application_sign_in_policy_satisfied(context.tenant_id, subject.id, input.params.client_id)
    emits:
      - AuthorizationCodeIssued
      - ConsentGranted
    access: public
    bindings:
      - kind: http
        method: GET
        path: /authorize
        request_form: query
        successful_status_codes:
          - "302"
  GetBrowserTransaction:
    description: SPA が HttpOnly transaction cookie に対応するログイン・同意コンテキストを取得する。
    output:
      response:
        type: BrowserTransactionResponse
    errors:
      - InvalidRequestError
    read_only: true
    access: public
    bindings:
      - kind: http
        method: GET
        path: /api/auth/transaction
  SubmitBrowserConsent:
    description: SPA JSON API から authorization request の同意・拒否を確定する。
    input:
      request:
        type: BrowserConsentRequest
    output:
      response:
        type: BrowserFlowResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    requires:
      - valid_authorization_transaction(context.transaction_cookie)
    emits:
      - ConsentGranted
      - AuthorizationCodeIssued
    access:
      policies: [AuthenticatedResourceOwner]
      resource:
        type: OAuth2AuthorizationService
        id: context.transaction_id
    bindings:
      - kind: http
        method: POST
        path: /api/auth/consent
        request_body: json
  SubmitBrowserDevice:
    description: SPA JSON API から device user_code を承認または拒否する。
    input:
      request:
        type: BrowserDeviceRequest
    output:
      response:
        type: BrowserFlowResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - DeviceAuthorizationApproved
      - DeviceAuthorizationDenied
    access:
      policies: [AuthenticatedResourceOwner]
      resource:
        type: OAuth2AuthorizationService
        id: context.transaction_id
    bindings:
      - kind: http
        method: POST
        path: /api/auth/device
        request_body: json
  GetBrowserDeviceContext:
    description: SPA が device user_code と CSRF token を取得する。
    output:
      response:
        type: BrowserDeviceContextResponse
    read_only: true
    access: public
    bindings:
      - kind: http
        method: GET
        path: /api/auth/device
  EndSession:
    description: RP-Initiated Logout endpoint (OIDC RP-Initiated Logout 1.0)。redirect 検証は OAuth2/OIDC bounded context が行い、session revocation は Authentication bounded context の SessionManager に委譲する。
    steps:
      - "{client_id} として post_logout_redirect_uri {post_logout_redirect_uri} でログアウトする"
    input:
      params:
        type: EndSessionParameters
    errors:
      - InvalidRequestError
    requires:
      - registered_post_logout_redirect_uri(input.params.client_id, input.params.post_logout_redirect_uri)
    access: public
    bindings:
      - kind: http
        method: GET
        path: /end_session
        request_form: query
        successful_status_codes:
          - "200"
          - "302"
      - kind: http
        method: POST
        path: /end_session
        request_form: form
        successful_status_codes:
          - "200"
          - "302"
  PushAuthorizationRequest:
    description: Pushed Authorization Request (RFC 9126)
    steps:
      - "{client_id} として認可リクエストを事前送信する"
    input:
      request:
        type: ParRequest
    output:
      response:
        type: ParResponse
    errors:
      - InvalidRequestError
      - InvalidClientError
    emits:
      - PARStored
    access:
      policies: [AuthenticatedClient]
      resource:
        type: OAuth2AuthorizationService
        id: context.client_id
    bindings:
      - kind: http
        method: POST
        path: /par
        request_form: form
  Token:
    description: Token endpoint (RFC 6749 §3.2 + 9068 + 9449)
    steps:
      - "認可コード {code} を verifier {code_verifier} で交換する"
      - "リフレッシュトークン {refresh_token} を交換する"
      - "device_code {device_code} を交換する"
      - "client_credentials で scope {scope} のトークンを取得する"
      - "subject_token {subject_token} を resource {resource} 向けに交換する"
    input:
      request:
        type: TokenRequest
    output:
      response:
        type: TokenResponse
    errors:
      - InvalidRequestError
      - InvalidClientError
      - InvalidGrantError
      - UnsupportedGrantTypeError
      - InvalidScopeError
      - InvalidDpopProofError
      - AuthorizationPendingError
      - SlowDownError
      - AccessDeniedError
      - ExpiredTokenError
    requires:
      - signing_key_provider_healthy(context.tenant_id)
      - token_request_references_are_tenant_local(context.tenant_id, input.request)
      - dpop_proof_is_fresh_and_unique(context.dpop_proof)
    ensures:
      - output.response.access_token == null || access_token_audience_non_empty(output.response.access_token)
      - input.request.grant_type != AuthorizationCode || consent_covers_issued_scopes(input.request)
      - input.request.grant_type != AuthorizationCode || pkce_verifier_matches_authorization_code(input.request)
      - input.request.grant_type != RefreshToken || rotated_refresh_preserves_parent_family_and_absolute_expiry(input.request.refresh_token, output.response.refresh_token)
      - "!refresh_token_reuse_detected(input.request) || refresh_family_is_revoked(input.request.refresh_token)"
      - client_authentication_failures_are_uniform()
    emits:
      - AccessTokenIssued
      - RefreshTokenIssued
      - RefreshTokenRotated
      - RefreshTokenReuseDetected
      - AuthorizationCodeRedeemed
      - TokenExchanged
      - TokenExchangeRejected
    access:
      policies: [TokenAuthorizationCode, TokenRefresh, TokenClientCredentials, TokenDeviceCode, TokenExchange]
      resource:
        type: OAuth2TokenService
        id: context.client_id
    bindings:
      - kind: http
        method: POST
        path: /token
        request_form: form
        headers:
          dpop:
            type: String
            optional: true
  Introspect:
    description: Token Introspection (RFC 7662)
    steps:
      - "トークン {token} を検査する"
    input:
      request:
        type: IntrospectionRequest
    output:
      response:
        type: IntrospectionResponse
    errors:
      - InvalidClientError
      - InvalidTokenError
    emits:
      - TokenIntrospected
    access:
      policies: [AuthenticatedClient]
      resource:
        type: OAuth2TokenService
        id: context.client_id
    bindings:
      - kind: http
        method: POST
        path: /introspect
        request_form: form
  Revoke:
    description: Token Revocation (RFC 7009)
    steps:
      - "トークン {token} を失効させる"
    input:
      request:
        type: RevokeRequest
    errors:
      - InvalidClientError
    emits:
      - TokenRevoked
    access:
      policies: [AuthenticatedClient]
      resource:
        type: OAuth2TokenService
        id: context.client_id
    bindings:
      - kind: http
        method: POST
        path: /revoke
        request_form: form
        successful_status_codes:
          - "200"
  UserInfo:
    description: UserInfo (OIDC Core §5.3)
    steps:
      - "トークン {access_token} でユーザー情報を取得する"
    output:
      response:
        type: UserInfoResponse
    errors:
      - InvalidTokenError
      - InsufficientScopeError
    access:
      policies: [ActiveOpenidToken]
      resource:
        type: OAuth2UserInfoService
        id: context.token_client_id
    bindings:
      - kind: http
        method: GET
        path: /userinfo
        headers:
          authorization:
            type: String
  PostUserInfo:
    description: UserInfo の POST binding (OIDC Core §5.3)
    steps:
      - "トークン {access_token} でユーザー情報を取得する"
    output:
      response:
        type: UserInfoResponse
    errors:
      - InvalidTokenError
      - InsufficientScopeError
    access:
      policies: [ActiveOpenidToken]
      resource:
        type: OAuth2UserInfoService
        id: context.token_client_id
    bindings:
      - kind: http
        method: POST
        path: /userinfo
        headers:
          authorization:
            type: String
  DeviceAuthorization:
    description: Device Authorization Request (RFC 8628 §3.1)
    steps:
      - "{client_id} として scope {scope} でデバイス認可を開始する"
    input:
      request:
        type: DeviceAuthorizationRequest
    output:
      response:
        type: DeviceAuthorizationResponse
    errors:
      - InvalidRequestError
      - InvalidClientError
    emits:
      - DeviceAuthorizationRequested
    access:
      policies: [RegisteredClient]
      resource:
        type: OAuth2AuthorizationService
        id: context.client_id
    bindings:
      - kind: http
        method: POST
        path: /device_authorization
        request_form: form
  GetOpenidConfiguration:
    description: OIDC Discovery
    steps:
      - Discovery 文書を取得する
    output:
      discovery:
        type: DiscoveryDocument
    read_only: true
    access: public
    bindings:
      - kind: http
        method: GET
        path: /.well-known/openid-configuration
  GetOauthAuthorizationServer:
    description: OAuth 2.0 Authorization Server Metadata (RFC 8414)
    steps:
      - Authorization Server メタデータを取得する
    output:
      discovery:
        type: DiscoveryDocument
    read_only: true
    access: public
    bindings:
      - kind: http
        method: GET
        path: /.well-known/oauth-authorization-server
  Health:
    description: Health check
    read_only: true
    access: public
    bindings:
      - kind: http
        method: GET
        path: /health
        successful_status_codes:
          - "200"
  ListAuthorizationDetailTypes:
    description: 管理者が所属テナントの authorization_details type を一覧する (RFC 9396)。
    output:
      response:
        type: AuthorizationDetailTypeListResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: /api/admin/authorization-detail-types
  GetAuthorizationDetailType:
    description: 管理者が単一 type を取得する。別テナントの type は未存在として扱う。
    input:
      type:
        type: String
    output:
      response:
        type: AuthorizationDetailTypeResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/authorization-detail-types/{type}"
  CreateAuthorizationDetailType:
    description: 管理者が所属テナントに authorization_details type を登録する。
    input:
      request:
        type: AuthorizationDetailTypeRequest
    output:
      response:
        type: AuthorizationDetailTypeResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: POST
        path: /api/admin/authorization-detail-types
        request_form: body
        successful_status_codes:
          - "201"
  UpdateAuthorizationDetailType:
    description: 管理者が type の schema / display_template / description / state を更新する。
    input:
      type:
        type: String
      request:
        type: AuthorizationDetailTypeRequest
    output:
      response:
        type: AuthorizationDetailTypeResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/authorization-detail-types/{type}"
        request_form: body
  DeleteAuthorizationDetailType:
    description: 管理者が type を削除する。発行済みトークンは失効まで有効。
    input:
      type:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/authorization-detail-types/{type}"
        successful_status_codes:
          - "204"
  ListAdminOAuth2Clients:
    description: 管理者が所属テナントの client を一覧する。
    output:
      response:
        type: AdminOAuth2ClientListResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: /api/admin/clients
  GetAdminOAuth2Client:
    description: 管理者が所属テナントの client を取得する。別テナントの client は未存在として扱う。
    input:
      client_id:
        type: String
    output:
      client:
        type: AdminOAuth2ClientResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/clients/{client_id}"
  CreateAdminOAuth2Client:
    description: 管理者が所属テナントに client を作成する。
    input:
      request:
        type: AdminOAuth2ClientCreateRequest
    output:
      response:
        type: AdminOAuth2ClientCreateResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - AdminOAuth2ClientCreated
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: POST
        path: /api/admin/clients
        request_form: body
        successful_status_codes:
          - "201"
  UpdateAdminOAuth2Client:
    description: 管理者が所属テナントの client metadata を更新する。
    input:
      client_id:
        type: String
      request:
        type: AdminOAuth2ClientUpdateRequest
    output:
      client:
        type: AdminOAuth2ClientResponse
    errors:
      - InvalidRequestError
