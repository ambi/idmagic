# idmagic OAuth2 — SCL
# Generated from idmagic/spec/scl.yaml during SCL 2.0 context split.

system: idmagic
spec_version: "3.0"
context: OAuth2
standards:
  RFC6749:
    title: The OAuth 2.0 Authorization Framework
    version: RFC 6749
    url: https://www.rfc-editor.org/rfc/rfc6749.html
    roles:
      - AuthorizationServer
    scope: Authorization Code、Refresh Token、Client Credentialsと共通エラー処理。
    requirements:
      - id: RFC6749-AUTHORIZATION-CODE
        section: §4.1
        strength: MUST
        adoption: required
        statement: Authorization Code Grantを認可エンドポイントとトークンエンドポイントで提供する。
      - id: RFC6749-CLIENT-CREDENTIALS
        section: §4.4
        strength: MAY
        adoption: optional
        statement: confidential clientに限りClient Credentials Grantを許可する。
      - id: RFC6749-IMPLICIT
        section: §4.2
        strength: MAY
        adoption: excluded
        statement: Implicit Grantを提供する。
        reason: RFC 9700の勧告に従いAuthorization Code + PKCEへ限定する。
      - id: RFC6749-PASSWORD-GRANT
        section: §4.3
        strength: MAY
        adoption: excluded
        statement: Resource Owner Password Credentials Grantを提供する。
        reason: RFC 9700により使用しない。
  RFC6750:
    title: The OAuth 2.0 Authorization Framework Bearer Token Usage
    version: RFC 6750
    url: https://www.rfc-editor.org/rfc/rfc6750.html
    roles:
      - AuthorizationServer
      - ResourceServer
    scope: Bearer Access Tokenの提示方法とエラー応答。
    requirements:
      - id: RFC6750-AUTHORIZATION-HEADER
        section: §2.1
        strength: MUST
        adoption: required
        statement: Bearer Access TokenはAuthorizationヘッダーで受け付ける。
      - id: RFC6750-QUERY-TOKEN
        section: §2.3
        strength: MAY
        adoption: excluded
        statement: URI query parameterによるAccess Token提示を受け付ける。
        reason: URL、ログ、Refererへのトークン漏洩を避ける。
  RFC7009:
    title: OAuth 2.0 Token Revocation
    version: RFC 7009
    url: https://www.rfc-editor.org/rfc/rfc7009.html
    roles:
      - AuthorizationServer
    scope: Access TokenとRefresh Tokenの失効。
    requirements:
      - id: RFC7009-REVOCATION-ENDPOINT
        section: §2
        strength: MUST
        adoption: required
        statement: 認証済みクライアントへトークン失効エンドポイントを提供する。
      - id: RFC7009-UNKNOWN-TOKEN
        section: §2.2
        strength: MUST
        adoption: required
        statement: 無効または他クライアント所有のトークンに対しても成功応答を返し情報を漏らさない。
  RFC7517:
    title: JSON Web Key
    version: RFC 7517
    url: https://www.rfc-editor.org/rfc/rfc7517.html
    roles:
      - AuthorizationServer
    scope: 署名検証鍵のJWK Set公開。
    requirements:
      - id: RFC7517-JWKS
        section: §5
        strength: MUST
        adoption: required
        statement: 公開可能な検証鍵をJWK Setとして配布する。
  RFC7518:
    title: JSON Web Algorithms
    version: RFC 7518
    url: https://www.rfc-editor.org/rfc/rfc7518.html
    roles:
      - AuthorizationServer
    scope: JWT署名に用いる暗号アルゴリズム。
    requirements:
      - id: RFC7518-SIGNATURE-ALGORITHMS
        section: §3
        strength: MUST
        adoption: required
        statement: JWT署名をPS256またはES256で行い、対称鍵署名をAccess TokenとID Tokenに使用しない。
  RFC7519:
    title: JSON Web Token
    version: RFC 7519
    url: https://www.rfc-editor.org/rfc/rfc7519.html
    roles:
      - AuthorizationServer
    scope: Access Token、ID Token、client assertionのJWT表現。
    requirements:
      - id: RFC7519-REGISTERED-CLAIMS
        section: §4.1
        strength: MUST
        adoption: required
        statement: JWTのissuer、subject、audience、有効期限、発行時刻、一意識別子を用途に応じて検証・発行する。
  RFC7523:
    title: JSON Web Token Profile for OAuth 2.0 Client Authentication and Authorization Grants
    version: RFC 7523
    url: https://www.rfc-editor.org/rfc/rfc7523.html
    roles:
      - AuthorizationServer
    scope: private_key_jwtによるClient Authentication。
    requirements:
      - id: RFC7523-CLIENT-ASSERTION
        section: "§2.2, §3"
        strength: MAY
        adoption: optional
        statement: client assertionの署名、issuer、subject、audience、有効期限、jtiを検証する。
  RFC7591:
    title: OAuth 2.0 Dynamic Client Registration Protocol
    version: RFC 7591
    url: https://www.rfc-editor.org/rfc/rfc7591.html
    roles:
      - AuthorizationServer
    scope: OAuth Client metadataの動的登録。
    requirements:
      - id: RFC7591-REGISTER
        section: §3
        strength: MAY
        adoption: optional
        statement: Client metadataを受け取りclient_idと登録結果を返す。
      - id: RFC7591-REDIRECT-URI
        section: §2
        strength: MUST
        adoption: required
        statement: Authorization Code Grantを利用するClientにはredirect_uri登録を要求する。
  RFC7636:
    title: Proof Key for Code Exchange by OAuth Public Clients
    version: RFC 7636
    url: https://www.rfc-editor.org/rfc/rfc7636.html
    roles:
      - AuthorizationServer
    scope: Authorization Code横取り攻撃への対策。
    requirements:
      - id: RFC7636-VERIFY
        section: §4.6
        strength: MUST
        adoption: required
        statement: Token requestのcode_verifierを認可時のcode_challengeと照合する。
      - id: RFC7636-S256
        section: §4.2
        strength: SHOULD
        adoption: required
        statement: code_challenge_methodはS256だけを許可する。
      - id: RFC7636-PLAIN
        section: §4.2
        strength: MAY
        adoption: excluded
        statement: plain code challenge methodを許可する。
        reason: 認可コード横取り耐性をS256へ統一する。
  RFC7662:
    title: OAuth 2.0 Token Introspection
    version: RFC 7662
    url: https://www.rfc-editor.org/rfc/rfc7662.html
    roles:
      - AuthorizationServer
    scope: Resource Serverによるトークン状態照会。
    requirements:
      - id: RFC7662-INTROSPECT
        section: §2
        strength: MUST
        adoption: required
        statement: 認証済みResource Serverへactive状態と許可されたメタデータを返す。
      - id: RFC7662-INACTIVE
        section: §2.2
        strength: MUST
        adoption: required
        statement: 無効なトークンにはactive=falseだけを返す。
  RFC7800:
    title: Proof-of-Possession Key Semantics for JSON Web Tokens
    version: RFC 7800
    url: https://www.rfc-editor.org/rfc/rfc7800.html
    roles:
      - AuthorizationServer
      - ResourceServer
    scope: JWT cnf claimによるproof-of-possession key表現。
    requirements:
      - id: RFC7800-CONFIRMATION
        section: §3
        strength: MAY
        adoption: optional
        statement: Sender-constrained tokenの確認鍵情報をcnf claimへ格納する。
  RFC8176:
    title: Authentication Method Reference Values
    version: RFC 8176
    url: https://www.rfc-editor.org/rfc/rfc8176.html
    roles:
      - OpenIDProvider
    scope: ID Token等へ記録する認証方法参照値。
    requirements:
      - id: RFC8176-AMR
        section: §2
        strength: MAY
        adoption: required
        statement: 実際に成立した認証方法をamr値として記録する。
  RFC8414:
    title: OAuth 2.0 Authorization Server Metadata
    version: RFC 8414
    url: https://www.rfc-editor.org/rfc/rfc8414.html
    roles:
      - AuthorizationServer
    scope: Authorization Server metadataの公開。
    requirements:
      - id: RFC8414-METADATA
        section: §3
        strength: MUST
        adoption: required
        statement: issuerと利用可能なエンドポイント・機能をmetadata文書として公開する。
  RFC8628:
    title: OAuth 2.0 Device Authorization Grant
    version: RFC 8628
    url: https://www.rfc-editor.org/rfc/rfc8628.html
    roles:
      - AuthorizationServer
    scope: 入力制約のあるデバイス向け認可。
    requirements:
      - id: RFC8628-DEVICE-AUTHORIZATION
        section: §3.1-3.3
        strength: MUST
        adoption: optional
        statement: device_code、user_code、verification_uriを発行しResourceOwnerの判断を受け付ける。
      - id: RFC8628-POLLING
        section: §3.5
        strength: MUST
        adoption: required
        statement: authorization_pending、slow_down、expired_tokenのポーリング意味論を守る。
  RFC8705:
    title: OAuth 2.0 Mutual-TLS Client Authentication and Certificate-Bound Access Tokens
    version: RFC 8705
    url: https://www.rfc-editor.org/rfc/rfc8705.html
    roles:
      - AuthorizationServer
    scope: mTLS Client Authenticationと証明書バインドAccess Token。
    requirements:
      - id: RFC8705-CLIENT-AUTH
        section: §2
        strength: MAY
        adoption: optional
        statement: 登録済みSubject DNと検証済みクライアント証明書を照合してClientを認証する。
      - id: RFC8705-CERT-BOUND
        section: §3
        strength: MAY
        adoption: optional
        statement: Access Tokenをクライアント証明書thumbprintへバインドしResource access時に照合する。
  RFC8707:
    title: Resource Indicators for OAuth 2.0
    version: RFC 8707
    url: https://www.rfc-editor.org/rfc/rfc8707.html
    roles:
      - AuthorizationServer
    scope: Access Token audienceの明示と権限最小化。
    requirements:
      - id: RFC8707-AUDIENCE
        section: §2
        strength: SHOULD
        adoption: required
        statement: 発行するAccess Tokenへ非空のaudienceを設定し、意図しないResource Serverでの利用を防ぐ。
  RFC9068:
    title: JSON Web Token Profile for OAuth 2.0 Access Tokens
    version: RFC 9068
    url: https://www.rfc-editor.org/rfc/rfc9068.html
    roles:
      - AuthorizationServer
    scope: JWT形式Access Tokenのクレームと署名。
    requirements:
      - id: RFC9068-CLAIMS
        section: §2.2
        strength: MUST
        adoption: required
        statement: JWT Access Tokenへiss、sub、aud、exp、iat、jti、client_idを含める。
      - id: RFC9068-ASYMMETRIC-SIGNATURE
        section: §2.1
        strength: MUST
        adoption: required
        statement: Access Tokenを非対称アルゴリズムで署名し公開鍵で検証可能にする。
  RFC9126:
    title: OAuth 2.0 Pushed Authorization Requests
    version: RFC 9126
    url: https://www.rfc-editor.org/rfc/rfc9126.html
    roles:
      - AuthorizationServer
    scope: 認可パラメータの事前送信とrequest_uri参照。
    requirements:
      - id: RFC9126-PAR
        section: §2
        strength: MAY
        adoption: optional
        statement: Client認証済みPARを保存し短命なrequest_uriを返す。
      - id: RFC9126-SINGLE-USE
        section: §2.2
        strength: SHOULD
        adoption: required
        statement: request_uriは短命かつ一度だけ使用可能とする。
  RFC9207:
    title: OAuth 2.0 Authorization Server Issuer Identification
    version: RFC 9207
    url: https://www.rfc-editor.org/rfc/rfc9207.html
    roles:
      - AuthorizationServer
    scope: Authorization responseにおけるmix-up攻撃対策。
    requirements:
      - id: RFC9207-ISS
        section: §2
        strength: MUST
        adoption: required
        statement: Authorization responseへissuer識別子を含める。
  RFC9449:
    title: OAuth 2.0 Demonstrating Proof of Possession
    version: RFC 9449
    url: https://www.rfc-editor.org/rfc/rfc9449.html
    roles:
      - AuthorizationServer
      - ResourceServer
    scope: DPoP proofと公開鍵バインドAccess Token。
    requirements:
      - id: RFC9449-PROOF
        section: §4-7
        strength: MAY
        adoption: optional
        statement: DPoP proofの署名、htm、htu、iat、jtiを検証する。
      - id: RFC9449-TOKEN-BINDING
        section: §6
        strength: MUST
        adoption: optional
        statement: DPoP利用時はAccess Tokenへjktを含め、提示proofの鍵と照合する。
  RFC9700:
    title: Best Current Practice for OAuth 2.0 Security
    version: RFC 9700 / BCP 240
    url: https://www.rfc-editor.org/rfc/rfc9700.html
    roles:
      - AuthorizationServer
    scope: OAuth 2.0の現行セキュリティベストプラクティス。
    requirements:
      - id: RFC9700-REDIRECT-MATCH
        section: "§2.1, §4.1.3"
        strength: MUST
        adoption: required
        statement: redirect_uriは登録値と完全一致させ、未検証URIへリダイレクトしない。
      - id: RFC9700-AUTHORIZATION-CODE
        section: §2.1.1
        strength: MUST
        adoption: required
        statement: redirect-based flowはAuthorization Code GrantとPKCEで保護する。
      - id: RFC9700-SENDER-CONSTRAINT
        section: §2.2.1
        strength: SHOULD
        adoption: optional
        statement: 高セキュリティClientではAccess TokenをDPoPまたはmTLSでsender-constrainedにする。
      - id: RFC9700-REFRESH-REPLAY
        section: "§2.2.2, §4.14"
        strength: MUST
        adoption: required
        statement: Refresh Tokenをローテーションし再利用検知時に関連トークンを失効する。
  OpenIDConnectCore:
    title: OpenID Connect Core 1.0 incorporating errata set 1
    version: Final
    url: https://openid.net/specs/openid-connect-core-1_0-18.html
    roles:
      - OpenIDProvider
    scope: Authorization Code Flow、ID Token、UserInfo、認証セッション。
    requirements:
      - id: OIDC-CORE-CODE-FLOW
        section: §3.1
        strength: MUST
        adoption: required
        statement: code response typeによるOpenID Connect Authenticationを提供する。
      - id: OIDC-CORE-ID-TOKEN
        section: §2
        strength: MUST
        adoption: required
        statement: ID Tokenへiss、sub、aud、exp、iatと認証コンテキストを含める。
      - id: OIDC-CORE-USERINFO
        section: §5.3
        strength: SHOULD
        adoption: required
        statement: openid scopeのAccess Tokenに対してsubを含むUserInfoを返す。
      - id: OIDC-CORE-HYBRID-IMPLICIT
        section: §3.2-3.3
        strength: MAY
        adoption: excluded
        statement: Implicit FlowおよびHybrid Flowを提供する。
        reason: front-channel token発行を避けcode response typeだけを採用する。
  OpenIDConnectDiscovery:
    title: OpenID Connect Discovery 1.0 incorporating errata set 1
    version: Final
    url: https://openid.net/specs/openid-connect-discovery-1_0-21.html
    roles:
      - OpenIDProvider
    scope: OpenID Provider metadataの公開。
    requirements:
      - id: OIDC-DISCOVERY-CONFIGURATION
        section: §4
        strength: MUST
        adoption: required
        statement: well-known configurationからissuer、endpoints、supported metadataを公開する。
  OpenIDConnectRPInitiatedLogout:
    title: OpenID Connect RP-Initiated Logout 1.0
    version: Final
    url: https://openid.net/specs/openid-connect-rpinitiated-1_0.html
    roles:
      - OpenIDProvider
    scope: RPから開始するEnd-User session終了。
    requirements:
      - id: OIDC-LOGOUT-ENDPOINT
        section: §2
        strength: MUST
        adoption: required
        statement: end_session_endpointを公開しRPからのlogout要求を受け付ける。
      - id: OIDC-LOGOUT-REDIRECT
        section: §3
        strength: MUST
        adoption: required
        statement: post_logout_redirect_uriはClientに登録済みの値だけを許可する。
  FAPI2SecurityProfile:
    title: FAPI 2.0 Security Profile
    version: Final
    url: https://openid.net/specs/fapi-security-profile-2_0-final.html
    roles:
      - AuthorizationServer
    scope: confidential client向け高セキュリティOAuthプロファイル。
    requirements:
      - id: FAPI2-PROFILE-SELECTION
        section: §5.3
        strength: MUST
        adoption: optional
        statement: Fapi2SecurityProfileを選択したClientにだけ本プロファイルの追加制約を適用する。
      - id: FAPI2-PAR-PKCE
        section: §5.3.2
        strength: MUST
        adoption: optional
        statement: FAPI ClientはPARとS256 PKCEを使用する。
      - id: FAPI2-CLIENT-AUTH
        section: §5.3.2
        strength: MUST
        adoption: optional
        statement: FAPI Clientはprivate_key_jwtまたはmTLSで認証する。
      - id: FAPI2-SENDER-CONSTRAINT
        section: §5.3.2
        strength: MUST
        adoption: optional
        statement: FAPI Access TokenをDPoPまたはmTLSでsender-constrainedにする。
glossary:
  ResourceOwner:
    definition: 保護リソースに対するアクセス権限を付与できる実体。本アプリではエンドユーザー。
    aliases:
      - resource_owner
      - リソースオーナー
      - EndUser
    not_to_confuse_with:
      - term: Client
        reason: Client はアプリケーション、ResourceOwner は人間。OAuth では明確に区別される。
  Client:
    definition: ResourceOwner に代わって保護リソースへのアクセスを要求するアプリケーション。client_id で識別される。
    aliases:
      - client
      - クライアント
      - RelyingParty
  AuthorizationServer:
    definition: ResourceOwner を認証し Client にトークンを発行するサーバー。本アプリそのもの。OIDC では IdP と同義。
    aliases:
      - authorization_server
      - IdP
      - IdentityProvider
  ResourceServer:
    definition: AccessToken を提示する Client に対して保護リソースを返すサーバー。本アプリの外部。
    aliases:
      - resource_server
  Public:
    definition: "client_secret を安全に保持できない Client（SPA, ネイティブアプリ）。PKCE 必須。"
    aliases:
      - public
  Confidential:
    definition: サーバーサイドで client_secret または private_key を保持できる Client。
    aliases:
      - confidential
  AuthorizationCode:
    definition: 短命（60秒以下）の一度限り使用される中間トークン。/authorize で発行され /token で交換される。grant_type 値「authorization_code」と同じ文字列を共有する（RFC 6749 §4.1）。
    aliases:
      - authorization_code
      - 認可コード
  RefreshToken:
    definition: AccessToken の再発行に使うトークン。提示のたびにローテーションされる。絶対 TTL 30 日。grant_type 値「refresh_token」と同じ文字列を共有する（RFC 6749 §6）。
    aliases:
      - refresh_token
      - リフレッシュトークン
  ClientCredentials:
    definition: Client 自身が認可主体となる machine-to-machine フロー (RFC 6749 §4.4)。confidential のみ。
    aliases:
      - client_credentials
      - M2Mグラント
  DeviceCode:
    definition: 入力制約のあるデバイス向けのデバイス認可グラント (RFC 8628)。grant_type は URN。
    aliases:
      - urn:ietf:params:oauth:grant-type:device_code
      - device_code
      - デバイスコード
  TokenExchange:
    definition: 既存トークンを別トークンに交換するトークン交換グラント (RFC 8693)。本アプリは自己発行トークンの委任 (delegation) のみを扱い、subject_token / actor_token は本 IdP が発行したものに限る。grant_type は URN。
    aliases:
      - urn:ietf:params:oauth:grant-type:token-exchange
      - token-exchange
      - トークン交換
  AuthorizationDetails:
    definition: 構造化された細粒度の権限要求 (RFC 9396)。type で識別される JSON オブジェクトの配列として、対象・操作・上限・条件を表し、/authorize・/par・/token で要求・同意・トークン反映する。本アプリは受理する type をテナント登録スキーマに限定し fail-closed に検証する。
    aliases:
      - authorization_details
      - RAR
      - Rich Authorization Requests
      - リッチ認可リクエスト
  AccessToken:
    definition: ResourceServer にアクセスする際に提示するトークン。JWT (PS256 / ES256) として発行、TTL 600秒。
    aliases:
      - access_token
      - アクセストークン
    not_to_confuse_with:
      - term: IdToken
        reason: AccessToken は API アクセス用、IdToken は認証情報の表明用。混同してはならない。
  IdToken:
    definition: OIDC が定める、ResourceOwner の認証結果を表明する JWT。iss/sub/aud/exp/iat/auth_time/nonce/azp を含む。
    aliases:
      - id_token
      - IDトークン
  Pkce:
    definition: Proof Key for Code Exchange (RFC 7636)。code_challenge / code_verifier で認可コード横取り攻撃を防ぐ。本アプリでは例外なく必須。
    aliases:
      - pkce
      - PKCE
    not_to_confuse_with:
      - term: Dpop
        reason: PKCE は認可コード保護、DPoP はトークン保護。攻撃面が異なる。
  Dpop:
    definition: Demonstrating Proof of Possession (RFC 9449)。JWK サムプリント (jkt) でトークンを所有鍵にバインドする。
    aliases:
      - dpop
      - DPoP
  Mtls:
    definition: Mutual-TLS Client Authentication (RFC 8705)。TLS クライアント証明書で Client を認証する。
    aliases:
      - mtls
      - mTLS
      - tls_client_auth
  Par:
    definition: Pushed Authorization Requests (RFC 9126)。/par に認可リクエストを事前 POST し /authorize は request_uri のみで参照する。FAPI 2.0 必須。
    aliases:
      - par
      - PAR
  SenderConstrainedToken:
    definition: 所有証明（DPoP または mTLS）と組み合わさったトークン。所有者以外による再利用を防ぐ。
  Issuer:
    definition: トークンを発行した AuthorizationServer の URL 識別子。
    aliases:
      - iss
  Subject:
    definition: トークンの主体（通常は ResourceOwner）の仮名化された識別子。削除後も監査ログに残る。
    aliases:
      - sub
    not_to_confuse_with:
      - term: PreferredUsername
        reason: sub は仮名化された安定識別子、preferred_username は表示用の文字列。
  Audience:
    definition: トークンの想定受信者の識別子。通常は Client の client_id。
    aliases:
      - aud
  JwtId:
    definition: JWT 一意識別子。リプレイ防止と監査の追跡に使用。
    aliases:
      - jti
  Nonce:
    definition: Client が認可リクエストに含め、ID トークンに含めて返される値。IDトークンのリプレイ防止。
  Scope:
    definition: Client が要求する権限の集合。Client メタデータで宣言された集合の部分集合でなければならない。
  Consent:
    definition: ResourceOwner が Client に対して特定の Scope を付与する意思表示。tenant / subject / client / scopes / granted_at / expires_at を永続化する。管理者は参照と撤回だけが可能で、付与や scope 拡張を代行できない。
    aliases:
      - consent
      - 同意
  AdminConsentManagement:
    definition: Administrator が所属テナント内の Consent を監査目的で参照し、必要時に撤回する管理操作。同意の作成や scope 拡張は含まない。
    aliases:
      - consent administration
      - 同意管理
  PreferredUsername:
    definition: 表示用のユーザー名。可変。
    aliases:
      - preferred_username
  ClientSecretBasic:
    definition: HTTP Basic 認証（レガシークライアント向け）。
    aliases:
      - client_secret_basic
  ClientSecretPost:
    definition: フォームボディ内のクレデンシャル。
    aliases:
      - client_secret_post
  PrivateKeyJwt:
    definition: RFC 7523 — client_assertion による署名済み JWT 認証。confidential 推奨。
    aliases:
      - private_key_jwt
  TlsClientAuth:
    definition: RFC 8705 §2 — Mutual-TLS Client Authentication（PKI 結合）。Mtls 機構の一形態を token_endpoint_auth_method の値として表現したもの。
    aliases:
      - tls_client_auth
    not_to_confuse_with:
      - term: Mtls
        reason: Mtls は機構（mTLS）の一般名、TlsClientAuth は token_endpoint_auth_method 値として使う具体的な wire 形式。
  None:
    definition: クライアント認証なし（public クライアント、PKCE が代替防御）。
    aliases:
      - none
  PS256:
    definition: RSASSA-PSS using SHA-256 (RFC 7518)。
  ES256:
    definition: ECDSA using P-256 and SHA-256 (RFC 7518)。
  S256:
    definition: PKCE code_challenge_method=S256。code_challenge は BASE64URL-ENCODE(SHA256(code_verifier))。
    aliases:
      - S256
  Hwk:
    definition: RFC 8176 の hardware-secured key 認証メソッド。
    aliases:
      - hwk
  Swk:
    definition: RFC 8176 の software-secured key 認証メソッド。
    aliases:
      - swk
  Code:
    definition: response_type=code。本アプリが対応する唯一のレスポンスタイプ。
    aliases:
      - code
  Query:
    definition: authorization response parameters を redirect_uri の query component で返す response_mode。
    aliases:
      - query
  FormPost:
    definition: authorization response parameters を自動送信 HTML form で返す response_mode。
    aliases:
      - form_post
  InvalidRequest:
    definition: OAuth error code invalid_request。必須パラメータ欠落、不正値、重複などのリクエスト不備。
    aliases:
      - invalid_request
  InvalidClient:
    definition: OAuth error code invalid_client。クライアント認証失敗。
    aliases:
      - invalid_client
  InvalidGrant:
    definition: OAuth error code invalid_grant。認可コード、refresh token、device_code などの grant が無効。
    aliases:
      - invalid_grant
  UnauthorizedClient:
    definition: OAuth error code unauthorized_client。クライアントが当該 grant_type を使えない。
    aliases:
      - unauthorized_client
  UnsupportedGrantType:
    definition: OAuth error code unsupported_grant_type。未対応の grant_type。
    aliases:
      - unsupported_grant_type
  InvalidScope:
    definition: OAuth error code invalid_scope。要求 scope が不正、未知、または許可外。
    aliases:
      - invalid_scope
  InvalidToken:
    definition: Bearer token error code invalid_token。トークンが無効、期限切れ、改ざん、または失効済み。
    aliases:
      - invalid_token
  InvalidDpopProof:
    definition: DPoP error code invalid_dpop_proof。DPoP proof JWT の検証失敗。
    aliases:
      - invalid_dpop_proof
  AccessDenied:
    definition: OAuth error code access_denied。ResourceOwner またはポリシーによる拒否。
    aliases:
      - access_denied
  ExpiredToken:
    definition: Device Authorization Grant error code expired_token。device_code が期限切れ。
    aliases:
      - expired_token
  InsufficientScope:
    definition: Bearer token error code insufficient_scope。提示 token の scope が不足。
    aliases:
      - insufficient_scope
  ServerError:
    definition: OAuth error code server_error。AuthorizationServer 側の予期せぬ内部エラー。
    aliases:
      - server_error
  Fapi2SecurityProfile:
    definition: FAPI 2.0 Security Profile。tls_client_auth または private_key_jwt + PAR 必須。
    aliases:
      - fapi_2_security_profile
  Received:
    definition: 認可リクエストを受信した直後の初期状態。
    aliases:
      - received
  AuthenticationPending:
    definition: ResourceOwner の認証を待っている状態。
    aliases:
      - authentication_pending
  Authenticated:
    definition: ResourceOwner の認証が完了した状態。
    aliases:
      - authenticated
  ConsentPending:
    definition: ResourceOwner に Scope への同意を求めている状態。
    aliases:
      - consent_pending
  Consented:
    definition: ResourceOwner が要求 Scope に同意した状態。
    aliases:
      - consented
  CodeIssued:
    definition: AuthorizationCode を Client に発行した状態。
    aliases:
      - code_issued
  Exchanged:
    definition: AuthorizationCode が /token で正常に交換された終端状態。
    aliases:
      - exchanged
  Rejected:
    definition: 認可リクエストが拒否された終端状態。
    aliases:
      - rejected
  Expired:
    definition: 期限切れにより無効化された終端状態。
    aliases:
      - expired
  Validate:
    definition: 認可リクエストの構文・必須パラメータ・redirect_uri を検証する。検証成功で AuthenticationPending へ遷移し、ログイン UI 提示を含む。
    aliases:
      - validate
  AuthenticateUser:
    definition: ResourceOwner の認証を実行する。
    aliases:
      - authenticate_user
  RequestConsent:
    definition: ResourceOwner に Scope への同意を求める（同意 UI 表示）。
    aliases:
      - request_consent
  GrantConsent:
    definition: ResourceOwner が同意を付与する。
    aliases:
      - grant_consent
  IssueCode:
    definition: AuthorizationCode を Client に発行する。
    aliases:
      - issue_code
  RedeemCode:
    definition: Client が AuthorizationCode を /token で AccessToken と交換する。
    aliases:
      - redeem_code
  Reject:
    definition: 認可リクエストを拒否する。
    aliases:
      - reject
  Expire:
    definition: 期限切れにより認可リクエストを無効化する。
    aliases:
      - expire
  Issued:
    definition: device_code と user_code を発行した初期状態。
    aliases:
      - issued
  UserCodeEntered:
    definition: ユーザーが verification_uri で user_code を入力した状態。
    aliases:
      - user_code_entered
  AuthorizationPending:
    definition: ユーザー承認待ち状態（device_code フロー）。
    aliases:
      - authorization_pending
  Approved:
    definition: ユーザーが承認した状態。
    aliases:
      - approved
  Denied:
    definition: ユーザーが拒否した、または user_code 誤り過多で失敗した状態。
    aliases:
      - denied
  EnterUserCode:
    definition: ユーザーが verification_uri で user_code を入力する。
    aliases:
      - enter_user_code
  Approve:
    definition: ユーザーが承認する。
    aliases:
      - approve
  Deny:
    definition: ユーザーが拒否する。
    aliases:
      - deny
  Exchange:
    definition: デバイスが /token で device_code を交換する。
    aliases:
      - exchange
  SlowDown:
    definition: ポーリング間隔を増やすよう指示する。
    aliases:
      - slow_down
  Active:
    definition: トークンまたは鍵が現在有効で第一線で使われている状態。RefreshToken と SigningKey で共用。
    aliases:
      - active
  Rotated:
    definition: 子トークンに引き継がれ親が消費された状態。家族失効の対象になりうる。
    aliases:
      - rotated
  Revoked:
    definition: 失効済み。/revoke もしくは家族失効により遷移する。RefreshToken と Consent で共用。
    aliases:
      - revoked
  Rotate:
    definition: 親 RefreshToken を Rotated とし、新しい子トークンを発行する。
    aliases:
      - rotate
  RevokeToken:
    definition: トークンを失効させる（/revoke または家族失効）。
    aliases:
      - revoke_token
  Redeemed:
    definition: 認可コードが /token で正規に交換された終端状態（AuthorizationCodeRecord）。AuthorizationCodeFlow の Exchanged と並行。
    aliases:
      - redeemed
  Stored:
    definition: /par で受領済みかつ未参照の request_uri。
    aliases:
      - stored
  Used:
    definition: request_uri が一度参照済みの終端状態。再使用不可。
    aliases:
      - used
  Use:
    definition: /authorize から request_uri を参照する。一度きり。
    aliases:
      - use
  Granted:
    definition: 同意が付与された状態（Consent の初期状態）。
    aliases:
      - granted
  RevokeConsent:
    definition: ResourceOwner が同意を撤回する（GDPR Art.7(3)）。
    aliases:
      - revoke_consent
  Implicit:
    definition: implicit grant は RFC 9700 §2.1.2 により参照実装から除外する。
    aliases:
      - __excluded_implicit
    not_to_confuse_with:
      - term: AuthorizationCode
        reason: 旧 implicit が担っていた SPA 向けトークン発行は authorization_code + nonce + PKCE が代替する。
  PasswordGrant:
    definition: Resource Owner Password Credentials grant は RFC 9700 §2.4 により参照実装から除外する。
    aliases:
      - __excluded_password
models:
  ClientType:
    kind: enum
    description: クライアントが client_secret を安全に保持できるかどうかの分類。Public はモバイル/SPA など秘匿不可、Confidential はサーバーサイドで秘密鍵を保持可能。
    values:
      - Public
      - Confidential
  GrantType:
    kind: enum
    description: トークン発行の方式。本アプリがサポートする 5 種を列挙する。各値の意味は glossary を参照。
    values:
      - AuthorizationCode
      - RefreshToken
      - ClientCredentials
      - DeviceCode
      - TokenExchange
  TokenEndpointAuthMethod:
    kind: enum
    description: /token エンドポイントにおけるクライアント認証方式 (RFC 6749 §2.3 / RFC 7523 / RFC 8705)。None は public client 専用。
    values:
      - ClientSecretBasic
      - ClientSecretPost
      - PrivateKeyJwt
      - TlsClientAuth
      - None
  ResponseType:
    kind: enum
    description: /authorize で要求できる応答種別。本アプリでは Authorization Code フロー専用なので Code のみサポート。
    values:
      - Code
  ResponseMode:
    kind: enum
    description: 認可レスポンスのパラメータをクライアントへ返す方式 (OIDC Multiple Response Types §3)。
    values:
      - Query
      - FormPost
  FapiProfile:
    kind: enum
    description: クライアントに適用される FAPI セキュリティプロファイル。None は通常クライアント、Fapi2SecurityProfile は金融グレード API 向け（PAR 必須 / DPoP 必須 等の追加制約）。
    values:
      - None
      - Fapi2SecurityProfile
  TokenType:
    kind: enum
    description: /introspect / /revoke の token_type_hint で指定されるトークン種別。
    values:
      - AccessToken
      - RefreshToken
  SenderConstraintKind:
    kind: enum
    description: トークンを所有者にバインドする方式 (RFC 7800)。Dpop は DPoP 公開鍵サムプリント、Mtls は mTLS クライアント証明書サムプリント。
    values:
      - Dpop
      - Mtls
  AccessTokenSenderConstraint:
    kind: enum
    description: 発行された AccessToken に適用されているセンダー制約。None は Bearer トークン。
    values:
      - None
      - Dpop
      - Mtls
  CodeChallengeMethod:
    kind: enum
    description: PKCE (RFC 7636) の code_challenge ハッシュ方式。本アプリでは S256 のみ許容（plain は脆弱なため拒否）。
    values:
      - S256
  AuthorizationCodeState:
    kind: enum
    description: AuthorizationCodeFlow 状態機械の取りうる状態列挙。状態機械セクションも参照。
    values:
      - Received
      - AuthenticationPending
      - Authenticated
      - ConsentPending
      - Consented
      - CodeIssued
      - Exchanged
      - Rejected
      - Expired
  DeviceCodeState:
    kind: enum
    description: DeviceCodeFlow (RFC 8628) 状態機械の取りうる状態列挙。状態機械セクションも参照。
    values:
      - Issued
      - UserCodeEntered
      - Approved
      - Denied
      - Exchanged
      - Expired
  RefreshTokenState:
    kind: enum
    description: RefreshTokenLifecycle 状態機械の取りうる状態列挙。Rotated は子トークンへ消費済み、Revoked は失効済み、Expired は期限切れ。
    values:
      - Active
      - Rotated
      - Revoked
      - Expired
  AuthorizationCodeRecordState:
    kind: enum
    description: AuthorizationCodeRecordLifecycle 状態機械の取りうる状態列挙。AuthorizationCodeFlow とは別軸でコード本体のライフサイクルを表す。
    values:
      - Issued
      - Redeemed
      - Expired
  ConsentState:
    kind: enum
    description: ConsentLifecycle 状態機械の取りうる状態列挙。GDPR Art.7(3) 撤回権により Granted → Revoked が可能。
    values:
      - Granted
      - Revoked
      - Expired
  PARRecordState:
    kind: enum
    description: PARRecordLifecycle 状態機械の取りうる状態列挙。Stored から /authorize での参照で Used、期限切れで Expired。
    values:
      - Stored
      - Used
      - Expired
  AuthorizationDetailFieldSemantics:
    kind: enum
    description: authorization_details の登録スキーマで各フィールドが担うダウンスコープ半順序。 set は集合包含 (要求 ⊆ 同意/元)、at_most は単調減少 (要求 ≤ 同意/元)、enum は許可列挙からの完全一致、 exact は不透明値の完全一致。判定不能はすべて拒否側へ倒す (fail-closed)。
    values:
      - set
      - at_most
      - enum
      - exact
  AuthorizationDetailTypeState:
    kind: enum
    description: AuthorizationDetailType の運用状態列挙。Enabled のみ受理対象、Disabled は新規要求を拒否する (既存トークンは失効まで有効)。
    values:
      - Enabled
      - Disabled
  OAuthErrorCode:
    kind: enum
    description: OAuth 2.0 / OIDC / DPoP / FAPI / RFC 8628 で規定された標準エラーコード一式。HTTP レスポンスの error フィールド値となる。
    values:
      - InvalidRequest
      - InvalidClient
      - InvalidGrant
      - UnauthorizedClient
      - UnsupportedGrantType
      - InvalidScope
      - InvalidToken
      - ServerError
      - InvalidDpopProof
      - AccessDenied
      - ExpiredToken
      - SlowDown
      - InsufficientScope
      - AuthorizationPending
  OAuth2Client:
    kind: entity
    description: RFC 7591 + FAPI 2.0 拡張のクライアント。
    identity:
      - client_id
    fields:
      tenant_id:
        type: String
        default: default
        description: "所属テナント ID。"
      client_id:
        type: String
        constraints:
          - non_empty
          - max_length: 128
      client_secret_hash:
        type: String
        optional: true
        annotations:
          sensitive: true
      client_name:
        type: String
        optional: true
        constraints:
          - max_length: 200
      client_type:
        type: ClientType
      redirect_uris:
        type: "URI[]"
        optional: true
        description: redirect 系グラント (authorization_code) のとき必須。client_credentials のみの M2M クライアントは持たない (RFC 6749 §3.1.2)。
      grant_types:
        type: "GrantType[]"
        constraints:
          - non_empty
      response_types:
        type: "ResponseType[]"
      token_endpoint_auth_method:
        type: TokenEndpointAuthMethod
      scope:
        type: String
      jwks_uri:
        type: URI
        optional: true
      jwks:
        type: JSON
        optional: true
      tls_client_auth_subject_dn:
        type: String
        optional: true
      id_token_signed_response_alg:
        type: SignatureAlgorithm
        default: PS256
      require_pushed_authorization_requests:
        type: Boolean
        default: false
      require_pkce:
        type: Boolean
        optional: true
      dpop_bound_access_tokens:
        type: Boolean
        default: false
      fapi_profile:
        type: FapiProfile
        default: None
      first_party:
        type: Boolean
        default: false
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
        description: 作成時は created_at と同じ値を持ち、以後 client metadata の管理操作ごとに更新する。
  Consent:
    kind: entity
    constraints:
      - consent_references_are_tenant_local(user_id, client_id)
    description: GDPR 同意取得記録。状態は ConsentLifecycle 状態機械に従う。user_id と client_id は既存 User と OAuth2Client を指す。
    identity:
      - user_id
      - client_id
    fields:
      user_id:
        type: String
      client_id:
        type: String
      scopes:
        type: "String[]"
        constraints:
          - non_empty
          - unique
      state:
        type: ConsentState
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
      granted_at:
        type: DateTime
      expires_at:
        type: DateTime
        description: 通常 granted_at + 365 日
      revoked_at:
        type: DateTime
        optional: true
        description: state == Revoked になった時刻（監査）。
      authorization_details:
        type: "AuthorizationDetail[]"
        optional: true
        description: RFC 9396 — ユーザーが同意した構造化詳細。発行・交換時の部分集合判定の基準。
  AuthorizationDetail:
    kind: value_object
    description: RFC 9396 authorization_details の 1 要素。type で識別される構造化された細粒度権限を表す。 要求・同意・トークン反映を通じて一貫して扱い、登録済み AuthorizationDetailType に対し fail-closed に検証する。
    fields:
      type:
        type: String
        constraints:
          - non_empty
        description: "登録済み AuthorizationDetailType の識別子 (例: payment_initiation)。"
      locations:
        type: "String[]"
        optional: true
        description: RFC 9396 — 詳細が向く resource server の URI 群。
      actions:
        type: "String[]"
        optional: true
        description: RFC 9396 — 対象に対して許可する操作群。
      datatypes:
        type: "String[]"
        optional: true
        description: RFC 9396 — アクセスするデータ種別群。
      identifier:
        type: String
        optional: true
        description: RFC 9396 — 対象リソースの識別子。
      privileges:
        type: "String[]"
        optional: true
        description: RFC 9396 — 対象に対する権限レベル群。
      fields:
        type: "Map<String, JSON>"
        optional: true
        description: "type 固有の構造化フィールド (例: instructedAmount, creditorAccount)。登録スキーマで意味論を束縛する。"
  AuthorizationDetailFieldRule:
    kind: value_object
    description: AuthorizationDetailsSchema の 1 フィールド規則。ダウンスコープ半順序と許可値を定義する。
    fields:
      name:
        type: String
        constraints:
          - non_empty
        description: 対象フィールド名。標準フィールド (actions 等) または fields マップ内のキー。
      semantics:
        type: AuthorizationDetailFieldSemantics
        description: 部分集合判定に使う半順序。
      required:
        type: Boolean
        default: false
        description: true のとき詳細にこのフィールドが必須。
      allowed:
        type: "String[]"
        optional: true
        description: semantics が set / enum のとき許可される値の閉集合 (空なら無制限)。
  AuthorizationDetailsSchema:
    kind: value_object
    description: "ある type の構造的スキーマ。受理するフィールドと各フィールドのダウンスコープ半順序を列挙する。 未登録フィールド・スキーマ不適合・許可外値はすべて拒否する (fail-closed)。"
    fields:
      rules:
        type: "AuthorizationDetailFieldRule[]"
        constraints:
          - non_empty
        description: フィールド規則の集合。
  AuthorizationDetailType:
    kind: entity
    description: テナントが登録する authorization_details の type 定義。type 識別子・検証スキーマ・同意 UI の 表示テンプレートを束ねる。Enabled な type のみ受理する。管理は AdminAuthorizationDetailTypesManage で保護する。
    identity:
      - tenant_id
      - type
    fields:
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。
      type:
        type: String
        constraints:
          - non_empty
        description: authorization_details の type 識別子。
      description:
        type: String
        optional: true
      schema:
        type: AuthorizationDetailsSchema
      display_template:
        type: String
        description: "同意 UI で詳細を人間可読に提示するテンプレート (例: '{identifier} へ最大 {fields.instructedAmount} まで')。"
      state:
        type: AuthorizationDetailTypeState
        default: Enabled
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
  RefreshTokenRecord:
    kind: entity
    constraints:
      - hash != ''
      - absolute_expires_at >= expires_at
      - refresh_token_references_are_tenant_local(user_id, client_id)
      - parent_id == null || parent_in_same_family(parent_id, family_id)
    description: リフレッシュトークンのストアレコード。プレーン値は保存しない。状態は RefreshTokenLifecycle 状態機械に従う。tenant は global ID の User / OAuth2Client から導出し、token 行に冗長保持しない。use case は両者の tenant-local invariant を検証する。
    identity: id
    fields:
      id:
        type: UUID
      hash:
        type: String
        description: SHA-256 ハッシュ。
        annotations:
          sensitive: true
      family_id:
        type: UUID
        description: 認可コード交換から派生したすべてのトークンが共有する識別子。
      parent_id:
        type: UUID
        optional: true
      client_id:
        type: String
      user_id:
        type: String
      scopes:
        type: "String[]"
      state:
        type: RefreshTokenState
      created_at:
        type: DateTime
      updated_at:
        type: DateTime
      issued_at:
        type: DateTime
      expires_at:
        type: DateTime
      absolute_expires_at:
        type: DateTime
        description: ローテーションされても延長されない絶対期限。
      sender_constraint:
        type: RefreshTokenSenderConstraint
        optional: true
  AuthorizationRequest:
    kind: entity
    constraints:
      - code_challenge != ''
      - code_challenge_method == S256
    description: フロー追跡用のサーバー内部中間ステート。
    identity: id
    fields:
      id:
        type: UUID
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。
      state:
        type: AuthorizationCodeState
      client_id:
        type: String
      redirect_uri:
        type: URI
      response_type:
        type: ResponseType
      scope:
        type: String
      state_param:
        type: String
        optional: true
      nonce:
        type: String
        optional: true
      code_challenge:
        type: String
      code_challenge_method:
        type: CodeChallengeMethod
      prompt:
        type: String
        optional: true
      max_age:
        type: Integer
        optional: true
        constraints:
          - min: 0
      par_request_uri:
        type: String
        optional: true
      user_id:
        type: String
        optional: true
      auth_time:
        type: Integer
        optional: true
      amr:
        type: "String[]"
        optional: true
        description: 認証成功時のメソッド列。advance(authenticate_user) で AuthenticationContext から伝搬。
      acr:
        type: String
        optional: true
        description: amr から AuthenticationContextPolicy に従って導出した URN。
      acr_values:
        type: String
        optional: true
        description: クライアントが /authorize に与えた acr_values パラメータ (RFC 8176)。step-up 判定に使う。
      authorization_details:
        type: "AuthorizationDetail[]"
        optional: true
        description: RFC 9396 — クライアントが要求した構造化詳細。検証済み・登録 type 適合済みのものを保持する。
      created_at:
        type: DateTime
      expires_at:
        type: DateTime
  AuthorizationCodeRecord:
    kind: entity
    constraints:
      - expires_at - issued_at <= duration('60s')
    description: 発行済み認可コードの永続レコード。code 本体は短命。状態は AuthorizationCodeRecordLifecycle に従う（AuthorizationCodeFlow とは別軸でコード自体のライフサイクルを表す）。
    identity: code
    fields:
      code:
        type: String
        annotations:
          sensitive: true
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。
      authorization_request_id:
        type: UUID
      client_id:
        type: String
      user_id:
        type: String
      scopes:
        type: "String[]"
      redirect_uri:
        type: URI
      code_challenge:
        type: String
      code_challenge_method:
        type: CodeChallengeMethod
      nonce:
        type: String
        optional: true
      auth_time:
        type: Integer
      amr:
        type: "String[]"
        optional: true
        description: 認可リクエストから引き継いだ認証メソッド列。id_token / access_token に emit する。
      acr:
        type: String
        optional: true
        description: 認可リクエストから引き継いだ ACR URN。id_token / access_token に emit する。
      authorization_details:
        type: "AuthorizationDetail[]"
        optional: true
        description: RFC 9396 — 同意済み構造化詳細。交換で発行トークンへ反映する。
      state:
        type: AuthorizationCodeRecordState
      issued_at:
        type: DateTime
      expires_at:
        type: DateTime
      redeemed_at:
        type: DateTime
        optional: true
        description: state == Redeemed になった時刻（監査）。
      issued_family_id:
        type: UUID
        optional: true
        description: 成功交換で発行された refresh family（不正リプレイ検知時のファミリー失効に使う）
  PARRecord:
    kind: entity
    description: Pushed Authorization Request の格納レコード。状態は PARRecordLifecycle に従う。
    identity: request_uri
    fields:
      request_uri:
        type: String
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。
      client_id:
        type: String
      parameters:
        type: "Map<String, String>"
      state:
        type: PARRecordState
      issued_at:
        type: DateTime
      expires_at:
        type: DateTime
  DeviceAuthorization:
    kind: entity
    description: RFC 8628 デバイス認可レコード。device_code はハッシュのみで保存する。
    identity: device_code_hash
    fields:
      device_code_hash:
        type: String
        annotations:
          sensitive: true
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。
      user_code:
        type: String
        description: 紛らわしい文字を避けた短いコード。
      client_id:
        type: String
      scopes:
        type: "String[]"
      state:
        type: DeviceCodeState
      user_id:
        type: String
        optional: true
      auth_time:
        type: Integer
        optional: true
      interval_seconds:
        type: Integer
        constraints:
          - min: 1
      last_polled_at:
        type: DateTime
        optional: true
      issued_family_id:
        type: UUID
        optional: true
      issued_at:
        type: DateTime
      expires_at:
        type: DateTime
  SenderConstraintCnf:
    kind: value_object
    description: Sender-Constrained 証明 (RFC 7800)。
    fields:
      jkt:
        type: String
        optional: true
        description: DPoP 鍵の SHA-256 サムプリント (RFC 9449 §6.1)。
      x5t_s256:
        type: String
        optional: true
        description: "mTLS クライアント証明書のサムプリント (x5t#S256, RFC 8705)。"
  RefreshTokenSenderConstraint:
    kind: value_object
    description: RefreshToken に紐づくセンダー制約。発行時のバインド先（DPoP 鍵サムプリントまたは mTLS 証明書サムプリント）を保持する。
    fields:
      type:
        type: SenderConstraintKind
      jkt:
        type: String
        optional: true
      x5t_s256:
        type: String
        optional: true
  AccessTokenClaims:
    kind: value_object
    constraints:
      - audience_non_empty(aud)
    description: JWT Access Token クレーム (RFC 9068)。TTL 600 秒。
    fields:
      iss:
        type: URI
      sub:
        type: String
        description: client_credentials 時は client_id と一致。
      aud:
        type: Audience
      client_id:
        type: String
      scope:
        type: String
        description: スペース区切りスコープ列。
      exp:
        type: Integer
        description: Unix epoch seconds
      iat:
        type: Integer
      nbf:
        type: Integer
        optional: true
      jti:
        type: String
      auth_time:
        type: Integer
        optional: true
      acr:
        type: String
        optional: true
      amr:
        type: "String[]"
        optional: true
      cnf:
        type: SenderConstraintCnf
        optional: true
      act:
        type: JSON
        optional: true
        description: RFC 8693 §4.1 actor claim。委任の現在アクターを表す。subject_token に act があれば入れ子で連結される。
      may_act:
        type: JSON
        optional: true
        description: RFC 8693 §4.4 may_act claim。許可された委任先アクターを表す。
      authorization_details:
        type: "AuthorizationDetail[]"
        optional: true
        description: RFC 9396 — トークンに束縛された構造化詳細。RS の検証点。optional で後方互換。
  IdTokenClaims:
    kind: value_object
    description: OIDC ID Token クレーム。TTL 3600 秒。
    fields:
      iss:
        type: URI
      sub:
        type: String
      aud:
        type: Audience
      exp:
        type: Integer
      iat:
        type: Integer
      auth_time:
        type: Integer
      nonce:
        type: String
        optional: true
      acr:
        type: String
        optional: true
      amr:
        type: "String[]"
        optional: true
      azp:
        type: String
        optional: true
      at_hash:
        type: String
        optional: true
      c_hash:
        type: String
        optional: true
      name:
        type: String
        optional: true
        annotations:
          pii: true
      preferred_username:
        type: String
        optional: true
        annotations:
          pii: true
      email:
        type: String
        optional: true
        constraints:
          - format: email
        annotations:
          pii: true
      email_verified:
        type: Boolean
        optional: true
  Audience:
    kind: value_object
    description: 文字列または1つ以上の文字列の配列（JWT RFC 7519 §4.1.3）。
    fields:
      one_or_many:
        type: JSON
        description: JSON string または1つ以上の JSON string の配列。
  DiscoveryDocument:
    kind: value_object
    description: RFC 8414 / OIDC Discovery 1.0 メタデータ。
    fields:
      issuer:
        type: URI
      authorization_endpoint:
        type: URI
      token_endpoint:
        type: URI
      userinfo_endpoint:
        type: URI
      jwks_uri:
        type: URI
      introspection_endpoint:
        type: URI
      revocation_endpoint:
        type: URI
      pushed_authorization_request_endpoint:
        type: URI
      device_authorization_endpoint:
        type: URI
      registration_endpoint:
        type: URI
      end_session_endpoint:
        type: URI
        optional: true
      scopes_supported:
        type: "String[]"
        default:
          - openid
          - profile
          - email
          - phone
          - address
          - custom_attribute
          - offline_access
          - idmagic.admin
          - idmagic.account
      response_types_supported:
        type: "ResponseType[]"
      response_modes_supported:
        type: "ResponseMode[]"
        optional: true
      grant_types_supported:
        type: "GrantType[]"
      token_endpoint_auth_methods_supported:
        type: "TokenEndpointAuthMethod[]"
      introspection_endpoint_auth_methods_supported:
        type: "TokenEndpointAuthMethod[]"
        default:
          - ClientSecretBasic
          - PrivateKeyJwt
          - TlsClientAuth
      revocation_endpoint_auth_methods_supported:
        type: "TokenEndpointAuthMethod[]"
        default:
          - ClientSecretBasic
          - PrivateKeyJwt
          - TlsClientAuth
      id_token_signing_alg_values_supported:
        type: "SignatureAlgorithm[]"
      code_challenge_methods_supported:
        type: "CodeChallengeMethod[]"
      require_pushed_authorization_requests:
        type: Boolean
      require_pkce:
        type: Boolean
      authorization_response_iss_parameter_supported:
        type: Boolean
        optional: true
      dpop_signing_alg_values_supported:
        type: "SignatureAlgorithm[]"
        optional: true
      tls_client_certificate_bound_access_tokens:
        type: Boolean
        optional: true
      subject_types_supported:
        type: "String[]"
        default:
          - public
      claims_supported:
        type: "String[]"
        optional: true
        default:
          - sub
          - iss
          - aud
          - exp
          - iat
          - auth_time
          - nonce
          - acr
          - amr
          - azp
          - name
          - given_name
          - family_name
          - preferred_username
          - email
          - email_verified
          - updated_at
      acr_values_supported:
        type: "String[]"
        optional: true
        default:
          - urn:idmagic:acr:pwd
          - urn:idmagic:acr:mfa
      ui_locales_supported:
        type: "String[]"
        optional: true
        default:
          - en
          - ja
      authorization_details_types_supported:
        type: "String[]"
        optional: true
        description: "RFC 9396 — 当テナントで受理する authorization_details の type 一覧 (Enabled な AuthorizationDetailType から導出)。"
  ClientRegistrationRequest:
