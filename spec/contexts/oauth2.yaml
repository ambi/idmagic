    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/clients/{client_id}"
        request_form: body
  DeleteAdminOAuth2Client:
    description: 管理者が所属テナントの client を削除する。
    input:
      client_id:
