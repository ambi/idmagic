scenarios:
  認可コードフローでアクセストークンと ID トークンを取得できる:
    actor: RegisteredClient
    given:
      - "\"web-app\" は confidential クライアントで redirect_uri \"https://app.example.com/callback\" を登録済みである"
      - "ユーザー \"alice\" は \"web-app\" に scope \"openid profile\" を同意済みである"
    main_success:
      - "\"web-app\" として scope \"openid profile\" で認可リクエストを送る"
      - 発行された認可コードを正しい PKCE verifier で交換する
      - 応答に access_token・id_token・refresh_token が含まれ token_type は Bearer
      - "\"UserAuthenticated\" が発行される"
      - "\"AuthorizationCodeIssued\" が発行される"
      - "\"AuthorizationCodeRedeemed\" が発行される"
      - "\"AccessTokenIssued\" が発行される"
      - "\"RefreshTokenIssued\" が発行される"
    extensions:
      - at: 1
        condition: 認可リクエストの redirect_uri が未登録である
        steps:
          - リダイレクトは行われず IdP がエラーページを表示する
          - "エラー \"InvalidRequestError\""
      - at: 2
        condition: PKCE verifier が一致しない
        steps:
          - 認可コードを誤った code_verifier で交換する
          - "エラー \"InvalidGrantError\""
          - トークンは発行されない
      - at: 2
        condition: 同じ認可コードを 2 回交換する
        steps:
          - 1 回目の応答には access_token が含まれる
          - "2 回目はエラー \"InvalidGrantError\""
          - 発行ファミリーのトークンがすべて失効する
          - "\"RefreshTokenReuseDetected\" が発行される"
          - "\"TokenRevoked\" が発行される"
      - at: 2
        condition: 認可コードが発行から 60 秒を超えている
        steps:
          - "認可コードの交換はエラー \"InvalidGrantError\""
          - 認可コードの状態は Expired になる
  リフレッシュトークンをローテーションして新しいトークンを得る:
    actor: RegisteredClient
    given:
      - "有効な refresh token \"RT1\" が存在する"
    main_success:
      - "リフレッシュトークン \"RT1\" を交換する"
      - 応答に新しい access_token と refresh_token が含まれる
      - "\"RT1\" の状態は \"Rotated\""
      - "\"RefreshTokenRotated\" が発行される"
      - "\"AccessTokenIssued\" が発行される"
      - "\"RefreshTokenIssued\" が発行される"
    extensions:
      - at: 1
        condition: ローテーション済みの旧 refresh token を再使用する
        steps:
          - "family_id \"F1\" の refresh token \"RT1\" をローテーション後に再使用する"
          - "再使用はエラー \"InvalidGrantError\""
          - "\"RT1\" の状態は \"Revoked\""
          - "family_id \"F1\" のトークンがすべて失効する"
          - "\"RefreshTokenReuseDetected\" が発行される"
          - "\"TokenRevoked\" が発行される"
  不正なクライアント認証は invalid_client で一律拒否される:
    actor: RegisteredClient
    main_success:
      - 既知のクライアントを誤った client_secret で認可コードを交換する
      - "エラー \"InvalidClientError\""
    extensions:
      - condition: 未知の client_id で交換する
        at: 1
        steps:
          - 未知の client_id で認可コードを交換する
          - "エラー \"InvalidClientError\""
  既存同意の有無に応じて同意画面を出し分ける:
    actor: ResourceOwner
    given:
      - "ユーザー \"alice\" が \"web-app\" に scope \"openid profile\" を同意済みである"
    main_success:
      - "\"web-app\" として scope \"openid profile\" で認可リクエストを送る"
      - 認可リクエストの状態は Consented
      - 同意 UI は表示されない
    extensions:
      - at: 1
        condition: prompt=consent で再同意を要求する
        steps:
          - "\"web-app\" として prompt \"consent\" で認可リクエストを送る"
          - 認可リクエストの状態は ConsentPending
  PAR で送信した認可リクエストを request_uri 経由で実行する:
    actor: RegisteredClient
    given:
      - "クライアント \"web-app\" が存在する"
    main_success:
      - "\"web-app\" として認可リクエストを事前送信する"
      - PAR 応答に request_uri が含まれ expires_in は 600 以下
      - "request_uri \"<返された値>\" で認可リクエストを送る"
      - "その PAR レコードの状態は \"Used\""
      - "\"PARStored\" が発行される"
      - "\"AuthorizationCodeIssued\" が発行される"
    extensions:
      - condition: PAR 必須の FAPI クライアントが PAR なしで直接送信する
        at: 1
        steps:
          - "PAR 必須の FAPI クライアント \"fapi-app\" として scope \"openid\" で直接認可リクエストを送る"
          - "エラー \"InvalidRequestError\""
  DPoP 証明付き要求はセンダー制約付きトークンを発行する:
    actor: RegisteredClient
    main_success:
      - 有効な DPoP 証明を付けて認可コードを交換する
      - 発行された access token は DPoP 鍵サムプリントに cnf でバインドされる
      - 発行された refresh token のセンダー制約は Dpop
    extensions:
      - at: 1
        condition: iat が 60 秒以上古い DPoP 証明である
        steps:
          - "iat \"2026-01-01T00:00:00Z\" の DPoP 証明を時刻 \"2026-01-01T00:01:30Z\" で付けて認可コードを交換する"
          - "エラー \"InvalidDpopProofError\""
      - at: 1
        condition: 同一 DPoP jti を再使用する
        steps:
          - "jti \"ABC\" の DPoP 証明を付けて認可コードを交換する"
          - "同じ jti \"ABC\" の DPoP 証明を付けて認可コードを交換する"
          - 1 回目の応答には access_token が含まれる
          - "2 回目はエラー \"InvalidDpopProofError\""
  失効済みトークンの introspection は active=false のみ返す:
    actor: ResourceServer
    given:
      - "失効済み access token \"AT1\" が存在する"
    main_success:
      - "トークン \"AT1\" を検査する"
      - 応答は active=false のみで他のフィールドを含まない
  UserInfo は openid スコープのトークンに sub を返す:
    actor: RegisteredClient
    given:
      - "scope \"openid profile\" の access token \"AT1\" が存在する"
    main_success:
      - "トークン \"AT1\" でユーザー情報を取得する"
      - 応答に sub・name・preferred_username が含まれる
    extensions:
      - condition: openid スコープを持たないトークンで取得する
        at: 1
        steps:
          - "scope \"profile\" のみの access token \"AT1\" でユーザー情報を取得する"
          - "エラー \"InsufficientScopeError\""
  Discovery 文書は宣言された全エンドポイントを広告する:
    actor: RegisteredClient
    main_success:
      - Discovery 文書を取得する
      - 応答に issuer・authorization_endpoint・token_endpoint・userinfo_endpoint・jwks_uri・introspection_endpoint・revocation_endpoint・pushed_authorization_request_endpoint・device_authorization_endpoint・registration_endpoint が含まれる
  認可コードの並行交換はちょうど一方だけ成功する:
    actor: RegisteredClient
    given:
      - "発行済み認可コード \"AC1\"（family_id \"F1\"）が存在する"
    main_success:
      - "認可コード \"AC1\" を verifier \"v\" で並行に 2 回交換する"
      - "ちょうど一方が成功し、もう一方はエラー \"InvalidGrantError\""
      - "family_id \"F1\" のトークンがすべて失効する"
      - "\"AuthorizationCodeRedeemed\" が発行される"
      - "\"RefreshTokenReuseDetected\" が発行される"
      - "\"TokenRevoked\" が発行される"
  動的クライアント登録は client_id を採番して返す:
    actor: Client
    main_success:
      - "confidential クライアント \"web-app\" を redirect_uri \"https://app.example.com/callback\" で登録する"
      - 応答に client_id と client_secret が含まれる
      - "\"ClientRegistered\" が発行される"
    extensions:
      - at: 1
        condition: redirect_uri を持たない登録要求である
        steps:
          - "confidential クライアント \"web-app\" を redirect_uri \"\" で登録する"
          - "エラー \"InvalidRequestError\""
  absolute_expires_at を超えた refresh token はローテーション不可:
    actor: RegisteredClient
    given:
      - "absolute_expires_at \"2026-01-01T00:00:00Z\" の refresh token \"RT1\" が存在する"
    main_success:
      - "時刻が \"2026-01-02T00:00:00Z\" になる"
      - "リフレッシュトークン \"RT1\" を交換する"
      - "エラー \"InvalidGrantError\""
  クライアントは自分のトークンを失効できる:
    actor: RegisteredClient
    given:
      - "有効な refresh token \"RT1\" が存在する"
    main_success:
      - "トークン \"RT1\" を失効させる"
      - "\"RT1\" の状態は \"Revoked\""
      - "\"TokenRevoked\" が発行される"
    extensions:
      - condition: 所有者でないクライアントが失効を要求する
        at: 1
        steps:
          - "クライアント \"client-A\" が所有する refresh token \"RT1\" に対し \"client-B\" として失効を要求する"
          - "盗難検知防止のため 200 OK のみ返り \"RT1\" の状態は \"Active\" のまま"
  失効した access_token でユーザー情報取得は invalid_token で拒否される:
    actor: RegisteredClient
    given:
      - "有効な access token \"AT1\" が存在する"
    main_success:
      - "トークン \"AT1\" を失効させる"
      - "トークン \"AT1\" でユーザー情報を取得する"
      - "エラー \"InvalidTokenError\""
  refresh_token は offline_access スコープ付与時のみ発行される:
    actor: RegisteredClient
    given:
      - "confidential クライアント \"web-app\" が grant_types に \"authorization_code\"・\"refresh_token\" を含めて登録済みである"
    main_success:
      - "\"web-app\" として scope \"openid offline_access\" で認可リクエストを送る"
      - "発行された認可コードを verifier \"v\" で交換する"
      - 応答に refresh_token が含まれる
      - "\"RefreshTokenIssued\" が発行される"
    extensions:
      - condition: offline_access を要求しない
        at: 1
        steps:
          - "\"web-app\" として scope \"openid profile\" で認可リクエストを送る"
          - "発行された認可コードを verifier \"v\" で交換する"
          - 応答に refresh_token は含まれない
  認可リクエストの nonce は ID トークンに伝播する:
    actor: RegisteredClient
    main_success:
      - "\"web-app\" として scope \"openid\"、nonce \"n-12345\" で認可リクエストを送る"
      - "発行された認可コードを verifier \"v\" で交換する"
      - "応答の id_token の nonce クレームは \"n-12345\""
  RP-Initiated Logout は登録済み post_logout_redirect_uri にだけ戻す:
    actor: ResourceOwner
    given:
      - "confidential クライアント \"web-app\" が redirect_uri \"https://app.example.com/cb\" で登録済みである"
    main_success:
      - "\"web-app\" として post_logout_redirect_uri \"https://app.example.com/cb\" でログアウトする"
      - state が post_logout_redirect_uri に伝播する
    extensions:
      - at: 1
        condition: 未登録の post_logout_redirect_uri を指定する
        steps:
          - "\"web-app\" として post_logout_redirect_uri \"https://evil.example.com/cb\" でログアウトする"
          - "エラー \"InvalidRequestError\""
  client_credentials グラントで M2M トークンが発行される:
    actor: RegisteredClient
    given:
      - "confidential クライアント \"backend\" が grant_types に \"client_credentials\" を含めて登録済みである"
    main_success:
      - "\"backend\" として client_credentials で scope \"api:read\" のトークンを取得する"
      - 応答に access_token が含まれ refresh_token は含まれない
      - 発行された access_token の sub は client_id と一致する
      - "\"AccessTokenIssued\" が発行される"
    extensions:
      - condition: public クライアントが client_credentials を登録しようとする
        at: 1
        steps:
          - "public クライアント \"spa-app\" を grant_types に \"client_credentials\" 含めて登録する"
          - "client_credentials は confidential 限定でありエラー \"InvalidRequestError\""
  デバイス認可フローでアクセストークンを取得できる:
    actor: RegisteredClient
    given:
      - "confidential クライアント \"tv-app\" が grant_types に \"urn:ietf:params:oauth:grant-type:device_code\" を含めて登録済みである"
    main_success:
      - "\"tv-app\" として scope \"openid profile\" でデバイス認可を開始する"
      - 応答に device_code・user_code・verification_uri・interval が含まれる
      - "ユーザー \"alice\" が verification_uri で user_code を入力し承認する"
      - "device_code \"DC1\" を交換する"
      - 応答に access_token と id_token が含まれる
      - "\"DeviceAuthorizationRequested\" が発行される"
      - "\"DeviceAuthorizationApproved\" が発行される"
      - "\"AccessTokenIssued\" が発行される"
    extensions:
      - at: 4
        condition: ユーザー承認前にポーリングする
        steps:
          - "Issued 状態の device_code \"DC1\" を交換する"
          - "エラー \"AuthorizationPendingError\""
      - at: 4
        condition: ポーリング間隔より短い再試行をする
        steps:
          - "interval 5 秒の device_code \"DC1\" を Issued 状態で用意する"
          - "device_code \"DC1\" を交換し \"2s\" 経過後に再度交換する"
          - "2 回目はエラー \"SlowDownError\""
      - at: 4
        condition: device_code が expires_in を超えている
        steps:
          - "issued_at \"2026-01-01T00:00:00Z\"・expires_at \"2026-01-01T00:10:00Z\" の device_code \"DC1\" を時刻 \"2026-01-01T00:11:00Z\" で交換する"
          - "エラー \"ExpiredTokenError\""
  改ざんされた client_assertion は invalid_client で拒否される:
    actor: RegisteredClient
    given:
      - "confidential クライアント \"fapi-app\" が token_endpoint_auth_method \"private_key_jwt\"・jwks 登録で存在する"
    main_success:
      - "認可コード \"AC1\" を verifier \"v\"・改ざんされた client_assertion で交換する"
      - "エラー \"InvalidClientError\""
  mTLS バインド AT は同じ証明書のリクエストでのみ受理される:
    actor: RegisteredClient
    given:
      - "confidential クライアント \"mtls-app\" が token_endpoint_auth_method \"tls_client_auth\" で存在する"
    main_success:
      - mTLS 証明書バインドされた access_token を発行する
      - 同じ証明書を提示して userinfo を取得すると 200 を返す
    extensions:
      - condition: 別の証明書を提示する
        at: 1
        steps:
          - 別の証明書を提示すると invalid_token で拒否される
  RFC 8414 メタデータ文書は OIDC Discovery と同等の内容を返す:
    actor: RegisteredClient
    main_success:
      - Authorization Server メタデータを取得する
      - 応答に issuer・authorization_endpoint・token_endpoint・jwks_uri・grant_types_supported が含まれる
  管理者は所属テナントの同意を参照・撤回できるが付与は代行できない:
    actor: TenantAdministrator
    given:
      - "tenant_id \"acme\" の roles=[\"admin\"] のユーザー \"operator\" が認証済みである"
      - "tenant_id \"acme\" のユーザー \"alice\" と client \"portal\" の Consent が Granted で存在する"
    main_success:
      - "管理者 \"operator\" が Consent 一覧と単一 Consent を取得する"
      - "管理者 \"operator\" がユーザー \"alice\" と client \"portal\" の Consent を撤回する"
      - Consent の state は Revoked で revoked_at が記録される
      - "\"ConsentRevoked\" が actorUserId \"operator\" で発行される"
      - 管理者が Consent を作成または scope 拡張する interface は存在しない
  ユーザーは接続済みアプリの同意を自分で撤回できる:
    actor: ResourceOwner
    given:
      - "ユーザー \"alice\" が client \"web-app\" に scope \"openid profile\" を同意済みである"
      - "ユーザー \"alice\" が認証済みで接続済みアプリ画面を開いている"
    main_success:
      - "一覧に \"web-app\" が表示される"
      - "ユーザー \"alice\" が \"web-app\" の同意を撤回する"
      - Consent の state は Revoked になり一覧から消える
  realm prefix 付き Discovery は同 prefix の issuer を返す:
    actor: RegisteredClient
    given:
      - "tenant_id \"acme\" が Active で存在する"
    main_success:
      - /realms/acme/.well-known/openid-configuration を取得する
      - 応答の issuer は base URL + /realms/acme
      - 応答の authorization_endpoint は base URL + /realms/acme/authorize
  トークンエンドポイントはテナント境界を越えた資格情報を受理しない:
    actor: RegisteredClient
    main_success:
      - "tenant_id \"acme\" で発行した認可コード \"AC1\" を \"/realms/default/token\" で交換する"
      - "エラー \"InvalidGrantError\""
    extensions:
      - condition: 他テナントの client_id を使う
        at: 1
        steps:
          - "tenant_id \"acme\" に登録した client_id \"web-app\" で \"/realms/default/token\" に交換を要求する"
          - "エラー \"InvalidClientError\""
      - condition: 他テナントのリフレッシュトークンを再発行する
        at: 1
        steps:
          - "tenant_id \"acme\" で発行した refresh token \"RT1\" を \"/realms/default/token\" で再発行する"
          - "エラー \"InvalidGrantError\""
      - condition: 保存層に別テナントの subject / client を持つ refresh token を書き込む
        at: 1
        steps:
          - "tenant_id \"acme\" の refresh token に tenant_id \"default\" の client_id または sub を指定する"
          - "永続化層が参照整合性エラーで拒否する"
      - condition: 他テナントの device_code を交換する
        at: 1
        steps:
          - "tenant_id \"acme\" で発行し承認した device_code \"DC1\" を \"/realms/default/token\" で交換する"
          - "エラー \"InvalidGrantError\""
  管理者は所属テナントのclientを作成・更新・削除できる:
    actor: TenantAdministrator
    given:
      - 'tenant_id "acme" の admin "operator" が認証済みである'
    main_success:
      - '"operator" が client "portal" を作成し client_secret を一度だけ受け取る'
      - '"operator" が client "portal" の redirect_uris を更新する'
      - '"operator" が client "portal" を削除する'
      - '"AdminOAuth2ClientCreated"、"AdminOAuth2ClientUpdated"、"AdminOAuth2ClientDeleted" が発行される'
    extensions:
      - at: 1
        condition: 別テナントの client を取得する
        steps:
          - 別テナントの管理者が client_id を指定して取得する
          - 'エラー "InvalidRequestError"'
  管理consent APIは別テナントの同意を公開しない:
    actor: TenantAdministrator
    given:
      - 'tenant_id "acme" の user と client の Consent が存在する'
    main_success:
      - 'tenant_id "default" の管理者が同じ user_id と client_id の Consent を取得する'
      - 'エラー "InvalidRequestError"'
  KeyProvider障害時は新規token発行を拒否する:
    actor: RegisteredClient
    given:
      - 'tenant_id "acme" の KeyProvider が到達不能である'
    main_success:
      - 'tenant_id "acme" の client が token 発行を要求する'
      - '新規署名は行われずエラー "ServerError" で拒否される'
flows:
  Authorization:
    entry: Home
    transitions:
      - from: Home
        action: authorization_started
        interface: Authorize
        to: Consent
      - from: Consent
        action: consent_allowed
        interface: SubmitBrowserConsent
        external: true
      - from: Consent
        action: consent_denied
        interface: SubmitBrowserConsent
        external: true
  DeviceAuthorization:
    entry: Device
    transitions:
      - from: Device
        action: device_approved
        interface: SubmitBrowserDevice
        to: Status
      - from: Device
        action: device_denied
        interface: SubmitBrowserDevice
        to: Status
  AdminAuthorizationDetailTypes:
    entry: AdminAuthorizationDetailTypes
    transitions:
      - from: AdminAuthorizationDetailTypes
        action: list
        interface: ListAuthorizationDetailTypes
        to: AdminAuthorizationDetailTypes
      - from: AdminAuthorizationDetailTypes
        action: create
        interface: CreateAuthorizationDetailType
        to: AdminAuthorizationDetailTypes
      - from: AdminAuthorizationDetailTypes
        action: update
        interface: UpdateAuthorizationDetailType
        to: AdminAuthorizationDetailTypes
      - from: AdminAuthorizationDetailTypes
        action: delete
        interface: DeleteAuthorizationDetailType
        to: AdminAuthorizationDetailTypes
  AdminConsents:
    entry: AdminConsents
    transitions:
      - from: AdminConsents
        action: list
        interface: ListAdminConsents
        to: AdminConsents
      - from: AdminConsents
        action: revoke
        interface: RevokeAdminConsent
        to: AdminConsents
  AccountApplications:
    entry: AccountApplications
    transitions:
      - from: AccountApplications
        action: list
        interface: ListMyConsents
        to: AccountApplications
      - from: AccountApplications
        action: revoke
        interface: RevokeMyConsent
        to: AccountApplications
