      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/clients/{client_id}"
        successful_status_codes:
          - "204"
  ListAdminConsents:
    description: 管理者が所属テナントの Consent を監査目的で一覧する。
    output:
      response:
        type: AdminConsentListResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: /admin/consents
  GetAdminConsent:
    description: 管理者が所属テナントの Consent を subject と client_id で取得する。別テナントの Consent は未存在として扱う。
    input:
      user_id:
        type: String
      client_id:
        type: String
    output:
      consent:
        type: AdminConsentResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: "/admin/consents/{user_id}/{client_id}"
  RevokeAdminConsent:
    description: 管理者が所属テナントの Consent を論理撤回する。管理者による Consent の作成・scope 拡張は許可しない。
    input:
      user_id:
        type: String
      client_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ConsentRevoked
    access:
      policies: [TenantAdministrator]
      resource:
        type: Tenant
        id: context.tenant_id
    bindings:
      - kind: http
        method: DELETE
        path: "/admin/consents/{user_id}/{client_id}"
        successful_status_codes:
          - "204"
  ListMyConsents:
    description: "認証済みユーザーが自身の接続済みアプリ (active な Consent) 一覧を取得する\n(self-service)。対象は actor.id に固定し、他人の Consent は返さない。\n"
    output:
      response:
        type: AccountConsentListResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: GET
        path: /api/account/consents
  RevokeMyConsent:
    description: "認証済みユーザーが自身の Consent を client_id 指定で論理撤回する (self-service)。\nactor.id == target.id に固定。次回その client の認可では consent が再要求される。\n"
    input:
      client_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - ConsentRevoked
    access:
      policies: [AuthenticatedSelf]
      resource:
        type: User
        id: subject.id
    bindings:
      - kind: http
        method: POST
        path: "/api/account/consents/{client_id}/revoke"
        successful_status_codes:
          - "204"
authorization:
  resources:
    OAuth2AuthorizationService:
      description: tenant 内の authorization / PAR / device flow 操作対象。
    OAuth2TokenService:
      description: client に束縛された token 発行・検査・失効操作対象。
    OAuth2UserInfoService:
      description: active openid token に束縛された UserInfo 操作対象。
  principals:
    RegisteredClient:
      type: OAuth2Client
      matches:
        - principal.client_id != ""
        - principal.tenant_id == context.tenant_id
    AuthenticatedClient:
      type: OAuth2Client
      matches:
        - context.client_authenticated
        - principal.client_id != ""
        - principal.tenant_id == context.tenant_id
    ActiveOpenidToken:
      type: OAuth2Client
      matches:
        - context.token_active
        - '"openid" in context.token_scopes'
        - principal.tenant_id == context.tenant_id
    AuthenticatedResourceOwner:
      type: User
      matches:
        - context.authenticated
        - principal.status == "Active"
        - principal.tenant_id == context.tenant_id
    AuthenticatedSelf:
      type: User
      matches:
        - context.authenticated
        - principal.status == "Active"
    TenantAdministrator:
      type: User
      matches:
        - context.authenticated
        - principal.status == "Active"
        - '"admin" in principal.roles'
  policies:
    RegisteredClient:
      effect: permit
      principal: RegisteredClient
      when: principal.client_id == resource.id
    AuthenticatedClient:
      effect: permit
      principal: AuthenticatedClient
      when: principal.client_id == resource.id
    ActiveOpenidToken:
      effect: permit
      principal: ActiveOpenidToken
      when: principal.client_id == resource.id
    AuthenticatedResourceOwner:
      effect: permit
      principal: AuthenticatedResourceOwner
      when: valid_authorization_transaction(context.transaction_cookie)
    AuthenticatedSelf:
      effect: permit
      principal: AuthenticatedSelf
      when: principal.id == resource.id
    TenantAdministrator:
      effect: permit
      principal: TenantAdministrator
      when: principal.tenant_id == resource.id
    TokenAuthorizationCode:
      effect: permit
      principal: RegisteredClient
      when: context.grant_type == AuthorizationCode && AuthorizationCode in principal.grant_types && authorization_code_grant_valid(context)
    TokenRefresh:
      effect: permit
      principal: RegisteredClient
      when: context.grant_type == RefreshToken && RefreshToken in principal.grant_types && refresh_grant_valid(context)
    TokenClientCredentials:
      effect: permit
      principal: AuthenticatedClient
      when: context.grant_type == ClientCredentials && principal.client_type == Confidential && ClientCredentials in principal.grant_types
    TokenDeviceCode:
      effect: permit
      principal: RegisteredClient
      when: context.grant_type == DeviceCode && DeviceCode in principal.grant_types && device_code_grant_valid(context)
    TokenExchange:
      effect: permit
      principal: AuthenticatedClient
      when: context.grant_type == TokenExchange && TokenExchange in principal.grant_types
