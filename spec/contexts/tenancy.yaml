# idmagic Tenancy — SCL
# Generated from idmagic/spec/scl.yaml during SCL 2.0 context split.

system: idmagic
spec_version: "2.0"
context: Tenancy
glossary:
  Tenant:
    definition: 独立した認可境界。Client / User / Consent / 鍵 / ポリシーがこの境界に閉じる。URL 上は Realm という別名で表現される。
    aliases:
      - tenant
      - テナント
      - Realm
      - realm
    not_to_confuse_with:
      - term: Client
        reason: Tenant は境界、Client は境界内のアプリケーション。Tenant は人間/組織を表し、Client はそのテナント所属のアプリ。
  DefaultTenant:
    definition: "起動時に自動作成される `realm == \"default\"` のテナント。id は固定 UUID の代理キー。単一テナント運用時の互換と、未 prefix HTTP リクエストの解決先を兼ねる。"
    aliases:
      - default tenant
      - デフォルトテナント
  TenantDisablement:
    definition: "Tenant.disabled_at を設定してテナント単位で `/authorize` / `/token` / `/login` 等を停止する復活可能な操作。テナント物理削除とは独立。"
    aliases:
      - disable tenant
      - テナント無効化
  EntraFederation:
    definition: Microsoft Entra ID の検証済みドメインを WS-Federation / WS-Trust の federated IdP として接続する profile。
    aliases:
      - Microsoft365Federation
      - AzureADFederation
      - M365Federation
  Disabled:
    definition: 復活可能な無効化状態。Tenant と (慣例的に) User の disabled_at 経路で共有される。
    aliases:
      - disabled
  Disable:
    definition: "対象を Disabled に遷移させる。Tenant では `/api/admin/tenants/{id}/disable` から発火。"
    aliases:
      - disable
  Enable:
    definition: "Disabled の対象を Active に戻す。Tenant では `/api/admin/tenants/{id}/enable` から発火。"
    aliases:
      - enable
models:
  TenantStatus:
    kind: enum
    description: "テナント状態。Active は通常稼働、Disabled はテナント全体のプロトコル受付を停止 (`/authorize` `/token` 等が一律 invalid_request)。"
    values:
      - Active
      - Disabled
  AttributeType:
    kind: enum
    description: 属性値の sum type discriminator。OIDC 標準クレームの組み込み属性と tenant 定義 custom 属性の両方で共通。
    values:
      - String
      - Number
      - Boolean
      - Date
      - StringArray
  AttrVisibility:
    kind: enum
    description: 属性の開示範囲。ClaimExposed のみ UserInfo / ID Token に出せる。
    values:
      - Private
      - SelfReadable
      - AdminReadable
      - ClaimExposed
  Tenant:
    kind: entity
    description: "テナント (realm) 集約。Client / User / Consent / ポリシー / ブランディングはこの境界に閉じる。`default` テナントは起動時に自動作成され、削除・無効化とも不可。live aggregate は tenant_id で既存 Tenant を参照し、履歴・イベント用途の record は監査保持のため tenant 外部キーを持たない場合がある。"
    identity: id
    fields:
      id:
        type: String
        constraints:
          - non_empty
        description: "不変の UUID 代理キー。テナント生成時に採番し以後不変。全テーブルの tenant_id FK・spec.DefaultTenantID・内部のテナント参照はこの値を用いる。"
      realm:
        type: String
        constraints:
          - non_empty
          - max_length: 63
          - pattern: "^[a-z0-9][a-z0-9-]{0,62}$"
        description: "URL `/realms/{realm}/`・OIDC issuer 等の公開語彙に現れる mutable な一意識別子 (旧 id の slug)。予約語 admin は禁止。一意制約の範囲で変更可能 (rename)。"
      display_name:
        type: String
        constraints:
          - non_empty
          - max_length: 200
        annotations:
          pii: true
      status:
        type: TenantStatus
        default: Active
      password_policy_override:
        type: PasswordPolicyOverride
        optional: true
        description: objectives.PasswordPolicy をこのテナントだけ上書きする値。指定された値のみ上書きされ、それ以外は global default を継承。
      created_at:
        type: Timestamp
      updated_at:
        type: Timestamp
        description: 作成時は created_at と同じ値を持ち、以後 mutable aggregate の管理操作ごとに更新する。
      disabled_at:
        type: Timestamp
        optional: true
        description: テナント無効化時刻。non-null なら /authorize / /token / /login 等を一律拒否。
  PasswordPolicyOverride:
    kind: value_object
    description: "テナント固有のパスワードポリシー上書き値 (Phase 4)。Phase 0 で固定値とした\nobjectives.PasswordPolicy をテナント解決ポートで差し替えるためのスキーマ。\n省略フィールドは global default を継承し、change_password / reset_password の\n評価経路ではテナント値が global より厳しい方向にのみ働く想定。\n"
    fields:
      min_length:
        type: Integer
        optional: true
        description: 下限長 (≥ global default を推奨)
      max_length:
        type: Integer
        optional: true
        description: 上限長
      history_depth:
        type: Integer
        optional: true
        description: 履歴照合件数 (PasswordHistoryNoReuse)
  UserAttributeDef:
    kind: value_object
    description: 属性 1 件の定義。OIDC 組み込みカタログ (BuiltinUserAttributeDefs) と tenant 定義 (TenantUserAttributeSchema) の両方で使う。key は snake_case、英字始まり。
    fields:
      key:
        type: String
        constraints:
          - non_empty
          - pattern: "^[a-z][a-z0-9_]{0,62}$"
      label:
        type: String
        optional: true
        constraints:
          - max_length: 100
        description: 利用者向けの日本語表示名。未設定なら UI は key を表示する。
      type:
        type: AttributeType
      multi_valued:
        type: Boolean
        default: false
        description: type == StringArray のときのみ true。
      required:
        type: Boolean
        default: false
      editable_by_user:
        type: Boolean
        default: false
        description: self-service 経路で end-user が編集できるか。
      claim_name:
        type: String
        optional: true
        description: 露出時に UserInfo / ID Token に出す OIDC claim 名。
      oidc_scope:
        type: String
        optional: true
        description: 露出を解禁する OIDC scope (profile / phone / address 等)。
      visibility:
        type: AttrVisibility
        default: Private
      pii:
        type: Boolean
        default: true
        description: 省略時は PII 扱い (監査 hash 化) が安全側 default。
  TenantUserAttributeSchema:
    kind: entity
    description: tenant 単位の custom 属性定義集合。組み込み属性はコード (BuiltinUserAttributeDefs) が持ち、本集合は tenant 固有分のみ。tenant aggregate には埋め込まず独立 aggregate として持ち、tenant 削除時に cascade する。
    identity: tenant_id
    fields:
      tenant_id:
        type: String
        default: default
        description: 所属テナント ID。
      attributes:
        type: "UserAttributeDef[]"
        description: key が一意で組み込み属性と衝突しない定義の並び。
      created_at:
        type: Timestamp
      updated_at:
        type: Timestamp
  PasswordPolicyDefaults:
    kind: value_object
    description: "objectives.PasswordPolicy の現行値。テナント設定 UI が「テナント上書きが\n無いときに実際に適用される値」をユーザに具体数字で示せるよう、API レスポンスに\n埋め込む。同時に override がこの値より弱い場合の reject 閾値でもある。\n"
    fields:
      min_length:
        type: Integer
        description: objectives.PasswordPolicy.min_length。
      max_length:
        type: Integer
        description: objectives.PasswordPolicy.max_length。
      history_depth:
        type: Integer
        description: objectives.PasswordPolicy.history_depth。
  AdminSettingsResponse:
    kind: value_object
    description: "`/api/admin/settings` の返り値。テナント本体ではなく管理 UI 向けの projection で、\ntenant_id (UUID) / realm (URL slug) / display_name / password_policy_override に加え、\nUI 表示と weaker policy gating に使う objectives 標準値を併せて返す。\n"
    fields:
      tenant_id:
        type: String
        description: テナントの不変 UUID キー。
      realm:
        type: String
        description: URL `/realms/{realm}/` に現れる slug。SCIM エンドポイント URL 等の組み立てに使う。
      display_name:
        type: String
        annotations:
          pii: true
      password_policy_override:
        type: PasswordPolicyOverride
        optional: true
      password_policy_defaults:
        type: PasswordPolicyDefaults
  TenantUserAttributeSchemaResponse:
    kind: value_object
    description: "`/api/admin/tenant/user_attribute_schema` の返り値。tenant 固有の custom 属性定義\n(attributes) に加え、参照用にコードが持つ組み込みカタログ (builtin) を併せて返し、\nUI が key 衝突を避けつつ全属性を一覧できるようにする。\n"
    fields:
      tenant_id:
        type: String
      attributes:
        type: "UserAttributeDef[]"
        description: tenant が編集可能な custom 定義。
      builtin:
        type: "UserAttributeDef[]"
        description: コード提供の読み取り専用カタログ (BuiltinUserAttributeDefs)。
      created_at:
        type: Timestamp
      updated_at:
        type: Timestamp
  TenantUserAttributeSchemaUpdateRequest:
    kind: value_object
    description: tenant の custom 属性定義を全置換する JSON リクエスト。組み込み属性との key 衝突・重複 key は use case 側で拒否する。
    fields:
      attributes:
        type: "UserAttributeDef[]"
        description: 新しい custom 定義一覧。空配列で全削除。
  TenantBrandingAssetKind:
    kind: enum
    description: TenantBranding が持つ画像アセットの種別。
    values:
      - Logo
      - Favicon
  TenantBranding:
    kind: entity
    description: "テナント単位の hosted UI ブランディング設定 (wi-89, ADR-096)。Tenant 集約には埋め込まず、\nTenantUserAttributeSchema と同じ理由 (sparse な per-tenant config を Tenant 本体から分離する) で\n独立 entity として持つ。全フィールド optional で、行が存在しない、または全フィールドが未設定なら\n「branding 未設定」を意味し、GetTenantBranding はシステム既定にフォールバックする。\n色・リンク・テキストは限定トークンのみを受け付け、任意 CSS / HTML は構造的に受け付けない。\n"
    identity: tenant_id
    fields:
      tenant_id:
        type: String
        description: 所属テナント ID。
      product_name:
        type: String
        optional: true
        constraints:
          - max_length: 80
        description: sign-in 画面等に出す表示名。空文字列は未設定を意味し、システム既定 (IdMagic) を表示する。
      logo_object_key:
        type: String
        optional: true
        description: テナント境界内に保存されたロゴ画像 object の opaque key。管理者は直接入力せず UploadTenantBrandingAsset (kind=Logo) を経由する。
      logo_url:
        type: String
        optional: true
        description: IdP が保存済みロゴから生成する内部配信 URL。
      favicon_object_key:
        type: String
        optional: true
        description: テナント境界内に保存された favicon 画像 object の opaque key。UploadTenantBrandingAsset (kind=Favicon) を経由する。
      favicon_url:
        type: String
        optional: true
        description: IdP が保存済み favicon から生成する内部配信 URL。
      primary_color:
        type: String
        optional: true
        constraints:
          - pattern: "^#[0-9a-fA-F]{6}$"
        description: "ブランドカラー (プライマリ)。CSS custom property `--tenant-brand-primary` としてのみ注入する。既定の背景/前景に対する WCAG AA コントラスト比 (4.5:1) を満たさない値は保存時に拒否する。"
      accent_color:
        type: String
        optional: true
        constraints:
          - pattern: "^#[0-9a-fA-F]{6}$"
        description: "ブランドカラー (アクセント)。CSS custom property `--tenant-brand-accent` としてのみ注入する。primary_color と同じコントラスト検証を行う。"
      support_url:
        type: String
        optional: true
        constraints:
          - max_length: 2048
          - pattern: "^https://"
        description: サポート / ヘルプリンク。https scheme のみ許可する allowlist。
      legal_url:
        type: String
        optional: true
        constraints:
          - max_length: 2048
          - pattern: "^https://"
        description: 利用規約 / プライバシー等の法務リンク。https scheme のみ許可する allowlist。
      footer_text:
        type: String
        optional: true
        constraints:
          - max_length: 280
        description: footer に表示する補足テキスト (著作権表示等)。プレーンテキストとして描画側の既定エスケープでのみ表示する。
      created_at:
        type: Timestamp
      updated_at:
        type: Timestamp
        description: 更新のたびに進む。公開レスポンスの version / ETag として使う。
  TenantBrandingResponse:
    kind: value_object
    description: "GetTenantBranding / UpdateTenantBranding / asset upload・削除が返す公開安全な projection。\n未設定フィールドはシステム既定を表す (クライアント側で `IdMagic` 等のデフォルトに解決する)。\n"
    fields:
      product_name:
        type: String
        optional: true
      logo_url:
        type: String
        optional: true
      favicon_url:
        type: String
        optional: true
      primary_color:
        type: String
        optional: true
      accent_color:
        type: String
        optional: true
      support_url:
        type: String
        optional: true
      legal_url:
        type: String
        optional: true
      footer_text:
        type: String
        optional: true
      updated_at:
        type: Timestamp
        optional: true
        description: branding が一度でも設定されていれば version / ETag として使う。未設定なら省略する。
  TenantBrandingUpdateRequest:
    kind: value_object
    description: 管理者が branding のテキスト / 色 / リンクを更新する JSON リクエスト。画像アセットは UploadTenantBrandingAsset / DeleteTenantBrandingAsset 経由で別途扱う。指定フィールドのみ変更し、null を渡すとそのフィールドを未設定に戻す。
    fields:
      product_name:
        type: String
        optional: true
      primary_color:
        type: String
        optional: true
      accent_color:
        type: String
        optional: true
      support_url:
        type: String
        optional: true
      legal_url:
        type: String
        optional: true
      footer_text:
        type: String
        optional: true
  TenantBrandingUploadResponse:
    kind: value_object
    description: 画像アセットのアップロードまたは削除後の branding 表現。
    fields:
      branding:
        type: TenantBrandingResponse
  TenantBrandingUpdated:
    kind: event
    description: テナント内 admin が branding (テキスト / 色 / リンク / 画像アセット) を更新した。
    payload:
      occurredAt:
        type: Timestamp
      tenantId:
        type: String
      actorUserId:
        type: String
      changedFields:
        type: "String[]"
  TenantCreateRequest:
    kind: value_object
    description: "管理者が新規テナントを登録する JSON リクエスト。`realm` は URL-safe slug。UUID キー (id) はサーバが採番する。"
    fields:
      realm:
        type: String
        constraints:
          - non_empty
          - max_length: 63
          - pattern: "^[a-z0-9][a-z0-9-]{0,62}$"
      display_name:
        type: String
        constraints:
          - non_empty
          - max_length: 200
        annotations:
          pii: true
  TenantUpdateRequest:
    kind: value_object
    description: "管理者がテナントの表示名 / パスワードポリシー上書きを更新する JSON リクエスト。`id` と status は変更しない。status 変更は disable/enable 専用 endpoint を経由。"
    fields:
      display_name:
        type: String
        optional: true
        constraints:
          - non_empty
          - max_length: 200
        annotations:
          pii: true
      password_policy_override:
        type: PasswordPolicyOverride
        optional: true
        description: 省略時は既存値を維持。null を渡したい場合は明示する。
  TenantSummaryResponse:
    kind: value_object
    description: テナント表現。管理 UI の一覧と詳細で同じ表現を返す。
    fields:
      id:
        type: String
        description: テナントの不変 UUID キー。
      realm:
        type: String
        description: URL `/realms/{realm}/` に現れる slug 識別子。
      display_name:
        type: String
        annotations:
          pii: true
      status:
        type: TenantStatus
      password_policy_override:
        type: PasswordPolicyOverride
        optional: true
      created_at:
        type: Timestamp
      updated_at:
        type: Timestamp
        optional: true
      disabled_at:
        type: Timestamp
        optional: true
  TenantListResponse:
    kind: value_object
    description: 管理 API のテナント一覧。
    fields:
      tenants:
        type: "TenantSummaryResponse[]"
  TenantCreated:
    kind: event
    description: system_admin が新規テナントを作成した。
    payload:
      occurredAt:
        type: Timestamp
      actorUserId:
        type: String
      tenantId:
        type: String
  TenantUpdated:
    kind: event
    description: system_admin がテナントの表示名を更新した。
    payload:
      occurredAt:
        type: Timestamp
      actorUserId:
        type: String
      tenantId:
        type: String
      changedFields:
        type: "String[]"
  TenantUserAttributeSchemaUpdated:
    kind: event
    description: テナント内 admin が custom 属性定義 (TenantUserAttributeSchema) を更新した。値は持たず、変更後の custom 属性 key 一覧のみを記録する。
    payload:
      occurredAt:
        type: Timestamp
      actorUserId:
        type: String
      tenantId:
        type: String
      attributeKeys:
        type: "String[]"
  TenantDisabled:
    kind: event
    description: system_admin がテナントを無効化した。当該テナントのすべてのプロトコルルートは invalid_request で拒否される。
    payload:
      occurredAt:
        type: Timestamp
      actorUserId:
        type: String
      tenantId:
        type: String
  TenantEnabled:
    kind: event
    description: system_admin が無効化済みテナントを再有効化した。
    payload:
      occurredAt:
        type: Timestamp
      actorUserId:
        type: String
      tenantId:
        type: String
states:
  TenantLifecycle:
    description: テナント のライフサイクル。Active で通常稼働、Disable で全プロトコルルートを停止、Enable で復帰。物理削除は本フェーズ対象外。
    target: Tenant
    initial: Active
    terminal:
      []
    transitions:
      - from: Active
        event: Disable
        to: Disabled
      - from: Disabled
        event: Enable
        to: Active
interfaces:
  ResolveTenant:
    description: "HTTP リクエストの path の realm slug から所属テナントを解決する内部インターフェース。\n`/realms/{realm}/...` の realm を UUID キーのテナントへ写像し、prefix が無い場合は\n`default` realm のテナントに解決する。issuer / URL prefix は解決した realm から組み立て、\n公開語彙を realm に保つ。不在テナントは 404 tenant_not_found、disabled テナントは\nOAuth/OIDC の protocol route では 400 invalid_request とし、いずれも存在や状態の詳細を漏らさない。\n"
    input:
      path:
        type: String
        description: HTTP リクエスト path
    output:
      tenant:
        type: Tenant
    errors:
      - InvalidRequestError
  ListTenants:
    description: "system_admin がテナント一覧を取得する。テナント横断操作のため system_admin\nロールでゲートし、システムコンソール (/system) から呼ぶ。default テナントに解決する\nbare path と control-plane path (/realms/default 配下、cookie session 整合) の両方から\n同じ handler に入る。"
    output:
      response:
        type: TenantListResponse
    errors:
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/admin/tenants
  GetTenant:
    description: system_admin が単一テナントを取得する。
    input:
      tenant_id:
        type: String
    output:
      tenant:
        type: TenantSummaryResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/tenants/{tenant_id}"
  CreateTenant:
    description: system_admin が新規テナントを作成する。
    input:
      request:
        type: TenantCreateRequest
    output:
      tenant:
        type: TenantSummaryResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - TenantCreated
    bindings:
      - kind: http
        method: POST
        path: /api/admin/tenants
        request_form: body
        successful_status_codes:
          - "201"
  UpdateTenant:
    description: system_admin がテナントの表示名を更新する。
    input:
      tenant_id:
        type: String
      request:
        type: TenantUpdateRequest
    output:
      tenant:
        type: TenantSummaryResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - TenantUpdated
    bindings:
      - kind: http
        method: PATCH
        path: "/api/admin/tenants/{tenant_id}"
        request_form: body
  DisableTenant:
    description: system_admin が default 以外のテナントを無効化する。/authorize / /token / /login 等は一律 invalid_request になる。
    input:
      tenant_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - TenantDisabled
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/tenants/{tenant_id}/disable"
        successful_status_codes:
          - "204"
  EnableTenant:
    description: system_admin が無効化済みテナントを再有効化する。
    input:
      tenant_id:
        type: String
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - TenantEnabled
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/tenants/{tenant_id}/enable"
        successful_status_codes:
          - "204"
  GetAdminSettings:
    description: "テナント内 admin が自身のテナントの設定 (表示名 / パスワードポリシー上書き) を取得する。\n対象テナントは actor.tenant_id に固定するため cross-tenant 読み出しは構造的に発生しない。\n`/api/admin/tenants` (system_admin 専用) とは別経路で、admin にも開放される。\nレスポンスには objectives.PasswordPolicy の現行値 (password_policy_defaults) を\n含め、UI が「上書きしないときに実際に適用される値」を具体数字で示せるようにする。\n"
    output:
      settings:
        type: AdminSettingsResponse
    errors:
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/admin/settings
  UpdateAdminSettings:
    description: "テナント内 admin が自身のテナントの設定を更新する。display_name と\npassword_policy_override のいずれかまたは両方を任意フィールドとして受け取り、\nactor.tenant_id に固定した上で UpdateTenant のロジックを実行する。\npassword_policy_override が objectives.PasswordPolicy の標準値より弱い場合\n(min_length 下回り / max_length 上回り / history_depth 下回り) は use case\n側で拒否する。\n"
    input:
      request:
        type: TenantUpdateRequest
    output:
      settings:
        type: AdminSettingsResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - TenantUpdated
    bindings:
      - kind: http
        method: PATCH
        path: /api/admin/settings
        request_form: body
  GetTenantUserAttributeSchema:
    description: "テナント内 admin が自身のテナントの custom 属性定義を取得する。\n対象テナントは actor.tenant_id に固定し cross-tenant 読み出しを構造的に排除する。\nレスポンスには tenant 固有の custom 定義に加えて組み込みカタログ (builtin) も\n含め、UI が全属性を一覧しつつ key 衝突を避けられるようにする。\n"
    output:
      schema:
        type: TenantUserAttributeSchemaResponse
    errors:
      - AccessDeniedError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/admin/tenant/user_attribute_schema
  UpdateTenantUserAttributeSchema:
    description: "テナント内 admin が custom 属性定義を全置換する。actor.tenant_id に\n固定した上で、各 UserAttributeDef を検証し、組み込み属性との key 衝突・重複 key を\n拒否する。値そのものは保持せず定義のみを扱う。\n"
    input:
      request:
        type: TenantUserAttributeSchemaUpdateRequest
    output:
      schema:
        type: TenantUserAttributeSchemaResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - TenantUserAttributeSchemaUpdated
    bindings:
      - kind: http
        method: PUT
        path: /api/admin/tenant/user_attribute_schema
        request_form: body
  GetTenantBranding:
    description: "解決済みテナントの hosted UI ブランディングを取得する公開 interface。認証を要求しない\n(login / consent / device 画面が未認証のうちに読む)。branding 未設定・値不正・アセット欠損の\nいずれでもシステム既定にフォールバックし、常に成功する。対象テナントは realm 解決 (ResolveTenant)\nで既に確定しているため入力を取らない。\n"
    output:
      branding:
        type: TenantBrandingResponse
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: /api/branding
  UpdateTenantBranding:
    description: "テナント内 admin が自身のテナントの branding (製品名 / 色 / サポートリンク / 法務リンク /\nフッターテキスト) を更新する。画像アセットは別 interface で扱う。色は hex 形式とコントラスト比、\nリンクは https scheme のみを use case 側で検証し、満たさない値は拒否する。\n"
    input:
      request:
        type: TenantBrandingUpdateRequest
    output:
      branding:
        type: TenantBrandingResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - TenantBrandingUpdated
    bindings:
      - kind: http
        method: PUT
        path: /api/admin/tenant/branding
        request_form: body
  UploadTenantBrandingAsset:
    description: 管理者が branding のロゴまたは favicon 画像を multipart でアップロードする。受理形式は PNG / JPEG / WebP / GIF、最大 256KiB とし、magic byte で検証する。
    input:
      kind:
        type: TenantBrandingAssetKind
      file:
        type: String
    output:
      response:
        type: TenantBrandingUploadResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - TenantBrandingUpdated
    bindings:
      - kind: http
        method: POST
        path: "/api/admin/tenant/branding/assets/{kind}"
        request_form: form
  DeleteTenantBrandingAsset:
    description: 管理者が branding の保存済みロゴまたは favicon を削除する。削除後は該当アセットの URL を返さない。
    input:
      kind:
        type: TenantBrandingAssetKind
    output:
      response:
        type: TenantBrandingUploadResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    emits:
      - TenantBrandingUpdated
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/tenant/branding/assets/{kind}"
  GetTenantBrandingAsset:
    description: "保存済み branding アセット (ロゴ / favicon) を配信する公開 interface。Content-Type は検証済み\n形式に固定し、X-Content-Type-Options: nosniff を付ける。別テナントまたは削除済み object は\n未存在として扱う。\n"
    input:
      kind:
        type: TenantBrandingAssetKind
      object_key:
        type: String
    output:
      file:
        type: String
    errors:
      - InvalidRequestError
    read_only: true
    bindings:
      - kind: http
        method: GET
        path: "/tenant-branding-assets/{kind}/{object_key}"
invariants:
  TenantBrandingSafeTokens:
    description: "TenantBranding の色 / リンク / テキストは限定トークンのみを許容する。色は `#rrggbb` かつ\n既定の背景/前景に対する WCAG AA コントラスト比 (4.5:1) を満たし、リンクは https scheme のみ、\nテキストは長さ上限内のプレーンテキストのみを保存できる。\n反例: 任意 CSS 宣言や `javascript:` リンク、非 https リンクが branding として保存される。\n"
    target: TenantBranding
    always: branding_persisted implies (colors_valid_and_contrast_ok and links_https_only and text_within_length_limits)
  TenantBrandingSafeAssetServing:
    description: TenantBranding のロゴ / favicon は保存時に magic byte とサイズ上限を検証し、配信時は保存済み content-type と nosniff を強制する。SVG や実行可能コンテンツとして扱われる形式は受け付けない。
    target: TenantBranding
    always: branding_asset_uploaded implies (content_type in ["image/png","image/jpeg","image/webp","image/gif"] and size_bytes <= 262144 and response_nosniff == true)
  TenantBrandingAssetTenantIsolation:
    description: TenantBranding のロゴ / favicon は tenant_id + kind + object_key で参照し、別テナントの object は同じ key でも取得できない。
    target: TenantBranding
    always: branding_asset_served implies request.tenant_id == asset.tenant_id
  TenantBrandingFailsOpen:
    description: "GetTenantBranding は branding 未設定・値不正・アセット欠損のいずれでも例外を投げず\nシステム既定にフォールバックする。hosted login / consent / device の各エンドポイントは\nbranding 解決の失敗によって停止しない。\n反例: 不正な branding 設定が login エンドポイント自体を 500 で落とす。\n"
    target: TenantBranding
    never: branding_resolution_failed and login_endpoint_unavailable
permissions:
  AdminTenantsManage:
    description: テナントの作成・更新・無効化・再有効化・一覧取得。system_admin ロールに限定する。
    actor: User
    resource: Tenant
    allow_when: "system_admin in actor.roles && actor.tenant_id == \"default\" && actor.disabled_at == null && context.authenticated == true"
  AdminSettingsRead:
    description: "所属テナントの管理設定 (表示名 / パスワードポリシー上書き) を閲覧する。\ntenant 内 admin と system_admin のどちらでも許可する。\n対象は actor.tenant_id に固定するため cross-tenant 読み出しは構造的に発生しない。\n"
    actor: User
    resource: Tenant
    allow_when: "((admin in actor.roles) || (system_admin in actor.roles)) && actor.disabled_at == null && context.authenticated == true && actor.tenant_id == resource.tenant_id"
  AdminSettingsUpdate:
    description: "所属テナントの管理設定を更新する。tenant 内 admin に解放し、設定対象は\nactor.tenant_id に固定する。password_policy_override は global\nPasswordPolicy より弱い場合 use case 側で reject する。\n"
    actor: User
    resource: Tenant
    allow_when: "((admin in actor.roles) || (system_admin in actor.roles)) && actor.disabled_at == null && context.authenticated == true && actor.tenant_id == resource.tenant_id"
  BrandingUpdate:
    description: "所属テナントの hosted UI branding (テキスト / 色 / リンク / 画像アセット) を更新する。\ntenant 内 admin に解放し、設定対象は actor.tenant_id に固定する。閲覧 (GetTenantBranding /\nGetTenantBrandingAsset) は presentational のみのため public とし、permission を設けない。\n"
    actor: User
    resource: TenantBranding
    allow_when: "((admin in actor.roles) || (system_admin in actor.roles)) && actor.disabled_at == null && context.authenticated == true && actor.tenant_id == resource.tenant_id"
scenarios:
  管理者は監査ログを期間で絞り込み参照・エクスポートできる:
    goal: 管理者が所属テナントの監査イベントを絞り込み、参照・エクスポートする。
    primary_actor: Administrator
    scope: Tenancy
    level: user_goal
    preconditions:
      - "roles=[\"admin\"] のユーザー \"operator\" が管理画面の監査ログを開いている"
    main_success:
      - "管理者 \"operator\" が直近 24 時間で監査イベントを絞り込む"
      - 一覧に所属テナントの監査イベントだけが表示される
      - "管理者 \"operator\" が絞り込み結果をエクスポートする"
  管理者はテナント固有のユーザー属性スキーマを定義できる:
    goal: 管理者がテナント固有のカスタムユーザー属性スキーマを定義する。
    primary_actor: Administrator
    scope: Tenancy
    level: user_goal
    preconditions:
      - "roles=[\"admin\"] のユーザー \"operator\" が管理画面のユーザー属性を開いている"
    main_success:
      - "管理者 \"operator\" が editable_by_user=true の custom_attribute を追加する"
      - 更新後のスキーマに追加した属性が含まれる
  default テナントは起動時に自動作成され削除も無効化もできない:
    goal: default テナントが bootstrap で常在し、削除・無効化を受け付けない。
    primary_actor: System
    scope: Tenancy
    level: user_goal
    description: bootstrap 不変性。
    main_success:
      - IdP を起動する
      - "テナント \"default\" が status=Active で存在する"
    extensions:
      - condition: default テナントの削除を試みる
        steps:
          - default テナントを削除する API は提供されない
      - condition: default テナントの無効化を試みる
        steps:
          - default テナントの disable は InvalidRequestError で拒否される
  管理者はテナントのロゴと配色をカスタマイズでき利用者のログイン画面に反映される:
    goal: 管理者がテナントのロゴ・配色・サポートリンクを設定し、未認証の login 画面がそれを表示する。
    primary_actor: Administrator
    scope: Tenancy
    level: user_goal
    preconditions:
      - "roles=[\"admin\"] のユーザー \"operator\" が管理画面の branding 設定を開いている"
    main_success:
      - "管理者 \"operator\" が PNG ロゴをアップロードする"
      - "管理者 \"operator\" が primary_color / accent_color / support_url / footer_text を設定する"
      - 未認証の利用者が login 画面を開く
      - login 画面に設定したロゴ・配色・サポートリンク・フッターテキストが表示される
  不正な branding 入力は拒否されシステム既定にフォールバックする:
    goal: XSS / open redirect につながる branding 入力を構造的に拒否し、login エンドポイントを止めない。
    primary_actor: Administrator
    scope: Tenancy
    level: user_goal
    preconditions:
      - "roles=[\"admin\"] のユーザー \"operator\" が管理画面の branding 設定を開いている"
    main_success:
      - "管理者 \"operator\" が branding を一度も設定していないテナントで login 画面を開く"
      - login 画面はシステム既定 (IdMagic) のブランディングを表示する
    extensions:
      - condition: "管理者 \"operator\" が support_url に javascript: スキームを指定して保存を試みる"
        steps:
          - InvalidRequestError で拒否され保存されない
      - condition: "管理者 \"operator\" がコントラスト比を満たさない primary_color を指定して保存を試みる"
        steps:
          - InvalidRequestError で拒否され保存されない
      - condition: 管理者が SVG ファイルをロゴとしてアップロードしようとする
        steps:
          - InvalidRequestError で拒否され保存されない
  リクエストのテナントは realm prefix から解決される:
    goal: HTTP リクエストの realm prefix から対象テナントを解決する。
    primary_actor: OAuth2Client
    scope: Tenancy
    level: user_goal
    description: 下位互換。/.well-known や /authorize が prefix なしでも動く。
    main_success:
      - /realms/ 接頭辞を持たない /authorize にリクエストを送る
      - "解決されたテナントは \"default\""
      - iss claim は base URL + /realms/default
    extensions:
      - condition: 対象テナントが無効化されている
        steps:
          - "tenant_id \"acme\" を作成して無効化する"
          - "無効化済みテナントの \"/realms/acme/authorize\" にリクエストを送る"
          - "テナントの存在を漏らさずエラー \"InvalidRequestError\""
user_experience:
  screens:
    AdminTenants:
      route: /system/tenants
      purpose: システムコンソール (system_admin 専用のテナント横断領域) でテナントを一覧・作成・更新し、有効化・無効化する。テナント管理コンソール (/admin) とは別シェルに隔離する。default テナントは削除・無効化できない。
      interfaces:
        - ListTenants
        - GetTenant
        - CreateTenant
        - UpdateTenant
        - DisableTenant
        - EnableTenant
      states:
        - ready
        - loading
        - submitting
        - empty
        - access_denied
        - service_error
    AdminTenantAttributes:
      route: /admin/tenant/attributes
      purpose: 管理者がテナント固有のカスタムユーザー属性スキーマを定義・更新する。組み込み属性はコードが提供する。
      interfaces:
        - GetTenantUserAttributeSchema
        - UpdateTenantUserAttributeSchema
      states:
        - ready
        - loading
        - submitting
        - access_denied
        - service_error
    AdminSettings:
      route: /admin/settings
      purpose: 管理者がパスワードポリシーなど所属テナントの設定を参照・更新する。
      interfaces:
        - GetAdminSettings
        - UpdateAdminSettings
      states:
        - ready
        - loading
        - submitting
        - access_denied
        - service_error
  requirements:
    - id: UX-ADMIN-CONTROL-PLANE
      category: security
      adoption: required
      statement: テナント管理画面はsystem_adminロール専用のシステムコンソール(/system)に隔離し、各ルートのガードとサーバ側APIの双方でsystem_adminを必須とする(pathではなくroleでゲート)。通常テナントの管理者には導線も操作も提供しない。
      screens:
        - AdminTenants
      interfaces:
        - ListTenants
        - GetTenant
        - CreateTenant
        - UpdateTenant
        - DisableTenant
        - EnableTenant
