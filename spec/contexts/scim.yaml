system: idmagic
spec_version: "2.0"
context: Scim

glossary:
  ScimToken:
    definition: SCIM 2.0 API アクセス用のアクセストークン。SCIM クライアントは Authorization ヘッダに Bearer スキームで提示する。現状はテナント管理者が発行・失効を管理する長寿命トークンだが、認証方式は SCIM 2.0 仕様では規定されておらず、将来 OAuth 2.0 で発行したアクセストークンを受け入れる余地も残す。
    aliases:
      - SCIM アクセストークン
      - access token

models:
  ScimUserRef:
    kind: entity
    description: SCIM 2.0 の ID と IdP 内部の User (sub) を紐付けるマッピング。
    identity: scim_id
    fields:
      tenant_id:
        type: String
      scim_id:
        type: String
      user_id:
        type: String
  ScimGroupRef:
    kind: entity
    description: SCIM 2.0 の ID と IdP 内部の Group (id) を紐付けるマッピング。
    identity: scim_id
    fields:
      tenant_id:
        type: String
      scim_id:
        type: String
      group_id:
        type: String
  ScimToken:
    kind: entity
    description: SCIM 2.0 API アクセス用のアクセストークン。Bearer スキームで提示する。有効なアクセストークンが1本もなければ SCIM API は事実上利用できず、これがテナントごとの有効・無効の唯一の判断軸となる。
    identity: id
    fields:
      tenant_id:
        type: String
      id:
        type: String
      token_hash:
        type: String
      description:
        type: String
      created_at:
        type: Timestamp
      expires_at:
        type: Timestamp
        optional: true
interfaces:
  GetScimServiceProviderConfig:
    description: |
      SCIM 2.0 /ServiceProviderConfig を取得する。
      レスポンスは受け付ける認証方式を authenticationSchemes で申告する。同属性は
      RFC 7643 §5 で REQUIRED の多値属性であり、空や欠落は許されない。SCIM API は
      Bearer スキームで提示するアクセストークンで認証するため、少なくとも
      oauthbearertoken 方式を 1 件含める。
    input:
      tenant_id:
        type: String
    output:
      config:
        type: "Map<String,JSON>"
    bindings:
      - kind: http
        method: GET
        path: /scim/v2/ServiceProviderConfig
  GetScimResourceTypes:
    description: SCIM 2.0 /ResourceTypes を取得する。
    input:
      tenant_id:
        type: String
    output:
      types:
        type: "Map<String,JSON>[]"
    bindings:
      - kind: http
        method: GET
        path: /scim/v2/ResourceTypes
  GetScimSchemas:
    description: SCIM 2.0 /Schemas を取得する。
    input:
      tenant_id:
        type: String
    output:
      schemas:
        type: "Map<String,JSON>[]"
    bindings:
      - kind: http
        method: GET
        path: /scim/v2/Schemas
  CreateScimUser:
    description: SCIM 2.0 /Users に対する POST 要求。内部 User の作成（または mapping 適用）を処理する。
    input:
      tenant_id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    bindings:
      - kind: http
        method: POST
        path: /scim/v2/Users
  GetScimUser:
    description: SCIM 2.0 /Users/{id} に対する GET 要求。
    input:
      tenant_id:
        type: String
      id:
        type: String
    output:
      response:
        type: "Map<String,JSON>"
    bindings:
      - kind: http
        method: GET
        path: "/scim/v2/Users/{id}"
  PatchScimUser:
    description: SCIM 2.0 /Users/{id} に対する PATCH 要求。active の変更や属性の更新を処理する。
    input:
      tenant_id:
        type: String
      id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    bindings:
      - kind: http
        method: PATCH
        path: "/scim/v2/Users/{id}"
  UpdateScimUser:
    description: SCIM 2.0 /Users/{id} に対する PUT 要求。
    input:
      tenant_id:
        type: String
      id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    bindings:
      - kind: http
        method: PUT
        path: "/scim/v2/Users/{id}"
  DeleteScimUser:
    description: SCIM 2.0 /Users/{id} に対する DELETE 要求。内部 User を soft-delete する。
    input:
      tenant_id:
        type: String
      id:
        type: String
    bindings:
      - kind: http
        method: DELETE
        path: "/scim/v2/Users/{id}"
  CreateScimGroup:
    description: SCIM 2.0 /Groups に対する POST 要求。
    input:
      tenant_id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    bindings:
      - kind: http
        method: POST
        path: /scim/v2/Groups
  GetScimGroup:
    description: SCIM 2.0 /Groups/{id} に対する GET 要求。
    input:
      tenant_id:
        type: String
      id:
        type: String
    output:
      response:
        type: "Map<String,JSON>"
    bindings:
      - kind: http
        method: GET
        path: "/scim/v2/Groups/{id}"
  PatchScimGroup:
    description: SCIM 2.0 /Groups/{id} に対する PATCH 要求。メンバーの追加・削除などを処理する。
    input:
      tenant_id:
        type: String
      id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    bindings:
      - kind: http
        method: PATCH
        path: "/scim/v2/Groups/{id}"
  UpdateScimGroup:
    description: SCIM 2.0 /Groups/{id} に対する PUT 要求。
    input:
      tenant_id:
        type: String
      id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    bindings:
      - kind: http
        method: PUT
        path: "/scim/v2/Groups/{id}"
  DeleteScimGroup:
    description: SCIM 2.0 /Groups/{id} に対する DELETE 要求。
    input:
      tenant_id:
        type: String
      id:
        type: String
    bindings:
      - kind: http
        method: DELETE
        path: "/scim/v2/Groups/{id}"
  ListScimTokens:
    description: テナントの SCIM アクセストークン一覧を取得する。
    input:
      tenant_id:
        type: String
    output:
      tokens:
        type: "Map<String,JSON>[]"
    bindings:
      - kind: http
        method: GET
        path: /api/admin/scim/tokens
  CreateScimToken:
    description: テナントの SCIM アクセストークンを新規発行する。
    input:
      tenant_id:
        type: String
      description:
        type: String
      expiry_days:
        type: Integer
    output:
      token:
        type: "Map<String,JSON>"
    bindings:
      - kind: http
        method: POST
        path: /api/admin/scim/tokens
  RevokeScimToken:
    description: テナントの SCIM アクセストークンを無効化する。
    input:
      tenant_id:
        type: String
      id:
        type: String
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/scim/tokens/{id}"
permissions:
  ScimProvision:
    description: SCIM 2.0 プロビジョニング API を呼び出す権限。
    actor: Agent
    resource: User
    allow_when: "true"
  ManageScimSettings:
    description: SCIM アクセストークンを管理する権限。
    actor: User
    resource: ScimToken
    allow_when: "admin in actor.roles && actor.disabled_at == null && context.authenticated == true && actor.tenant_id == resource.tenant_id"
scenarios:
  外部IDPからのSCIMユーザー同期ライフサイクル:
    goal: 外部 IDP からの SCIM ユーザープロビジョニングを処理する。
    primary_actor: Agent
    scope: Scim
    level: user_goal
    preconditions:
      - "有効な SCIM アクセストークンが発行されている"
    main_success:
      - "SCIMクライアントが CreateScimUser を呼び出す"
      - "内部 User が作成され status が Active になる"
      - "SCIMクライアントが PatchScimUser で active=false を指定する"
      - "内部 User が Disabled になる"
      - "SCIMクライアントが DeleteScimUser を呼び出す"
      - "内部 User が PendingDeletion に遷移する"
  外部IDPからのSCIMグループおよびメンバーシップ同期:
    goal: 外部 IDP からの SCIM グループおよびメンバーシップ同期。
    primary_actor: Agent
    scope: Scim
    level: user_goal
    preconditions:
      - "有効な SCIM アクセストークンが発行されている"
    main_success:
      - "SCIMクライアントが CreateScimGroup を呼び出す"
      - "グループが作成される"
      - "SCIMクライアントが PatchScimGroup でメンバー追加を指定する"
      - "GroupMembership が同期され User の有効ロールが更新される"
