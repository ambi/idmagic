system: idmagic
spec_version: "3.0"
context: Scim

standards:
  RFC7643:
    title: System for Cross-domain Identity Management Core Schema
    version: RFC 7643
    url: https://www.rfc-editor.org/rfc/rfc7643.html
    roles: [ServiceProvider]
    scope: SCIM User、Group、ServiceProviderConfig、ResourceType、Schema resource の表現。
    requirements:
      - id: RFC7643-SERVICE-PROVIDER-CONFIG
        section: §5
        strength: MUST
        adoption: required
        statement: ServiceProviderConfig は authenticationSchemes を含み Bearer token 方式を広告する。
        refs:
          - interfaces.GetScimServiceProviderConfig
      - id: RFC7643-CORE-RESOURCES
        section: "§4.1, §4.2"
        strength: MUST
        adoption: required
        statement: User と Group resource を SCIM core schema に従って表現する。
        refs:
          - interfaces.CreateScimUser
          - interfaces.CreateScimGroup
  RFC7644:
    title: System for Cross-domain Identity Management Protocol
    version: RFC 7644
    url: https://www.rfc-editor.org/rfc/rfc7644.html
    roles: [ServiceProvider]
    scope: SCIM User / Group resource の CRUD、PATCH、Bearer 認証、protocol error。
    requirements:
      - id: RFC7644-RESOURCE-OPERATIONS
        section: "§3.2–§3.6"
        strength: MUST
        adoption: required
        statement: User と Group resource に create、read、replace、delete 操作を提供する。
        refs:
          - interfaces.CreateScimUser
          - interfaces.GetScimUser
          - interfaces.UpdateScimUser
          - interfaces.DeleteScimUser
          - interfaces.CreateScimGroup
          - interfaces.GetScimGroup
          - interfaces.UpdateScimGroup
          - interfaces.DeleteScimGroup
      - id: RFC7644-PATCH
        section: §3.5.2
        strength: SHOULD
        adoption: required
        statement: User と Group resource の部分更新を PATCH operation で提供する。
        refs:
          - interfaces.PatchScimUser
          - interfaces.PatchScimGroup
      - id: RFC7644-BEARER-AUTHORIZATION
        section: §2
        strength: MUST
        adoption: required
        statement: SCIM protocol endpoint は tenant-scoped Bearer token で認証・認可する。
        refs:
          - models.ScimToken
      - id: RFC7644-ERROR-RESPONSE
        section: §3.12
        strength: MUST
        adoption: required
        statement: protocol failure は HTTP status と detail を持つ SCIM error response で返す。
        refs:
          - models.ScimProtocolError

glossary:
  ScimToken:
    definition: SCIM 2.0 API アクセス用のアクセストークン。SCIM クライアントは Authorization ヘッダに Bearer スキームで提示する。現状はテナント管理者が発行・失効を管理する長寿命トークンだが、認証方式は SCIM 2.0 仕様では規定されておらず、将来 OAuth 2.0 で発行したアクセストークンを受け入れる余地も残す。
    aliases:
      - SCIM アクセストークン
      - access token
  ScimClient:
    definition: tenant-scoped Bearer token を提示して SCIM provisioning API を呼び出す外部 agent。

models:
  User:
    kind: entity
    description: IdManagement が publish する管理者 principal の最小 stub。
    identity: id
    fields:
      id:
        type: String
      tenant_id:
        type: String
      status:
        type: String
      roles:
        type: "String[]"
  Agent:
    kind: entity
    description: 有効な SCIM Bearer token から解決される provisioning principal。
    identity: id
    fields:
      id:
        type: String
      tenant_id:
        type: String
      status:
        type: String
  Tenant:
    kind: entity
    description: Tenancy が publish するテナント resource の最小 stub。
    identity: id
    fields:
      id:
        type: String
  InvalidRequestError:
    kind: error
    description: SCIM token 管理入力が不正である。
  AccessDeniedError:
    kind: error
    description: SCIM Bearer token または管理者 principal が操作を許可されない。
  ScimProtocolError:
    kind: error
    description: RFC 7644 §3.12 に従う SCIM protocol error response。
    payload:
      status:
        type: String
      detail:
        type: String
        optional: true
      scim_type:
        type: String
        optional: true
  ScimUserRef:
    kind: entity
    description: SCIM 2.0 の ID と IdP 内部の User (sub) を紐付けるマッピング。
    identity: [tenant_id, scim_id]
    fields:
      tenant_id:
        type: String
      scim_id:
        type: String
      user_id:
        type: String
  ScimGroupRef:
    kind: entity
    description: SCIM 2.0 の ID と IdP 内部の Group (id) を紐付けるマッピング。
    identity: [tenant_id, scim_id]
    fields:
      tenant_id:
        type: String
      scim_id:
        type: String
      group_id:
        type: String
  ScimToken:
    kind: entity
    description: SCIM 2.0 API アクセス用のアクセストークン。Bearer スキームで提示する。有効なアクセストークンが1本もなければ SCIM API は事実上利用できず、これがテナントごとの有効・無効の唯一の判断軸となる。
    identity: [tenant_id, id]
    fields:
      tenant_id:
        type: String
      id:
        type: String
      token_hash:
        type: String
      description:
        type: String
      created_at:
        type: DateTime
      expires_at:
        type: DateTime
        optional: true
interfaces:
  GetScimServiceProviderConfig:
    description: |
      SCIM 2.0 /ServiceProviderConfig を取得する。
      レスポンスは受け付ける認証方式を authenticationSchemes で申告する。同属性は
      RFC 7643 §5 で REQUIRED の多値属性であり、空や欠落は許されない。SCIM API は
      Bearer スキームで提示するアクセストークンで認証するため、少なくとも
      oauthbearertoken 方式を 1 件含める。
    input:
      tenant_id:
        type: String
    output:
      config:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    read_only: true
    access:
      policies: [ScimProvision]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: GET
        path: /scim/v2/ServiceProviderConfig
  GetScimResourceTypes:
    description: SCIM 2.0 /ResourceTypes を取得する。
    input:
      tenant_id:
        type: String
    output:
      types:
        type: "Map<String,JSON>[]"
    errors: [ScimProtocolError]
    read_only: true
    access:
      policies: [ScimProvision]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: GET
        path: /scim/v2/ResourceTypes
  GetScimSchemas:
    description: SCIM 2.0 /Schemas を取得する。
    input:
      tenant_id:
        type: String
    output:
      schemas:
        type: "Map<String,JSON>[]"
    errors: [ScimProtocolError]
    read_only: true
    access:
      policies: [ScimProvision]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: GET
        path: /scim/v2/Schemas
  CreateScimUser:
    description: SCIM 2.0 /Users に対する POST 要求。内部 User の作成（または mapping 適用）を処理する。
    input:
      tenant_id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ScimProvision]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: POST
        path: /scim/v2/Users
  ListScimUsers:
    description: |
      SCIM 2.0 /Users collection を filter、startIndex、count に従って検索する。
      filter は RFC 7644 §3.4.2.2 grammar のうち、User の許可属性
      (userName, active, name.formatted, name.givenName, name.familyName,
      emails.value, id) への比較演算子 (eq, ne, co, sw, ew, pr) と論理演算子
      (and, or, not, 丸括弧によるグループ化) だけを受け付ける。許可外の属性・演算子・
      構文エラー・入力長やネスト深さの上限超過は invalidFilter の ScimProtocolError
      とし、内部エラーには落とさない。
    input:
      tenant_id: { type: String }
      filter:
        type: String
        optional: true
        description: RFC 7644 §3.4.2.2 grammar のうち上記 allowlist に閉じた filter 式。
      startIndex:
        type: Integer
        optional: true
        description: |
          RFC 7644 §3.4.2.4 の 1-origin index。省略時は 1。1 未満の値は 1 に正規化する
          (RFC の規定通り)。整数として解釈できない値は invalidValue の ScimProtocolError。
      count:
        type: Integer
        optional: true
        description: |
          ページの希望件数。省略時は ServiceProviderConfig が広告する上限
          (filter.maxResults = 100) を既定値とする。0 は「resource を返さず
          totalResults だけ返す」を意味する (RFC 7644 §3.4.2.4)。負値や整数として
          解釈できない値は invalidValue の ScimProtocolError。上限を超える値は
          上限に clamp する。
    output:
      response: { type: "Map<String,JSON>" }
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    read_only: true
    access:
      policies: [ScimProvision]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: GET
        path: /scim/v2/Users
        request_form: query
  GetScimUser:
    description: SCIM 2.0 /Users/{id} に対する GET 要求。
    input:
      tenant_id:
        type: String
      id:
        type: String
    output:
      response:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    read_only: true
    access:
      policies: [ScimProvision]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: GET
        path: "/scim/v2/Users/{id}"
  PatchScimUser:
    description: SCIM 2.0 /Users/{id} に対する PATCH 要求。active の変更や属性の更新を処理する。
    input:
      tenant_id:
        type: String
      id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ScimProvision]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: PATCH
        path: "/scim/v2/Users/{id}"
  UpdateScimUser:
    description: SCIM 2.0 /Users/{id} に対する PUT 要求。
    input:
      tenant_id:
        type: String
      id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ScimProvision]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: PUT
        path: "/scim/v2/Users/{id}"
  DeleteScimUser:
    description: SCIM 2.0 /Users/{id} に対する DELETE 要求。内部 User を soft-delete する。
    input:
      tenant_id:
        type: String
      id:
        type: String
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ScimProvision]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: DELETE
        path: "/scim/v2/Users/{id}"
  CreateScimGroup:
    description: SCIM 2.0 /Groups に対する POST 要求。
    input:
      tenant_id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ScimProvision]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: POST
        path: /scim/v2/Groups
  ListScimGroups:
    description: |
      SCIM 2.0 /Groups collection を filter、startIndex、count に従って検索する。
      filter は RFC 7644 §3.4.2.2 grammar のうち、Group の許可属性
      (displayName, id) への比較演算子 (eq, ne, co, sw, ew, pr) と論理演算子
      (and, or, not, 丸括弧によるグループ化) だけを受け付ける。許可外の属性・演算子・
      構文エラー・入力長やネスト深さの上限超過は invalidFilter の ScimProtocolError
      とし、内部エラーには落とさない。
    input:
      tenant_id: { type: String }
      filter:
        type: String
        optional: true
        description: RFC 7644 §3.4.2.2 grammar のうち上記 allowlist に閉じた filter 式。
      startIndex:
        type: Integer
        optional: true
        description: |
          RFC 7644 §3.4.2.4 の 1-origin index。省略時は 1。1 未満の値は 1 に正規化する
          (RFC の規定通り)。整数として解釈できない値は invalidValue の ScimProtocolError。
      count:
        type: Integer
        optional: true
        description: |
          ページの希望件数。省略時は ServiceProviderConfig が広告する上限
          (filter.maxResults = 100) を既定値とする。0 は「resource を返さず
          totalResults だけ返す」を意味する (RFC 7644 §3.4.2.4)。負値や整数として
          解釈できない値は invalidValue の ScimProtocolError。上限を超える値は
          上限に clamp する。
    output:
      response: { type: "Map<String,JSON>" }
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    read_only: true
    access:
      policies: [ScimProvision]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: GET
        path: /scim/v2/Groups
        request_form: query
  GetScimGroup:
    description: SCIM 2.0 /Groups/{id} に対する GET 要求。
    input:
      tenant_id:
        type: String
      id:
        type: String
    output:
      response:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    read_only: true
    access:
      policies: [ScimProvision]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: GET
        path: "/scim/v2/Groups/{id}"
  PatchScimGroup:
    description: SCIM 2.0 /Groups/{id} に対する PATCH 要求。メンバーの追加・削除などを処理する。
    input:
      tenant_id:
        type: String
      id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ScimProvision]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: PATCH
        path: "/scim/v2/Groups/{id}"
  UpdateScimGroup:
    description: SCIM 2.0 /Groups/{id} に対する PUT 要求。
    input:
      tenant_id:
        type: String
      id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ScimProvision]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: PUT
        path: "/scim/v2/Groups/{id}"
  DeleteScimGroup:
    description: SCIM 2.0 /Groups/{id} に対する DELETE 要求。
    input:
      tenant_id:
        type: String
      id:
        type: String
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ScimProvision]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: DELETE
        path: "/scim/v2/Groups/{id}"
  ListScimTokens:
    description: テナントの SCIM アクセストークン一覧を取得する。
    input:
      tenant_id:
        type: String
    output:
      tokens:
        type: "Map<String,JSON>[]"
    errors: [AccessDeniedError]
    read_only: true
    access:
      policies: [ManageScimSettings]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: GET
        path: /api/admin/scim/tokens
  CreateScimToken:
    description: テナントの SCIM アクセストークンを新規発行する。
    input:
      tenant_id:
        type: String
      description:
        type: String
      expiry_days:
        type: Integer
    output:
      token:
        type: "Map<String,JSON>"
    errors: [InvalidRequestError, AccessDeniedError]
    requires:
      - input.tenant_id == context.tenant_id
      - input.expiry_days > 0
    access:
      policies: [ManageScimSettings]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: POST
        path: /api/admin/scim/tokens
  RevokeScimToken:
    description: テナントの SCIM アクセストークンを無効化する。
    input:
      tenant_id:
        type: String
      id:
        type: String
    errors: [InvalidRequestError, AccessDeniedError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ManageScimSettings]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: DELETE
        path: "/api/admin/scim/tokens/{id}"
authorization:
  principals:
    ScimBearerClient:
      type: Agent
      matches:
        - context.authenticated
        - principal.status == "Active"
    TenantAdministrator:
      type: User
      matches:
        - context.authenticated
        - principal.status == "Active"
        - '"admin" in principal.roles || "system_admin" in principal.roles'
  policies:
    ScimProvision:
      effect: permit
      principal: ScimBearerClient
      when: principal.tenant_id == resource.id
    ManageScimSettings:
      effect: permit
      principal: TenantAdministrator
      when: principal.tenant_id == resource.id
scenarios:
  SCIM clientはUsersとGroups collectionを検索できる:
    actor: ScimClient
    given:
      - SCIM client が tenant に対する有効な provisioning token を持つ
    main_success:
      - SCIM client が filter、startIndex、count を指定して /Users と /Groups を GET する
      - 各応答は filter 適用後の totalResults、ページ分の Resources、itemsPerPage を持つ
        SCIM ListResponse を返す
    extensions:
      - at: 1
        condition: filter が許可属性・演算子外、または構文エラー
        steps:
          - invalidFilter の SCIM protocol error で拒否される
      - at: 1
        condition: startIndex または count が整数として解釈できない、あるいは count が負値
        steps:
          - invalidValue の SCIM protocol error で拒否される
      - at: 1
        condition: provisioning token の tenant が要求 tenant と一致しない
        steps:
          - SCIM protocol error で拒否される
  外部IDPからのSCIMユーザー同期ライフサイクル:
    actor: ScimBearerClient
    given:
      - "有効な SCIM アクセストークンが発行されている"
    main_success:
      - "SCIMクライアントが CreateScimUser を呼び出す"
      - "内部 User が作成され status が Active になる"
      - "SCIMクライアントが PatchScimUser で active=false を指定する"
      - "内部 User が Disabled になる"
      - "SCIMクライアントが DeleteScimUser を呼び出す"
      - "内部 User が PendingDeletion に遷移する"
    extensions:
      - at: 1
        condition: Bearer token が失効済み、期限切れ、または別 tenant の token である
        steps:
          - SCIM protocol error を返し User を作成しない
      - at: 3
        condition: PATCH body が RFC 7644 の operation 契約を満たさない
        steps:
          - invalidValue の ScimProtocolError を返し User を変更しない
      - at: 5
        condition: 指定 ID が存在しない
        steps:
          - 404 の ScimProtocolError を返す
  外部IDPからのSCIMグループおよびメンバーシップ同期:
    actor: ScimBearerClient
    given:
      - "有効な SCIM アクセストークンが発行されている"
    main_success:
      - "SCIMクライアントが CreateScimGroup を呼び出す"
      - "グループが作成される"
      - "SCIMクライアントが PatchScimGroup でメンバー追加を指定する"
      - "GroupMembership が同期され User の有効ロールが更新される"
    extensions:
      - at: 3
        condition: 追加対象 User が別 tenant に属する
        steps:
          - ScimProtocolError を返し membership を作成しない
  テナント管理者はSCIMアクセストークンを管理できる:
    actor: TenantAdministrator
    given:
      - admin は対象 tenant で認証済みである
    main_success:
      - admin が CreateScimToken を呼び出す
      - 平文 token は作成応答で一度だけ返される
      - admin が RevokeScimToken を呼び出す
      - 失効した token で SCIM API を呼ぶと拒否される
    extensions:
      - at: 1
        condition: admin が別 tenant の token を作成または失効しようとする
        steps:
          - AccessDeniedError を返し token を変更しない
