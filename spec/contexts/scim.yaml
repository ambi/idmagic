system: idmagic
spec_version: "3.0"
context: Scim

standards:
  RFC7643:
    title: System for Cross-domain Identity Management Core Schema
    version: RFC 7643
    url: https://www.rfc-editor.org/rfc/rfc7643.html
    roles: [ServiceProvider]
    scope: SCIM User、Group、ServiceProviderConfig、ResourceType、Schema resource の表現。
    requirements:
      - id: RFC7643-SERVICE-PROVIDER-CONFIG
        section: §5
        strength: MUST
        adoption: required
        statement: ServiceProviderConfig は authenticationSchemes を含み Bearer token 方式を広告する。
        refs:
          - interfaces.GetScimServiceProviderConfig
      - id: RFC7643-CORE-RESOURCES
        section: "§4.1, §4.2"
        strength: MUST
        adoption: partial
        statement: User と Group resource を SCIM core schema に従って表現する。
        reason: >-
          User は id、userName(必須)、name.formatted/givenName/familyName、emails
          (書込みは配列を受け付けるが最初の要素の value だけを永続化する、単一の
          primary/work email 相当)、active、meta のみ対応する。phoneNumbers、
          addresses、photos、entitlements、roles、x509Certificates、ims、
          preferredLanguage、locale、timezone、profileUrl、title、userType、
          nickName、他の複数 emails 要素、enterprise extension や custom schema
          extension は未対応。Group は id、displayName(必須)、members(User
          member のみ、type=Group の nested group member は未対応)、meta のみ
          対応する。GetScimSchemas/GetScimResourceTypes はこの対応範囲だけを
          広告する。
        refs:
          - interfaces.CreateScimUser
          - interfaces.CreateScimGroup
          - interfaces.GetScimSchemas
  RFC7644:
    title: System for Cross-domain Identity Management Protocol
    version: RFC 7644
    url: https://www.rfc-editor.org/rfc/rfc7644.html
    roles: [ServiceProvider]
    scope: SCIM User / Group resource の CRUD、PATCH、Bearer 認証、protocol error。
    requirements:
      - id: RFC7644-RESOURCE-OPERATIONS
        section: "§3.2–§3.6"
        strength: MUST
        adoption: required
        statement: User と Group resource に create、read、replace、delete 操作を提供する。
        refs:
          - interfaces.CreateScimUser
          - interfaces.GetScimUser
          - interfaces.UpdateScimUser
          - interfaces.DeleteScimUser
          - interfaces.CreateScimGroup
          - interfaces.GetScimGroup
          - interfaces.UpdateScimGroup
          - interfaces.DeleteScimGroup
      - id: RFC7644-PATCH
        section: §3.5.2
        strength: SHOULD
        adoption: partial
        statement: User と Group resource の部分更新を PATCH operation で提供する。
        reason: >-
          add/replace/remove の各 operation は RFC7643-CORE-RESOURCES が対応する
          属性 path(User: userName、name、name.formatted、name.givenName、
          name.familyName、emails、active。Group: displayName、members)にのみ
          適用できる。members に対する複合 value フィルタ path
          (例 members[value eq "..."]) は未対応で、常に配列全体を対象にする。
          readOnly 属性(id、meta、schemas)への書込みは mutability エラーにする。
        refs:
          - interfaces.PatchScimUser
          - interfaces.PatchScimGroup
      - id: RFC7644-BEARER-AUTHORIZATION
        section: §2
        strength: MUST
        adoption: required
        statement: >-
          SCIM protocol endpoint は tenant-scoped Bearer token で認証・認可する。
          token は ApiTokens context が発行する API アクセストークンで、SCIM 操作は
          scim:users:read / scim:users:write / scim:groups:read / scim:groups:write の
          該当 scope を要求する。discovery endpoint は scim:* のいずれかで参照できる。
        refs:
          - interfaces.GetScimServiceProviderConfig
          - interfaces.GetScimResourceTypes
          - interfaces.GetScimSchemas
          - interfaces.ListScimUsers
          - interfaces.CreateScimUser
          - interfaces.GetScimUser
          - interfaces.UpdateScimUser
          - interfaces.PatchScimUser
          - interfaces.DeleteScimUser
          - interfaces.ListScimGroups
          - interfaces.CreateScimGroup
          - interfaces.GetScimGroup
          - interfaces.UpdateScimGroup
          - interfaces.PatchScimGroup
          - interfaces.DeleteScimGroup
      - id: RFC7644-ERROR-RESPONSE
        section: §3.12
        strength: MUST
        adoption: required
        statement: protocol failure は HTTP status と detail を持つ SCIM error response で返す。
        refs:
          - models.ScimProtocolError
      - id: RFC7644-FILTERING
        section: §3.4.2.2
        strength: SHOULD
        adoption: partial
        statement: List collection endpoint は filter query parameter による絞り込みを提供する。
        reason: >-
          属性・演算子は allowlist に閉じる(injection・過剰計算量対策)。
          比較演算子は eq、ne、co、sw、ew、pr に加え、dateTime 属性
          (User/Group 共通の meta.created、meta.lastModified)への gt、ge、
          lt、le を対応する(RFC3339 実時刻としての比較、文字列辞書順ではない)。
          属性名は RFC 7644 §3.4.2.2 grammar が許容する schema URN プレフィックス
          (urn:ietf:params:scim:schemas:core:2.0:User: /
          ...:Group:)付き表記にも対応し、prefix を剥がした後に同じ allowlist
          で解決する。複数値属性の複合フィルタ(bracket 構文、例
          emails[type eq "work"])は User の email 表現が単一値に簡略化されて
          いる現状に依存するため未対応。custom / extension schema 属性への
          フィルタも未対応。
        refs:
          - interfaces.ListScimUsers
          - interfaces.ListScimGroups

glossary:
  ScimClient:
    definition: tenant-scoped Bearer token を提示して SCIM provisioning API を呼び出す外部 agent。

models:
  User:
    kind: entity
    description: IdManagement が publish する管理者 principal の最小 stub。
    identity: id
    fields:
      id:
        type: String
      tenant_id:
        type: String
      status:
        type: String
      roles:
        type: "String[]"
  Agent:
    kind: entity
    description: 有効な SCIM Bearer token から解決される provisioning principal。
    identity: id
    fields:
      id:
        type: String
      tenant_id:
        type: String
      status:
        type: String
  Tenant:
    kind: entity
    description: Tenancy が publish するテナント resource の最小 stub。
    identity: id
    fields:
      id:
        type: String
  ScimProtocolError:
    kind: error
    description: RFC 7644 §3.12 に従う SCIM protocol error response。
    payload:
      status:
        type: String
      detail:
        type: String
        optional: true
      scim_type:
        type: String
        optional: true
  ScimUserRef:
    kind: entity
    description: SCIM 2.0 の ID と IdP 内部の User (sub) を紐付けるマッピング。
    identity: [tenant_id, scim_id]
    fields:
      tenant_id:
        type: String
      scim_id:
        type: String
      user_id:
        type: String
  ScimGroupRef:
    kind: entity
    description: SCIM 2.0 の ID と IdP 内部の Group (id) を紐付けるマッピング。
    identity: [tenant_id, scim_id]
    fields:
      tenant_id:
        type: String
      scim_id:
        type: String
      group_id:
        type: String
interfaces:
  GetScimServiceProviderConfig:
    description: |
      SCIM 2.0 /ServiceProviderConfig を取得する。
      レスポンスは受け付ける認証方式を authenticationSchemes で申告する。同属性は
      RFC 7643 §5 で REQUIRED の多値属性であり、空や欠落は許されない。SCIM API は
      Bearer スキームで提示するアクセストークンで認証するため、少なくとも
      oauthbearertoken 方式を 1 件含める。
    input:
      tenant_id:
        type: String
    output:
      config:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    read_only: true
    access:
      policies: [ScimDiscovery]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: GET
        path: /scim/v2/ServiceProviderConfig
  GetScimResourceTypes:
    description: |
      SCIM 2.0 /ResourceTypes を取得する。実装済みの User と Group の2 resource type
      だけを返す(schema URN、endpoint、schema extension は空)。
    input:
      tenant_id:
        type: String
    output:
      types:
        type: "Map<String,JSON>[]"
    errors: [ScimProtocolError]
    read_only: true
    access:
      policies: [ScimDiscovery]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: GET
        path: /scim/v2/ResourceTypes
  GetScimSchemas:
    description: |
      SCIM 2.0 /Schemas を取得する。RFC7643-CORE-RESOURCES が対応する User と Group の
      属性だけを、各属性の type、multiValued、required、mutability(readOnly/readWrite)、
      returned、uniqueness とともに広告する。空の attribute 配列を返さない。
    input:
      tenant_id:
        type: String
    output:
      schemas:
        type: "Map<String,JSON>[]"
    errors: [ScimProtocolError]
    read_only: true
    access:
      policies: [ScimDiscovery]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: GET
        path: /scim/v2/Schemas
  CreateScimUser:
    description: |
      SCIM 2.0 /Users に対する POST 要求。内部 User を作成する。`userName` は必須で、
      欠落は invalidValue の ScimProtocolError にする。`id` は常に server が生成し、
      body に含まれていても無視する(readOnly)。`active` 省略時は true。作成した
      resource は `id`、`meta.resourceType`、`meta.created`、`meta.lastModified`、
      `meta.location` を含めて返す。同一 tenant 内で `userName` が既存 User と重複する
      場合は 409 `uniqueness` にする。
    input:
      tenant_id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ScimWriteUsers]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: POST
        path: /scim/v2/Users
  ListScimUsers:
    description: |
      SCIM 2.0 /Users collection を filter、startIndex、count に従って検索する。
      filter は RFC 7644 §3.4.2.2 grammar のうち、User の許可属性
      (userName, active, name.formatted, name.givenName, name.familyName,
      emails.value, id への eq, ne, co, sw, ew, pr。meta.created,
      meta.lastModified への eq, ne, gt, ge, lt, le, pr。dateTime 比較は
      RFC3339 実時刻で行う) への比較演算子と論理演算子 (and, or, not, 丸括弧に
      よるグループ化) だけを受け付ける。属性名は schema URN プレフィックス
      (urn:ietf:params:scim:schemas:core:2.0:User: など) を付けた表記でも
      解決できる。許可外の属性・演算子・未知の URN プレフィックス・構文エラー・
      入力長やネスト深さの上限超過は invalidFilter の ScimProtocolError とし、
      内部エラーには落とさない。
    input:
      tenant_id: { type: String }
      filter:
        type: String
        optional: true
        description: RFC 7644 §3.4.2.2 grammar のうち上記 allowlist に閉じた filter 式。
      startIndex:
        type: Integer
        optional: true
        description: |
          RFC 7644 §3.4.2.4 の 1-origin index。省略時は 1。1 未満の値は 1 に正規化する
          (RFC の規定通り)。整数として解釈できない値は invalidValue の ScimProtocolError。
      count:
        type: Integer
        optional: true
        description: |
          ページの希望件数。省略時は ServiceProviderConfig が広告する上限
          (filter.maxResults = 100) を既定値とする。0 は「resource を返さず
          totalResults だけ返す」を意味する (RFC 7644 §3.4.2.4)。負値や整数として
          解釈できない値は invalidValue の ScimProtocolError。上限を超える値は
          上限に clamp する。
    output:
      response: { type: "Map<String,JSON>" }
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    read_only: true
    access:
      policies: [ScimReadUsers]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: GET
        path: /scim/v2/Users
        request_form: query
  GetScimUser:
    description: |
      SCIM 2.0 /Users/{id} に対する GET 要求。`id`、`meta.resourceType`、
      `meta.created`、`meta.lastModified`、`meta.location` を含む resource を返す。
    input:
      tenant_id:
        type: String
      id:
        type: String
    output:
      response:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    read_only: true
    access:
      policies: [ScimReadUsers]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: GET
        path: "/scim/v2/Users/{id}"
  PatchScimUser:
    description: |
      SCIM 2.0 /Users/{id} に対する PATCH 要求(RFC 7644 §3.5.2)。`Operations` の
      各要素は `op`(add/replace/remove のいずれか)と `path` を持つ。`path` は
      RFC7644-PATCH が対応する User 属性(userName、name、name.formatted、
      name.givenName、name.familyName、emails、active)のいずれかでなければならず、
      それ以外は invalidPath の ScimProtocolError にする。`op` が add/replace/remove
      以外、または value の型が対象属性と不整合な場合は invalidValue にする。`id`、
      `meta`、`schemas` への書込みは mutability エラーにする。
    input:
      tenant_id:
        type: String
      id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ScimWriteUsers]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: PATCH
        path: "/scim/v2/Users/{id}"
  UpdateScimUser:
    description: |
      SCIM 2.0 /Users/{id} に対する PUT 要求。RFC7643-CORE-RESOURCES が対応する
      mutable 属性を**完全に置換**する(部分更新ではない)。`userName` は必須で、
      欠落は invalidValue の ScimProtocolError にする。省略された他の mutable
      属性(name.*、emails、active)は既定値にリセットする(name/emails は空、
      active は true)。`id`、`meta` への書込みは無視する(readOnly)。
    input:
      tenant_id:
        type: String
      id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ScimWriteUsers]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: PUT
        path: "/scim/v2/Users/{id}"
  DeleteScimUser:
    description: SCIM 2.0 /Users/{id} に対する DELETE 要求。内部 User を soft-delete する。
    input:
      tenant_id:
        type: String
      id:
        type: String
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ScimWriteUsers]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: DELETE
        path: "/scim/v2/Users/{id}"
  CreateScimGroup:
    description: |
      SCIM 2.0 /Groups に対する POST 要求。`displayName` は必須で、欠落は
      invalidValue の ScimProtocolError にする。`id` は常に server が生成し、
      body に含まれていても無視する(readOnly)。`members` の各要素は同一 tenant
      内で解決可能な User の SCIM id でなければならず、解決できない member は
      invalidValue にして group を作成しない。作成した resource は `id`、
      `meta.resourceType`、`meta.created`、`meta.lastModified`、`meta.location`
      を含めて返す。同一 tenant 内で `displayName` が既存 Group と重複する場合は
      409 `uniqueness` にする。
    input:
      tenant_id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ScimWriteGroups]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: POST
        path: /scim/v2/Groups
  ListScimGroups:
    description: |
      SCIM 2.0 /Groups collection を filter、startIndex、count に従って検索する。
      filter は RFC 7644 §3.4.2.2 grammar のうち、Group の許可属性
      (displayName, id への eq, ne, co, sw, ew, pr。meta.created,
      meta.lastModified への eq, ne, gt, ge, lt, le, pr。dateTime 比較は
      RFC3339 実時刻で行う) への比較演算子と論理演算子 (and, or, not, 丸括弧に
      よるグループ化) だけを受け付ける。属性名は schema URN プレフィックス
      (urn:ietf:params:scim:schemas:core:2.0:Group: など) を付けた表記でも
      解決できる。許可外の属性・演算子・未知の URN プレフィックス・構文エラー・
      入力長やネスト深さの上限超過は invalidFilter の ScimProtocolError とし、
      内部エラーには落とさない。
    input:
      tenant_id: { type: String }
      filter:
        type: String
        optional: true
        description: RFC 7644 §3.4.2.2 grammar のうち上記 allowlist に閉じた filter 式。
      startIndex:
        type: Integer
        optional: true
        description: |
          RFC 7644 §3.4.2.4 の 1-origin index。省略時は 1。1 未満の値は 1 に正規化する
          (RFC の規定通り)。整数として解釈できない値は invalidValue の ScimProtocolError。
      count:
        type: Integer
        optional: true
        description: |
          ページの希望件数。省略時は ServiceProviderConfig が広告する上限
          (filter.maxResults = 100) を既定値とする。0 は「resource を返さず
          totalResults だけ返す」を意味する (RFC 7644 §3.4.2.4)。負値や整数として
          解釈できない値は invalidValue の ScimProtocolError。上限を超える値は
          上限に clamp する。
    output:
      response: { type: "Map<String,JSON>" }
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    read_only: true
    access:
      policies: [ScimReadGroups]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: GET
        path: /scim/v2/Groups
        request_form: query
  GetScimGroup:
    description: |
      SCIM 2.0 /Groups/{id} に対する GET 要求。`id`、`meta.resourceType`、
      `meta.created`、`meta.lastModified`、`meta.location` を含む resource を返す。
    input:
      tenant_id:
        type: String
      id:
        type: String
    output:
      response:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    read_only: true
    access:
      policies: [ScimReadGroups]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: GET
        path: "/scim/v2/Groups/{id}"
  PatchScimGroup:
    description: |
      SCIM 2.0 /Groups/{id} に対する PATCH 要求(RFC 7644 §3.5.2)。`path` は
      RFC7644-PATCH が対応する Group 属性(displayName、members)のいずれかで
      なければならず、それ以外は invalidPath の ScimProtocolError にする。`op` が
      add/replace/remove 以外、または value の型が対象属性と不整合な場合は
      invalidValue にする。`members` の add で解決できない member を指定した場合も
      invalidValue にし、group を変更しない。`id`、`meta`、`schemas` への書込みは
      mutability エラーにする。
    input:
      tenant_id:
        type: String
      id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ScimWriteGroups]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: PATCH
        path: "/scim/v2/Groups/{id}"
  UpdateScimGroup:
    description: |
      SCIM 2.0 /Groups/{id} に対する PUT 要求。RFC7643-CORE-RESOURCES が対応する
      mutable 属性を**完全に置換**する(部分更新ではない)。`displayName` は必須で、
      欠落は invalidValue の ScimProtocolError にする。`members` を省略した場合は
      既存メンバーを全て削除する(空集合への置換)。解決できない member を指定した
      場合は invalidValue にし、group を変更しない。`id`、`meta` への書込みは
      無視する(readOnly)。
    input:
      tenant_id:
        type: String
      id:
        type: String
      body:
        type: "Map<String,JSON>"
    output:
      response:
        type: "Map<String,JSON>"
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ScimWriteGroups]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: PUT
        path: "/scim/v2/Groups/{id}"
  DeleteScimGroup:
    description: SCIM 2.0 /Groups/{id} に対する DELETE 要求。
    input:
      tenant_id:
        type: String
      id:
        type: String
    errors: [ScimProtocolError]
    requires:
      - input.tenant_id == context.tenant_id
    access:
      policies: [ScimWriteGroups]
      resource: {type: Tenant, id: context.tenant_id}
    bindings:
      - kind: http
        method: DELETE
        path: "/scim/v2/Groups/{id}"
authorization:
  principals:
    # discovery endpoint 用。scim:* のいずれかの scope を持てば足りる。
    ScimBearerClient:
      type: Agent
      matches:
        - context.authenticated
        - principal.status == "Active"
        - '"scim:users:read" in context.token_scopes || "scim:users:write" in context.token_scopes || "scim:groups:read" in context.token_scopes || "scim:groups:write" in context.token_scopes'
    ScimUserReader:
      type: Agent
      matches:
        - context.authenticated
        - principal.status == "Active"
        - '"scim:users:read" in context.token_scopes'
    ScimUserWriter:
      type: Agent
      matches:
        - context.authenticated
        - principal.status == "Active"
        - '"scim:users:write" in context.token_scopes'
    ScimGroupReader:
      type: Agent
      matches:
        - context.authenticated
        - principal.status == "Active"
        - '"scim:groups:read" in context.token_scopes'
    ScimGroupWriter:
      type: Agent
      matches:
        - context.authenticated
        - principal.status == "Active"
        - '"scim:groups:write" in context.token_scopes'
  policies:
    ScimDiscovery:
      effect: permit
      principal: ScimBearerClient
      when: principal.tenant_id == resource.id
    ScimReadUsers:
      effect: permit
      principal: ScimUserReader
      when: principal.tenant_id == resource.id
    ScimWriteUsers:
      effect: permit
      principal: ScimUserWriter
      when: principal.tenant_id == resource.id
    ScimReadGroups:
      effect: permit
      principal: ScimGroupReader
      when: principal.tenant_id == resource.id
    ScimWriteGroups:
      effect: permit
      principal: ScimGroupWriter
      when: principal.tenant_id == resource.id
scenarios:
  SCIM clientはUsersとGroups collectionを検索できる:
    actor: ScimClient
    given:
      - SCIM client が tenant に対する有効な provisioning token を持つ
    main_success:
      - SCIM client が filter、startIndex、count を指定して /Users と /Groups を GET する
      - 各応答は filter 適用後の totalResults、ページ分の Resources、itemsPerPage を持つ
        SCIM ListResponse を返す
    extensions:
      - at: 1
        condition: filter が許可属性・演算子外、または構文エラー
        steps:
          - invalidFilter の SCIM protocol error で拒否される
      - at: 1
        condition: startIndex または count が整数として解釈できない、あるいは count が負値
        steps:
          - invalidValue の SCIM protocol error で拒否される
      - at: 1
        condition: provisioning token の tenant が要求 tenant と一致しない
        steps:
          - SCIM protocol error で拒否される
  外部IDPからのSCIMユーザー同期ライフサイクル:
    actor: ScimBearerClient
    given:
      - "有効な SCIM アクセストークンが発行されている"
    main_success:
      - "SCIMクライアントが CreateScimUser を呼び出す"
      - "内部 User が作成され status が Active になる"
      - "SCIMクライアントが PatchScimUser で active=false を指定する"
      - "内部 User が Disabled になる"
      - "SCIMクライアントが DeleteScimUser を呼び出す"
      - "内部 User が PendingDeletion に遷移する"
    extensions:
      - at: 1
        condition: Bearer token が失効済み、期限切れ、または別 tenant の token である
        steps:
          - SCIM protocol error を返し User を作成しない
      - at: 3
        condition: PATCH body が RFC 7644 の operation 契約を満たさない
        steps:
          - invalidValue の ScimProtocolError を返し User を変更しない
      - at: 5
        condition: 指定 ID が存在しない
        steps:
          - 404 の ScimProtocolError を返す
  外部IDPはSCIM resourceをPUTで完全に置換できる:
    actor: ScimBearerClient
    given:
      - "有効な SCIM アクセストークンが発行されている"
      - "対象 User が存在し、name.givenName と active=false を持つ"
    main_success:
      - "SCIMクライアントが UpdateScimUser を、userName のみを含む body で呼び出す"
      - "name.givenName は空文字にリセットされ、active は true にリセットされる"
      - "応答は id、meta.resourceType、meta.created、meta.lastModified、
        meta.location を含む"
    extensions:
      - at: 1
        condition: PUT body に必須属性 (User の userName、Group の displayName)
          が欠落している
        steps:
          - invalidValue の ScimProtocolError を返し resource を変更しない
      - at: 1
        condition: PUT body の id が既存の id と異なる値を含む
        steps:
          - id は無視され既存の server-assigned id が維持される
  外部IDPは対応外のPATCH pathやreadOnly属性への書込みを拒否される:
    actor: ScimBearerClient
    given:
      - "有効な SCIM アクセストークンが発行されている"
      - "対象 User または Group が存在する"
    main_success:
      - "SCIMクライアントが RFC7644-PATCH の対応 path (User: userName / name /
        active / emails、Group: displayName / members) に replace operation を
        PatchScimUser または PatchScimGroup で送る"
      - "対象属性だけが更新され、他の属性は変化しない"
    extensions:
      - at: 1
        condition: path が対応 attribute allowlist の外、または存在しない属性
        steps:
          - invalidPath の ScimProtocolError を返し resource を変更しない
      - at: 1
        condition: path が id、meta、schemas のいずれか (readOnly)
        steps:
          - mutability の ScimProtocolError を返し resource を変更しない
      - at: 1
        condition: op が add / replace / remove のいずれでもない
        steps:
          - invalidValue の ScimProtocolError を返し resource を変更しない
  外部IDPからのSCIMグループおよびメンバーシップ同期:
    actor: ScimBearerClient
    given:
      - "有効な SCIM アクセストークンが発行されている"
    main_success:
      - "SCIMクライアントが CreateScimGroup を呼び出す"
      - "グループが作成される"
      - "SCIMクライアントが PatchScimGroup でメンバー追加を指定する"
      - "GroupMembership が同期され User の有効ロールが更新される"
    extensions:
      - at: 3
        condition: 追加対象 User が別 tenant に属する
        steps:
          - ScimProtocolError を返し membership を作成しない
