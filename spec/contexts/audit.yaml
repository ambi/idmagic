# idmagic Audit — SCL
# Split from OAuth2 (wi-146): audit events are a cross-context security read
# model, not an OAuth2-owned concept.
# Migrated to SCL 3.0 by wi-209 (ADR-103).

system: idmagic
spec_version: "3.0"
context: Audit
glossary:
  AuditEventSearchRegistry:
    definition: 監査イベント検索で許可される検索軸 (AuditEventSearchAttribute) の allowlist。field/operator/transform を宣言し、任意 SQL / JSONPath ではなく閉じた検索文法を定める。Go 側の AuditSearchRegistry map が単一の正。
    aliases:
      - search-attribute-registry
      - 検索属性 registry
    not_to_confuse_with:
      - term: AuditEventFilterExpression
        reason: registry は許可される検索軸の定義集合、filter expression は 1 回の検索で指定される具体的な field/operator/value。
  AuditEventFilterExpression:
    definition: AuditEventQuery.filter の 1 項。registry allowlist の field と operator、値の並びからなる連言 (AND) の 1 要素。PII 属性は平文入力をサーバ側で transform してから照合する。
    aliases:
      - filter-expression
      - フィルタ式
  AuditActorVsTarget:
    definition: "監査イベントのユーザー相関には actor (操作者) と target (対象ユーザー) の 2 つの独立した軸がある。\nactor は操作を行った当人 (payload の userId 相当。認証・OAuth2 フロー・自身の操作はすべて actor)。\ntarget は操作の対象になった別ユーザー (payload の targetUserId 相当。例: 管理者が UserCreated /\nUserDisabled / GroupMemberAdded を実行した際の対象ユーザー)。AuditEventQuery.user_id / username\n(検索時に user_id へ解決) と filter の actor.id は同じ actor 概念の別表現であり、filter の target.id とは\n別概念である。実在しないアカウント名も追跡する認証失敗イベントだけは、別の平文検索属性\nactor.username で扱う。UI 語彙では actor 系を「ユーザー ID (操作者)」「ユーザー名 (操作者)」\n「ログイン試行のユーザー名」、target 系を「対象ユーザー」と表記して区別する。\n"
    aliases:
      - actor-vs-target
      - 操作者と対象ユーザー
  ResolvableUserEventPayloadPolicy:
    definition: "実アカウントが常に確定するイベント (UserAuthenticated、ConsentGranted、\nAuthorizationCodeIssued、AuthorizationCodeRedeemed、AccessTokenIssued、RefreshTokenIssued 等) は\npayload に username (平文・hash とも) を持たない。この制約はイベントを発行する各 context\n自身の event model が username 相当の field を持たないことで構造的に保証される\n(例: Authentication.UserAuthenticated の payload は userId のみを持つ)。管理 UI がユーザー名で\n検索したい場合は AuditEventQuery.username が検索時に UserRepo で user_id へ解決し、既存の\nuser_id 経路で絞り込む。実在しないアカウント名も追跡する必要がある認証失敗イベントだけが、\n例外として actor.username 検索属性に平文 username を持つ。\n"
    aliases:
      - resolvable-user-event-payload-policy
  TenantAdministrator:
    definition: 所属テナントまたは (system_admin の場合) 全テナント横断で監査イベントを読み出す権限を持つ管理者。
models:
  User:
    kind: entity
    description: IdentityManagement が publish する identity principal を、認可判断に必要な属性だけで表す published language stub。
    identity: id
    fields:
      id:
        type: String
      tenant_id:
        type: String
      status:
        type: String
      roles:
        type: "String[]"
  InvalidRequestError:
    kind: error
    description: リクエストに必須パラメータの欠落・不正値・重複等がある (RFC 6749 §5.2 invalid_request)。OAuth2 context が定義する共通 error の published language stub。
    payload:
      reason:
        type: String
        optional: true
  AccessDeniedError:
    kind: error
    description: 認証済みだが認可条件を満たさない、またはサーバーポリシーが許可しなかった。OAuth2 context が定義する共通 error の published language stub。
  AuditEventQuery:
    kind: value_object
    description: "ListAdminAuditEvents のクエリパラメータ。tenant_id は context から付与されるため\nフィールドには含めない。type は SCL events セクションの型名。\n"
    fields:
      type:
        type: String
        optional: true
        description: "type 完全一致フィルタ (機械向け低レベル)。例: AccessTokenIssued"
      category:
        type: String
        optional: true
        description: イベントカテゴリ絞り込み。authentication / success / fail / aggregated / user / group / client / consent / token / tenant / key。
      user_id:
        type: String
        optional: true
        description: "操作者 (actor) の user sub による完全一致フィルタ。filter の actor.id と同じ対象を指す\n(AuditActorVsTarget 参照)。管理操作の対象ユーザーを絞り込みたい場合は filter の target.id を使う\n(本フィールドとは別概念)。UI 上のラベルは「ユーザー ID (操作者)」。\n"
      username:
        type: String
        optional: true
        description: "操作者 (actor) のログイン名による検索。実アカウントが常に確定するイベント\n(UserAuthenticated、OAuth2 フロー系イベント等) は payload に username を持たないため、\n検索時に UserRepo で user_id へ解決してから user_id と同じ経路で絞り込む。該当ユーザーが\n存在しない場合は 0 件を返す (フィルタ無視で全件返すフォールバックはしない)。実在しないアカウント\n名も追跡する必要がある認証失敗イベントの検索には使えない (filter の actor.username を使う)。\n"
      after:
        type: DateTime
        optional: true
        description: occurred_at がこの時刻以降。
      before:
        type: DateTime
        optional: true
        description: occurred_at がこの時刻以前。
      limit:
        type: Integer
        optional: true
        description: "返却件数の上限 (default 100, max 1000)。"
      q:
        type: String
        optional: true
        description: "raw 保存された text 列 (type / outcome 等) への部分一致フリーテキスト。PII 列は対象外。"
      filter:
        type: "AuditEventFilterExpression[]"
        optional: true
        description: "registry allowlist の field/operator による構造化検索式の連言 (AND)。actor.username は\n実在しないアカウント名も追跡する必要がある認証失敗イベント専用の平文一致検索で、hash 化はしない。\n実アカウントが確定するイベントの検索には username query param を使う (本フィールドとは別経路)。\nclient.ip も平文一致で照合する (truncate/hash はしない)。event.type は SCL events セクションの型名\n(owns_events) の allowlist、outcome は Go 側 eventOutcome 分類の enum (success / failure) から選ぶ\n選択式の値であり、自由入力ではない (AuditActorVsTarget / AuditSearchRegistry 参照)。actor.id /\nactor.username は操作者、target.id は管理操作の対象ユーザーを指し、意味が異なる。workflow.id /\nworkflow_run.id / workflow_step.id は IdentityManagement.LifecycleWorkflow* / WorkflowRun* /\nWorkflowStepFailed イベントの workflowId/runId/stepIndex から eq 一致で検索できる registry 属性で、\nattribute value や email 本文は payload に含まないため検索対象にもならない。"
  AuditEventFilterOperator:
    kind: enum
    description: "監査イベント検索 filter 式で使える比較演算子。registry の属性ごとに許可 operator が宣言される。eq は完全一致、in は値集合のいずれか一致、contains は部分一致 (q 用)、time_range は occurred_at の期間指定。"
    values:
      - eq
      - in
      - contains
      - time_range
  AuditEventSearchTransform:
    kind: enum
    description: "検索属性を sidecar に保存 / 検索する前に平文値へ適用する変換。現状は\nnone (raw 保存) のみ存在する。\n"
    values:
      - none
  AuditEventSearchAttribute:
    kind: value_object
    description: "監査イベント検索で許可される検索軸 (registry エントリ)。field/operator の allowlist を宣言し、\n任意 SQL / JSONPath ではなく閉じた検索文法を定める。Go 側の AuditSearchRegistry がこの value_object の twin。\nactor.username / client.ip を含む全属性が平文のまま sidecar に保存・検索される。actor.id /\nactor.username は操作者 (誰が行ったか)、target.id は管理操作の対象ユーザー (誰に対して行ったか) を指し、\n同じ「ユーザー」でも意味が異なる (AuditActorVsTarget)。event.type / outcome は値が自由入力ではなく\nallowlist / enum 由来の選択式として扱う: event.type は SCL events の型名 (owns_events)、outcome は\nGo 側 eventOutcome() が返す success / failure の 2 値 (該当しないイベントでは値なし)。\n"
    fields:
      field:
        type: String
        description: "検索軸の正準ドット名。例: actor.username / client.ip / event.type。"
      raw_storable:
        type: Boolean
        description: "平文をそのまま sidecar に保存してよいか。現状は全属性で true。"
      transform:
        type: AuditEventSearchTransform
        description: 保存 / 検索前に平文値へ適用する変換 (現状は none のみ)。
      allowed_operators:
        type: "AuditEventFilterOperator[]"
        description: この属性に許可される operator の allowlist。
      ui_visible:
        type: Boolean
        description: admin 検索ビルダーの UI プリセットに出すか。
  AuditEventFilterExpression:
    kind: value_object
    description: "AuditEventQuery.filter の 1 項。registry allowlist の field と operator、値の並びからなる連言 (AND) の 1 要素。\n任意 SQL は許さない。\n"
    fields:
      field:
        type: String
        description: registry の AuditEventSearchAttribute.field。
      operator:
        type: AuditEventFilterOperator
        description: 属性の allowed_operators に含まれる operator。
      values:
        type: "String[]"
        description: "operator に応じた値の並び (eq=1 / in=N / time_range=2)。PII 属性は平文入力をサーバ側で transform してから照合する。"
  AdminAuditEventResponse:
    kind: value_object
    description: "管理者向けに公開する DomainEvent。payload は構造化 JSON。\n返却時に PII フィールド (email / IP 等) は EventSink 側で redact 済み前提。\nappend_only で 7 年保持する (GDPR Art. 30、ADR-107)。\n"
    fields:
      id:
        type: String
        description: ストア側で割り当てたイベント ID (UUIDv4)。
      tenant_id:
        type: String
        description: イベントが帰属するテナント ID。
      type:
        type: String
        description: DomainEvent.type ワイヤ名。
      occurred_at:
        type: DateTime
      payload:
        type: JSON
        description: イベント本体 (SCL events セクションの payload 形状)。
  AdminAuditEventListResponse:
    kind: value_object
    description: 監査イベントの検索結果。
    fields:
      events:
        type: "AdminAuditEventResponse[]"
      next_after:
        type: DateTime
        optional: true
        description: ページング継続用カーソル。
  AuditEventSearchOptionsResponse:
    kind: value_object
    description: "event.type / outcome を選択式にするための選択肢一覧。UI がハードコードせず、\nGo 側の単一の正 (category → type マップ / eventOutcome 分類) から機械的に取得する。\n"
    fields:
      event_types:
        type: "String[]"
        description: "選択可能な event.type の値一覧 (SCL events の型名)。カテゴリ分類済みの type 群の和集合で、\nadmin UI のイベントカテゴリ選択肢と同じ母集合。"
      outcomes:
        type: "String[]"
        description: "選択可能な outcome の値一覧。現時点では success / failure の 2 値 (認証系イベントのみ分類対象)。"
interfaces:
  ListAdminAuditEvents:
    description: "管理者が所属テナントの監査用 DomainEvent を時系列降順で取得する。SOC / コンプライアンス\n用途を想定し、ページング (after / before / limit) と type / user_id / username (操作者) による\n絞り込みを提供する。認証イベント (ログイン成功 / 失敗 / MFA / セッション / 集約) も同一ストアに属し、\ncategory (authentication / success / fail / aggregated / user / group / client / consent / token /\ntenant / key) で絞り込んでセキュリティ調査や運用調査に使える。さらに q (raw text 部分一致) と\nfilter (registry allowlist の field/operator による構造化式) で汎用検索できる。filter の field は\nAuditEventSearchAttribute registry で許可されたもののみで、任意 SQL / JSONPath は受け付けない。\nuser_id と filter の actor.id は操作者を指し、username は操作者のログイン名を検索時に user_id へ\n解決する (hash 化せず、該当ユーザーが無ければ 0 件)。filter の actor.username は実在しない\nアカウント名も追跡する認証失敗イベント専用の平文一致検索。filter の target.id は管理操作の対象\nユーザーを指す別概念 (AuditActorVsTarget)。system_admin であれば default tenant 経路から全テナント\n横断、admin は所属テナント内に閉じる (クエリが tenant_id 入力を取らないため所属テナントに構造的に\n閉じ、system_admin だけが専用経路から横断できる)。\n"
    input:
      query:
        type: AuditEventQuery
    output:
      response:
        type: AdminAuditEventListResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: AuditEventLog
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: /api/admin/audit_events
  ExportAdminAuditEvents:
    description: "管理者が監査イベント (認証イベントを含む) を期間 / フィルタ指定でエクスポートする。\nSIEM への streaming は別 WI で、本 interface は 1 回分のダウンロードを返すのみ。\nフィルタは ListAdminAuditEvents と同じ AuditEventQuery (q / filter / category / type / 期間)。\nfilter の field は registry allowlist のみ。\n"
    input:
      query:
        type: AuditEventQuery
    output:
      response:
        type: AdminAuditEventListResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: AuditEventLog
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: /api/admin/audit_events/export
  GetAdminAuditEventSearchOptions:
    description: "管理者が監査イベント検索フォームの event.type / outcome を選択式にするための選択肢一覧を取得する。\n値は AuditSearchRegistry / auditEventCategoryTypes と同じ Go 側の単一の正から導出し、UI 側で\nハードコードした allowlist との drift を防ぐ。\n"
    output:
      response:
        type: AuditEventSearchOptionsResponse
    errors:
      - AccessDeniedError
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: AuditEventLog
        id: context.tenant_id
    bindings:
      - kind: http
        method: GET
        path: /api/admin/audit_events/search_options
  GetAdminAuditEvent:
    description: 管理者が監査イベント 1 件を ID で取得する。別テナントのイベントは未存在として扱う。
    input:
      id:
        type: String
    output:
      event:
        type: AdminAuditEventResponse
    errors:
      - InvalidRequestError
      - AccessDeniedError
    ensures:
      - output.event.tenant_id == context.tenant_id
    read_only: true
    access:
      policies: [TenantAdministrator]
      resource:
        type: AdminAuditEventResponse
        id: input.id
    bindings:
      - kind: http
        method: GET
        path: "/api/admin/audit_events/{id}"
authorization:
  resources:
    AuditEventLog:
      description: テナント境界内の監査イベント一覧・エクスポート対象を表す singleton resource。
  principals:
    TenantAdministrator:
      type: User
      matches:
        - context.authenticated
        - principal.status == "Active"
        - '"admin" in principal.roles || "system_admin" in principal.roles'
  policies:
    TenantAdministrator:
      effect: permit
      principal: TenantAdministrator
scenarios:
  管理者は監査ログを期間で絞り込み参照・エクスポートできる:
    actor: TenantAdministrator
    given:
      - "roles=[\"admin\"] のユーザー \"operator\" が管理画面の監査ログを開いている"
    main_success:
      - "管理者 \"operator\" が直近 24 時間で監査イベントを絞り込む"
      - 一覧に所属テナントの監査イベントだけが表示される
      - "管理者 \"operator\" が絞り込み結果をエクスポートする"
  workerプロセスが発行した業務イベントも管理者は監査ログで参照できる:
    actor: TenantAdministrator
    given:
      - CSV インポートの apply が worker プロセスで実行される
    main_success:
      - worker プロセスが CSV インポートの apply を実行し UserCreated を発行する
      - 管理者が ListAdminAuditEvents で type=UserCreated を検索する
      - 発行元プロセス (idmagic-api / idmagic-worker) に関わらずイベントが監査ログに含まれる
  管理者はworkflow_idとrun_idでLifecycleWorkflowの監査イベントを検索できる:
    actor: TenantAdministrator
    given:
      - "LifecycleWorkflow \"leaver-offboarding\" の WorkflowRun \"run-1\" が1つの step で失敗した"
    main_success:
      - "\"LifecycleWorkflowRunPartiallyFailed\" と \"LifecycleWorkflowStepFailed\" が発行される"
      - "管理者が filter に workflow_run.id=\"run-1\" を指定して監査ログを検索する"
      - "\"run-1\" に紐づくイベントだけが返り、attribute value や email 本文は含まれない"
flows:
  AdminAuditEvents:
    entry: AdminAuditEvents
    views:
      AdminAuditEvents:
        sees: 監査イベント一覧画面(時系列降順の DomainEvent、種別/操作者/期間の絞り込み、テキスト検索)
        does:
          - action: list
            does: 絞り込み条件を指定して一覧を検索する
            interface: ListAdminAuditEvents
            to: AdminAuditEvents
          - action: view
            does: 一覧からイベントを1件クリックして詳細を表示する
            interface: GetAdminAuditEvent
            to: AdminAuditEvents
          - action: export
            does: 絞り込み条件を指定してエクスポートボタンをクリックする
            interface: ExportAdminAuditEvents
            to: AdminAuditEvents
