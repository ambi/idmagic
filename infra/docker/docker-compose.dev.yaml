services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: idmagic
      POSTGRES_USER: idmagic
      POSTGRES_PASSWORD: idmagic
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idmagic"]
      interval: 2s
      timeout: 2s
      retries: 20
    ports: ["5432:5432"]

  schema:
    image: sqldef/psqldef:3.11
    environment:
      PGPASSWORD: idmagic
    volumes:
      - ../schema:/schema:ro
    command: ["-U", "idmagic", "-h", "postgres", "-p", "5432", "idmagic", "--apply", "--file", "/schema/postgres.sql"]
    depends_on:
      postgres: { condition: service_healthy }

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20
    ports: ["6379:6379"]

  kafka:
    image: redpandadata/redpanda:v24.3.18
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=kafka:9092
    ports: ["9092:9092"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports: ["4318:4318"]

  # MetricsExposition の /metrics を pull-scrape する最小例。recording/alert
  # rule と dashboard は wi-11 (Kubernetes/monitoring 資産) が所有する。
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules.yml:/etc/prometheus/rules.yml:ro
    ports: ["9090:9090"]
    depends_on:
      idp: { condition: service_started }

  idp:
    image: idmagic:dev
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    environment:
      ADDR: :8081
      ISSUER: http://localhost:8080
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_RP_ORIGINS: http://localhost:8080
      WEBAUTHN_RP_DISPLAY_NAME: IdMagic Local
      PERSISTENCE: postgres_valkey
      DATABASE_URL: postgres://idmagic:idmagic@postgres:5432/idmagic?sslmode=disable
      VALKEY_URL: valkey://valkey:6379/0
      EVENT_SINK: outbox
      OBSERVABILITY: otel
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      SCL_PATH: /app/spec/scl.yaml
    depends_on:
      postgres: { condition: service_healthy }
      schema: { condition: service_completed_successfully }
      valkey: { condition: service_healthy }
      otel-collector: { condition: service_started }

  frontend:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      BACKEND_ADDRESS: http://idp:8081
    depends_on:
      idp: { condition: service_started }
    ports: ["8080:8080"]

  event-relay:
    image: idmagic:dev
    entrypoint: ["/app/idmagic-relay"]
    environment:
      DATABASE_URL: postgres://idmagic:idmagic@postgres:5432/idmagic?sslmode=disable
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres: { condition: service_healthy }
      schema: { condition: service_completed_successfully }
      kafka: { condition: service_started }

  worker:
    image: idmagic:dev
    entrypoint: ["/app/idmagic-worker"]
    environment:
      PERSISTENCE: postgres_valkey
      DATABASE_URL: postgres://idmagic:idmagic@postgres:5432/idmagic?sslmode=disable
      VALKEY_URL: valkey://valkey:6379/0
      EVENT_SINK: outbox
      OBSERVABILITY: otel
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: idmagic-worker
    depends_on:
      postgres: { condition: service_healthy }
      schema: { condition: service_completed_successfully }
      valkey: { condition: service_healthy }
      otel-collector: { condition: service_started }
