# Minimal scrape example for the MetricsExposition interface (system.yaml).
# wi-11 (Kubernetes/monitoring assets) owns the production ServiceMonitor,
# recording rules, alert rules, and dashboards built on top of this catalog.
global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: idmagic-api
    metrics_path: /metrics
    static_configs:
      - targets: ["idp:8081"]
