apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: idmagic-api
  labels:
    app.kubernetes.io/name: idmagic
    app.kubernetes.io/part-of: idmagic
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: idmagic
      app.kubernetes.io/component: api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
