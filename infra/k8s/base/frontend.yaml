apiVersion: apps/v1
kind: Deployment
metadata:
  name: idmagic-frontend
  labels:
    app.kubernetes.io/name: idmagic
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: idmagic
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: idmagic
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: idmagic
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: idmagic
    spec:
      serviceAccountName: idmagic
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: frontend
          image: ghcr.io/ambi/idmagic-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef: { name: idmagic-runtime }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: caddy-data, mountPath: /data }
            - { name: caddy-config, mountPath: /config }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
      volumes:
        - name: caddy-data
          emptyDir: {}
        - name: caddy-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: idmagic-frontend
  labels:
    app.kubernetes.io/name: idmagic
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: idmagic
spec:
  selector:
    app.kubernetes.io/name: idmagic
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 8080
      targetPort: http
