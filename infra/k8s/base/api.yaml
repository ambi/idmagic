apiVersion: apps/v1
kind: Deployment
metadata:
  name: idmagic-api
  labels:
    app.kubernetes.io/name: idmagic
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: idmagic
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: idmagic
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: idmagic
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: idmagic
    spec:
      serviceAccountName: idmagic
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: ghcr.io/ambi/idmagic:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef: { name: idmagic-runtime }
            - secretRef: { name: idmagic-runtime-secrets }
          startupProbe:
            httpGet: { path: /startupz, port: http }
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet: { path: /livez, port: http }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: "1", memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: idmagic-api
  labels:
    app.kubernetes.io/name: idmagic
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: idmagic
spec:
  selector:
    app.kubernetes.io/name: idmagic
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: http
