apiVersion: apps/v1
kind: Deployment
metadata: { name: idmagic-api }
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          envFrom:
            - configMapRef: { name: idmagic-runtime }
            - secretRef: { name: idmagic-dev-runtime-secrets }
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: "1", memory: 512Mi }
