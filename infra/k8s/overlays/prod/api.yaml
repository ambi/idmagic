apiVersion: apps/v1
kind: Deployment
metadata: { name: idmagic-api }
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: api
          envFrom:
            - configMapRef: { name: idmagic-runtime }
            - secretRef: { name: idmagic-prod-runtime-secrets }
          resources:
            requests: { cpu: "1", memory: 1Gi }
            limits: { cpu: "2", memory: 2Gi }
