    schema: "infra/schema/postgres.sql"
    queries: "backend/application/db_postgres"
    gen:
      go:
        package: "db_postgres"
        out: "backend/application/db_postgres"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: false
        emit_result_struct_pointers: true
        overrides:
          - db_type: "uuid"
            go_type: "string"
          - db_type: "timestamptz"
