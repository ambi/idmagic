id: idp-wi-87-self-service-user-registration
title: セルフサービスのユーザ登録 (self-service sign-up) を導入する
created_at: 2026-07-03
authors: [tn]
status: pending

motivation: |
  現状ユーザは管理者の CreateAdminUser でしか作成できず、エンドユーザ自身が
  アカウントを新規登録する導線が無い。一方、代表的な IdP はいずれも
  self-service registration を標準機能として持つ:

  - Keycloak: realm の "User registration" スイッチと registration ページ。
  - Okta / Entra External ID (旧 Azure AD B2C): self-service sign-up flow。
  - OneLogin: self-registration policy。

  顧客向け (B2C / B2B) IdP として使うには、テナントが許可した場合に限り
  エンドユーザが自分でサインアップし、email 検証を経て利用開始できる導線が要る。
  本 WI は password ベースの最小 sign-up (email + password + 表示名) を、
  テナント設定でゲートされた public フローとして追加する。ソーシャル / 外部 IdP
  経由の JIT 登録は [[wi-30-inbound-federation-and-identity-broker]] の範囲とする。

scope:
  decision:
    - >-
      新規 ADR: self-registration をテナント設定 (allow_self_registration、既定 off)
      でゲートする。email 検証必須 (ADR-030 の one-time token 方針を踏襲)、
      tenant 内 email 一意、登録直後は未検証 = login 不可 (fail-closed)、
      account enumeration を避ける応答方針を記録する。
  scl:
    - >-
      §3.3 interfaces: RegisterUser (public / unauthenticated / tenant-scoped) と、
      browser フロー用の登録トランザクション取得を追加する。
    - >-
      §3.2 models: RegistrationRequest (email / password / 表示名) を追加する。
    - §3.4 states/events: UserSelfRegistered イベントを追加する。
    - >-
      §3.5 invariants: tenant 内 email 一意、未検証ユーザは login 不可を明示する。
    - §3.7 permissions: RegisterUser は public、対象 tenant は解決済み tenant に固定。
    - >-
      tenancy: AdminSettings に allow_self_registration を追加し、
      UpdateAdminSettings で切り替え可能にする。
  go:
    - >-
      usecase RegisterUser を追加し、既存 email 検証トークンストア
      (EmailChangeTokenStore / password reset と同パターン) を再利用して
      VerifyEmail 相当の検証を経てから login 可能にする。
    - テナント設定が off の場合は構造的に 404/無効化する (fail-closed)。
  http:
    - >-
      POST /register (public, CSRF + same-origin 必須) と登録トランザクション
      context を追加する。bot 対策 / rate limit は
      [[wi-27-endpoint-rate-limit-and-bot-mitigation]] に委譲する。
  ui:
    - >-
      auth-flow に RegisterPage を追加し、LoginPage から導線を張る。送信後は
      「確認メールを送信しました」を表示し、検証リンクで利用開始できるようにする。
  documentation:
    - README に self-registration の有効化手順とテナント設定を追記する。

out_of_scope:
  - 外部 IdP / ソーシャル経由の JIT 登録 ([[wi-30-inbound-federation-and-identity-broker]])。
  - CAPTCHA / bot mitigation ([[wi-27-endpoint-rate-limit-and-bot-mitigation]])。
  - 招待ベースのオンボーディング (invite flow)。
  - progressive profiling / 多段の追加属性収集。

affected_guarantees:
  - >-
    tenant isolation: 登録は解決済み tenant に固定し、body/URL の tenant 指定を
    信用しない。email 一意は tenant スコープで判定する。
  - >-
    gated by policy: allow_self_registration が false のテナントでは登録できない
    (fail-closed、既定 off)。
  - >-
    no account enumeration: 既存 email でも新規でも同一応答を返し、存在有無を
    漏らさない。
  - >-
    email verification required: 検証完了までユーザは login できない。検証トークンは
    hash 保存・単発消費・期限付き (ADR-030 と整合)。

verification:
  - cmd: 'go test ./...'
    in: idmagic
  - cmd: 'golangci-lint run ./...'
    in: idmagic
  - cmd: 'go build ./...'
    in: idmagic
  - cmd: 'bun --cwd idmagic/ui typecheck'
  - cmd: 'bun --cwd idmagic/ui lint'
  - cmd: 'bun --cwd idmagic/ui build'
  - >-
    手動: テナント設定で登録を有効化 → RegisterPage で email/password 登録 →
    確認メールのリンクで検証 → login 成立。設定を無効化すると登録導線が塞がる
    ことを確認する。
  - >-
    手動: 既存 email で登録しても「存在する」ことが応答から判別できないことを
    確認する。

risk: medium
risk_notes: |
  public な書き込みエンドポイントを増やすため、account enumeration / spam 登録 /
  未検証ユーザの滞留が主なリスク。enumeration は応答統一で、spam は rate limit
  (wi-27) への委譲と検証必須で緩和する。既定 off とし、明示的に有効化した
  テナントだけが露出する設計にする。
