id: idp-wi-104-http-security-headers
title: ログイン・同意・ポータルへ CSP / HSTS / frame-ancestors 等のセキュリティヘッダを一元適用する
created_at: 2026-07-04
authors: [tn]
status: pending

motivation: |
  現状 Go 側にセキュリティレスポンスヘッダ（Content-Security-Policy、
  Strict-Transport-Security、X-Frame-Options / frame-ancestors、
  Referrer-Policy、X-Content-Type-Options 等）を付与する middleware が見当たらない。
  IdP のログイン・同意（consent）・アカウントポータルは資格情報と認可判断を
  扱う最も攻撃価値の高い画面で、CSP 不在は XSS 経由の資格情報窃取、
  frame-ancestors 不在は consent/login のクリックジャッキング（同意の乗っ取り）に
  直結する。これは本番 IdP では譲れない基本防御である。

  Keycloak はログインテーマに既定で frame-options / CSP / HSTS 等を出し、
  OWASP ASVS もこれらを要求する。idmagic も UI が別プロセスでも gateway で
  同一オリジンに統合される構成（ARCHITECTURE.md）なので、認証系レスポンスに
  一元的にヘッダを適用し、CSP は nonce ベースで UI ビルドと整合させるべきである。

scope:
  decision:
    - >-
      新規 ADR: 適用するヘッダ集合と各値、CSP の方式（nonce か hash か）、
      IdP 画面は frame-ancestors 'none'（クリックジャッキング防止）とする方針、
      OAuth/OIDC のリダイレクト・POST バインディング（SAML ACS 等）と矛盾しない範囲を定義する。
  scl:
    - System context に SecurityResponseHeaders / FrameAncestorsPolicy の objective を追加する。
  go:
    - >-
      セキュリティヘッダ middleware を追加し、認証系・ポータル・consent レスポンスへ一元適用する。
      HSTS は TLS 終端前提を明示し、開発（http）では抑制できるようにする。
    - >-
      CSP を nonce ベースにし、per-request nonce を UI へ受け渡す。unsafe-inline に依存しない。
      SAML/WS-Fed の自動 POST フォーム等インライン script が要る箇所は nonce/hash で許可する。
    - report-only モードと report 収集の切替を用意し、段階導入できるようにする。
  ui:
    - Bun ビルドの生成物が nonce ベース CSP と両立するよう、インライン script/style の扱いを整える。
    - CSP 違反で画面が壊れないことを e2e で担保する。
  documentation:
    - README に TLS 終端・HSTS・CSP report エンドポイントの設定を書く。

out_of_scope:
  - WAF / CDN 側のヘッダ注入。
  - Subresource Integrity（SRI）による外部 CDN 資産の固定（外部資産を持たない前提）。
  - CORS ポリシーの再設計（必要なら別 WI）。

affected_guarantees:
  - security: login/consent/portal が XSS・クリックジャッキングに対する基本ヘッダ防御を持つ。
  - correctness: CSP が OAuth リダイレクト・SAML POST バインディング等の正規フローを壊さない。
  - operability: report-only で段階導入でき、違反を観測してから enforce へ移せる。

verification:
  - cmd: 'go test -race ./...'
    in: idmagic
  - cmd: 'bun run build'
    in: idmagic/ui
  - cmd: 'bun run typecheck'
    in: idmagic/ui
  - >-
    手動: login / consent / account portal のレスポンスに CSP・HSTS・frame-ancestors 'none' が
    付き、iframe 埋め込みが拒否されることを確認する。
  - "手動: authorization_code フローと SAML POST バインディングが CSP enforce 下で通ることを確認する。"

risk: medium
risk_notes: |
  厳格な CSP はインライン script/style を壊しやすく、特に SAML/WS-Fed の自動 POST や
  UI ビルド生成物で事故りやすい。report-only で違反を洗い出してから enforce に切り替え、
  正規プロトコルフローの回帰を e2e で先に固定する。
