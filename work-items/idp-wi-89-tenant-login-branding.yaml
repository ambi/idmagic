id: idp-wi-89-tenant-login-branding
title: テナント単位のログイン / アカウント画面ブランディングを導入する
created_at: 2026-07-03
authors: [tn]
status: pending

motivation: |
  idmagic は login / consent / account portal を共通の無地デザインで配信して
  おり、テナントが自社ブランドで hosted UI を出せない。代表的な IdP はいずれも
  hosted login のブランディングを標準機能として持つ:

  - Okta: Brands / custom sign-in ページ (ロゴ・色・favicon)。
  - Entra ID: Company branding (背景・ロゴ・テキスト)。
  - Keycloak: realm themes。
  - OneLogin: custom branding。

  マルチテナント IdP のデモとして、テナントが自身の hosted 画面にロゴ・製品名・
  ブランドカラー・サポート / 法務リンクを反映できることは、非常によく求められる。
  本 WI は安全な範囲 (画像 + 限定トークン + テキスト / リンク) の per-tenant
  branding を追加する。任意 CSS / HTML 差し込みは injection 面が大きいため範囲外。

scope:
  decision:
    - >-
      新規 ADR: branding の格納形式。sparse な tenant 設定に載せるか、専用
      TenantBranding aggregate を切るかを決める。ロゴ画像は
      [[wi-74-application-icon-image-upload]] の画像取り扱いに倣う。色は自由 CSS
      でなく限定トークン (CSS custom properties)、テキスト / リンクは escape /
      allowlist して injection を構造的に排除する方針を記録する。
  scl:
    - >-
      §3.2 models: TenantBranding (製品名 / ロゴ参照 / ブランドカラー / サポート
      URL / 法務リンク / フッターテキスト) を追加する。
    - >-
      §3.3 interfaces: GetTenantBranding (public / 解決済み tenant) /
      UpdateTenantBranding (admin) / UploadTenantLogo / GetTenantLogo を追加する。
    - §3.4 states/events: TenantBrandingUpdated を追加する。
    - >-
      §3.7 permissions: 参照は public (presentational のみ)、更新は tenant admin に
      固定する。
  go:
    - >-
      branding repository (memory + postgres + migration) と、ロゴ asset ストア
      (icon storage 再利用) を追加する。public 解決 endpoint を用意する。
  http:
    - >-
      GET /api/branding (public, 解決済み tenant) / PUT /api/admin/tenant/branding
      (admin) / ロゴ upload・取得を追加する。
  ui:
    - >-
      login / consent / device / account portal がブランディングを消費する
      (ロゴ・製品名・CSS custom properties での配色・サポート / 法務リンク)。
      AdminSettingsPage を拡張するか AdminBrandingPage を追加して編集可能にする。
  documentation:
    - README にブランディング設定項目と安全上の制約を追記する。

out_of_scope:
  - custom domain / vanity URL (インフラ範囲)。
  - 任意の custom CSS / HTML 差し込み (injection 面が大きい)。
  - アプリケーション単位のブランディング。
  - email テンプレートのブランディング (別途検討)。
  - i18n / 多言語ブランディング文言。

affected_guarantees:
  - >-
    no injection: 色は限定トークン、テキストは escape、リンクは scheme allowlist
    (https のみ等) で検証し、任意 markup / script を注入させない。
  - tenant isolation: branding は解決済み tenant に紐づけ、cross-tenant で混ざらない。
  - >-
    minimal public exposure: public な branding 参照は presentational な非機微
    情報のみを返す。
  - asset safety: ロゴ画像は content-type / サイズを検証する (icon upload と同方針)。

verification:
  - cmd: 'go test ./...'
    in: idmagic
  - cmd: 'golangci-lint run ./...'
    in: idmagic
  - cmd: 'go build ./...'
    in: idmagic
  - cmd: 'bun --cwd idmagic/ui typecheck'
  - cmd: 'bun --cwd idmagic/ui lint'
  - cmd: 'bun --cwd idmagic/ui build'
  - >-
    手動: admin でロゴ / 製品名 / 配色 / サポートリンクを設定 → login /
    account portal に反映されることを確認する。悪意ある値 (script / 非 https
    リンク) が拒否 / 無害化されることを確認する。

risk: medium
risk_notes: |
  hosted UI にテナント入力を反映するため XSS / open redirect / SSRF (外部画像) が
  主なリスク。自由 CSS / HTML を排し、色トークン・escape・リンク allowlist・
  画像アップロード検証で面を小さく保つ。public 参照は presentational のみに絞る。
