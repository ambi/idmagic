# scl-to-jsonschema — Specification Core Language (SCL) Document

system: scl-to-jsonschema
spec_version: "3.0"

glossary:
  SclBundle:
    definition: root SCL 文書と参照される context 文書をまとめた入力。
  ModelDef:
    definition: 1 つの SCL model から導出される JSON Schema の $defs エントリ。
  GeneratedSchema:
    definition: bundle 内の全 model を $defs に集約した JSON Schema 2020-12 文書。
  UntranslatedConstraint:
    definition: JSON Schema へ意味を保ったまま変換できず、明示的 annotation に保持された CEL 制約。
  Maintainer:
    definition: SCL から model schema を生成する利用者。

models:
  GenerateRequest:
    kind: value_object
    fields:
      scl: { type: String, constraints: [non_empty] }
      out: { type: String, optional: true }
  GeneratedSchema:
    kind: value_object
    fields:
      schema_dialect: { type: String }
      id: { type: String }
      defs_count: { type: Integer, constraints: [{ minimum: 0 }] }
      untranslated_constraints: { type: List<String> }
    constraints:
      - defs_count >= 0

interfaces:
  GenerateModelSchemas:
    description: |
      SCL bundle の model を JSON Schema 2020-12 に変換する。field constraints と、
      単一 field と scalar literal の比較として表現できる model CEL は JSON Schema keyword に変換する。
      表現できない CEL は x-scl-untranslated-constraints annotation に原文のまま保持する。
    input:
      request: { type: GenerateRequest }
    output:
      schema: { type: GeneratedSchema }
    requires:
      - input.request.scl != ""
    ensures:
      - output.schema.schema_dialect == "https://json-schema.org/draft/2020-12/schema"
      - output.schema.defs_count >= 0
      - output.schema.untranslated_constraints.all(value, value != "")
      - every_model_becomes_one_definition(input.request, output.schema)
      - all_model_references_resolve(output.schema)
      - supported_constraints_are_enforced(input.request, output.schema)
      - unsupported_constraints_are_annotated(input.request, output.schema)
    access: public
    idempotent: true
    read_only: true
    bindings:
      - kind: cli
        command: scl-to-jsonschema
        flags:
          - { name: scl, required: true }
          - { name: out, required: false }
        exit_codes:
          success: 0
          usage_error: 2

objectives:
  GenerateLatency:
    description: 一般的な tool spec の model schema を対話的に生成できる。
    interface: GenerateModelSchemas
    indicator: measurement.latency_ms < 500
    target: 0.95
    window: 30d
    budgeting: occurrences

scenarios:
  enum モデルは string enum になる:
    actor: Maintainer
    main_success:
      - enum model を含む SCL を GenerateModelSchemas に渡す
      - 対応する ModelDef が string enum を持つ
  field constraint は JSON Schema keyword になる:
    actor: Maintainer
    main_success:
      - non_empty、minimum、maximum、pattern を持つ field を生成する
      - 対応する minLength、minimum、maximum、pattern が ModelDef に含まれる
  表現可能な model constraint は強制される:
    actor: Maintainer
    main_success:
      - age >= 18 という model constraint を生成する
      - 対応 field の minimum が 18 になる
  表現不能な model constraint は明示される:
    actor: Maintainer
    main_success:
      - start_at < end_at という複数 field の CEL constraint を生成する
      - 原文が x-scl-untranslated-constraints に保持される
  tool spec から dangling ref の無い schema が生成される:
    actor: Maintainer
    main_success:
      - tool の SCL を GenerateModelSchemas に渡す
      - 全参照が $defs の ModelDef に解決する
