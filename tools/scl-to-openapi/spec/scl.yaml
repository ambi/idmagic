# scl-to-openapi — Specification Core Language (SCL) Document

system: scl-to-openapi
spec_version: "3.0"

glossary:
  HttpBinding:
    definition: interface bindings のうち kind が http の契約。
  Operation:
    definition: OpenAPI の path と method で識別される操作。
  AuthorizationMetadata:
    definition: protected interface の policy と resource から決定的に導出する action group 表現。
  Maintainer:
    definition: SCL から OpenAPI を生成する利用者。

models:
  GenerateRequest:
    kind: value_object
    fields:
      scl: { type: String, constraints: [non_empty] }
      out: { type: String, optional: true }
  OpenApiDocument:
    kind: value_object
    fields:
      openapi: { type: String }
      title: { type: String }
      paths_count: { type: Integer, constraints: [{ minimum: 0 }] }
    constraints:
      - paths_count >= 0
  AuthorizationAction:
    kind: value_object
    fields:
      name: { type: String, constraints: [non_empty] }
      policies: { type: List<String>, constraints: [non_empty] }
      resource_type: { type: String, constraints: [non_empty] }
  AuthorizationActionGroup:
    kind: value_object
    fields:
      name: { type: String, constraints: [non_empty] }
      policies: { type: List<String>, constraints: [non_empty] }
      actions: { type: List<AuthorizationAction>, constraints: [non_empty] }

interfaces:
  BuildAuthorizationMetadata:
    description: |
      protected interface を policy 集合ごとに group 化し、interface 名を action 名、
      resource.type を appliesTo として安定 sort した中間表現を返す。
    input:
      interfaces: { type: "Map<String, JSON>" }
    output:
      groups: { type: List<AuthorizationActionGroup> }
    ensures:
      - output.groups.size() >= 0
    access: internal
    read_only: true
    idempotent: true
  GenerateOpenApi:
    description: |
      http binding を持つ interface を OpenAPI 3.1 Operation に変換する。public operation は
      security を空配列、protected operation は bearer security と x-scl-access を持つ。
      requires、ensures、resource、policy と AuthorizationMetadata を vendor extension に保持する。
    input:
      request: { type: GenerateRequest }
    output:
      document: { type: OpenApiDocument }
    requires:
      - input.request.scl != ""
    ensures:
      - output.document.openapi == "3.1.0"
      - output.document.paths_count >= 0
      - all_component_references_resolve(output.document)
      - every_http_binding_becomes_an_operation(input.request, output.document)
      - internal_interfaces_are_not_exposed(input.request, output.document)
      - access_and_contract_metadata_are_preserved(input.request, output.document)
    access: public
    idempotent: true
    read_only: true
    bindings:
      - kind: cli
        command: scl-to-openapi
        flags:
          - { name: scl, required: true }
          - { name: out, required: false }
        exit_codes:
          success: 0
          usage_error: 2

objectives:
  GenerateLatency:
    interface: GenerateOpenApi
    indicator: measurement.latency_ms < 500
    target: 0.95
    window: 30d
    budgeting: occurrences

scenarios:
  public interface は unauthenticated operation になる:
    actor: Maintainer
    main_success:
      - public access の HttpBinding を GenerateOpenApi に渡す
      - Operation の security は空配列になる
  protected interface は security metadata を保持する:
    actor: Maintainer
    main_success:
      - policy と resource を持つ protected HttpBinding を GenerateOpenApi に渡す
      - Operation は bearer security と x-scl-access を持つ
  interface contract は記述として保持される:
    actor: Maintainer
    main_success:
      - requires と ensures を持つ HttpBinding を GenerateOpenApi に渡す
      - Operation の x-scl-requires と x-scl-ensures に原文が保持される
  policy 集合から action group が決定的に生成される:
    actor: Maintainer
    main_success:
      - 複数の protected interface を BuildAuthorizationMetadata に渡す
      - policy 集合が同じ action は同一 group に安定順で含まれる
  tool spec から解決可能な OpenAPI が生成される:
    actor: Maintainer
    main_success:
      - tool の SCL を GenerateOpenApi に渡す
      - 全 $ref が components/schemas に解決する
