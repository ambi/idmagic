# scl-to-html — Specification Core Language (SCL) Document

system: scl-to-html
spec_version: "3.0"

glossary:
  SclDocument:
    definition: 入力となる SCL 3.0 YAML 文書。
  HtmlDocument:
    definition: 入力一式から決定的に派生する自己完結 HTML 文書。
  CrossReference:
    definition: SCL の意味参照から参照先 anchor へ移動できる link。
  DiagramView:
    definition: context map、state、authorization、flow から派生する SVG 図。
  Maintainer:
    definition: SCL と変更記録から HTML を生成する利用者。
  Reader:
    definition: 生成された HTML で仕様を読む利用者。

models:
  TabKind:
    kind: enum
    values: [overview, scl, architecture, decisions, work_items]
  SectionKind:
    kind: enum
    values:
      - standards
      - context_map
      - glossary
      - models
      - interfaces
      - states
      - authorization
      - objectives
      - scenarios
      - flows
  SclDocument:
    kind: value_object
    fields:
      system: { type: String, constraints: [non_empty] }
      spec_version: { type: String, constraints: [non_empty] }
      annotations: { type: Map, optional: true }
      standards: { type: Map, optional: true }
      context_map: { type: Map, optional: true }
      glossary: { type: Map, optional: true }
      models: { type: Map, optional: true }
      interfaces: { type: Map, optional: true }
      states: { type: Map, optional: true }
      authorization: { type: Map, optional: true }
      objectives: { type: Map, optional: true }
      scenarios: { type: Map, optional: true }
      flows: { type: Map, optional: true }
  DecisionDoc:
    kind: value_object
    fields:
      id: { type: String, constraints: [non_empty] }
      title: { type: String, constraints: [non_empty] }
      kind: { type: String }
      filename: { type: String, constraints: [non_empty] }
      body: { type: String }
  ChangeEntry:
    kind: value_object
    fields:
      id: { type: String, constraints: [non_empty] }
      work_item: { type: Map }
  ArchitectureDoc:
    kind: value_object
    fields:
      context: { type: String, optional: true }
      contexts: { type: Map, optional: true }
      modules: { type: Map, optional: true }
      overview: { type: String, optional: true }
      structure: { type: String, optional: true }
      stack: { type: String, optional: true }
  SiteInput:
    kind: value_object
    fields:
      scl: { type: SclDocument }
      decisions: { type: List<DecisionDoc> }
      work_items: { type: List<ChangeEntry> }
      architecture: { type: ArchitectureDoc, optional: true }
      title: { type: String, optional: true }
  HtmlDocument:
    kind: value_object
    fields:
      content: { type: String, constraints: [non_empty] }
  DiagramView:
    kind: value_object
    fields:
      kind: { type: String }
      nodes: { type: List<JSON> }
      edges: { type: List<JSON> }

interfaces:
  Render:
    description: |
      SCL 3.0 section と局所 constraint、contract、access、authorization、SLO、scenario、flow を
      所有要素の近くへ描画し、意味参照を安定 anchor へ結ぶ。
    input:
      input: { type: SiteInput }
    output:
      html: { type: HtmlDocument }
    requires:
      - input.input.scl.spec_version == "3.0"
    ensures:
      - output.html.content != ""
      - input.input.scl.models != null implies output.html.content.contains("models")
      - input.input.scl.authorization != null implies output.html.content.contains("authorization")
      - input.input.scl.flows != null implies output.html.content.contains("flows")
      - output.html.content.contains("Content-Security-Policy")
      - present_sections_have_stable_anchors(input.input.scl, output.html)
      - absent_sections_are_not_rendered(input.input.scl, output.html)
      - decisions_and_work_items_are_addressable(input.input, output.html)
      - user_text_is_escaped(input.input, output.html)
      - markdown_raw_html_is_disabled(input.input, output.html)
      - output_is_self_contained(output.html)
      - all_content_is_readable_without_javascript(output.html)
      - every_present_section_is_navigable(input.input.scl, output.html)
      - semantic_references_are_navigable(input.input.scl, output.html)
      - reading_position_is_indicated(output.html)
      - color_scheme_adapts_to_reader(output.html)
      - diagrams_are_derived_from_owned_relations(input.input.scl, output.html)
    access: internal
    idempotent: true
    read_only: true
  LoadSite:
    description: SCL、ADR、work item、Architecture map を読み SiteInput を返す。
    input:
      scl_path: { type: String, constraints: [non_empty] }
      decisions_dir: { type: String, optional: true }
      work_items_dir: { type: String, optional: true }
      architecture_path: { type: String, optional: true }
    output:
      input: { type: SiteInput }
    requires:
      - input.scl_path != ""
    ensures:
      - output.input.scl.spec_version == "3.0"
    access: internal
    read_only: true
  RenderCli:
    description: LoadSite と Render を呼び、HTML を file または stdout に出力する。
    access: public
    bindings:
      - kind: cli
        command: scl-to-html
        flags:
          - { name: scl, required: true }
          - { name: decisions, required: false }
          - { name: work-items, required: false }
          - { name: architecture, required: false }
          - { name: title, required: false }
          - { name: out, required: false }
        exit_codes:
          success: 0
          usage_error: 2

objectives:
  RenderLatency:
    interface: Render
    indicator: measurement.latency_ms < 500
    target: 0.95
    window: 30d
    budgeting: occurrences

scenarios:
  SCL 3.0 の全 section を表示できる:
    actor: Maintainer
    main_success:
      - 全 SectionKind を持つ SclDocument を Render に渡す
      - 各 section と所有要素の局所契約が HTML に表示される
  authorization を policy と action の近くに表示する:
    actor: Reader
    main_success:
      - protected interface と authorization を持つ HTML を開く
      - policy、principal、resource と interface access を相互に辿れる
  flow を navigation diagram として表示する:
    actor: Reader
    main_success:
      - flows を持つ HTML を開く
      - view と transition が SVG diagram と detail card に表示される
  意味参照を安定 anchor へ移動できる:
    actor: Reader
    main_success:
      - scenario 内の既知 model、interface、event 名を選択する
      - 対応する定義 card へ移動する
  user text は escape される:
    actor: Maintainer
    main_success:
      - HTML 特殊文字を含む SclDocument を Render に渡す
      - raw script を含まない HtmlDocument が返る
  JavaScript 無効時も全内容を読める:
    actor: Reader
    main_success:
      - JavaScript を無効にして HtmlDocument を開く
      - 全 tab の内容が縦に表示される
  work item の進捗と completion を表示する:
    actor: Reader
    main_success:
      - Plan、Tasks、completion を持つ ChangeEntry の HTML を開く
      - task progress と completion summary が同じ card に表示される

flows:
  SpecificationNavigation:
    entry: Overview
    views:
      Overview:
        sees: 概要タブ(system 名、spec_version、tab 一覧)
        does:
          - action: open_scl
            does: SCL タブをクリックする
            to: Scl
          - action: open_architecture
            does: Architecture タブをクリックする
            to: Architecture
          - action: open_decisions
            does: Decisions タブをクリックする
            to: Decisions
          - action: open_work_items
            does: Work Items タブをクリックする
            to: WorkItems
      Scl:
        sees: SCL タブ(standards・context_map・glossary・models・interfaces・states・authorization・objectives・scenarios・flows の各 section)
        does:
          - action: back
            does: 概要タブへ戻るボタンをクリックする
            to: Overview
      Architecture:
        sees: Architecture タブ(ARCHITECTURE.md の contexts・modules・overview・structure・stack)
        does:
          - action: back
            does: 概要タブへ戻るボタンをクリックする
            to: Overview
      Decisions:
        sees: Decisions タブ(ADR 一覧。各 ADR の id・title・本文)
        does:
          - action: back
            does: 概要タブへ戻るボタンをクリックする
            to: Overview
      WorkItems:
        sees: Work Items タブ(work item 一覧。各 work item の Plan・Tasks・completion)
        does:
          - action: back
            does: 概要タブへ戻るボタンをクリックする
            to: Overview
