# ra — Specification Core Language (SCL) Document

system: ra
spec_version: "3.0"

glossary:
  RaWorkspace:
    definition: Regenerative Architecture に従う標準レイアウトのリポジトリ。
    aliases: [workspace]
  StandardLayout:
    definition: 追加設定なしで RA CLI が発見する既定のファイル配置。
  ToolSpec:
    definition: RA core repository 内の tools/*/spec/scl.yaml。
  WorkspaceDiscovery:
    definition: registry に依存せず標準レイアウトから対象を決定する処理。
  Maintainer:
    definition: RA workspace を初期化、検証、描画する利用者。
  TraceabilityManifest:
    definition: SCL 規範要素、Architecture module、宣言済み check、実行 evidence を外部から直接結ぶ workspace マニフェスト。
  CoveragePolicy:
    definition: selector に一致する SCL 規範要素に必要な realization、check 数、evidence kind を定める規則。
  ExecutionEvidence:
    definition: 宣言済み check を特定 source revision に対して実行した結果。
  ExecutableArchitecture:
    definition: workspace の SCL context、module、runtime、実 import、complexity budget を直接照合する現在状態の地図。

models:
  WorkspaceApp:
    kind: value_object
    description: 標準レイアウトから発見されたアプリケーション仕様。
    fields:
      name: { type: String, constraints: [non_empty] }
      root: { type: String, constraints: [non_empty] }
      scl: { type: String, constraints: [non_empty] }
      context_glob: { type: String, optional: true }
      decisions: { type: String, optional: true }
      work_items: { type: String, optional: true }
  WorkspaceConfig:
    kind: value_object
    description: 発見済み workspace の検証・生成対象。
    fields:
      apps: { type: List<WorkspaceApp> }
      repository_work_items: { type: String, optional: true }
      tool_specs: { type: List<String> }
      architecture_docs: { type: List<String> }
  WorkspaceCommand:
    kind: enum
    values: [init, verify, yaml-check, render]
  NoWorkspaceTargets:
    kind: error
    fields:
      root: { type: String }
  TraceabilityFindingKind:
    kind: enum
    values: [realized_without_spec, specified_without_realization, specified_without_verification, verification_without_target, missing_evidence, stale_evidence]
  TraceabilityReport:
    kind: value_object
    description: workspace 追跡グラフの coverage と freshness の機械可読な検査結果。
    fields:
      findings: { type: List<TraceabilityFindingKind> }
      strict: { type: Boolean }
      passed: { type: Boolean }
  ArchitectureReport:
    kind: value_object
    description: Architecture map と workspace 実装の構造 drift を分類した検査結果。
    fields:
      findings: { type: List<String> }
      passed: { type: Boolean }

interfaces:
  DiscoverWorkspace:
    description: 現在の作業ディレクトリから標準 RA workspace を発見する。
    input:
      cwd: { type: String }
    output:
      config: { type: WorkspaceConfig }
    errors: [NoWorkspaceTargets]
    ensures:
      - output.config.apps.size() > 0 || output.config.tool_specs.size() > 0 || output.config.repository_work_items != null
      - output.config.tool_specs.size() >= 0
      - standard_layout_requires_no_registry(input.cwd, output.config)
    access: internal
    read_only: true
  RunWorkspaceCommand:
    description: 発見済み workspace に対して検証または派生物生成を実行する。
    input:
      command: { type: WorkspaceCommand }
      config: { type: WorkspaceConfig }
    output:
      exit_code: { type: Integer }
    ensures:
      - output.exit_code >= 0
      - public_command_name_is_ra(input.command)
    access: internal
  InitializeWorkspace:
    description: 現在の作業ディレクトリに標準 RA レイアウトを作成する。
    input:
      cwd: { type: String }
    output:
      created_layout: { type: Boolean }
    ensures:
      - output.created_layout implies input.cwd != ""
      - existing_scl_is_not_overwritten(input.cwd)
    access: internal
  CheckTraceability:
    description: workspace の四層追跡グラフを構築し、参照、coverage、evidence の新鮮さを検査する。
    input:
      workspace: { type: WorkspaceConfig }
      strict: { type: Boolean }
      source_revision: { type: String }
    output:
      report: { type: TraceabilityReport }
    ensures:
      - output.report.strict == input.strict
      - output.report.passed implies output.report.findings.size() == 0 || input.strict == false
      - successful_evidence_targets_revision(input.source_revision)
    access: internal
    read_only: true
  CheckArchitecture:
    description: Architecture map を SCL context、全 production source の module 所属、RA layer、declared dependency、runtime entrypoint、実 import、complexity budget と照合する。
    input:
      workspace: { type: WorkspaceConfig }
    output:
      report: { type: ArchitectureReport }
    ensures:
      - output.report.passed implies output.report.findings.size() == 0
      - every_workspace_scl_context_is_declared(input.workspace, output.report)
      - every_production_source_belongs_to_a_declared_module(input.workspace, output.report)
      - module_dependencies_are_acyclic_and_point_inward(input.workspace, output.report)
      - workspace_local_import_targets_belong_to_declared_modules(input.workspace, output.report)
      - production_imports_match_declared_dependencies(input.workspace, output.report)
      - runtime_entrypoints_belong_to_composed_modules(input.workspace, output.report)
      - complexity_debt_is_bounded_and_not_expired(input.workspace, output.report)
    access: internal
    read_only: true

objectives:
  TraceabilityDeterminism:
    description: 同一 workspace、manifest、source revision から安定した機械可読 report を生成する。
    interface: CheckTraceability
    indicator: measurement.report_order_instability == 0
    target: 1.0
    window: 30d
    budgeting: occurrences

scenarios:
  StandardAppWithoutRegistry:
    actor: Maintainer
    given:
      - spec/scl.yaml を持ち registry を持たないアプリ repo がある
    main_success:
      - Maintainer が DiscoverWorkspace を実行する
      - spec と work item が検証対象として発見される
  InitializeStandardLayout:
    actor: Maintainer
    given:
      - 空のアプリ repo がある
    main_success:
      - Maintainer が InitializeWorkspace を実行する
      - 標準ディレクトリが作成される
    extensions:
      - at: 1
        condition: spec/scl.yaml が既に存在する
        steps:
          - 既存の spec/scl.yaml は上書きされない
  CoreRepositoryToolSpecs:
    actor: Maintainer
    given:
      - RA core repository に複数の ToolSpec がある
    main_success:
      - Maintainer が render を実行する
      - 各 ToolSpec の HTML が同じ spec ディレクトリへ生成される
  EmptyRepositoryRejected:
    actor: Maintainer
    given:
      - 標準レイアウトの対象が何も存在しない
    main_success:
      - Maintainer が DiscoverWorkspace を実行する
      - NoWorkspaceTargets が返る
  TraceabilityReportOnly:
    actor: Maintainer
    given:
      - coverage debt を含む TraceabilityManifest がある
    main_success:
      - Maintainer が strict=false で CheckTraceability を実行する
      - finding が種別ごとに report される
      - finding があっても report-only check は成功する
  TraceabilityStrictRejectsDrift:
    actor: Maintainer
    given:
      - baseline で許容されていない coverage drift がある
    main_success:
      - Maintainer が strict=true で CheckTraceability を実行する
      - finding は機械可読 report に分類される
      - check は失敗する
    extensions:
      - at: 1
        condition: evidence の target revision が現在の source revision と異なる
        steps:
          - stale_evidence として分類される
  ExecutableArchitectureAcceptsDeclaredWorkspace:
    actor: Maintainer
    given:
      - 全 SCL context、module、runtime、dependency、complexity budget を宣言した workspace がある
    main_success:
      - Maintainer が CheckArchitecture を実行する
      - 全 production source、workspace-local import、runtime entrypoint が宣言 module へ解決される
      - report は成功する
  ExecutableArchitectureRejectsDrift:
    actor: Maintainer
    given:
      - 未宣言 module import または許可されない外向き layer dependency がある
    main_success:
      - Maintainer が CheckArchitecture を実行する
      - drift が finding に分類される
      - report は失敗する
    extensions:
      - at: 1
        condition: production source または workspace-local import 先がどの module にも所属しない
        steps:
          - import finding として拒否される
      - at: 1
        condition: runtime entrypoint が runtime の composed module に所属しない
        steps:
          - architecture finding として拒否される
      - at: 1
        condition: complexity debt が期限切れまたは baseline ceiling を超える
        steps:
          - complexity finding として拒否される
