# yaml-check — Specification Core Language (SCL) Document

system: yaml-check
spec_version: "3.0"

glossary:
  YamlInput:
    definition: 検査対象となる UTF-8 YAML テキストファイル。
  Finding:
    definition: 発生位置、重大度、メッセージを持つ検査違反。
  SchemaFinding:
    definition: 入力が選択された JSON Schema に適合しなかった Finding。
  SemanticFinding:
    definition: SCL section 間の参照、CEL binding、graph の意味的不整合を表す Finding。
  Maintainer:
    definition: YAML と SCL 文書を検証する利用者。

models:
  SchemaName:
    kind: enum
    values: [work-item, scl]
  FindingKind:
    kind: enum
    values: [parse, lint, schema, semantic, context_map]
  Severity:
    kind: enum
    values: [error, warning]
  Finding:
    kind: value_object
    fields:
      kind: { type: FindingKind }
      severity: { type: Severity, default: error }
      file: { type: String, constraints: [non_empty] }
      line: { type: Integer, constraints: [{ minimum: 1 }] }
      column: { type: Integer, constraints: [{ minimum: 1 }] }
      message: { type: String, constraints: [non_empty] }
    constraints:
      - line >= 1
      - column >= 1
  CheckResult:
    kind: value_object
    fields:
      file: { type: String, constraints: [non_empty] }
      findings: { type: List<Finding> }
      ok: { type: Boolean }
    constraints:
      - ok == (findings.size() == 0)
  CheckRunSummary:
    kind: value_object
    fields:
      total: { type: Integer, constraints: [{ minimum: 0 }] }
      failed: { type: Integer, constraints: [{ minimum: 0 }] }
      results: { type: List<CheckResult> }
    constraints:
      - total >= failed
      - total == results.size()

interfaces:
  CheckYaml:
    description: |
      YAML parse、text lint、SCL 3.0 schema と semantics、context map、
      work-item dependency を決定的な順序で検査する。
    input:
      files: { type: List<String>, constraints: [non_empty] }
      schema: { type: SchemaName, optional: true }
    output:
      summary: { type: CheckRunSummary }
      exit_code: { type: Integer }
    requires:
      - input.files.size() > 0
    ensures:
      - output.summary.total == input.files.size()
      - output.exit_code == 0 || output.exit_code == 1 || output.exit_code == 2
      - output.exit_code == 0 implies output.summary.failed == 0
      - output.summary.results.size() == output.summary.total
      - parse_precedes_schema(input.files, output.summary)
      - schema_validation_is_opt_in(input.schema, output.summary)
      - schema_name_is_validated_before_file_reads(input.schema, output.exit_code)
      - one_schema_is_applied_uniformly(input.schema, output.summary)
      - scl_schema_accepts_only_spec_version_3(input.schema, output.summary)
      - input_content_executes_no_code(input.files)
      - input_files_are_not_modified(input.files)
      - context_map_semantics_are_checked(input.files, output.summary)
      - work_item_dependencies_are_resolved_and_acyclic(input.files, output.summary)
      - warnings_do_not_fail(output.summary, output.exit_code)
      - finding_locations_are_within_source(output.summary)
    access: public
    idempotent: true
    read_only: true
    bindings:
      - kind: cli
        command: yaml-check
        flags:
          - { name: schema, short: s, required: false }
        args:
          - { name: files, position: 1, repeatable: true }
        exit_codes:
          success: 0
          findings_present: 1
          usage_error: 2
  ListSchemas:
    description: 同梱 SchemaName を安定順で返す。
    output:
      schemas: { type: List<SchemaName> }
    ensures:
      - output.schemas.size() > 0
    access: public
    read_only: true
    bindings:
      - kind: cli
        command: yaml-check
        flags:
          - { name: list-schemas, required: true }
        exit_codes: { success: 0 }

objectives:
  CheckLatency:
    description: 数十 KiB のファイル 30 件程度を対話的に検査できる。
    interface: CheckYaml
    indicator: measurement.latency_ms < 500
    target: 0.95
    window: 30d
    budgeting: occurrences

scenarios:
  正しい SCL 3.0 文書を検査できる:
    actor: Maintainer
    main_success:
      - Maintainer が spec_version 3.0 の文書を CheckYaml で検査する
      - schema と semantics の Finding はなく exit code 0 になる
  SCL 2.0 文書は拒否される:
    actor: Maintainer
    main_success:
      - Maintainer が spec_version 2.0 の文書を CheckYaml で検査する
      - SchemaFinding と exit code 1 が返る
  SCL 3.0 の未解決参照は拒否される:
    actor: Maintainer
    main_success:
      - 未知 policy を参照する protected interface を CheckYaml で検査する
      - SemanticFinding と exit code 1 が返る
  未知 schema 名は検査前に拒否される:
    actor: Maintainer
    main_success:
      - 未知 schema 名で CheckYaml を起動する
      - ファイルを読まず usage error の exit code 2 になる
  schema 指定なしでは parse と lint だけを行う:
    actor: Maintainer
    main_success:
      - schema 違反だが valid YAML の文書を schema 指定なしで検査する
      - SchemaFinding は返らない
  parse 失敗時は schema 検証を行わない:
    actor: Maintainer
    main_success:
      - 壊れた YAML を CheckYaml で検査する
      - parse Finding だけがその文書の構造検査結果になる
  work-item dependency graph を検査する:
    actor: Maintainer
    main_success:
      - work-item workspace を CheckYaml で検査する
      - 未解決参照、自己参照、循環が error として報告される
  context map の循環を検査する:
    actor: Maintainer
    main_success:
      - 循環した context_map を CheckYaml で検査する
      - ContextMap Finding と exit code 1 が返る
  warning だけなら成功する:
    actor: Maintainer
    main_success:
      - shared kernel 肥大 warning だけを持つ文書を検査する
      - Finding は表示され exit code は 0 になる
